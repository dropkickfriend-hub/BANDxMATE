// -- USER SOUNDBANK ----------------------------------------------------------
// Each install grows its own synth voice. An EMA of the user's inputs
// (chaos, density, swing, bpm, root, mic energy, onset rate) produces a
// "bias" vector that nudges the current STYLE_PROFILE's ranges. Persisted
// under namespace 'soundbank' in the local store so it survives reloads.
const userSoundbank = {
  ema: null,        // running mean of the feature vector
  alpha: 0.06,      // learning rate per observation
  _dirty: false,
  _saveTimer: null,
  _neutral(){
    return {chaosAvg:0.3, densityAvg:0.5, swingAvg:0.55, bpmNorm:0.5,
            rootPC:0, micRMS:0, onsetRate:0, samples:0};
  },
  observe(obs){
    if(!this.ema) this.ema=this._neutral();
    const a=this.alpha;
    for(const k of Object.keys(this.ema)){
      if(k==='samples') continue;
      if(obs[k]==null||isNaN(obs[k])) continue;
      this.ema[k]=this.ema[k]*(1-a)+obs[k]*a;
    }
    this.ema.samples=(this.ema.samples||0)+1;
    this._dirty=true;
    clearTimeout(this._saveTimer);
    this._saveTimer=setTimeout(()=>this.save(),4000);
  },
  // Returns bias multipliers that mergeProfile applies to the active STYLE_PROFILE.
  // Biases are small (roughly 0.85..1.20) so the synth stays inside safe ranges.
  currentBias(){
    const e=this.ema||this._neutral();
    // Centre each feature at neutral, then map to a bounded nudge.
    const dChaos  = e.chaosAvg   - 0.30;              // -0.25..+0.70
    const dDens   = e.densityAvg - 0.50;
    const dSwing  = e.swingAvg   - 0.55;
    const dBpm    = e.bpmNorm    - 0.50;              // 0=slow, 1=fast (bpm/180)
    const dMic    = Math.min(0.6, e.micRMS||0);
    const dOnset  = Math.min(1.5, e.onsetRate||0)/1.5;
    const clamp=(x,lo,hi)=>Math.max(lo,Math.min(hi,x));
    return {
      kickF0Lo:      clamp(1 + dBpm*0.15 - dChaos*0.05, 0.85, 1.15),
      kickF0Hi:      clamp(1 + dBpm*0.10 + dChaos*0.05, 0.85, 1.15),
      kickDecayLo:   clamp(1 - dChaos*0.20, 0.85, 1.10),
      kickDecayHi:   clamp(1 + dChaos*0.35, 0.90, 1.40),
      kickPunchLo:   clamp(1 + dMic*0.30 + dOnset*0.10, 0.90, 1.25),
      kickPunchHi:   clamp(1 + dMic*0.25 + dDens*0.10, 0.90, 1.25),
      kickClick:     clamp(1 + dChaos*0.25 + dOnset*0.15, 0.80, 1.30),
      kickSub:       clamp(1 + (-dBpm)*0.10 + dMic*0.10, 0.85, 1.20),
      microJitter:   clamp(1 + dChaos*0.50, 0.70, 1.60),
      swingBoost:    clamp(dSwing*8, -8, 8),    // added, not multiplied
      noteLenMult:   clamp(1 - dChaos*0.12, 0.85, 1.15),
      attackMult:    clamp(1 - dOnset*0.20, 0.75, 1.20),
      // Mode bias: nudges hat texture toward digital at high chaos, brush at low chaos.
      hatBias:       dChaos > 0.25 ? 'digital' : (dChaos < -0.15 ? 'brush' : null),
    };
  },
  async load(){
    const p=await genesisLocal.get('soundbank');
    if(p&&p.ema) this.ema=p.ema;
  },
  save(){
    if(!this._dirty) return;
    this._dirty=false;
    genesisLocal.put('soundbank',{ema:this.ema,_ts:Date.now()});
  },
};
if(typeof window!=='undefined') window.userSoundbank=userSoundbank;

// Shallow-merges a bias onto a STYLE_PROFILE without mutating the original.
// Range fields become [lo*biasLo, hi*biasHi]; scalars are multiplied; additive
// bias (swingBoost) is summed; mode biases override when set.
function mergeProfile(base, bias){
  if(!bias) return base;
  const mulR=(r,lo,hi)=>[r[0]*lo, r[1]*hi];
  const mul =(v,b )=>v*b;
  const out={...base};
  if(base.kickF0)    out.kickF0    = mulR(base.kickF0,    bias.kickF0Lo||1,    bias.kickF0Hi||1);
  if(base.kickDecay) out.kickDecay = mulR(base.kickDecay, bias.kickDecayLo||1, bias.kickDecayHi||1);
  if(base.kickPunch) out.kickPunch = mulR(base.kickPunch, bias.kickPunchLo||1, bias.kickPunchHi||1);
  if(base.kickClick!=null) out.kickClick = mul(base.kickClick, bias.kickClick||1);
  if(base.kickSub!=null)   out.kickSub   = mul(base.kickSub,   bias.kickSub||1);
  if(base.microJitter!=null) out.microJitter = mul(base.microJitter, bias.microJitter||1);
  if(base.swingBoost!=null)  out.swingBoost  = base.swingBoost + (bias.swingBoost||0);
  if(base.noteLenMult!=null) out.noteLenMult = mul(base.noteLenMult, bias.noteLenMult||1);
  if(base.attackMult!=null)  out.attackMult  = mul(base.attackMult,  bias.attackMult||1);
  if(bias.hatBias&&base.hatMode) out.hatMode = bias.hatBias;
  return out;
}

// -- TENSION ARC -------------------------------------------------------------
// Every 8 bars a conductor picks an "arc" from the library and assigns each
// voice a phase offset so voices stretch into and out of dissonance on their
// own schedule. `currentFor(role)` returns {h,r}: harmonic + rhythmic tension
// in 0..1. h biases Brain.choose toward dissonance; r widens microJitter,
// tightens note length, nudges swing via styleP's mergeProfile.
const tensionArc = {
  PHRASE: 8,
  currentArc: null,
  phaseOffset: {drum:0, bass:2, mid:4, lead:6},
  arcIndex: 0,
  intensity: 0.7,           // global 0..1 scaling -- can be turned up for chaotic moods
  lastArcName: null,

  library: [
    // Straight: everyone rises to bar 4 and resolves by bar 7.
    {name:'straight', offsets:{drum:0,bass:0,mid:0,lead:0},
      fn:(b)=>{ const c=Math.sin((b/7)*Math.PI); return {h:c, r:c*0.75}; }},
    // Mirror: harmony and rhythm swap -- when one is tense, the other rests.
    {name:'mirror', offsets:{drum:0,bass:0,mid:2,lead:4},
      fn:(b)=>{ const t=b/7; return {h:Math.sin(t*Math.PI), r:Math.sin((t+0.5)*Math.PI)}; }},
    // Call-and-response: tension flips each bar, passing voice-to-voice via offsets.
    {name:'call_response', offsets:{drum:0,bass:1,mid:2,lead:3},
      fn:(b)=>({h:(b%2===0)?0.9:0.15, r:(b%2===0)?0.3:0.7})},
    // Slow bloom: 6 bars of gradual tension, hard release on bar 7.
    {name:'slow_bloom', offsets:{drum:0,bass:1,mid:2,lead:3},
      fn:(b)=>{ if(b===7) return {h:0.05, r:0.1}; return {h:(b/6)*0.95, r:(b/6)*0.55}; }},
    // Shock-settle: max tension on bar 0, earn the resolution back over 7 bars.
    {name:'shock_settle', offsets:{drum:0,bass:2,mid:4,lead:6},
      fn:(b)=>({h:Math.max(0, 1 - b/6), r:Math.max(0, 0.8 - b/7)})},
    // Polyrhythm: harmony steady, rhythm pulses 3-over-4.
    {name:'polyrhythm', offsets:{drum:0,bass:0,mid:1,lead:2},
      fn:(b)=>({h:0.45, r:(b%3===0)?0.9:0.2})},
    // Ballad breathe: low overall tension, gentle swells.
    {name:'ballad', offsets:{drum:0,bass:1,mid:3,lead:5},
      fn:(b)=>{ const c=0.3+0.25*Math.sin((b/7)*Math.PI*2); return {h:c, r:c*0.45}; }},
    // Double-arc: two rise/falls per phrase for tighter breath.
    {name:'double', offsets:{drum:0,bass:2,mid:1,lead:3},
      fn:(b)=>{ const c=Math.abs(Math.sin((b/4)*Math.PI)); return {h:c, r:c*0.7}; }},
  ],

  pickArc(){
    const lib=this.library;
    let idx=Math.floor(Math.random()*lib.length);
    if(lib[idx].name===this.lastArcName && lib.length>1) idx=(idx+1)%lib.length;
    const pick=lib[idx];
    this.currentArc=pick;
    this.phaseOffset={...pick.offsets};
    this.lastArcName=pick.name;
  },

  advance(barCount){
    if(!this.currentArc || barCount%this.PHRASE===0) this.pickArc();
    this.arcIndex=((barCount%this.PHRASE)+this.PHRASE)%this.PHRASE;
  },

  currentFor(role){
    if(!this.currentArc) return {h:0, r:0};
    const off=this.phaseOffset[role]||0;
    const b=((this.arcIndex+off)%this.PHRASE+this.PHRASE)%this.PHRASE;
    const raw=this.currentArc.fn(b);
    return {
      h:Math.max(0,Math.min(1,(raw.h||0)*this.intensity)),
      r:Math.max(0,Math.min(1,(raw.r||0)*this.intensity)),
    };
  },

  // Rhythmic bias for styleP (feeds the same mergeProfile path as userSoundbank).
  // Uses the drum voice's rhythm tension (with a bass tail) since styleP is global.
  rhythmicBias(){
    const dR=this.currentFor('drum').r;
    const bR=this.currentFor('bass').r;
    const r=Math.max(dR, bR*0.8);
    return {
      microJitter: 1 + r*1.5,     // up to 2.5x grid scatter under max tension
      swingBoost:  r*6 - 3,       // small swing drift: -3..+3 ticks
      noteLenMult: 1 - r*0.15,    // tenser = shorter, more staccato
      attackMult:  1 - r*0.25,    // tenser = punchier attack
    };
  },

  serialize(){ return {name:this.currentArc?.name||null, idx:this.arcIndex, int:this.intensity}; },
  load(d){
    if(!d) return;
    if(d.name){
      const f=this.library.find(a=>a.name===d.name);
      if(f){ this.currentArc=f; this.phaseOffset={...f.offsets}; this.lastArcName=f.name; }
    }
    if(typeof d.idx==='number') this.arcIndex=d.idx;
    if(typeof d.int==='number') this.intensity=d.int;
  },
};
if(typeof window!=='undefined') window.tensionArc=tensionArc;

// -- CONDUCTOR + MOTION TWEENS ------------------------------------------------
// The "conductor" is the voice everyone else follows. If the user plays drums,
// bass takes the baton and provides the harmonic/timing anchor. If the user
// plays anything else, drums are the conductor. Other voices reference the
// conductor's phase/swing so they don't sound like they're ignoring each other.
const conductor = {
  role: 'drum',                  // 'drum' | 'bass' | 'mid' | 'lead'
  update(userRole){
    this.role = (userRole === 'drum') ? 'bass' : 'drum';
  },
};
if(typeof window!=='undefined') window.conductor=conductor;

// Smoothly interpolate a value toward a target. Used for swing and for
// envelope-shape morphing so parameters don't snap between bars. Rate is
// 0..1, higher = faster snap. Returns the new value. Safe on first call.
const motionTween = {
  // per-instrument swing amount [0..1], each moves toward a shared target at
  // its own rate so voices sway in loose sync rather than lockstep.
  swing: { drum: 0.18, bass: 0.18, mid: 0.18, lead: 0.18, target: 0.18 },
  // per-instrument envelope "openness" [0..1] -- drives attack/release shape
  // inside each synth function. Tweens toward a target driven by taste + arc.
  env:   { drum: 0.5,  bass: 0.5,  mid: 0.5,  lead: 0.5,  target: 0.5 },

  // Rates per instrument so drums snap faster (they define the pocket),
  // lead tweens slowest (it floats on top).
  rates: { drum: 0.35, bass: 0.22, mid: 0.18, lead: 0.14 },

  // Called each bar with fresh targets. Targets are derived from the tension
  // arc and bandTaste (so swing/envelope flow with the music, not a dial).
  step(arcTension){
    this.swing.target = Math.max(0, Math.min(1, 0.15 + arcTension*0.35 + bandTaste.groove*0.25));
    this.env.target   = Math.max(0.15, Math.min(1, 0.35 + arcTension*0.4 + bandTaste.density*0.2));
    for(const r of ['drum','bass','mid','lead']){
      const rate = this.rates[r];
      this.swing[r] = this.swing[r] + (this.swing.target - this.swing[r]) * rate;
      this.env[r]   = this.env[r]   + (this.env.target   - this.env[r])   * rate;
    }
  },

  swingFor(role){ return this.swing[role] ?? this.swing.target; },
  envFor(role){   return this.env[role]   ?? this.env.target;   },
};
if(typeof window!=='undefined') window.motionTween=motionTween;

// Helper: returns the current style profile object, biased by the user soundbank
// and then by the current rhythmic tension arc.
function styleP(){
  const base = STYLE_PROFILES[kickStyle]||STYLE_PROFILES.pop;
  const withUser = mergeProfile(base, userSoundbank.currentBias());
  return mergeProfile(withUser, tensionArc.rhythmicBias());
}

// Lerp between profile range values using a seed float [0-1]
function styleLerp(range, seed){ return range[0] + seed*(range[1]-range[0]); }

function synthKick(ctx,t,warp,dest,inputEnergy=0.5){
  const s=drumSeed();
  const sp=styleP(); // current style profile
  // LFO samples at trigger time -- continuous drift across hits
  const lSlow = lfoBank.get('slow',t);
  const lMed  = lfoBank.get('med',t);
  const lBr   = lfoBank.get('breath',t);
  // Artifact gate: if this seed is far from the learned-good kick region
  // (and we're not explicitly exploring via a wildcard), soften the hit so
  // the bad random values don't ruin the pocket.
  if(!s._wild && paramMemory.shouldGate('drum', s)){
    s.punch *= 0.55; s.decay *= 0.65; s.click *= 0.6;
    inputEnergy *= 0.55;
  }
  // Observe: punchy non-wildcard kicks teach the "good kick" distribution.
  if(!s._wild && inputEnergy > 0.45){
    paramMemory.observe('drum', {pitch:s.pitch,punch:s.punch,decay:s.decay,tone:s.tone,sub:s.sub,click:s.click}, inputEnergy);
  }

  // в”Ђв”Ђ Style-shaped parameters (LFO-nudged so each hit differs) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  const f0 = styleLerp(sp.kickF0, s.pitch+inputEnergy*0.3) * warp * (1 + lSlow*0.04);
  const f1 = styleLerp(sp.kickF1, s.pitch) * warp * (1 + lMed*0.06);
  const decay = styleLerp(sp.kickDecay, s.decay+inputEnergy*0.2) / warp * (1 + lBr*0.18);
  const punch = styleLerp(sp.kickPunch, s.punch) * (0.8+inputEnergy*0.2) * (1 + lMed*0.08);

  // в”Ђв”Ђ EDM extra: pre-kick click burst (the "knock") в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  if(kickStyle==='edm'){
    const knock=ctx.createOscillator(); knock.type='square';
    knock.frequency.setValueAtTime(f0*2.5,t);
    knock.frequency.exponentialRampToValueAtTime(f0*0.5,t+0.008/warp);
    const kg=ctx.createGain();
    kg.gain.setValueAtTime(0.55,t); kg.gain.linearRampToValueAtTime(0.0001,t+0.012/warp);
    knock.connect(kg); kg.connect(dest); knock.start(t); knock.stop(t+0.015/warp);
    autoClean(knock,kg);
  }

  // в”Ђв”Ђ BODY: sine sweep в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  const body=ctx.createOscillator(); body.type='sine';
  body.frequency.setValueAtTime(f0,t);
  body.frequency.setValueAtTime(f0*(kickStyle==='jazz'?0.88:0.92),t+0.002);
  body.frequency.exponentialRampToValueAtTime(f1,t+decay);
  const bg=ctx.createGain();
  bg.gain.setValueAtTime(0,t);
  // Jazz: slower attack for brushed feel; EDM: instant
  const attackT = kickStyle==='jazz'?0.008:kickStyle==='edm'?0.0005:0.003;
  bg.gain.linearRampToValueAtTime(punch, t+attackT);
  bg.gain.setValueAtTime(punch*(0.88+s.punch*0.08), t+attackT*3);
  bg.gain.linearRampToValueAtTime(0.0001, t+decay+(kickStyle==='edm'?0.12:0.04));
  bg.gain.setValueAtTime(0, t+decay+(kickStyle==='edm'?0.14:0.06));
  // 200Hz punch boost for hiphop/edm/westcoast -- gives kick the chest thump
  if(kickStyle==='edm'||kickStyle==='hiphop'||kickStyle==='westcoast'||kickStyle==='eastcoast'){
    const eq200=ctx.createBiquadFilter(); eq200.type='peaking';
    eq200.frequency.value=200; eq200.Q.value=1.4;
    eq200.gain.value=(kickStyle==='edm'?6:kickStyle==='westcoast'?5:4); // dB
    body.connect(eq200); eq200.connect(bg); bg.connect(dest);
    autoClean(eq200);
  }else{
    body.connect(bg); bg.connect(dest);
  }
  body.start(t); body.stop(t+decay+(kickStyle==='edm'?0.16:0.08));
  autoClean(body,bg);

  // в”Ђв”Ђ SUB LAYER: style-weighted в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  const subFreq=(22+s.pitch*14)*warp;
  // EDM gets a 4th subharmonic layer for massive low end
  const subLayers=kickStyle==='edm'?3:2;
  const subFreqs=[subFreq, subFreq*1.5, subFreq*0.5]; // fund, 3rd harmonic, sub-octave
  const subGains=[s.sub*sp.kickSub*0.65*punch, s.color*sp.kickSub*0.30*punch, sp.kickSub*0.45*punch];
  const subDecays=[decay*1.4, decay*0.85, decay*1.8];
  for(let i=0;i<subLayers;i++){
    const osc=ctx.createOscillator(); osc.type='sine'; osc.frequency.value=subFreqs[i];
    const sg=ctx.createGain();
    sg.gain.setValueAtTime(subGains[i],t);
    sg.gain.linearRampToValueAtTime(0.0001,t+subDecays[i]);
    sg.gain.setValueAtTime(0,t+subDecays[i]+0.01);
    osc.connect(sg); sg.connect(dest);
    osc.start(t); osc.stop(t+subDecays[i]+0.02);
    autoClean(osc,sg);
  }
  // Soft saturation on sub mix for warmth (EDM gets harder clip)
  const dist=ctx.createWaveShaper();
  const drive=kickStyle==='edm'?3.5:kickStyle==='jazz'?1.1:1.5;
  const cv=new Float32Array(512);for(let i=0;i<512;i++){const x=i*2/512-1;cv[i]=Math.tanh(x*drive);}
  dist.curve=cv;
  // (sub layers connect directly for simplicity, dist applied via body path)

  // в”Ђв”Ђ CLICK TRANSIENT: style-shaped в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  const ckVol = s.click * sp.kickClick;
  if(ckVol > 0.05){
    const ckFreq=(kickStyle==='jazz'?160:kickStyle==='edm'?350:220)+s.click*280;
    const click=ctx.createOscillator(); click.type='square';
    click.frequency.setValueAtTime(ckFreq*warp,t);
    click.frequency.exponentialRampToValueAtTime(ckFreq*warp*0.18,t+0.038/warp);
    const cg=ctx.createGain();
    cg.gain.setValueAtTime(ckVol,t);
    cg.gain.linearRampToValueAtTime(0.0001,t+(0.030+s.click*0.025)/warp);
    click.connect(cg); cg.connect(dest); click.start(t); click.stop(t+0.065/warp);
    autoClean(click,cg);
    // EDM: noise burst layered over click for extra snap
    if(kickStyle==='edm'){
      const buf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*0.02),ctx.sampleRate);
      const d=buf.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
      const ns=ctx.createBufferSource(); ns.buffer=buf;
      const nhpf=ctx.createBiquadFilter(); nhpf.type='highpass'; nhpf.frequency.value=4000;
      const ng=ctx.createGain(); ng.gain.setValueAtTime(0.35,t); ng.gain.linearRampToValueAtTime(0.0001,t+0.018);
      ns.connect(nhpf); nhpf.connect(ng); ng.connect(dest); ns.start(t);
      autoClean(ns,nhpf,ng);
    }
  }
}

function synthSnare(ctx,t,chaos,warp,dest,inputTight=0.5){
  const s=drumSeed();
  const lSlow = lfoBank.get('slow',t);
  const lMed  = lfoBank.get('med',t);
  // Artifact gate for snare -- uses the shared 'drum' memory.
  if(!s._wild && paramMemory.shouldGate('drum', s)){
    s.punch *= 0.60; s.decay *= 0.70; s.tone = (s.tone+0.5)*0.5;
  }
  const bodyFreq=(155+s.pitch*90+inputTight*50)*warp * (1 + lSlow*0.05);
  const tightness=s.tone*(0.5+inputTight*0.5) * (1 + lMed*0.12);

  // -- BODY: tonal thump -- unique pitch and decay per hit ------------------
  const body=ctx.createOscillator();
  body.type=s.color>0.5?'triangle':'sine';  // varies timbre class
  body.frequency.setValueAtTime(bodyFreq,t);
  body.frequency.exponentialRampToValueAtTime(bodyFreq*(0.55+s.tone*0.2),t+0.09/warp);
  const bg=ctx.createGain();
  bg.gain.setValueAtTime(s.punch*0.62,t);
  bg.gain.linearRampToValueAtTime(0.0001,t+(0.13+s.decay*0.08)/warp);
  bg.gain.setValueAtTime(0,t+(0.14+s.decay*0.08)/warp);
  body.connect(bg);bg.connect(dest);body.start(t);body.stop(t+(0.15+s.decay*0.08)/warp);
  autoClean(body,bg);

  // -- RING: metallic overtone, unique ratio and decay ---------------------
  if(s.color>0.3){  // not every hit has ring -- variation
    const ring=ctx.createOscillator();ring.type='sine';
    ring.frequency.value=bodyFreq*(1.4+s.color*0.8);  // unique ring pitch
    const rg=ctx.createGain();
    rg.gain.setValueAtTime(s.color*0.22,t);
    rg.gain.linearRampToValueAtTime(0.0001,t+(0.06+s.color*0.06)/warp);
    ring.connect(rg);rg.connect(dest);ring.start(t);ring.stop(t+0.16/warp);
    autoClean(ring,rg);
  }

  // -- CRACK: unique noise burst -- different spectral shape every hit ------
  // Generate noise with unique RNG seed pattern for spectral variety
  const crLen=Math.floor(ctx.sampleRate*(0.028+tightness*0.030));
  const crBuf=ctx.createBuffer(1,crLen,ctx.sampleRate);
  const crD=crBuf.getChannelData(0);
  const seed1=s.click,seed2=s.color;
  for(let i=0;i<crLen;i++){
    const noiseVal=(Math.random()*2-1);
    const shape=Math.pow(1-i/crLen,0.6+seed1);
    crD[i]=noiseVal*shape*(1+seed2*Math.sin(i*0.08+seed1*10));
  }
  const crack=ctx.createBufferSource();crack.buffer=crBuf;
  const ckHpf=ctx.createBiquadFilter();ckHpf.type='highpass';ckHpf.frequency.value=(2200+s.click*2800)*warp;
  const cg=ctx.createGain();cg.gain.setValueAtTime(s.click*0.90,t);cg.gain.linearRampToValueAtTime(0.0001,t+0.045/warp);
  crack.connect(ckHpf);ckHpf.connect(cg);cg.connect(dest);crack.start(t);
  autoClean(crack,ckHpf,cg);

  // -- TAIL: snare wire noise -- unique length, brightness, and texture ------
  const tLen=Math.floor(ctx.sampleRate*(0.16+chaos*0.12+s.decay*0.08)/warp);
  const tBuf=ctx.createBuffer(2,tLen,ctx.sampleRate);  // stereo for width
  for(let ch=0;ch<2;ch++){
    const td=tBuf.getChannelData(ch);
    for(let i=0;i<tLen;i++){
      td[i]=(Math.random()*2-1)*(ch===0?1+s.color*0.3:1-s.color*0.3);  // L/R differ
    }
  }
  const tail=ctx.createBufferSource();tail.buffer=tBuf;
  const hpf=ctx.createBiquadFilter();hpf.type='highpass';hpf.frequency.value=(1200+chaos*2000+s.color*1200)*warp;
  const lpf=ctx.createBiquadFilter();lpf.type='lowpass';lpf.frequency.value=(8000+s.click*6000)*warp;
  const tg=ctx.createGain();tg.gain.setValueAtTime(s.tone*0.52,t);tg.gain.linearRampToValueAtTime(0.0001,t+(0.18+s.decay*0.10)/warp);
  tail.connect(hpf);hpf.connect(lpf);lpf.connect(tg);tg.connect(dest);tail.start(t);
  autoClean(tail,hpf,lpf,tg);
}

function synthHat(ctx,t,open,chaos,warp,dest,inputBright=0.5,velocity=0.7){
  const s=drumSeed();
  const isCrash = open && chaos > 0.68 && Math.random()<0.22;
  const isRide  = open && !isCrash && s.tone > 0.65;
  const cymType = isCrash?'crash':isRide?'ride':open?'open':'closed';
  const hatMode = styleP().hatMode || 'metallic';
  // LFO-modulated brightness so consecutive hat hits drift in timbre
  const lBr = lfoBank.get('breath',t);
  const lFast = lfoBank.get('fast',t);
  synthCymbal(ctx, t, cymType, s, warp, dest,
    Math.max(0.05, Math.min(1, inputBright + lBr*0.15)),
    velocity * (1 + lFast*0.08),
    hatMode);
}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// STYLE-AWARE CYMBAL ENGINE
// Each hatMode produces a fundamentally different sound character:
//   metallic - physical model: inharmonic sine partials (pop/default)
//   brush    - jazz brush swish: filtered noise with soft envelope (Purdie feel)
//   digital  - FM noise synthesis: sharp, synthetic, bit-crushed (EDM/trap)
//   tape     - tape-saturated: waveshaper distortion, lo-fi warmth (Dilla MPC feel)
//   vinyl    - dusty vinyl crackle: high-pass filtered, gritty, sample-like
//   shaker   - granular burst: organic micro-grains, like a cabasa/shekere
//   tabla    - pitched membrane + buzz: resonant, tuned, tabla-inspired
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function synthCymbal(ctx, t, type, s, warp, dest, brightness=0.5, velocity=0.7, hatMode='metallic'){
  if(!dest) return;
  const SR = ctx.sampleRate;
  const vel = Math.max(0.05, Math.min(1, velocity));

  // Per-type base timing (all modes share these fundamentals)
  const baseDur = {
    closed: 0.022+s.decay*0.020,
    open:   0.12+s.decay*0.18,
    crash:  0.45+s.decay*0.45,
    ride:   0.20+s.decay*0.24,
  };
  const dur = (baseDur[type]||baseDur.closed) / warp;
  const atk = type==='closed' ? 0.0003+(1-vel)*0.002 : 0.001+(1-vel)*0.004;

  // в”Ђв”Ђ ROUTE BY HAT MODE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  if(hatMode==='brush'){
    // JAZZ BRUSH: Bernard Purdie's ride + hi-hat feel
    // Brushes on a cymbal = dense filtered noise, no sharp transient
    // Velocity controls "weight" -- ghost notes are barely-there wisps
    // Think: swishing brushes across a cymbal, not hitting it
    const brushDur = dur * (1.2 + vel*0.8); // brushes ring longer
    const nLen = Math.min(Math.ceil(SR*(brushDur+0.06)), SR*1.5|0);
    const nBuf = ctx.createBuffer(2, nLen, SR); // stereo for width
    // Per-channel noise with slightly different filtering = natural stereo
    for(let ch=0;ch<2;ch++){
      const nD = nBuf.getChannelData(ch);
      let p0=0,p1=0,p2=0;
      for(let i=0;i<nLen;i++){
        const w=Math.random()*2-1;
        // Deep pink noise -- warmer than standard pink, suits brushes
        p0=0.99765*p0+w*0.0990460; p1=0.96300*p1+w*0.2965164; p2=0.57000*p2+w*0.1;
        nD[i]=(p0+p1+p2+w*0.18)*0.06 * (ch===0?1+s.color*0.15:1-s.color*0.15);
      }
    }
    const ns = ctx.createBufferSource(); ns.buffer=nBuf;
    // Gentle bandpass: 1.5kHz-6kHz = warm brush zone (no harsh highs)
    const bhpf=ctx.createBiquadFilter(); bhpf.type='highpass';
    bhpf.frequency.value=(1200+s.pitch*800); bhpf.Q.value=0.3;
    const blpf=ctx.createBiquadFilter(); blpf.type='lowpass';
    blpf.frequency.value=(4500+brightness*2500+s.color*1500); blpf.Q.value=0.4+s.tone*0.3;
    // Soft envelope -- no click, just a swell and fade
    const bg=ctx.createGain();
    const peakVol = (0.10+vel*0.12)*(0.5+brightness*0.5);
    bg.gain.setValueAtTime(0.0001,t);
    // Slow attack = brush stroke starting. Ghost notes = even slower
    const brushAtk = vel<0.35 ? 0.008+s.decay*0.006 : 0.002+s.decay*0.003;
    bg.gain.linearRampToValueAtTime(peakVol, t+brushAtk);
    // Sustain plateau for open/ride
    if(type!=='closed'){
      bg.gain.setValueAtTime(peakVol*0.7, t+brushDur*0.3);
      bg.gain.exponentialRampToValueAtTime(0.0001, t+brushDur);
    }else{
      bg.gain.exponentialRampToValueAtTime(0.0001, t+brushDur*0.6);
    }
    ns.connect(bhpf); bhpf.connect(blpf); blpf.connect(bg); bg.connect(dest);
    ns.start(t); ns.stop(t+brushDur+0.05);
    autoClean(ns,bhpf,blpf,bg);

    // Brush has very subtle metallic shimmer (1-2 partials only, quiet)
    if(vel>0.3){
      const shimHz=(3800+s.pitch*1200)*warp;
      const shim=ctx.createOscillator(); shim.type='sine'; shim.frequency.value=shimHz;
      const sg=ctx.createGain();
      sg.gain.setValueAtTime(0.0001,t);
      sg.gain.linearRampToValueAtTime(vel*0.03,t+brushAtk);
      sg.gain.exponentialRampToValueAtTime(0.0001,t+brushDur*0.5);
      shim.connect(sg); sg.connect(dest);
      shim.start(t); shim.stop(t+brushDur*0.6);
      autoClean(shim,sg);
    }

  }else if(hatMode==='digital'){
    // EDM/TRAP DIGITAL HAT: FM-synthesized noise, sharp transient, bit-crush feel
    // Think: 808 machine hats but procedural -- tight, synthetic, cutting
    const digDur = type==='closed' ? 0.012+s.decay*0.010 : dur*0.8;
    // FM noise: two oscillators with irrational ratio = pseudo-noise
    const fmCarrier=ctx.createOscillator(); fmCarrier.type='square';
    const fmBase = (6000+s.pitch*4000+brightness*2000)*warp;
    fmCarrier.frequency.value=fmBase;
    const fmMod=ctx.createOscillator(); fmMod.type='square';
    fmMod.frequency.value=fmBase*1.4142; // sqrt(2) = irrational = noise-like
    const fmGain=ctx.createGain();
    fmGain.gain.value=fmBase*(2+s.color*4+vel*2); // high mod index = noisy
    fmMod.connect(fmGain); fmGain.connect(fmCarrier.frequency);
    // Bit-crush effect via waveshaper (staircase curve)
    const crush=ctx.createWaveShaper();
    const steps=Math.floor(6+s.tone*10); // 6-16 steps = more or less crushed
    const cv=new Float32Array(256);
    for(let i=0;i<256;i++){
      const x=i*2/256-1;
      cv[i]=Math.round(x*steps)/steps; // quantize
    }
    crush.curve=cv;
    // Extremely sharp envelope -- digital snap
    const dg=ctx.createGain();
    const dVol=(0.12+vel*0.16)*(0.5+brightness*0.5);
    dg.gain.setValueAtTime(dVol,t);
    dg.gain.setValueAtTime(dVol*0.85,t+0.001);
    dg.gain.exponentialRampToValueAtTime(0.0001,t+digDur);
    // HPF: remove all low end -- digital hats are pure top
    const dhpf=ctx.createBiquadFilter(); dhpf.type='highpass';
    dhpf.frequency.value=(5500+s.pitch*2000); dhpf.Q.value=0.7;
    fmCarrier.connect(crush); crush.connect(dhpf); dhpf.connect(dg); dg.connect(dest);
    fmCarrier.start(t); fmCarrier.stop(t+digDur+0.01);
    fmMod.start(t); fmMod.stop(t+digDur+0.01);
    autoClean(fmCarrier,fmMod,fmGain,crush,dhpf,dg);

    // Open/crash: add filtered noise tail
    if(type!=='closed'){
      const tLen=Math.ceil(SR*dur*0.7)|0;
      const tBuf=ctx.createBuffer(1,Math.max(1,tLen),SR);
      const tD=tBuf.getChannelData(0);
      for(let i=0;i<tLen;i++) tD[i]=(Math.random()*2-1)*Math.pow(1-i/tLen,0.8);
      const ts=ctx.createBufferSource();ts.buffer=tBuf;
      const thpf=ctx.createBiquadFilter();thpf.type='highpass';thpf.frequency.value=4000;
      const tg=ctx.createGain();
      tg.gain.setValueAtTime(0.08+vel*0.06,t+digDur*0.5);
      tg.gain.exponentialRampToValueAtTime(0.0001,t+dur);
      ts.connect(thpf);thpf.connect(tg);tg.connect(dest);
      ts.start(t+digDur*0.3);ts.stop(t+dur+0.05);
      autoClean(ts,thpf,tg);
    }

  }else if(hatMode==='tape'){
    // HIP-HOP TAPE-SAT HAT: J Dilla MPC2000 feel
    // Warm, compressed, slightly distorted, lo-fi but punchy
    // The hat from a dusty sample chopped through an SP-1200
    _synthCymbalMetallic(ctx,t,type,s,warp,brightness,vel,dur,atk,SR,function(signal){
      // Tape saturation: soft-clip waveshaper
      const sat=ctx.createWaveShaper();
      const cv=new Float32Array(512);
      const drive=2.5+s.tone*2.0; // warm but present
      for(let i=0;i<512;i++){const x=i*2/512-1; cv[i]=(3+drive)*x/(3+drive*Math.abs(x));}
      sat.curve=cv; sat.oversample='2x';
      // Lo-fi filter: roll off highs aggressively (tape head = ~8kHz ceiling)
      const lpf=ctx.createBiquadFilter();lpf.type='lowpass';
      lpf.frequency.value=(6000+brightness*2500)*warp; lpf.Q.value=0.6+s.color*0.4;
      // Slight mid bump (tape head resonance ~2.5kHz)
      const mid=ctx.createBiquadFilter();mid.type='peaking';
      mid.frequency.value=2500+s.pitch*500; mid.Q.value=1.2; mid.gain.value=3+vel*2;
      signal.connect(sat); sat.connect(lpf); lpf.connect(mid); mid.connect(dest);
      autoClean(sat,lpf,mid);
    });

  }else if(hatMode==='vinyl'){
    // EAST COAST VINYL HAT: dusty, crackly, sample-era feel
    // Like a hat from a vinyl break -- filtered, with artifacts
    _synthCymbalMetallic(ctx,t,type,s,warp,brightness,vel,dur,atk,SR,function(signal){
      // Vinyl filter: bandpass that mimics vinyl playback frequency response
      const bpf=ctx.createBiquadFilter();bpf.type='bandpass';
      bpf.frequency.value=(3500+s.pitch*1500+brightness*1000);
      bpf.Q.value=0.5+s.tone*0.5;
      signal.connect(bpf); bpf.connect(dest);
      autoClean(bpf);
    });
    // Add vinyl crackle layer
    const crkLen=Math.ceil(SR*dur*0.5)|0;
    const crkBuf=ctx.createBuffer(1,Math.max(1,crkLen),SR);
    const crkD=crkBuf.getChannelData(0);
    for(let i=0;i<crkLen;i++){
      // Sparse impulses = crackle
      crkD[i]=Math.random()<0.02?(Math.random()*2-1)*0.8:0;
    }
    const crk=ctx.createBufferSource();crk.buffer=crkBuf;
    const chpf=ctx.createBiquadFilter();chpf.type='highpass';chpf.frequency.value=2000;
    const cg=ctx.createGain();cg.gain.value=vel*0.04;
    crk.connect(chpf);chpf.connect(cg);cg.connect(dest);
    crk.start(t);crk.stop(t+dur*0.5+0.01);
    autoClean(crk,chpf,cg);

  }else if(hatMode==='shaker'){
    // AFRICAN SHAKER/CABASA: granular noise bursts = organic percussion
    // Multiple micro-grains with individual envelopes = shaker texture
    const shakerDur = type==='closed' ? 0.035+s.decay*0.025 : dur*1.1;
    const grainCount = type==='closed' ? 3+Math.floor(s.tone*4) : 6+Math.floor(s.tone*6);
    const grainLen = Math.floor(SR*0.003)|0; // 3ms micro-grains
    for(let gi=0;gi<grainCount;gi++){
      const gBuf=ctx.createBuffer(1,grainLen,SR);
      const gD=gBuf.getChannelData(0);
      // Each grain: unique filtered noise burst
      const gBright=0.3+Math.random()*0.7;
      for(let i=0;i<grainLen;i++){
        const env=Math.pow(1-i/grainLen,1.5); // fast decay per grain
        gD[i]=(Math.random()*2-1)*env*gBright;
      }
      const gs=ctx.createBufferSource();gs.buffer=gBuf;
      const ghpf=ctx.createBiquadFilter();ghpf.type='highpass';
      ghpf.frequency.value=(2500+Math.random()*3000+s.pitch*1500);
      const gg=ctx.createGain();
      const gVol=(0.06+vel*0.08)*(0.6+brightness*0.4)/(1+gi*0.08);
      gg.gain.value=gVol;
      gs.connect(ghpf);ghpf.connect(gg);gg.connect(dest);
      // Stagger grains across the duration for organic scatter
      const gOffset=gi*(shakerDur/grainCount)*(0.6+Math.random()*0.8);
      gs.start(t+gOffset);gs.stop(t+gOffset+0.004);
      autoClean(gs,ghpf,gg);
    }

  }else if(hatMode==='tabla'){
    // INDIAN TABLA-INSPIRED: pitched membrane + buzz wire resonance
    // Not a cymbal at all -- a tuned percussion sound
    const tabDur = type==='closed' ? 0.04+s.decay*0.03 : dur*0.8;
    // Membrane: pitched sine with pitch bend (like a "na" stroke)
    const memHz = (800+s.pitch*600+brightness*400)*warp;
    const mem=ctx.createOscillator();mem.type='sine';
    mem.frequency.setValueAtTime(memHz*1.15,t); // start slightly sharp
    mem.frequency.exponentialRampToValueAtTime(memHz,t+0.008); // settle
    const mg=ctx.createGain();
    mg.gain.setValueAtTime(0.0001,t);
    mg.gain.linearRampToValueAtTime((0.14+vel*0.14)*(0.5+brightness*0.5),t+0.001);
    mg.gain.exponentialRampToValueAtTime(0.0001,t+tabDur);
    mem.connect(mg);mg.connect(dest);
    mem.start(t);mem.stop(t+tabDur+0.02);
    autoClean(mem,mg);
    // Buzz wires: several very high partials with fast decay
    const buzzRatios=[2.6,4.15,5.82,7.41]; // non-integer = buzzy
    buzzRatios.forEach((ratio,bi)=>{
      const bHz=memHz*ratio*(1+s.color*0.02*bi);
      if(bHz>SR*0.45)return;
      const bo=ctx.createOscillator();bo.type='sine';bo.frequency.value=bHz;
      const bg=ctx.createGain();
      const bVol=vel*0.04/(bi+1);
      bg.gain.setValueAtTime(bVol,t);
      bg.gain.exponentialRampToValueAtTime(0.0001,t+tabDur*0.4/(bi+1));
      bo.connect(bg);bg.connect(dest);
      bo.start(t);bo.stop(t+tabDur*0.5);
      autoClean(bo,bg);
    });
    // Short noise burst for "skin" contact
    const skLen=Math.floor(SR*0.004)|0;
    const skBuf=ctx.createBuffer(1,skLen,SR);
    const skD=skBuf.getChannelData(0);
    for(let i=0;i<skLen;i++) skD[i]=(Math.random()*2-1)*Math.pow(1-i/skLen,2);
    const sk=ctx.createBufferSource();sk.buffer=skBuf;
    const skhpf=ctx.createBiquadFilter();skhpf.type='highpass';skhpf.frequency.value=3000;
    const skg=ctx.createGain();skg.gain.value=vel*0.12;
    sk.connect(skhpf);skhpf.connect(skg);skg.connect(dest);
    sk.start(t);
    autoClean(sk,skhpf,skg);

  }else{
    // DEFAULT METALLIC: physical cymbal model (pop / fallback)
    _synthCymbalMetallic(ctx,t,type,s,warp,brightness,vel,dur,atk,SR,function(signal){
      signal.connect(dest);
    });
  }
}

// в”Ђв”Ђ CORE METALLIC CYMBAL MODEL (used by metallic/tape/vinyl modes) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
// Outputs to a callback so post-processing (saturation, filtering) can be applied
function _synthCymbalMetallic(ctx,t,type,s,warp,brightness,vel,dur,atk,SR,connectFn){
  // Metallic partials: inharmonic sine stack
  const baseHz = (360 + s.pitch*280 + brightness*180) * (type==='open'?0.92:type==='crash'?0.78:type==='ride'?1.05:1.0);
  const ratios = [1.0, 1.483, 1.932, 2.694, 3.175, 4.055, 4.799, 5.621];
  const pGains = [1.0,  0.72,  0.55,  0.38,  0.28,  0.18,  0.11,  0.07];
  const nPartials = type==='closed'?5 : type==='ride'?7 : 6;
  const metalVol = type==='closed'?0.08+vel*0.10 : type==='ride'?0.18+vel*0.10 : 0.12+vel*0.10;
  const metalMix = ctx.createGain(); metalMix.gain.value = metalVol;

  // Output node -- all sound goes here, then to connectFn
  const outMix = ctx.createGain(); outMix.gain.value=1;
  connectFn(outMix);
  metalMix.connect(outMix);

  for(let pi=0; pi<nPartials; pi++){
    const pHz = baseHz * ratios[pi] * (1 + (s.color-0.5)*0.04*(pi+1));
    if(pHz > SR*0.46) continue;
    const osc = ctx.createOscillator(); osc.type='sine'; osc.frequency.value=pHz;
    const pg = ctx.createGain();
    const pDecay = dur * (1.0 - pi*0.08) * (0.7 + s.decay*0.35);
    const pVol = pGains[pi] * (0.6 + brightness*0.4);
    pg.gain.setValueAtTime(0.0001, t);
    pg.gain.linearRampToValueAtTime(pVol, t + atk);
    pg.gain.exponentialRampToValueAtTime(0.0001, t + Math.max(0.004, pDecay));
    osc.connect(pg); pg.connect(metalMix);
    osc.start(t); osc.stop(t + pDecay + 0.02);
    autoClean(osc, pg);
  }
  autoClean(metalMix);

  // Noise body
  const noiseVol = type==='closed'?0.18+vel*0.14 : type==='crash'?0.20+vel*0.12 : type==='ride'?0.08+vel*0.06 : 0.14+vel*0.10;
  const noiseLPF = type==='closed'?7000+s.color*3000 : type==='crash'?4000+s.color*2000 : type==='ride'?6000+s.color*3000 : 5500+s.color*2500;
  const washDur = type==='closed'?0 : type==='crash'?0.30+s.decay*0.20 : type==='ride'?0.05+s.decay*0.04 : 0.08+s.decay*0.06;
  const nDur = dur + washDur;
  const nLen = Math.min(Math.ceil(SR*(nDur+0.05)), SR*1.4|0);
  const nBuf = ctx.createBuffer(1, nLen, SR);
  const nD = nBuf.getChannelData(0);
  let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0;
  for(let i=0;i<nLen;i++){
    const wh=Math.random()*2-1;
    b0=0.99886*b0+wh*0.0555179; b1=0.99332*b1+wh*0.0750759;
    b2=0.96900*b2+wh*0.1538520; b3=0.86650*b3+wh*0.3104856;
    b4=0.55000*b4+wh*0.5329522; b5=-0.7616*b5-wh*0.0168980;
    nD[i]=(b0+b1+b2+b3+b4+b5+wh*0.5362)*0.11;
  }
  const ns = ctx.createBufferSource(); ns.buffer=nBuf;
  const nhpf = ctx.createBiquadFilter(); nhpf.type='highpass';
  nhpf.frequency.value = type==='closed'?4800 : type==='ride'?3600 : type==='crash'?1800 : 3200;
  nhpf.Q.value=0.5;
  const nlpf = ctx.createBiquadFilter(); nlpf.type='lowpass';
  nlpf.frequency.value=Math.min(noiseLPF,SR*0.46); nlpf.Q.value=0.3+s.tone*0.4;
  const ng = ctx.createGain();
  ng.gain.setValueAtTime(0.0001,t);
  ng.gain.linearRampToValueAtTime(noiseVol*(0.5+brightness*0.5),t+atk*2);
  ng.gain.exponentialRampToValueAtTime(0.0001,t+dur*0.7);
  ns.connect(nhpf); nhpf.connect(nlpf); nlpf.connect(ng); ng.connect(outMix);
  ns.start(t); ns.stop(t+nDur+0.05);
  autoClean(ns,nhpf,nlpf,ng);

  // Wash tail
  if(washDur > 0.02){
    const wLen=Math.ceil(SR*washDur)|0;
    const wBuf=ctx.createBuffer(1,Math.max(1,wLen),SR);
    const wD=wBuf.getChannelData(0);
    for(let i=0;i<wLen;i++) wD[i]=(Math.random()*2-1)*(1-i/wLen);
    const ws=ctx.createBufferSource();ws.buffer=wBuf;
    const wlpf=ctx.createBiquadFilter();wlpf.type='lowpass';
    wlpf.frequency.value=(3000+s.color*2000)*warp; wlpf.Q.value=0.5;
    const wg=ctx.createGain();
    wg.gain.setValueAtTime(0.10+brightness*0.06,t+dur*0.6);
    wg.gain.exponentialRampToValueAtTime(0.0001,t+dur+washDur*0.9);
    ws.connect(wlpf);wlpf.connect(wg);wg.connect(outMix);
    ws.start(t+dur*0.5);ws.stop(t+dur+washDur+0.05);
    autoClean(ws,wlpf,wg);
  }
  autoClean(outMix);
}

// Crash cymbal helper -- distinct accent hit
function synthCrash(ctx,t,chaos,warp,dest,energy=0.6){
  const s=drumSeed();
  const hatMode = styleP().hatMode || 'metallic';
  synthCymbal(ctx,t,'crash',s,warp,dest,energy,0.9,hatMode);
}

// Ride cymbal helper  
function synthRide(ctx,t,chaos,warp,dest,energy=0.4){
  const s=drumSeed();
  const hatMode = styleP().hatMode || 'metallic';
  synthCymbal(ctx,t,'ride',s,warp,dest,energy,0.7,hatMode);
}


// -- SUB BASS: dedicated sub instrument, routes to subBus (below 120Hz) --------
// Sub bass holds a note for longer -- it's a sustained low-end foundation.
// Stage rule: when sub is playing, bass rests. They alternate, never stack.
// -- NEURAL SUB BASS ENGINE ---------------------------------------------------
// Deep learning-inspired: winding number history shapes every parameter.
// Each note is generated by a "neural" weight vector trained on recent play.
// Sub uses 5-layer harmonic stack + FM modulation + chaos-driven waveshaping.

// Mini neural layer: maps input vector to output weights via tanh activations
function neuralLayer(inputs, weights){
  // Single hidden-layer network: inputs -> tanh -> weighted sum -> sigmoid
  const hidden = weights.map(row => Math.tanh(row.reduce((s,w,wi)=>s+w*(inputs[wi]||0),0)));
  return hidden.reduce((s,h)=>s+h,0)/hidden.length;
}

// Bass "brain" -- evolves weights based on recent winding numbers and chaos
const bassBrain={
  weights: Array.from({length:8},()=>Array.from({length:6},()=>Math.random()*2-1)),
  history: [],
  update(winding, chaos, pcMod, beat){
    const inputs=[winding/10, chaos, pcMod, beat/16, Math.sin(winding), Math.cos(chaos*Math.PI)];
    this.history.push(inputs);
    if(this.history.length>32)this.history.shift();
    // Hebbian-style update: reinforce weights that correlate with recent patterns
    if(this.history.length>4){
      const prev=this.history[this.history.length-5];
      this.weights=this.weights.map(row=>row.map((w,i)=>
        Math.max(-2,Math.min(2, w + 0.012*(inputs[i]-prev[i])*Math.tanh(w)))
      ));
    }
    return inputs;
  },
  infer(inputs){
    return{
      harmonicMix:  (neuralLayer(inputs,this.weights.slice(0,2))+1)/2,  // 0-1
      attackTime:   Math.abs(neuralLayer(inputs,this.weights.slice(2,4)))*0.08,
      filterCutoff: (neuralLayer(inputs,this.weights.slice(4,6))+1)/2,
      satAmount:    Math.abs(neuralLayer(inputs,this.weights.slice(6,8)))*3+0.5,
      subFreqMod:   neuralLayer(inputs,this.weights)*0.03,  // micro-detune
    };
  }
};

function synthSubBass(ctx, t, note, chaos, warp, windBoost=0, beat=0){
  const dest=bus.getInput('sub'); if(!dest)return;
  // Clamp note to true sub register: C0-C2 (12-36 MIDI)
  let subNote=note;
  while(subNote>36)subNote-=12;
  while(subNote<12)subNote+=12;
  const freq=440*Math.pow(2,(subNote-69)/12)*warp;
  const s=drumSeed();
  const pc=((subNote%12)+12)%12; const pcMod=pc/12;
  const subHz=freq*0.5;
  const weak=DeviceComp.score<0.45;

  const inputs=bassBrain.update(windBoost*10, chaos, pcMod, beat);
  const nn=bassBrain.infer(inputs);

  // LAYER 1: Primary sub -- EXACT frequency, no micro-detune on fundamental
  // Micro-detune on a low sine against bass = ~1Hz beating = audible artifact
  // Harmonics and FM voice can be detuned, but f1 must be clean
  const f1=subHz; // no subFreqMod here -- that goes on the FM layer only
  const osc1=ctx.createOscillator(); osc1.type='sine'; osc1.frequency.value=f1;
  const holdTime=(0.75+s.decay*0.5+windBoost*0.15)/warp;
  const attackT=Math.max(0.004,(nn.attackTime||0.01)*(1+chaos*0.5));
  const g1=ctx.createGain();
  g1.gain.setValueAtTime(0,t);
  g1.gain.linearRampToValueAtTime(0.80+windBoost*0.12, t+attackT);
  g1.gain.setValueAtTime(0.72+windBoost*0.10, t+holdTime*0.65);
  g1.gain.linearRampToValueAtTime(0.0001, t+holdTime);
  g1.gain.setValueAtTime(0, t+holdTime+0.003);

  // LAYER 2: 2nd harmonic -- exact 2x, no beating
  const osc2=ctx.createOscillator(); osc2.type='sine'; osc2.frequency.value=f1*2;
  const g2=ctx.createGain();
  g2.gain.setValueAtTime((nn.harmonicMix||0.2)*0.28+s.color*0.08,t+attackT*0.5);
  g2.gain.linearRampToValueAtTime(0.0001,t+holdTime*0.7);
  g2.gain.setValueAtTime(0,t+holdTime*0.72);

  // Shaper + filters
  const satCurve=new Float32Array(512);
  const sat=(nn.satAmount||1)*(1+chaos*0.8+windBoost*0.4);
  const tanhSat=Math.tanh(sat)||1;
  for(let si=0;si<512;si++){const x=si*2/512-1; satCurve[si]=Math.tanh(x*sat)/tanhSat;}
  const shaper=ctx.createWaveShaper(); shaper.curve=satCurve;
  const lpf1=ctx.createBiquadFilter(); lpf1.type='lowpass'; lpf1.frequency.value=110+windBoost*20; lpf1.Q.value=0.5;
  const lpf2=ctx.createBiquadFilter(); lpf2.type='lowpass'; lpf2.frequency.value=110+windBoost*20; lpf2.Q.value=0.5;

  // -- LFO 1: filter cutoff wobble -- slow, gives sub organic movement
  // Rate: 0.3-1.8Hz so it's felt as breath, not vibrato
  const lfo1=ctx.createOscillator(); lfo1.type='sine';
  lfo1.frequency.value=0.3+s.tone*1.5+chaos*0.8;
  const lfoGain1=ctx.createGain();
  lfoGain1.gain.value=(18+windBoost*12+chaos*20); // modulates lpf1 cutoff В±Hz
  lfo1.connect(lfoGain1); lfoGain1.connect(lpf1.frequency);
  lfo1.start(t); lfo1.stop(t+holdTime+0.1);
  autoClean(lfo1,lfoGain1);

  // -- LFO 2: amplitude tremolo -- very subtle, only on non-weak devices
  let lfo2=null,lfoGain2=null;
  if(!weak){
    lfo2=ctx.createOscillator(); lfo2.type='sine';
    // Slightly detuned from lfo1 so they don't phase-cancel
    lfo2.frequency.value=0.5+s.color*1.2+chaos*0.5;
    lfoGain2=ctx.createGain();
    lfoGain2.gain.value=0.06+chaos*0.05; // very subtle В±6% amplitude
    const lfoOffset=ctx.createGain(); lfoOffset.gain.value=1.0;
    lfo2.connect(lfoGain2); lfoGain2.connect(lfoOffset.gain);
    // Route through lfoOffset before mix so LFO modulates mix gain
    lfo2.start(t); lfo2.stop(t+holdTime+0.1);
    autoClean(lfo2,lfoGain2,lfoOffset);
  }

  const mix=ctx.createGain(); mix.gain.value=1.0;
  osc1.connect(g1); g1.connect(mix);
  osc2.connect(g2); g2.connect(mix);

  // LAYER 3+4: only on stronger devices
  let osc3=null,osc4=null,fmMod=null;
  if(!weak){
    osc3=ctx.createOscillator(); osc3.type='sine'; osc3.frequency.value=f1*3;
    const g3=ctx.createGain();
    g3.gain.setValueAtTime(chaos*0.15*(nn.harmonicMix||0.2)+windBoost*0.06,t+attackT);
    g3.gain.linearRampToValueAtTime(0.0001,t+holdTime*0.45);
    g3.gain.setValueAtTime(0,t+holdTime*0.47);
    osc3.connect(g3); g3.connect(mix);
    autoClean(osc3,g3);

    // FM voice: use subFreqMod here where slight detuning adds character not beating
    fmMod=ctx.createOscillator(); fmMod.type='sine';
    osc4=ctx.createOscillator(); osc4.type='sine'; osc4.frequency.value=f1;
    const fmRatio=1.0+pcMod*0.5+chaos*0.3+s.tone*0.2;
    fmMod.frequency.value=f1*fmRatio*(1+(nn.subFreqMod||0)*0.5); // subFreqMod safe here
    const fmDepth=ctx.createGain();
    fmDepth.gain.value=f1*(0.12+windBoost*0.18+chaos*0.22+s.sub*0.15);
    fmMod.connect(fmDepth); fmDepth.connect(osc4.frequency);
    const g4=ctx.createGain();
    g4.gain.setValueAtTime((nn.filterCutoff||0.3)*0.35+chaos*0.10,t+attackT*0.3);
    g4.gain.linearRampToValueAtTime(0.0001,t+holdTime*0.55);
    g4.gain.setValueAtTime(0,t+holdTime*0.57);
    osc4.connect(g4); g4.connect(mix);
    autoClean(osc4,g4); autoClean(fmMod,fmDepth);
  }

  mix.connect(shaper); shaper.connect(lpf1); lpf1.connect(lpf2); lpf2.connect(dest);
  const stopT=t+holdTime+0.08;
  osc1.start(t); osc1.stop(stopT);
  osc2.start(t); osc2.stop(stopT);
  if(osc3){osc3.start(t);osc3.stop(stopT);}
  if(osc4){osc4.start(t);osc4.stop(stopT);}
  if(fmMod){fmMod.start(t);fmMod.stop(stopT);}
  autoClean(osc1,g1,mix,shaper,lpf1,lpf2);
  autoClean(osc2,g2);
}


// -- NEURAL BASS ENGINE --------------------------------------------------------
// Midrange bass (60-600Hz) with neural filter envelope shaping.
// Winding number history determines attack character, resonance, and envelope.
// 4 synthesis modes selected by neural inference: pluck, slap, sustain, growl.


// в”Ђв”Ђ PER-GENRE BASS SYNTHS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

// 808 sub bomb: sine sweep with long tail + pitch envelope + noise transient
function synth808(ctx, t, note, chaos, warp, windBoost=0, destIn=null){
  const dest=destIn||bus.getInput('bass'); if(!dest)return;
  const baseFreq=440*Math.pow(2,(note-69)/12);
  const s=drumSeed();
  const decay=(1.2+s.decay*0.8+windBoost*0.4)/warp;  // long 808 tail
  const punch=0.90+s.punch*0.15;

  // в”Ђв”Ђ Pitch envelope: drops from 2Г— to fundamental в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  const osc=ctx.createOscillator(); osc.type='sine';
  osc.frequency.setValueAtTime(baseFreq*2.2,t);
  osc.frequency.setTargetAtTime(baseFreq,t+0.005,0.03+chaos*0.04);  // portamento
  osc.frequency.setTargetAtTime(baseFreq*0.985,t+0.2,0.15);         // slight drift

  const gainEnv=ctx.createGain();
  gainEnv.gain.setValueAtTime(0,t);
  gainEnv.gain.linearRampToValueAtTime(punch,t+0.003);
  gainEnv.gain.setValueAtTime(punch*0.95,t+0.010);
  gainEnv.gain.setTargetAtTime(0.0001,t+0.08,decay*0.38);
  gainEnv.gain.setValueAtTime(0,t+decay+0.1);

  // в”Ђв”Ђ Saturation: asymmetric waveshaper for harmonic grit в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  const ws=ctx.createWaveShaper();
  const cv=new Float32Array(512);
  for(let i=0;i<512;i++){const x=i*2/512-1;cv[i]=x<0?-Math.pow(-x,0.7):Math.pow(x,0.85);}
  ws.curve=cv; ws.oversample='4x';

  // в”Ђв”Ђ Sub layer: octave below for skull-rattling weight в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  const sub=ctx.createOscillator(); sub.type='sine';
  sub.frequency.setValueAtTime(baseFreq,t);
  sub.frequency.setTargetAtTime(baseFreq*0.5,t+0.008,0.06);
  const subG=ctx.createGain();
  subG.gain.setValueAtTime(0,t);
  subG.gain.linearRampToValueAtTime(0.70+windBoost*0.15,t+0.006);
  subG.gain.setTargetAtTime(0.0001,t+0.1,decay*0.50);
  subG.gain.setValueAtTime(0,t+decay+0.15);

  // в”Ђв”Ђ Click transient: snap at the top в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  const click=ctx.createOscillator(); click.type='square';
  click.frequency.setValueAtTime(baseFreq*8,t);
  click.frequency.exponentialRampToValueAtTime(baseFreq*2,t+0.015/warp);
  const cg=ctx.createGain();
  cg.gain.setValueAtTime(0.55+chaos*0.15,t);
  cg.gain.linearRampToValueAtTime(0.0001,t+0.025/warp);

  // в”Ђв”Ђ LPF: rolls off highs for boom-y body в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  const lpf=ctx.createBiquadFilter(); lpf.type='lowpass';
  lpf.frequency.setValueAtTime(280+chaos*200,t);
  lpf.frequency.setTargetAtTime(80,t+0.05,0.12);
  lpf.Q.value=1.5;

  osc.connect(ws); ws.connect(gainEnv); gainEnv.connect(lpf); lpf.connect(dest);
  sub.connect(subG); subG.connect(dest);
  click.connect(cg); cg.connect(dest);
  osc.start(t); osc.stop(t+decay+0.2);
  sub.start(t); sub.stop(t+decay+0.2);
  click.start(t); click.stop(t+0.035/warp);
  autoClean(osc,ws,gainEnv,lpf); autoClean(sub,subG); autoClean(click,cg);
}

// Upright/acoustic bass: Karplus-Strong inspired pluck with body resonance
function synthUprightBass(ctx, t, note, chaos, warp, windBoost=0, destIn=null){
  const dest=destIn||bus.getInput('bass'); if(!dest)return;
  const freq=440*Math.pow(2,(note-69)/12)*warp;
  const s=drumSeed();
  const decay=(0.35+s.decay*0.25+windBoost*0.12)/warp;

  // Noise burst в†’ resonant comb = plucked string feel
  const bufLen=Math.floor(ctx.sampleRate/freq);
  const noiseLen=Math.floor(ctx.sampleRate*0.04);
  const noiseBuf=ctx.createBuffer(1,noiseLen,ctx.sampleRate);
  const nd=noiseBuf.getChannelData(0);
  for(let i=0;i<noiseLen;i++) nd[i]=Math.random()*2-1;
  const ns=ctx.createBufferSource(); ns.buffer=noiseBuf;

  // Body resonance: bandpass tuned to note + 2 harmonics
  const body=ctx.createBiquadFilter(); body.type='bandpass';
  body.frequency.value=freq; body.Q.value=18+windBoost*8;
  const harm=ctx.createBiquadFilter(); harm.type='bandpass';
  harm.frequency.value=freq*2.01; harm.Q.value=12;
  const harmG=ctx.createGain(); harmG.gain.value=0.25+s.color*0.12;

  // Warm LPF: wood body cuts highs
  const lpf=ctx.createBiquadFilter(); lpf.type='lowpass';
  lpf.frequency.value=(700+windBoost*300)*warp; lpf.Q.value=0.8;

  const g=ctx.createGain();
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(0.72+windBoost*0.1,t+0.012); // slow bow-like attack
  g.gain.linearRampToValueAtTime(0.0001,t+decay);
  g.gain.setValueAtTime(0,t+decay+0.01);

  ns.connect(body); body.connect(g);
  ns.connect(harm); harm.connect(harmG); harmG.connect(g);
  g.connect(lpf); lpf.connect(dest);
  ns.start(t); ns.stop(t+decay+0.02);
  autoClean(ns,body,harm,harmG,g,lpf);
}

// G-Funk synth bass: Moog-style portamento slide, wide filter sweep
function synthGFunkBass(ctx, t, note, chaos, warp, windBoost=0, prevNote=60, destIn=null){
  const dest=destIn||bus.getInput('bass'); if(!dest)return;
  const freq=440*Math.pow(2,(note-69)/12)*warp;
  const prevFreq=440*Math.pow(2,(prevNote-69)/12)*warp;
  const s=drumSeed();
  const decay=(0.55+s.decay*0.35)/warp;

  const osc=ctx.createOscillator(); osc.type='sawtooth';
  // Portamento from previous note -- the G-Funk slide
  osc.frequency.setValueAtTime(prevFreq,t);
  osc.frequency.setTargetAtTime(freq,t,0.04+chaos*0.03);  // slide time

  // Wide resonant filter sweep -- the Moog signature
  const flt=ctx.createBiquadFilter(); flt.type='lowpass';
  flt.Q.value=8+chaos*10+windBoost*6;
  flt.frequency.setValueAtTime(freq*12+windBoost*800,t);
  flt.frequency.setTargetAtTime(freq*1.5,t+0.06,0.12);

  // Detune second osc for thickness
  const osc2=ctx.createOscillator(); osc2.type='sawtooth';
  osc2.frequency.setValueAtTime(prevFreq*1.003,t);
  osc2.frequency.setTargetAtTime(freq*1.003,t,0.042);
  const osc2g=ctx.createGain(); osc2g.gain.value=0.4;

  const g=ctx.createGain();
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(0.75+windBoost*0.12,t+0.008);
  g.gain.linearRampToValueAtTime(0.0001,t+decay);
  g.gain.setValueAtTime(0,t+decay+0.01);

  osc.connect(flt); osc2.connect(osc2g); osc2g.connect(flt);
  flt.connect(g); g.connect(dest);
  osc.start(t); osc2.start(t);
  osc.stop(t+decay+0.02); osc2.stop(t+decay+0.02);
  autoClean(osc,osc2,osc2g,flt,g);
}

// Boom-bap staccato electric bass: gritty, short, percussive
function synthBoomBapBass(ctx, t, note, chaos, warp, windBoost=0, destIn=null){
  const dest=destIn||bus.getInput('bass'); if(!dest)return;
  const freq=440*Math.pow(2,(note-69)/12)*warp;
  const s=drumSeed();
  const decay=(0.12+s.decay*0.10)/warp;  // very short

  const osc=ctx.createOscillator(); osc.type='square';
  osc.frequency.value=freq;
  osc.detune.value=s.color*8-4;

  // Grit waveshaper
  const ws=ctx.createWaveShaper();
  const cv=new Float32Array(256);
  for(let i=0;i<256;i++){const x=i*2/256-1;cv[i]=Math.tanh(x*(2.5+windBoost*2));}
  ws.curve=cv;

  // Tight lowpass
  const lpf=ctx.createBiquadFilter(); lpf.type='lowpass';
  lpf.frequency.value=(300+chaos*400)*warp; lpf.Q.value=3;

  const g=ctx.createGain();
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(0.85,t+0.001);  // instant attack
  g.gain.linearRampToValueAtTime(0.0001,t+decay);
  g.gain.setValueAtTime(0,t+decay+0.01);

  osc.connect(ws); ws.connect(lpf); lpf.connect(g); g.connect(dest);
  osc.start(t); osc.stop(t+decay+0.02);
  autoClean(osc,ws,lpf,g);
}

// African clay/wood sub: resonant wood body, deep sub, very dynamic velocity
function synthAfroSub(ctx, t, note, chaos, warp, velocity=0.7, windBoost=0, destIn=null){
  const dest=destIn||bus.getInput('bass'); if(!dest)return;
  const freq=440*Math.pow(2,(note-69)/12)*warp;
  const s=drumSeed();
  const decay=(0.18+s.decay*0.14+windBoost*0.08)/warp;

  // Sub sine: clay resonator body
  const sub=ctx.createOscillator(); sub.type='sine';
  sub.frequency.setValueAtTime(freq*1.08,t);
  sub.frequency.setTargetAtTime(freq,t+0.01,0.025);

  // Overtone layer: wood body character
  const over=ctx.createOscillator(); over.type='triangle';
  over.frequency.value=freq*2.03;
  const og=ctx.createGain(); og.gain.value=velocity*0.22*s.color;

  // Wood thump: bandpass noise burst
  const nLen=Math.floor(ctx.sampleRate*0.06);
  const nBuf=ctx.createBuffer(1,nLen,ctx.sampleRate);
  const nd=nBuf.getChannelData(0);
  for(let i=0;i<nLen;i++) nd[i]=(Math.random()*2-1)*Math.exp(-i/nLen*8);
  const ns=ctx.createBufferSource(); ns.buffer=nBuf;
  const nbp=ctx.createBiquadFilter(); nbp.type='bandpass';
  nbp.frequency.value=freq*3+200; nbp.Q.value=4;
  const ng=ctx.createGain(); ng.gain.value=velocity*0.35;

  const g=ctx.createGain();
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(velocity*0.80,t+0.004);
  g.gain.linearRampToValueAtTime(0.0001,t+decay);
  g.gain.setValueAtTime(0,t+decay+0.01);

  sub.connect(g); over.connect(og); og.connect(g); g.connect(dest);
  ns.connect(nbp); nbp.connect(ng); ng.connect(dest);
  sub.start(t); sub.stop(t+decay+0.02);
  over.start(t); over.stop(t+decay+0.02);
  ns.start(t);
  autoClean(sub,over,og,g); autoClean(ns,nbp,ng);
}

// Tanpura/Indian drone sub: very long sustain, slight detuning for sitar-like shimmer
function synthTanpuraBass(ctx, t, note, chaos, warp, windBoost=0, destIn=null){
  const dest=destIn||bus.getInput('bass'); if(!dest)return;
  const freq=440*Math.pow(2,(note-69)/12)*warp;
  const s=drumSeed();
  const decay=(0.80+s.decay*0.6+windBoost*0.3)/warp;  // very long

  // 3 slightly detuned sines for tanpura shimmer
  const detunes=[0, 6, -4];
  for(const dt of detunes){
    const osc=ctx.createOscillator(); osc.type='sine';
    osc.frequency.value=freq*(1+dt*0.0001);
    // Slow modulation for beating
    const lfo=ctx.createOscillator(); lfo.type='sine';
    lfo.frequency.value=0.8+s.tone*0.6;
    const lfoG=ctx.createGain(); lfoG.gain.value=freq*0.003;
    lfo.connect(lfoG); lfoG.connect(osc.frequency);
    const g=ctx.createGain();
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.28,t+0.035);  // slow swell
    g.gain.linearRampToValueAtTime(0.0001,t+decay);
    g.gain.setValueAtTime(0,t+decay+0.01);
    osc.connect(g); g.connect(dest);
    osc.start(t); lfo.start(t); osc.stop(t+decay+0.02); lfo.stop(t+decay+0.02);
    autoClean(osc,lfo,lfoG,g);
  }
}

// Wood percussion: tabla/djembe-style short dynamic hits (African + Indian)
function synthWoodPerc(ctx, t, velocity=0.7, pitch=1.0, warp=1.0, dest){
  if(!dest)return;
  const s=drumSeed();
  const baseFreq=(180+s.pitch*140)*pitch*warp;
  const decay=(0.06+s.decay*0.07+velocity*0.04)/warp;

  // Body: membrane drum resonance
  const body=ctx.createOscillator(); body.type='sine';
  body.frequency.setValueAtTime(baseFreq*1.6,t);
  body.frequency.setTargetAtTime(baseFreq,t+0.003,0.018);

  // Skin snap: noise through tight bandpass
  const nLen=Math.floor(ctx.sampleRate*0.03);
  const nBuf=ctx.createBuffer(1,nLen,ctx.sampleRate);
  const nd=nBuf.getChannelData(0);
  for(let i=0;i<nLen;i++) nd[i]=(Math.random()*2-1)*Math.exp(-i/nLen*15);
  const ns=ctx.createBufferSource(); ns.buffer=nBuf;
  const nbp=ctx.createBiquadFilter(); nbp.type='bandpass';
  nbp.frequency.value=baseFreq*2.5; nbp.Q.value=6;
  const ng=ctx.createGain(); ng.gain.value=velocity*0.50;

  const g=ctx.createGain();
  g.gain.setValueAtTime(0,t);
