  g.gain.setValueAtTime(0,t+decay+0.005);

  body.connect(g); g.connect(dest);
  ns.connect(nbp); nbp.connect(ng); ng.connect(dest);
  body.start(t); body.stop(t+decay+0.01);
  ns.start(t);
  autoClean(body,g); autoClean(ns,nbp,ng);
}

// Rhodes electric piano: FM tine model (operator pair + tremolo)
function synthRhodes(ctx, t, notes, chordType, chaos, warp, dest, windBoost=0){
  if(!dest)return;
  const s=drumSeed();
  const dark=bandTaste.darkness;
  const _ms=styleP(); 
  const sustain=(0.9+s.tone*0.5+windBoost*0.2)*_ms.noteLenMult/warp;
  const atk=0.008*_ms.attackMult;

  for(const semis of (notes||[0])){
    const freq=440*Math.pow(2,(semis-69)/12)*warp;
    if(freq<=0)continue;

    // Carrier + modulator FM pair (classic Rhodes tine simulation)
    const carrier=ctx.createOscillator(); carrier.type='sine';
    carrier.frequency.value=freq;

    const modFreq=freq*(1.0+dark*0.1);  // slight inharmonicity = warmth
    const mod=ctx.createOscillator(); mod.type='sine';
    mod.frequency.value=modFreq;
    const modIdx=ctx.createGain();
    modIdx.gain.setValueAtTime(freq*(0.45+dark*0.3+s.punch*0.2),t);    // attack brightness
    modIdx.gain.setTargetAtTime(freq*(0.06+dark*0.04),t+atk,0.18/warp); // decay to mellow

    // Tremolo LFO (the classic Rhodes wobble)
    const trem=ctx.createOscillator(); trem.type='sine';
    trem.frequency.value=4.5+s.tone*2.5+chaos*1.5;
    const tremAmt=ctx.createGain(); tremAmt.gain.value=0.06+dark*0.06+chaos*0.04;
    const tremDC=ctx.createGain(); tremDC.gain.value=1;

    // Envelope
    const g=ctx.createGain();
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.22+s.punch*0.06,t+atk);
    g.gain.setTargetAtTime(0.12,t+atk+0.05,0.15/warp);        // sustain plateau
    g.gain.linearRampToValueAtTime(0.0001,t+sustain);
    g.gain.setValueAtTime(0,t+sustain+0.01);

    mod.connect(modIdx); modIdx.connect(carrier.frequency);
    trem.connect(tremAmt); tremAmt.connect(tremDC);
    carrier.connect(g); g.connect(dest);  // tremolo on amplitude
    trem.connect(tremAmt);

    carrier.start(t); mod.start(t); trem.start(t);
    carrier.stop(t+sustain+0.02); mod.stop(t+sustain+0.02); trem.stop(t+sustain+0.02);
    autoClean(carrier,mod,modIdx,g,trem,tremAmt,tremDC);
  }
}

function synthBass(ctx, t, note, chaos, warp, windBoost=0, inputChar=0.5, beat=0, destIn=null){
  const dest=destIn||bus.getInput('bass'); if(!dest)return;
  const freq=440*Math.pow(2,(note-69)/12)*warp;
  const s=drumSeed();
  const pc=((note%12)+12)%12; const pcMod=pc/12;
  // LFO: slow drift on cutoff offset, med drift on the presence harmonic
  // gain (below). No fast LFO on bass -- 2Hz vibrato on low notes = cartoon.
  const lSlow = lfoBank.get('slow',t);
  const lMed  = lfoBank.get('med',t);
  // Bias a few per-hit parameters toward learned-good bass values.
  s.punch = paramMemory.bias('bass','punch', s.punch);
  s.tone  = paramMemory.bias('bass','tone',  s.tone);
  // Gate bass if the remaining seed is still far off the learned norm.
  if(!s._wild && paramMemory.shouldGate('bass', s)){
    s.punch *= 0.65; s.tone *= 0.8; windBoost *= 0.6;
  }

  // Neural inputs -- same brain as sub, different inference
  const inputs=bassBrain.update(windBoost*10, chaos, pcMod, beat);
  const nn=bassBrain.infer(inputs);

  // Select synthesis mode from neural output + chaos
  // 0=pluck 1=slap 2=sustain 3=growl
  const modeVal=(nn.harmonicMix + chaos*0.3 + windBoost*0.2 + pcMod*0.15) % 1.0;
  const mode=modeVal<0.28?'pluck':modeVal<0.52?'slap':modeVal<0.76?'sustain':'growl';

  const _styleLen=styleP().noteLenMult;
  // Envelope tween: scale decay by the slow-moving envelope target for bass.
  // Tight (low env) = shorter/punchier. Open (high env) = longer, breathier.
  const _bassEnv = motionTween.envFor('bass');
  const decayTime={pluck:0.22*_styleLen,slap:0.18*_styleLen,sustain:0.55*_styleLen,growl:0.40*_styleLen}[mode]/warp * (0.6 + _bassEnv*0.8);
  const bodyType={pluck:'triangle',slap:'square',sustain:'sawtooth',growl:'sawtooth'}[mode];

  // -- BODY OSCILLATOR ---------------------------------------------------
  const body=ctx.createOscillator(); body.type=bodyType;
  body.frequency.value=freq*(1+s.color*0.004);
  // Per-hit detune only. No LFO vibrato here -- a 2Hz wobble on bass sounds cartoony.
  body.detune.value=(pcMod*8-4)+(s.color*5-2.5);

  // -- RESONANT FILTER: neural cutoff + mode-specific envelope ----------
  const flt=ctx.createBiquadFilter(); flt.type='lowpass';
  const baseQ={pluck:4.5,slap:6.0,sustain:2.5,growl:8.0}[mode];
  flt.Q.value=baseQ+chaos*8+nn.filterCutoff*5+s.punch*3;

  // Filter envelope: each mode has distinct shape. Keep LFO contribution
  // tiny and SLOW only -- enough to make consecutive hits differ, not enough
  // to modulate the cutoff audibly within a note.
  const fOpen={pluck:800,slap:2200,sustain:600,growl:1400}[mode];
  const fClose={pluck:80,slap:120,sustain:180,growl:60}[mode];
  const lfoCutoff = lSlow*45;
  flt.frequency.setValueAtTime(Math.max(80,(fOpen+windBoost*400+inputChar*600+chaos*1200+pcMod*300+lfoCutoff)*warp), t);
  flt.frequency.exponentialRampToValueAtTime(Math.max(40,(fClose+pcMod*30)*warp), t+decayTime);

  // -- GAIN ENVELOPE -----------------------------------------------------
  const _atk=styleP().attackMult;
  const attackT={pluck:0.003*_atk,slap:0.001*_atk,sustain:0.020*_atk,growl:0.008*_atk}[mode];
  const g=ctx.createGain();
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(0.80+windBoost*0.12+pcMod*0.05, t+attackT);
  g.gain.linearRampToValueAtTime(0.0001, t+decayTime+0.03);
  g.gain.setValueAtTime(0, t+decayTime+0.05);

  // -- GROWL MODE: FM ring mod layer ------------------------------------
  if(mode==='growl'){
    const ring=ctx.createOscillator(); ring.type='sine';
    ring.frequency.value=freq*(1.5+chaos*0.5+nn.subFreqMod*3);
    const rg=ctx.createGain(); rg.gain.value=freq*(0.08+chaos*0.18+windBoost*0.10);
    ring.connect(rg); rg.connect(body.frequency);
    ring.start(t); ring.stop(t+decayTime+0.05);
    autoClean(ring,rg);
  }

  // -- SLAP MODE: transient click layer ---------------------------------
  if(mode==='slap'){
    const click=ctx.createOscillator(); click.type='square';
    click.frequency.setValueAtTime(freq*4,t);
    click.frequency.exponentialRampToValueAtTime(freq,t+0.02/warp);
    const cg=ctx.createGain();
    cg.gain.setValueAtTime(s.punch*0.55,t);
    cg.gain.linearRampToValueAtTime(0.0001,t+0.025/warp);
    click.connect(cg); cg.connect(dest);
    click.start(t); click.stop(t+0.03/warp);
    autoClean(click,cg);
  }

  // -- PRESENCE HARMONIC: overtone for articulation ----------------------
  // lMed samples once at trigger time -- brightness drifts across notes
  // without wobbling within a note (no cartoon effect).
  const pres=ctx.createOscillator(); pres.type='sine';
  pres.frequency.value=freq*(2+nn.harmonicMix*0.5);
  const pg=ctx.createGain();
  const presAmt = Math.max(0.02, (s.color*0.12+nn.filterCutoff*0.06) * (1 + lMed*0.45));
  pg.gain.setValueAtTime(presAmt,t);
  pg.gain.linearRampToValueAtTime(0.0001,t+0.14/warp);
  pres.connect(pg); pg.connect(dest);
  pres.start(t); pres.stop(t+0.18/warp);
  autoClean(pres,pg);

  // -- BASS LFO: gentle filter movement, growl mode only. Tuned WAY down
  // (max 2.2Hz, max 150Hz depth) so it breathes instead of Squidward-wahing.
  // Sustain mode is left clean -- long notes don't need a moving filter.
  if(mode==='growl'){
    const bassLfo=ctx.createOscillator(); bassLfo.type='sine';
    bassLfo.frequency.value=0.8+s.color*1.4;      // 0.8-2.2Hz, was 1.5-5Hz
    const bassLfoGain=ctx.createGain();
    bassLfoGain.gain.value=40+chaos*110;           // max 150Hz, was up to 572Hz
    bassLfo.connect(bassLfoGain); bassLfoGain.connect(flt.frequency);
    bassLfo.start(t); bassLfo.stop(t+decayTime+0.05);
    autoClean(bassLfo,bassLfoGain);
  }

  body.connect(flt); flt.connect(g); g.connect(dest);
  body.start(t); body.stop(t+decayTime+0.08);
  autoClean(body,flt,g);
  // Teach the bass "good-params" distribution on strong, non-wildcard hits.
  if(!s._wild && windBoost > 0.28){
    paramMemory.observe('bass', {punch:s.punch,tone:s.tone,color:s.color,pitch:s.pitch}, Math.min(1, windBoost*1.6));
  }
}

function synthMid(ctx,t,notes,chordType,chaos,warp,dest,windBoost=0){
  const ct=CHORDS[chordType]||CHORDS.maj;
  const s=drumSeed();
  const dark=bandTaste.darkness;

  // Chord character based on taste: dark=minor-flavored FM, bright=cleaner
  const fmR=ct.fm*(1+dark*0.15)+(chaos*0.1-0.05)+(s.tone*0.06-0.03);

  // Envelope
  const _mStyle=styleP();
  const atkT=(0.02+s.decay*0.035)*_mStyle.attackMult/warp;
  const susT=(1.1+s.tone*0.5+windBoost*0.35)*_mStyle.noteLenMult/warp;
  const maxVoices=DeviceComp.score<0.45?2:3;
  const voiceNotes=notes.slice(0,maxVoices);

  voiceNotes.forEach(function(note,idx){
    const freq=440*Math.pow(2,(note-69)/12)*warp;
    const vS=s.color+idx*0.17+dark*0.1;

    // Carrier: sine blended with triangle for warmth (not harsh square)
    const car=ctx.createOscillator();
    car.type=vS>0.7?'triangle':'sine';
    car.frequency.value=freq;
    // Slight chorus detune per voice -- makes chords feel thick not thin
    car.detune.value=(idx===0?0:idx===1?-8:+8)+(s.punch*6-3);

    // Modulator with unique ratio
    const mod=ctx.createOscillator();
    mod.type='sine';
    mod.frequency.value=freq*fmR*(1+vS*0.04);
    const mG=ctx.createGain();
    // FM depth: more for jazz/dark, less for clean bright
    mG.gain.value=freq*(0.18+dark*0.25+chaos*0.18+s.sub*0.12+windBoost*0.08);

    // Second harmonic layer -- adds body
    const harm=ctx.createOscillator();
    harm.type='sine';
    harm.frequency.value=freq*2.01;
    const hG=ctx.createGain();
    hG.gain.value=0.12+dark*0.08+s.tone*0.06;

    // Resonant filter -- unique character per hit
    const flt=ctx.createBiquadFilter();
    flt.type='lowpass';
    const fOpen=(1800+chaos*3000+s.color*2000+windBoost*500)*warp;
    const fClose=(300+dark*400+chaos*200)*warp;
    flt.frequency.setValueAtTime(fOpen,t);
    flt.frequency.linearRampToValueAtTime(fClose,t+susT*0.6);
    flt.Q.value=0.8+s.punch*2.2+chaos*1.4;

    // Envelope
    const g=ctx.createGain();
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.22+windBoost*0.06,t+atkT);
    g.gain.setValueAtTime(0.18+windBoost*0.04,t+susT*0.5);
    g.gain.linearRampToValueAtTime(0.0001,t+susT);
    g.gain.setValueAtTime(0,t+susT+0.005);

    mod.connect(mG); mG.connect(car.frequency);
    harm.connect(hG); hG.connect(flt);
    car.connect(flt); flt.connect(g); g.connect(dest);

    const stopT=t+susT+0.01;
    mod.start(t); mod.stop(stopT);
    car.start(t); car.stop(stopT);
    harm.start(t); harm.stop(stopT);
    autoClean(car,flt,g);
    autoClean(mod,mG);
    autoClean(harm,hG);
  });
}


// -- LEAD: multi-mode synth engine --------------------------------------------
// leadMode is set per style profile and evolves via brain reinforcement.
// Modes: 'saw' (poly detuned), 'fm' (FM stab), 'bell' (FM bell), 'pluck' (KS pluck), 'whistle' (sine+vib)
function synthLead(ctx,t,note,chaos,warp,dest,windBoost=0){
  const s=drumSeed();
  const _lStyle=styleP();
  const mode = _lStyle.leadMode || 'saw';
  const freq=440*Math.pow(2,(note-69)/12)*warp;
  // LFO only for long-form timbre drift. No note-length / volume wobble --
  // those made phrases sound like they were breathing wrong.
  const lSlow = lfoBank.get('slow',t);
  // Bias random params toward learned-good lead values
  s.punch = paramMemory.bias('lead','punch', s.punch);
  s.tone  = paramMemory.bias('lead','tone',  s.tone);
  s.color = paramMemory.bias('lead','color', s.color);
  // Artifact gate for lead -- if params drift far from learned-good, soften.
  if(!s._wild && paramMemory.shouldGate('lead', s)){
    s.punch *= 0.7; s.decay *= 0.8; windBoost *= 0.7;
  }
  // Envelope tween for lead: longer, more-open envelope when motionTween
  // targets higher values. At low env = punchy/tight, at high env = sustained.
  const _leadEnv = motionTween.envFor('lead');
  const durT=(0.22+s.tone*0.50+windBoost*0.18+chaos*0.25)*_lStyle.noteLenMult*(0.65 + _leadEnv*0.75)/warp;
  const atk = _lStyle.attackMult * 0.006 * (0.75 + _leadEnv*0.5);
  const vol = 0.09+windBoost*0.04+s.punch*0.03;

  // Hard ceiling: 10kHz lowpass on ALL lead modes -- prevents deafening highs
  // Gentle slope (Q=0.5) so it doesn't ring, just rolls off
  const ceiling=ctx.createBiquadFilter(); ceiling.type='lowpass';
  ceiling.frequency.value=10000; ceiling.Q.value=0.5;
  ceiling.connect(dest);
  // All lead modes output to `ceiling` instead of `dest` directly
  const leadDest=ceiling;
  autoClean(ceiling);

  if(mode==='saw'){
    // Classic detuned poly-saw -- 2-4 osc, portamento, lowpass filter sweep
    const portInterval = s.color>0.6?-12:s.color>0.3?-7:-5;
    const from=440*Math.pow(2,((note+portInterval)-69)/12)*warp;
    const portTime=(0.04+s.decay*0.08)/warp;
    const maxV=DeviceComp.score<0.4?2:4;
    const voiceCount=Math.min(maxV,2+Math.floor(s.punch*2+chaos*1.5));
    const detuneSpread=5+s.color*18+chaos*12;
    const fOpen=(900+chaos*3800+s.punch*1200+windBoost*600)*warp;
    const fClose=(200+s.tone*400+windBoost*200)*warp;
    const fQ=1.2+chaos*4.5+s.color*2.0;
    const master=ctx.createGain();
    const flt=ctx.createBiquadFilter();flt.type='lowpass';
    flt.frequency.setValueAtTime(fOpen,t+portTime*0.5);
    flt.frequency.linearRampToValueAtTime(fClose,t+durT*0.75);
    flt.Q.value=fQ;
    if(s.color>0.5){
      const flt2=ctx.createBiquadFilter();flt2.type='bandpass';
      flt2.frequency.value=(2000+s.punch*3000)*warp;flt2.Q.value=0.4+s.tone*0.8;
      master.connect(flt);flt.connect(flt2);flt2.connect(leadDest);
    }else{master.connect(flt);flt.connect(leadDest);}
    for(let vi=0;vi<voiceCount;vi++){
      const detune=voiceCount===1?0:((vi/(voiceCount-1))*2-1)*detuneSpread;
      const o=ctx.createOscillator();o.type='sawtooth';o.detune.value=detune;
      o.frequency.setValueAtTime(from,t);
      o.frequency.linearRampToValueAtTime(freq,t+portTime);
      if(vi>0&&s.sub>0.5){
        const vib=ctx.createOscillator();vib.type='sine';vib.frequency.value=4.5+s.color*3.5;
        const vg=ctx.createGain();vg.gain.value=freq*(0.002+s.sub*0.004);
        vib.connect(vg);vg.connect(o.frequency);vib.start(t);vib.stop(t+durT+0.01);autoClean(vib,vg);
      }
      o.connect(master);o.start(t);o.stop(t+durT+0.01);autoClean(o);
    }
    master.gain.setValueAtTime(0,t);
    master.gain.linearRampToValueAtTime(vol,t+atk);
    master.gain.linearRampToValueAtTime(0.0001,t+durT-0.008);
    master.gain.setValueAtTime(0,t+durT);
    setTimeout(()=>{try{master.disconnect();flt.disconnect();}catch(e){}},Math.ceil((durT+0.05)*1000));

  }else if(mode==='fm'){
    // 2-op FM stab: carrier + modulator, mod ratio shapes timbre
    // ratio > 1 = metallic/bright, ratio < 1 = warm/hollow
    const ratios=[1,1.5,2,2.5,3.5,4][Math.floor(s.color*5+chaos*1.5)%6];
    const modIdx=2+chaos*8+windBoost*4+s.punch*3; // modulation index
    const carrier=ctx.createOscillator(); carrier.type='sine'; carrier.frequency.value=freq;
    const modulator=ctx.createOscillator(); modulator.type='sine'; modulator.frequency.value=freq*ratios;
    const modGain=ctx.createGain();
    modGain.gain.setValueAtTime(freq*modIdx,t);
    modGain.gain.exponentialRampToValueAtTime(freq*(modIdx*0.1+0.5),t+durT*0.4); // mod decay = brightness decay
    const ampEnv=ctx.createGain();
    // Hard attack for FM stabs
    ampEnv.gain.setValueAtTime(0.0001,t);
    ampEnv.gain.linearRampToValueAtTime(vol*1.1,t+atk*0.5);
    ampEnv.gain.exponentialRampToValueAtTime(vol*0.4,t+durT*0.3);
    ampEnv.gain.exponentialRampToValueAtTime(0.0001,t+durT);
    modulator.connect(modGain); modGain.connect(carrier.frequency);
    carrier.connect(ampEnv); ampEnv.connect(leadDest);
    carrier.start(t);carrier.stop(t+durT+0.02);
    modulator.start(t);modulator.stop(t+durT+0.02);
    autoClean(carrier,modulator,modGain,ampEnv);

  }else if(mode==='bell'){
    // FM bell: multiple partials with independent decays -- floating, harmonic
    const partials=[1, 2.756, 5.404, 8.933]; // inharmonic bell ratios
    const partialGains=[1.0, 0.45, 0.22, 0.10];
    const master=ctx.createGain();
    master.gain.setValueAtTime(0.0001,t);
    master.gain.linearRampToValueAtTime(vol*0.85,t+0.002);
    master.gain.exponentialRampToValueAtTime(0.0001,t+durT*1.6); // bells ring long
    master.connect(leadDest);
    partials.forEach((ratio,pi)=>{
      const pFreq=freq*ratio*(1+s.color*0.008*pi); // slight inharmonicity
      const pModFreq=pFreq*(1.5+s.tone*0.5);
      const pModIdx=(3-pi*0.5+chaos*2)*s.punch;
      const c=ctx.createOscillator();c.type='sine';c.frequency.value=pFreq;
      const m=ctx.createOscillator();m.type='sine';m.frequency.value=pModFreq;
      const mg=ctx.createGain();
      mg.gain.setValueAtTime(pFreq*pModIdx,t);
      mg.gain.exponentialRampToValueAtTime(0.001,t+durT*(0.3+pi*0.15));
      const pg=ctx.createGain();
      pg.gain.setValueAtTime(partialGains[pi]*0.3,t);
      pg.gain.exponentialRampToValueAtTime(0.0001,t+durT*(0.8+pi*0.3));
      m.connect(mg);mg.connect(c.frequency);c.connect(pg);pg.connect(master);
      c.start(t);c.stop(t+durT*2+0.05);m.start(t);m.stop(t+durT*2+0.05);
      autoClean(c,m,mg,pg);
    });
    setTimeout(()=>{try{master.disconnect();}catch(e){}},Math.ceil((durT*2+0.1)*1000));

  }else if(mode==='pluck'){
    // Karplus-Strong physical model pluck -- sampler-like, no downloads
    const bufLen=Math.max(2,Math.floor(ctx.sampleRate/freq));
    const pluckBuf=ctx.createBuffer(1,bufLen*2,ctx.sampleRate);
    const pd=pluckBuf.getChannelData(0);
    for(let i=0;i<bufLen*2;i++) pd[i]=(Math.random()*2-1)*(i<bufLen?1:0); // initial noise
    const src=ctx.createBufferSource();src.buffer=pluckBuf;src.loop=true;
    src.loopStart=0;src.loopEnd=bufLen/ctx.sampleRate;
    // One-pole lowpass inside the loop gives natural pluck decay
    const lpf=ctx.createBiquadFilter();lpf.type='lowpass';
    lpf.frequency.value=freq*(3+s.tone*4+chaos*2);lpf.Q.value=0.5+s.color;
    const ampEnv=ctx.createGain();
    ampEnv.gain.setValueAtTime(0.0001,t);
    ampEnv.gain.linearRampToValueAtTime(vol*1.3,t+0.001); // instant attack = pluck
    ampEnv.gain.exponentialRampToValueAtTime(0.0001,t+durT*0.8);
    src.connect(lpf);lpf.connect(ampEnv);ampEnv.connect(leadDest);
    src.start(t);src.stop(t+durT+0.05);
    autoClean(src,lpf,ampEnv);

  }else{ // 'whistle' -- sine + vibrato, breathy, vocal-like
    // Classic hip-hop/G-Funk whistle lead: pure sine with slow vib + slight sub octave
    const carrier=ctx.createOscillator();carrier.type='sine';carrier.frequency.value=freq;
    // Vibrato
    const vib=ctx.createOscillator();vib.type='sine';vib.frequency.value=5.5+chaos*2+s.color*1.5;
    const vibGain=ctx.createGain();
    // Vib depth grows after attack (natural breath vibrato)
    vibGain.gain.setValueAtTime(0,t);
    vibGain.gain.linearRampToValueAtTime(freq*(0.008+chaos*0.012),t+durT*0.35);
    vib.connect(vibGain);vibGain.connect(carrier.frequency);
    // Sub octave sine for body
    const sub=ctx.createOscillator();sub.type='sine';sub.frequency.value=freq*0.5;
    const subGain=ctx.createGain();subGain.gain.value=0.18+s.sub*0.12;
    sub.connect(subGain);
    // Gentle lowpass for air
    const lpf=ctx.createBiquadFilter();lpf.type='lowpass';lpf.frequency.value=(2000+chaos*3000)*warp;lpf.Q.value=0.5;
    const master=ctx.createGain();
    master.gain.setValueAtTime(0.0001,t);
    master.gain.linearRampToValueAtTime(vol*0.95,t+atk*1.5); // slightly slower attack = breath
    master.gain.setValueAtTime(vol*0.95,t+durT*0.6);
    master.gain.exponentialRampToValueAtTime(0.0001,t+durT);
    carrier.connect(lpf);subGain.connect(lpf);lpf.connect(master);master.connect(leadDest);
    carrier.start(t);carrier.stop(t+durT+0.02);
    vib.start(t);vib.stop(t+durT+0.02);
    sub.start(t);sub.stop(t+durT+0.02);
    autoClean(carrier,vib,vibGain,sub,subGain,lpf,master);
  }
  // Teach the lead "good-params" distribution on strong, non-wildcard hits.
  if(!s._wild && windBoost > 0.25){
    paramMemory.observe('lead', {punch:s.punch,tone:s.tone,color:s.color,decay:s.decay}, Math.min(1, windBoost*1.8));
  }
}

// -- FLIP ENGINE ----------------------------------------------------------
// Three endless flip modes that cycle to produce new variations:
// 1. CHORD INV: root -> 1st inv -> 2nd inv -> 3rd inv, cycles
// 2. PROG INV: reverses current chord progression sequence
// 3. TRIT SUB: tritone substitution -- replaces with chord a tritone away
const flipEngine={
  inversionStep: 0,
  progWindow: [],
  lastFlipMode: null,

  // Cycle chord inversion: shifts bass voice by 1 each call
  chordInversion(chordType, rootMidi){
    this.inversionStep=(this.inversionStep+1)%4;
    const ct=CHORDS[chordType]||CHORDS.maj;
    const iv=this.inversionStep===0?0:
              this.inversionStep===1?(ct.iv[1]||4):
              this.inversionStep===2?(ct.iv[2]||7):
              this.inversionStep===3?(ct.iv[ct.iv.length-1]||10):0;
    const label=['Root','1st inv','2nd inv','3rd inv'][this.inversionStep];
    return{newRoot:rootMidi-12+iv, label, step:this.inversionStep};
  },

  // Progression inversion: reverses the last 4 chords heard
  progressionInversion(window){
    if(!window||window.length<2)return null;
    const reversed=[...window].reverse();
    return{sequence:reversed, label:'Prog inv: '+reversed.slice(0,3).join('->')};
  },

  // Tritone substitution: move root up/down by tritone (6 semitones)
  // Also swaps chord quality: dom7 <-> maj7, min <-> aug, maj <-> dim
  tritoneSubstitution(chordType, rootMidi){
    const swaps={dom7:'maj7',maj7:'dom7',min:'aug',aug:'min',maj:'dim',dim:'maj',
                 min7:'dom9',dom9:'min7',quar:'min7'};
    const newChord=swaps[chordType]||chordType;
    const newRoot=rootMidi+6; // tritone = 6 semitones
    return{newRoot, newChord, label:'Trit sub: '+NOTE_NAMES[((newRoot%12)+12)%12]+' '+newChord};
  }
};

// -- SYNTH: ARP (arpeggiated plucked synth) -----------------------------------
// Physical model: Karplus-Strong style pluck + resonator
// Each arp note is uniquely generated
function synthArp(ctx, t, note, chaos, warp, dest, windBoost=0){
  const s=drumSeed();
  const freq=440*Math.pow(2,(note-69)/12)*warp;
  // Exciter: short noise burst (the "pluck")
  const excLen=Math.floor(ctx.sampleRate*(0.008+s.punch*0.012));
  const excBuf=ctx.createBuffer(1,excLen,ctx.sampleRate);
  const excD=excBuf.getChannelData(0);
  for(let i=0;i<excLen;i++){
    excD[i]=(Math.random()*2-1)*Math.pow(1-i/excLen,0.4+s.tone);
  }
  const exc=ctx.createBufferSource();exc.buffer=excBuf;
  // Body resonator: bandpass at fundamental + 2nd harmonic
  const res1=ctx.createBiquadFilter();res1.type='bandpass';
  res1.frequency.value=freq;res1.Q.value=18+chaos*30+windBoost*12;
  const res2=ctx.createBiquadFilter();res2.type='bandpass';
  res2.frequency.value=freq*(2+s.color*0.08);res2.Q.value=8+chaos*12;
  // Mix resonators
  const mix=ctx.createGain();mix.gain.value=1;
  const g1=ctx.createGain();g1.gain.value=0.7+s.tone*0.2;
  const g2=ctx.createGain();g2.gain.value=0.3+chaos*0.2;
  // Envelope
  const durT=(0.18+s.decay*0.45+windBoost*0.2+chaos*0.15)/warp;
  const env=ctx.createGain();
  env.gain.setValueAtTime(0.6+windBoost*0.15,t);
  env.gain.linearRampToValueAtTime(0.0001,t+durT);
  env.gain.setValueAtTime(0,t+durT+0.005);
  exc.connect(res1);exc.connect(res2);
  res1.connect(g1);res2.connect(g2);
  g1.connect(mix);g2.connect(mix);
  mix.connect(env);env.connect(dest);
  exc.start(t);exc.stop(t+excLen/ctx.sampleRate+0.01);
  autoClean(exc,res1,res2,g1,g2,mix,env);
}

      if(AR.current.ctx.state==='suspended')await AR.current.ctx.resume();
      const ab=await file.arrayBuffer();
      const audio=await AR.current.ctx.decodeAudioData(ab);
      // Analyze: extract tempo via onset detection on downmixed buffer
      const ch=audio.getChannelData(0);
      const sr=audio.sampleRate;
      const hop=Math.floor(sr*0.01); // 10ms hop
      const onsets=[];
      let prev=0;
      for(let i=0;i<ch.length-hop;i+=hop){
        let rms=0;for(let j=0;j<hop;j++)rms+=ch[i+j]*ch[i+j];
        rms=Math.sqrt(rms/hop);
        if(rms>prev*1.5&&rms>0.02&&(onsets.length===0||i/sr-onsets[onsets.length-1]>0.15))
          onsets.push(i/sr);
        prev=rms*0.85+prev*0.15;
      }
      // Estimate tempo from onset intervals
      let detectedBpm=120;
      if(onsets.length>4){
        const gaps=onsets.slice(1).map((ot,oi)=>ot-onsets[oi]);
        const med=gaps.sort((a,b)=>a-b)[Math.floor(gaps.length/2)];

        if(detectedBpm>200)detectedBpm=Math.round(detectedBpm/2);

      const fftSize=2048;

          if(Math.abs(slice[j])>0.01){

            chroma[((pitchEst%12)+12)%12]+=Math.abs(slice[j]);
          }
        }
      }
      const detectedRoot=chroma.indexOf(Math.max(...chroma));

      setUploadStatus(`${NOTE_NAMES[detectedRoot]} @ ${detectedBpm}BPM`);

    const ty=rect?(e.clientY-rect.top)/rect.height:0.5;
    tapVizRef.current.push({x:tx,y:ty,t:now,intensity:1});
    // Also register as input energy for hands-free detection
    AR.current.inputEnergy=1.0;
    setInputEnergy(1.0);setTimeout(()=>{AR.current.inputEnergy=0;setInputEnergy(0);},200);

    if(tap.times.length>=4){

      if(result){
        const{bpm:tb,swingPct,subdivisions:sub}=result;
        if(tb>=30&&tb<=280){

        if(swingPct>0){setSwing(swingPct);AR.current.swing=swingPct;setDSwing(swingPct);}
        setSubdivisions(sub||2);
        const subLabel={1:'whole',2:'8th',3:'triplet/jazz',4:'16th',5:'quintuplet',6:'sextuplet',7:'septuplet'};
        if(sub>2)addLog(`Rhythm: ${subLabel[sub]||sub+'-tuplet'} feel`);
      }
    }else{
      motifEng.addOnset(now); // always register onset, result only used after 4+
    }

    if(!isPlayRef.current)startBand();
  },[bpm]);

  // -- START / STOP ----------------------------------------------------------
  // - PRE-RENDER ENGINE -
  // Renders 60s of audio ahead using OfflineAudioContext.
  // While it plays, renders the next chunk in background.
  // Visual frames pre-computed as lightweight state snapshots.
  const preRenderRef=useRef({
    // -- DOUBLE BUFFER --------------------------------------------------
    // playingBuffer: currently playing AudioBufferSourceNode
    // nextBuffer:    already rendered, ready to swap in with zero gap
    // endAR:         AR snapshot at end of current chunk (for next chunk)
    playingSource:null,
    nextBuffer:null,
    nextVisualFrames:[],
    endAR:null,          // AR state at end of playing chunk
    renderingNext:false, // is the background render running?
    chunkSec:30,         // chunk duration in seconds
    // -- VISUAL PLAYBACK ------------------------------------------------
    visualFrames:[],
    frameIdx:0,
    playStartCtxTime:0,
  });

  // Simulate the band brain forward in time, collecting events
  // Returns {events, visualFrames} -- pure computation, no audio nodes
  const simulateBand=(durationSec, startAR, startBrainState)=>{
    const SR = DeviceComp.score<0.45?22050:44100;
    const ar = {...startAR, ctx:{currentTime:0, sampleRate:SR}};
    const bpm = ar.lockedBpm||ar.bpm||110;
    const spb = 60.0/(bpm*(ar.warpMultiplier||1));
    const stepDur = 0.25*spb;
    const totalSteps = Math.ceil(durationSec/stepDur)+4;
    const events=[]; // {t, type, note, velocity, voice, chordType, rootMidi}
    const visualFrames=[]; // sampled at ~30fps
    const FPS=30;
    const frameDur=1/FPS;
    let nextFrameT=0;

    // Lightweight brain clone -- just the Q table for note choices
    const qClone={...startBrainState};
    const choose=(role,opts,chaos,ct)=>{
      if(!opts||!opts.length)return opts[0];
      let b=opts[0],bw=-Infinity;
      for(const v of opts){
        const k=`${role}_${((v%12)+12)%12}_${ct}`;
        const w=((qClone[k]??0.5)*0.7+(qClone[`${role}_${((v%12)+12)%12}_global`]??0.5)*0.3);
        if(w>bw){bw=w;b=v;}
      }
      return b;
    };

    let simChordType=ar.chordType||'maj';
    let simRoot=ar.rootMidi||60;
    let simMeasure=ar.measureCount||0;
    let simMeasuresOnChord=ar.measuresThisChord||0;
    let simMeasuresPerChord=ar.measuresPerChord||4;
    let simPhrase=ar.targetChordSeq?[...ar.targetChordSeq]:[];
    let simPhrasePos=ar.phrasePosition||0;
    let simGroove=ar._groove||bandTaste.pickArchetype();
    let simPhaseLabel=ar.structurePhase||'intro';
    const simVoices={drum:{w:0},bass:{w:0,last:null},mid:{w:0},lead:{w:0,last:null}};
    const simMutes={}; // offline sim always plays all voices

    for(let step=0;step<totalSteps;step++){
      const t=step*stepDur;
      if(t>=durationSec)break;
      const beat=step%((ar.stepsPerMeasure||16));

      // Measure boundary
      if(beat===0){
        simMeasure++;
        simMeasuresOnChord++;
        simGroove=bandTaste.pickArchetype();
        if(simMeasuresOnChord>=simMeasuresPerChord){
          if(!simPhrase.length){
            simPhrase=structureEngine.buildPhrase(simChordType,ar.chaos||0.3,bandTaste.darkness,brain);
          }
          simPhrasePos=(simPhrasePos+1)%simPhrase.length;
          simChordType=simPhrase[simPhrasePos]||simChordType;
          simMeasuresOnChord=0;
          simMeasuresPerChord=structureEngine.chordDuration(ar.chaos||0.3,simPhaseLabel,brain.n);
          simPhaseLabel=structureEngine.advanceSection(Math.floor(simMeasure/4));
          if(simPhrasePos===0)simPhrase=structureEngine.buildPhrase(simChordType,ar.chaos||0.3,bandTaste.darkness,brain);
        }
      }

      const ct=CHORDS[simChordType]||CHORDS.maj;
      const chaos=ar.chaos||0.3;
      const density=ar.density||0.55;
      const b16=beat%16;

      // Drums with motif shaping
      if(!simMutes.drum){
        const simMotif = structureEngine.motifPhase(simMeasuresOnChord);
        const kMod = simMotif==='call'?1.2:simMotif==='response'?0.65:simMotif==='turnaround'?1.4:1;
        const sMod = simMotif==='call'?1.0:simMotif==='response'?0.80:simMotif==='turnaround'?1.6:1;
        const hMod = simMotif==='call'?0.9:simMotif==='response'?1.30:simMotif==='turnaround'?0.7:1;
        const kP=bandTaste.stepProb('k',b16,simGroove,chaos)*kMod;
        const sP=bandTaste.stepProb('s',b16,simGroove,chaos)*sMod;
        const hP=bandTaste.stepProb('h',b16,simGroove,chaos)*0.85*hMod;
        if(beat===0||Math.random()<kP) events.push({t,type:'kick',v:0.8+Math.random()*0.2});
        if(beat===8||Math.random()<sP) events.push({t,type:'snare',v:0.6+Math.random()*0.3});
        if(Math.random()<hP){
          const isDesignatedOpen = bandTaste.isOpenStep(b16, simGroove);
          const openH=Math.random()<(isDesignatedOpen ? 0.55+chaos*0.25 : chaos*0.12)*(simGroove==='jazzSwing'?1.8:simGroove==='bossaNova'?1.3:1);
          const isCrash=openH&&chaos>0.65&&Math.random()<0.18;
          events.push({t,type:'hat',v:0.3+Math.random()*0.4,open:openH,isCrash});
        }
        // Crash on turnaround downbeat
        if(simMotif==='turnaround'&&beat===0&&simMeasuresOnChord===1&&Math.random()<0.5)
          events.push({t,type:'crash',v:0.7});
      }

      // Sub bass on downbeats
      if(!simMutes.bass&&(beat===0||(beat===8&&Math.random()<0.75))){
        const subPC=((simRoot)%12+12)%12;
        let sn=24+subPC; while(sn<24)sn+=12; while(sn>36)sn-=12;
        events.push({t,type:'sub',note:sn,chordType:simChordType});
      }
      // Bass (simplified -- pitch class + register)
      if(!simMutes.bass&&(beat===0||beat===4||beat===8||beat===12||Math.random()<density*0.3)){
        const bassPC=((simRoot+choose('bass',[0,5,7],chaos,simChordType))%12+12)%12;
        let n=24+bassPC; while(n<28)n+=12; while(n>52)n-=12;
        events.push({t,type:'bass',note:n,chordType:simChordType,bassMode:styleP().bassMode,prevNote:simVoices.bass.last||n});
        simVoices.bass.last=n;
      }

      // Mid chord (less frequent)
      if(!simMutes.mid&&(beat===0||Math.random()<chaos*0.4*density)){
        const ivs=ct.iv.slice(0,3);
        const notes=ivs.map(v=>{let n2=simRoot+v;while(n2<48)n2+=12;while(n2>72)n2-=12;return n2;});
        events.push({t,type:'mid',notes,chordType:simChordType,midMode:styleP().midMode});
      }

      // Wood percussion events (African + Indian genres)
      if(styleP().woodPerc && !simMutes.drum && Math.random()<0.65){
        const _wv=0.35+Math.random()*0.50;
        const _wp=0.8+Math.random()*0.5;
        const _wt=t+(Math.random()-0.5)*styleP().microJitter*3;
        events.push({t:Math.max(0,_wt),type:'woodperc',velocity:_wv,pitch:_wp});
      }

      // Lead (sparse)
      if(!simMutes.lead&&Math.random()<density*0.35){
        const iv=choose('lead',ct.iv.map(v=>v+12),chaos,simChordType);
        let ln=simRoot+iv; while(ln<60)ln+=12; while(ln>84)ln-=12;
        events.push({t,type:'lead',note:ln,chordType:simChordType});
        simVoices.lead.last=ln;
      }

      // Visual frame snapshot
      if(t>=nextFrameT){
        visualFrames.push({
          t, beat, chordType:simChordType, rootMidi:simRoot,
          chaos, density, phase:simPhaseLabel,
          groove:simGroove,
          drumW:simVoices.drum.w, bassW:simVoices.bass.w,
          midW:simVoices.mid.w, leadW:simVoices.lead.w,
          kick:events[events.length-1]?.type==='kick',
          snare:events[events.length-1]?.type==='snare',
        });
        nextFrameT+=frameDur;
        // Update voice winding (fake)
        simVoices.drum.w=Math.min(10,(simVoices.drum.w||0)*0.97+0.2);
        simVoices.bass.w=Math.min(10,(simVoices.bass.w||0)*0.97+0.15);
        simVoices.mid.w=Math.min(10,(simVoices.mid.w||0)*0.97+0.1);
        simVoices.lead.w=Math.min(10,(simVoices.lead.w||0)*0.97+0.08);
      }
    }
    return{
      events, visualFrames,
      endChordType:     simChordType,
      endRoot:          simRoot,
      endMeasure:       simMeasure,
      endMeasuresOnChord: simMeasuresOnChord,
      endMeasuresPerChord: simMeasuresPerChord,
      endPhrase:        simPhrase,
      endPhrasePos:     simPhrasePos,
      endPhaseLabel:    simPhaseLabel,
      endGroove:        simGroove,
    };
  };

  // Render events into an OfflineAudioContext and return an AudioBuffer
  const renderEventsToBuffer=async(events,durationSec,baseAR)=>{
    const SR=22050; // always use 22050 for offline render -- halves computation
    const offCtx=new OfflineAudioContext(2,Math.ceil(SR*durationSec),SR);
    const offBus=new AudioBus();
    offBus.init(offCtx, true); // lean=true: skip reverb/delay/chorus for speed

    for(const ev of events){
      const t=ev.t;
      const warp=baseAR.warpMultiplier||1;
      const chaos=baseAR.chaos||0.3;
      try{
        if(ev.type==='kick')   synthKick(offCtx,t,warp,offBus.getInput('drum'),0.5);
        if(ev.type==='snare')  synthSnare(offCtx,t,chaos,warp,offBus.getInput('drum'),0.5);
        if(ev.type==='hat')    synthHat(offCtx,t,ev.open||false,chaos,warp,offBus.getInput('drum'),0.3);
        if(ev.type==='crash')  synthCrash(offCtx,t,chaos,warp,offBus.getInput('drum'),ev.v||0.6);
        if(ev.type==='sub')    synthSubBass(offCtx,t,ev.note,chaos,warp,0.05,0,offBus.getInput('sub'));
        if(ev.type==='bass'){
          const _bm=ev.bassMode||styleP().bassMode||'electric';
          const _bd=offBus.getInput('bass');
          if(_bm==='808')         synth808(offCtx,t,ev.note,chaos,warp,0.05,_bd);
          else if(_bm==='upright')synthUprightBass(offCtx,t,ev.note,chaos,warp,0.05,_bd);
          else if(_bm==='gfunk')  synthGFunkBass(offCtx,t,ev.note,chaos,warp,0.05,ev.prevNote||ev.note,_bd);
          else if(_bm==='boombap')synthBoomBapBass(offCtx,t,ev.note,chaos,warp,0.05,_bd);
          else if(_bm==='afrosub')synthAfroSub(offCtx,t,ev.note,chaos,warp,0.5,0.05,_bd);
          else if(_bm==='tanpura')synthTanpuraBass(offCtx,t,ev.note,chaos,warp,0.05,_bd);
          else                    synthBass(offCtx,t,ev.note,chaos,warp,0.05,0.5,0,_bd);
        }
        if(ev.type==='mid'&&ev.notes){
          const _midm=ev.midMode||styleP().midMode||'keys';
          if(_midm==='rhodes') synthRhodes(offCtx,t,ev.notes,ev.chordType,chaos,warp,offBus.getInput('mid'),0.05);
          else synthMid(offCtx,t,ev.notes,ev.chordType,chaos,warp,offBus.getInput('mid'),0.05);
        }
        if(ev.type==='woodperc') synthWoodPerc(offCtx,t,ev.velocity||0.6,ev.pitch||1,warp,offBus.getInput('drum'));
        if(ev.type==='lead')   synthLead(offCtx,t,ev.note,chaos,warp,offBus.getInput('lead'),0.05);
      }catch(e){}
    }
    return await offCtx.startRendering();
  };



  // в”Ђв”Ђ TAP MOTIF HANDLER в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  const handleConfigTap = () => {
    const now = Date.now();
    const times = tapTimesRef.current;
    // Reset if >3s since last tap
    if(times.length > 0 && now - times[times.length-1] > 3000){
      tapTimesRef.current = []; setTapTimes([]);
    }
    times.push(now);
    tapTimesRef.current = [...times];
    setTapTimes([...times]);
    clearTimeout(tapResetRef.current);

    if(times.length >= 4){
      // Compute inter-tap intervals
      const intervals = [];
      for(let i=1;i<times.length;i++) intervals.push(times[i]-times[i-1]);
      const avgInterval = intervals.reduce((a,b)=>a+b,0)/intervals.length;
      const bpm = Math.round(60000/avgInterval);
      // Detect pattern: normalize intervals to shortest unit
      const minInterval = Math.min(...intervals);
      const pattern = intervals.map(iv=>Math.round(iv/minInterval));
      // Bars: how many 4-beat groups do the taps span?
      const totalMs = times[times.length-1]-times[0];
      const beatsPerMs = bpm/60000;
      const totalBeats = totalMs*beatsPerMs;
      const bars = Math.max(1, Math.round(totalBeats/4));
      const clampedBpm = Math.max(60, Math.min(200, bpm));
      setTapMotif({bpm:clampedBpm, pattern, bars, intervals, tapCount:times.length});
      setTrackConfig(c=>({...c, bpm:clampedBpm}));
      // Save tap pattern into motifEngine
      try{ motifEng.record({intervals:intervals.map(ms=>ms/1000), type:'tap'}); }catch(e){}
    }

    // Auto-commit after 2s silence
    tapResetRef.current = setTimeout(()=>{
      if(tapTimesRef.current.length>0){ setTapTimes([]); tapTimesRef.current=[]; }
    }, 2500);
  };

  // в”Ђв”Ђ CONFIG MIC: record + full analysis в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  const startConfigMic = async () => {
    const ref = configMicRef.current;
    if(ref.stream) return;
    setMicRecording(true); setMicAnalysis(null); setMicProgress('Listening...');
    try{
      const stream = await navigator.mediaDevices.getUserMedia({
        audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false,sampleRate:44100}
      });
      const ctx = new(window.AudioContext||window.webkitAudioContext)({sampleRate:44100});
      const src = ctx.createMediaStreamSource(stream);
      const an  = ctx.createAnalyser(); an.fftSize=8192; an.smoothingTimeConstant=0.7;
      src.connect(an);
      ref.stream=stream; ref.ctx=ctx; ref.analyser=an;
      ref.onsets=[]; ref.pitches=[]; ref.chunks=[];

      // MediaRecorder for waveform capture
      const mr = new MediaRecorder(stream, {mimeType:'audio/webm'});
      mr.ondataavailable = e=>{ if(e.data.size>0) ref.chunks.push(e.data); };
      mr.start(100); ref.recorder=mr;

      // Real-time pitch + onset analysis loop
      const buf = new Float32Array(an.fftSize);
      const freqBuf = new Uint8Array(an.frequencyBinCount);
      let prevEnergy = 0, frameCount = 0;
      const loop = () => {
        ref.animFrame = requestAnimationFrame(loop);
        frameCount++;
        an.getFloatTimeDomainData(buf);
        an.getByteFrequencyData(freqBuf);
        const energy = buf.reduce((s,v)=>s+v*v,0)/buf.length;
        const rms = Math.sqrt(energy);
        // Onset: sudden energy spike
        if(rms > 0.015 && energy > prevEnergy*1.8 && frameCount>3){
          ref.onsets.push({t:ctx.currentTime, energy:rms});
          frameCount=0;
        }
        prevEnergy = energy*0.85 + prevEnergy*0.15;
        // Pitch via autocorrelation (every 4th frame for perf)
        if(frameCount%4===0 && rms > 0.02){
          const pitch = autocorrPitch(buf, ctx.sampleRate);
          if(pitch > 60 && pitch < 1500) ref.pitches.push(pitch);
        }
      };
      loop();
    }catch(e){
      setMicRecording(false); setMicProgress('Mic error: '+e.message);
    }
  };

  const stopConfigMic = async () => {
    const ref = configMicRef.current;
    if(!ref.stream) return;
    setMicProgress('Analysing...');
    cancelAnimationFrame(ref.animFrame);
    if(ref.recorder&&ref.recorder.state!=='inactive') ref.recorder.stop();
    ref.stream.getTracks().forEach(t=>t.stop());
    if(ref.ctx) ref.ctx.close();

    const onsets = ref.onsets;
    const pitches = ref.pitches;
    ref.stream=null; ref.ctx=null; ref.analyser=null;
    setMicRecording(false);

    // в”Ђв”Ђ TEMPO ANALYSIS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    let detectedBpm = 120, tempoChanges = [];
    if(onsets.length >= 4){
      const iois = [];
      for(let i=1;i<onsets.length;i++) iois.push(onsets[i].t - onsets[i-1].t);
      // Filter plausible IOIs (60-200bpm range = 0.3-1.0s)
      const valid = iois.filter(v=>v>0.28&&v<1.1);
      if(valid.length >= 3){
        const median = valid.slice().sort((a,b)=>a-b)[Math.floor(valid.length/2)];
        detectedBpm = Math.round(60/median);
        detectedBpm = Math.max(60, Math.min(200, detectedBpm));

        // Detect tempo changes: sliding window of 4 IOIs
        const wins = [];
        for(let i=0;i<=valid.length-4;i++){
          const win = valid.slice(i,i+4);
          wins.push(60/( win.reduce((a,b)=>a+b,0)/win.length ));
        }
        for(let i=1;i<wins.length;i++){
          if(Math.abs(wins[i]-wins[i-1]) > wins[i-1]*0.12){
            tempoChanges.push({at:onsets[i+1]?.t?.toFixed(1)||'?', from:Math.round(wins[i-1]), to:Math.round(wins[i])});
          }
        }
      }
    }

    // в”Ђв”Ђ BAR COUNT в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    const totalSec = onsets.length>=2 ? onsets[onsets.length-1].t - onsets[0].t : 0;
    const bars = totalSec>0 ? Math.max(1, Math.round(totalSec * detectedBpm / 240)) : 0;

    // в”Ђв”Ђ PITCH / KEY ANALYSIS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    let detectedKey = 'C', keyChanges = [];
    if(pitches.length >= 8){
      // Bin pitches into pitch classes
      const pcBins = new Array(12).fill(0);
      for(const p of pitches){
        const midi = Math.round(12*Math.log2(p/440)+69);
        pcBins[((midi%12)+12)%12] += 1;
      }
      // Krumhansl-Schmuckler key profiles
      const majorP=[6.35,2.23,3.48,2.33,4.38,4.09,2.52,5.19,2.39,3.66,2.29,2.88];
      const minorP=[6.33,2.68,3.52,5.38,2.60,3.53,2.54,4.75,3.98,2.69,3.34,3.17];
      const NOTE_NAMES=['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'];
      let bestScore=-Infinity, bestRoot=0, bestIsMinor=false;
      for(let root=0;root<12;root++){
        for(const [prof,isMinor] of [[majorP,false],[minorP,true]]){
          let score=0;
          for(let pc=0;pc<12;pc++) score+=pcBins[(pc+root)%12]*prof[pc];
          if(score>bestScore){bestScore=score;bestRoot=root;bestIsMinor=isMinor;}
        }
      }
      detectedKey = NOTE_NAMES[bestRoot]+(bestIsMinor?' min':'');

      // Detect key changes: split pitches into 4 windows
      const wSize = Math.floor(pitches.length/4);
      if(wSize>=4){
        const winKeys=[];
        for(let w=0;w<4;w++){
          const wp=pitches.slice(w*wSize,(w+1)*wSize);
          const wb=new Array(12).fill(0);
          wp.forEach(p=>{const m=Math.round(12*Math.log2(p/440)+69);wb[((m%12)+12)%12]++;});
          let bs=-Infinity,br=0,bm=false;
          for(let r=0;r<12;r++){
            for(const[pr,im] of[[majorP,false],[minorP,true]]){
              let sc=0;for(let pc=0;pc<12;pc++)sc+=wb[(pc+r)%12]*pr[pc];
              if(sc>bs){bs=sc;br=r;bm=im;}
            }
          }
          winKeys.push(NOTE_NAMES[br]+(bm?' min':''));
        }
        for(let i=1;i<winKeys.length;i++){
          if(winKeys[i]!==winKeys[i-1]) keyChanges.push({from:winKeys[i-1],to:winKeys[i],atBar:Math.round(i*bars/4)});
        }
      }
    }

    // Extract just the root for config (strip " min")
    const keyRoot = detectedKey.replace(' min','').trim();
    const isMinor = detectedKey.includes('min');

    const analysis = {bpm:detectedBpm, key:keyRoot, isMinor, bars, tempoChanges, keyChanges, onsetCount:onsets.length, pitchCount:pitches.length};
    setMicAnalysis(analysis);
    setMicProgress('');
    // Apply to config
    setTrackConfig(c=>({...c, bpm:detectedBpm, key:keyRoot, darkness:isMinor?Math.max(c.darkness,0.55):c.darkness}));
    // Store in motifEngine
    try{ if(pitches.length>0) motifEng.record({pitches:pitches.slice(0,32), bpm:detectedBpm, bars, type:'mic'}); }catch(e){}
  };

  // в”Ђв”Ђ Autocorrelation pitch detection (reuse from existing system) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  const autocorrPitch = (buf, sr) => {
    const SIZE = buf.length;
    const MAX_PERIOD = Math.floor(sr/60);
    const MIN_PERIOD = Math.floor(sr/1500);
    let bestPeriod=0, bestCorr=-1;
    for(let p=MIN_PERIOD;p<MAX_PERIOD;p++){
      let corr=0;
      for(let i=0;i<SIZE-p;i++) corr+=buf[i]*buf[i+p];
      corr/=(SIZE-p);
      if(corr>bestCorr){bestCorr=corr;bestPeriod=p;}
    }
    return bestPeriod>0?sr/bestPeriod:0;
  };

  // в”Ђв”Ђ SONG FINGERPRINT & NO-REPEAT ENGINE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  // Fingerprints are normalized to C (root subtracted) so "same song in D" is caught
  const songHistory = {
    seen: [],     // [{fp, bpm, key, genre, ts}]
    maxHistory: 20,

    fingerprint(events, bpmVal, rootNote, genreStr){
      // Normalize: transpose all notes to C, bucket tempo into slow/mid/fast
      const rootPC = ((rootNote%12)+12)%12;
      const chordSeq = [...new Set(events.filter(e=>e.chordType).map(e=>e.chordType))].join(',');
      const noteSet = [...new Set(events.filter(e=>e.note).map(e=>((((e.note%12)-rootPC)+12)%12)))].sort().join('');
      const bpmBucket = bpmVal<85?'slow':bpmVal<125?'mid':'fast';
      const density = Math.round(events.length/100)*100; // bucket to nearest 100 events
      return `${bpmBucket}|${genreStr}|${chordSeq}|${noteSet}|${density}`;
    },

    isTooSimilar(fp){
      // Check if fingerprint is within edit distance 1 of any seen song
      for(const s of this.seen){
        const a = fp.split('|'), b = s.fp.split('|');
        let diff = 0;
        for(let i=0;i<Math.max(a.length,b.length);i++) if(a[i]!==b[i]) diff++;
        if(diff<=1) return true;  // 1 or fewer fields differ = too similar
      }
      return false;
    },

    record(fp, bpmVal, key, genre){
      this.seen.unshift({fp, bpm:bpmVal, key, genre, ts:Date.now()});
      if(this.seen.length>this.maxHistory) this.seen.pop();
    },

    // Penalize Q-table entries that match seen chord progressions.
    // Drums get a much lighter penalty (factor 0.92 vs 0.75) because a rational
    // groove is SUPPOSED to recur -- we don't want to un-learn the backbeat.
    penalizeBrain(events, rootPC){
      const seenPCs = new Set(events.filter(e=>e.note).map(e=>((((e.note%12)-rootPC)+12)%12)));
      const ROLE_FACTOR = {lead:0.75, mid:0.75, bass:0.75, drum:0.92};
      for(const pc of seenPCs){
        for(const role of['lead','mid','bass','drum']){
          const key=`${role}_${pc}`;
          for(const k of Object.keys(brain.q)){
            if(k.startsWith(key)) brain.q[k] = (brain.q[k]||0.5)*ROLE_FACTOR[role];
          }
        }
      }
    },

    serialize(){ return {seen:this.seen.slice(0,this.maxHistory)}; },
    load(d){ if(d&&d.seen) this.seen=d.seen; },
  };

  // в”Ђв”Ђ FULL SONG RENDER в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  // Proper 3-minute structure: Introв†’Verseв†’Chorusв†’Bridgeв†’Verseв†’Chorusв†’Turnв†’Outro
  // Each section renders into its own buffer, then concatenated.
  // Stems rendered separately so user can download drum/bass/mid/lead individually.

  const renderStemBuffer = async (events, durationSec, baseAR, stemTypes) => {
    // Render only the event types in stemTypes array
    const SR = 22050;
    const filtered = events.filter(e => stemTypes.includes(e.type));
    const offCtx = new OfflineAudioContext(2, Math.ceil(SR*durationSec)+256, SR);
    const offBus = new AudioBus();
    offBus.init(offCtx, true);
    const warp = baseAR.warpMultiplier||1;
    const chaos = baseAR.chaos||0.3;
    for(const ev of filtered){
      const t = Math.max(0, ev.t);
      try{
        if(ev.type==='kick')   synthKick(offCtx,t,warp,offBus.getInput('drum'),0.5);
        if(ev.type==='snare')  synthSnare(offCtx,t,chaos,warp,offBus.getInput('drum'),0.5);
        if(ev.type==='hat')    synthHat(offCtx,t,ev.open||false,chaos,warp,offBus.getInput('drum'),0.3);
        if(ev.type==='crash')  synthCrash(offCtx,t,chaos,warp,offBus.getInput('drum'),ev.v||0.6);
        if(ev.type==='sub')    synthSubBass(offCtx,t,ev.note,chaos,warp,0.05,0,offBus.getInput('sub'));
        if(ev.type==='bass'){
          const _bm=ev.bassMode||styleP().bassMode||'electric';
          const _bd=offBus.getInput('bass');
          if(_bm==='808')         synth808(offCtx,t,ev.note,chaos,warp,0.05,_bd);
          else if(_bm==='upright')synthUprightBass(offCtx,t,ev.note,chaos,warp,0.05,_bd);
          else if(_bm==='gfunk')  synthGFunkBass(offCtx,t,ev.note,chaos,warp,0.05,ev.prevNote||ev.note,_bd);
          else if(_bm==='boombap')synthBoomBapBass(offCtx,t,ev.note,chaos,warp,0.05,_bd);
          else if(_bm==='afrosub')synthAfroSub(offCtx,t,ev.note,chaos,warp,0.5,0.05,_bd);
          else if(_bm==='tanpura')synthTanpuraBass(offCtx,t,ev.note,chaos,warp,0.05,_bd);
          else                    synthBass(offCtx,t,ev.note,chaos,warp,0.05,0.5,0,_bd);
        }
        if(ev.type==='mid'&&ev.notes) synthMid(offCtx,t,ev.notes,ev.chordType,chaos,warp,offBus.getInput('mid'),0.05);
        if(ev.type==='lead')   synthLead(offCtx,t,ev.note,chaos,warp,offBus.getInput('lead'),0.05);
      }catch(e){}
    }
    return offCtx.startRendering();
  };

  const concatBuffers = async (buffers, SR) => {
    const totalSamples = buffers.reduce((s,b)=>s+(b?b.length:0), 0);
    if(totalSamples === 0) return null;
    const out = new OfflineAudioContext(2, totalSamples, SR);
    let offset = 0;
    for(const buf of buffers){
      if(!buf) continue;
      const src = out.createBufferSource(); src.buffer = buf;
      src.connect(out.destination);
      src.start(offset/SR);
      offset += buf.length;
    }
    return out.startRendering();
  };

  const renderFullTrack = async (cfg) => {
    const KEYS={'C':60,'C#':61,'Db':61,'D':62,'D#':63,'Eb':63,'E':64,'F':65,'F#':66,'Gb':66,'G':67,'G#':68,'Ab':68,'A':69,'A#':70,'Bb':70,'B':71};
    const bpm    = parseInt(cfg.bpm)||110;
    const rootNote = KEYS[cfg.key]||60;
    const rootPC   = ((rootNote%12)+12)%12;
    const spb      = 60.0/bpm;
    const barsToSec = b => b*4*spb;
    const SR = 22050; // always 22050 for offline speed

    // Apply style
    kickStyle = ['jazz','pop','edm','hiphop','westcoast','eastcoast','african','indian'].includes(cfg.genre)?cfg.genre:'pop';

    // Seed AR
    const baseAR = {
      ...AR.current,
      bpm, warpMultiplier: 1,
      chaos:   Math.min(0.9, cfg.intensity*0.7),
      density: Math.min(1.0, cfg.intensity),
      darkness: cfg.darkness||0.35,
      root: rootNote, lockedRoot: rootNote,
      chordType: cfg.genre==='jazz'?'min7':'maj',
      measureCount:0, measuresThisChord:0,
      targetChordSeq:null, phrasePosition:0,
      structurePhase:'intro', _groove:null,
    };

    // Song structure вЂ” 92 bars в‰€ 3.3 min at 110bpm
    // [label, bars, chaosО”, densityО”]
    const sections = [
      ['intro',       8,  -0.15, -0.25],
      ['verse',      16,   0.00,  0.00],
      ['chorus',     16,   0.14,  0.18],
      ['bridge',      8,   0.06, -0.12],
      ['verse',      16,   0.02,  0.05],
      ['chorus',     16,   0.16,  0.20],
      ['turnaround',  4,   0.22,  0.12],
      ['outro',       8,  -0.22, -0.30],
    ];
    const totalBars = sections.reduce((s,[,b])=>s+b,0);

    // Per-stem event buckets  
    const STEM_GROUPS = {
      drums: ['kick','snare','hat','crash'],
      bass:  ['sub','bass'],
      mid:   ['mid'],
      lead:  ['lead'],
    };

    // Accumulate events PER SECTION (we'll render stems per section then concat)
    const stemSectionBufs = {drums:[], bass:[], mid:[], lead:[]};
    let sectionAR = {...baseAR};
    let progressBase = 0;
    let allEvents = []; // for fingerprinting

    setRenderProgress(2); setRenderStage('Starting...');

    for(let si=0;si<sections.length;si++){
      const [label, bars, chaosD, densD] = sections[si];
      const secSec = barsToSec(bars);
      setRenderStage(`${label} (${si+1}/${sections.length})`);

      const secAR = {
        ...sectionAR,
        structurePhase: label,
        chaos:   Math.max(0.05, Math.min(0.95, baseAR.chaos + chaosD)),
        density: Math.max(0.10, Math.min(1.00, baseAR.density + densD)),
      };

      // Per-section timeout: 3Г— the audio duration (generous headroom)
      const sectionTimeout = Math.max(30000, secSec * 3000);

      try{
        const sim = simulateBand(secSec, secAR, brain.q);
        allEvents = allEvents.concat(sim.events.map(e=>({...e, t:e.t}))); // for fingerprint

        // Render each stem group for this section in parallel
        const stemPromises = Object.entries(STEM_GROUPS).map(async ([name, types]) => {
          const p = renderStemBuffer(sim.events, secSec, secAR, types);
          const to = new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),sectionTimeout));
          return [name, await Promise.race([p, to])];
        });

        const results = await Promise.all(stemPromises);
        for(const [name, buf] of results){
          stemSectionBufs[name].push(buf);
        }

        // Carry forward musical state
        sectionAR = {
          ...secAR,
          chordType:          sim.endChordType,
          rootMidi:           sim.endRoot,
          measureCount:       sim.endMeasure,
          measuresThisChord:  sim.endMeasuresOnChord||0,
          measuresPerChord:   sim.endMeasuresPerChord||4,
          targetChordSeq:     sim.endPhrase||null,
          phrasePosition:     sim.endPhrasePos||0,
          structurePhase:     label,
          _groove:            sim.endGroove||null,
        };

      }catch(e){
        console.warn('[FullTrack] section failed:', label, e.message);
        // Push null so concat skips gracefully
        for(const name of Object.keys(STEM_GROUPS)) stemSectionBufs[name].push(null);
      }

      progressBase += bars/totalBars;
      setRenderProgress(Math.round(progressBase * 78) + 5);
    }

    setRenderStage('Mixing stems...');
    setRenderProgress(85);

    // Concatenate all sections per stem
    const stemFull = {};
    for(const [name, bufs] of Object.entries(stemSectionBufs)){
      stemFull[name] = await concatBuffers(bufs.filter(Boolean), SR);
    }

    // Mix all stems into a full master buffer
    setRenderStage('Master mix...');
    setRenderProgress(92);
    const totalSamples = Object.values(stemFull).find(Boolean)?.length || 0;
    if(totalSamples > 0){
      const masterCtx = new OfflineAudioContext(2, totalSamples, SR);
      const masterGain = masterCtx.createGain(); masterGain.gain.value = 0.88;
      // Limiter
      const lim = masterCtx.createDynamicsCompressor();
      lim.threshold.value=-1; lim.knee.value=0; lim.ratio.value=20;
      lim.attack.value=0.001; lim.release.value=0.05;
      masterGain.connect(lim); lim.connect(masterCtx.destination);

      for(const buf of Object.values(stemFull)){
        if(!buf) continue;
        const src = masterCtx.createBufferSource(); src.buffer=buf;
        src.connect(masterGain); src.start(0);
      }
      stemFull.full = await masterCtx.startRendering();
    }

    setRenderProgress(97); setRenderStage('Finalizing...');

    // в”Ђв”Ђ No-repeat fingerprint в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    const fp = songHistory.fingerprint(allEvents, bpm, rootNote, cfg.genre);
    if(songHistory.isTooSimilar(fp)){
      addLog('[Brain] Detected repeat pattern вЂ” penalizing Q-table to evolve next generation');
      songHistory.penalizeBrain(allEvents, rootPC);
    }
    songHistory.record(fp, bpm, cfg.key, cfg.genre);

    fullTrackRef.current.buffer = stemFull.full;
    fullTrackRef.current.stems  = stemFull;
    setStemBuffers(stemFull);
    setFullTrackBuffer(stemFull.full);

    // Sync brain state + save
    AR.current.chaos   = baseAR.chaos;
    AR.current.density = baseAR.density;
    AR.current.root    = rootNote;
    AR.current.lockedRoot = rootNote;
    setBpm(bpm);
    setKickStyleState(kickStyle);
    collectiveBrainSave();  // persist including song history

    setRenderProgress(100); setRenderStage('Done!');
    setTimeout(()=>{ setShowConfig(false); setTrackReady(true); setRenderProgress(0); }, 500);
  };

  // Download helper вЂ” AudioBuffer в†’ 16-bit WAV
  const downloadBuffer = (buf, filename) => {
    if(!buf){ addLog('No buffer to download.'); return; }
    const numCh=buf.numberOfChannels, len=buf.length, SR=buf.sampleRate;
    const wav = new ArrayBuffer(44 + len*numCh*2);
    const view = new DataView(wav);
    const ws = (off,s)=>{for(let i=0;i<s.length;i++)view.setUint8(off+i,s.charCodeAt(i));};
    ws(0,'RIFF'); view.setUint32(4,36+len*numCh*2,true);
    ws(8,'WAVE'); ws(12,'fmt ');
    view.setUint32(16,16,true); view.setUint16(20,1,true);
    view.setUint16(22,numCh,true); view.setUint32(24,SR,true);
    view.setUint32(28,SR*numCh*2,true); view.setUint16(32,numCh*2,true);
    view.setUint16(34,16,true); ws(36,'data');
    view.setUint32(40,len*numCh*2,true);
    let off=44;
    for(let i=0;i<len;i++) for(let c=0;c<numCh;c++){
      view.setInt16(off, Math.max(-32768,Math.min(32767,Math.round(buf.getChannelData(c)[i]*32767))),true); off+=2;
    }
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([wav],{type:'audio/wav'}));
    a.download=filename; a.click(); URL.revokeObjectURL(a.href);
  };

  // -- SOUNDBANK IMPORT/EXPORT ---------------------------------------------
  // The soundbank + brain snapshot is the fingerprint of this install's
  // learning. Export as JSON to back up or share with another device.
  const exportSoundbank = async () => {
    const [brainSnap, soundbankSnap, sim3Snap, phrasesSnap] = await Promise.all([
      genesisLocal.get(BRAIN_NS),
      genesisLocal.get('soundbank'),
      genesisLocal.get('sim3'),
      genesisLocal.get('phrases'),
    ]);
    const payload = {
      _version: 1,
      _exported_at: new Date().toISOString(),
      brain: brainSnap, soundbank: soundbankSnap,
      sim3: sim3Snap, phrases: phrasesSnap,
    };
    const blob = new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'bandxmate_soundbank_'+new Date().toISOString().slice(0,10)+'.json';
    a.click(); URL.revokeObjectURL(a.href);
    addLog('[SOUNDBANK] Exported '+(soundbankSnap?.ema?.samples||0)+' samples');
  };
  const importSoundbank = async (file) => {
    if(!file) return;
    try{
      const text = await file.text();
      const payload = JSON.parse(text);
      if(!payload || payload._version!==1) throw new Error('Unrecognised file version');
      if(payload.brain)     await genesisLocal.put(BRAIN_NS, payload.brain);
      if(payload.soundbank) await genesisLocal.put('soundbank', payload.soundbank);
      if(payload.sim3)      await genesisLocal.put('sim3', payload.sim3);
      if(payload.phrases)   await genesisLocal.put('phrases', payload.phrases);
      await userSoundbank.load();
      await collectiveBrainLoad();
      addLog('[SOUNDBANK] Imported вЂ” reload to apply fully');
    }catch(e){
      addLog('[SOUNDBANK] Import failed: '+(e?.message||e));
    }
  };

  const playFullTrack = () => {
    const buf = fullTrackRef.current.buffer; if(!buf)return;
    let ctx = AR.current.ctx;
    if(!ctx){
      const SR=DeviceComp.score<0.45?22050:44100;
      ctx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:SR,latencyHint:'playback'});
      AR.current.ctx=ctx; bus.init(ctx);
    }
    if(ctx.state==='suspended') ctx.resume();
    if(fullTrackRef.current.source){try{fullTrackRef.current.source.stop();}catch(e){}}
    const src=ctx.createBufferSource(); src.buffer=buf;
    src.connect(ctx.destination); src.start(0);
    fullTrackRef.current.source=src;
    setIsPlaying(true); isPlayRef.current=true;
    src.onended=()=>{ setIsPlaying(false); isPlayRef.current=false; };
    addLog('[Full Track] Playing ' + Math.round(buf.duration) + 's track.');
  };

    const startPreRenderedBand=async()=>{
    // -- DOUBLE-BUFFER PIPELINE ------------------------------------------
    // Step 1: Render chunk A (blocking, user sees "Loading...")
    // Step 2: Start playing chunk A immediately
    // Step 3: Render chunk B in background while A plays
    // Step 4: On A.onended -> swap to B instantly (zero gap)
    // Step 5: Immediately render chunk C in background, repeat forever
    // --------------------------------------------------------------------
    const ar=AR.current;
    const pr=preRenderRef.current;
    const CHUNK=pr.chunkSec||30;

    // Ensure audio context exists
    if(!ar.ctx){
      ar.ctx=(()=>{
        const SR=DeviceComp.score<0.45?22050:44100;
        try{return new(window.AudioContext||window.webkitAudioContext)({sampleRate:SR,latencyHint:'playback'});}
        catch(e){return new(window.AudioContext||window.webkitAudioContext)();}
      })();
    }
    if(ar.ctx.state==='suspended')await ar.ctx.resume();
    bus.init(ar.ctx);

    setLoadingBand(true);
    setPreRenderMode(true);

    try{
      // в”Ђв”Ђ CHUNK A: render now (user waits for this, ~2-5s) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      const simA = simulateBand(CHUNK, ar, brain.q);
      const renderA = renderEventsToBuffer(simA.events, CHUNK, ar);
      const timeout15 = new Promise((_,rej)=>setTimeout(()=>rej(new Error('render_timeout')),15000));
      const bufA = await Promise.race([renderA, timeout15]);

      // Store the end-state so chunk B continues from where A left off
      pr.endAR = {
        ...ar,
        chordType:        simA.endChordType,
        rootMidi:         simA.endRoot,
        measureCount:     simA.endMeasure,
        measuresThisChord: simA.endMeasuresOnChord||0,
        measuresPerChord:  simA.endMeasuresPerChord||4,
        targetChordSeq:   simA.endPhrase||null,
        phrasePosition:   simA.endPhrasePos||0,
        structurePhase:   simA.endPhaseLabel||'verse',
        _groove:          simA.endGroove||null,
      };
      pr.visualFrames    = simA.visualFrames;
      pr.frameIdx        = 0;
      pr.playStartCtxTime = ar.ctx.currentTime;

      // в”Ђв”Ђ Play chunk A в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      const srcA = ar.ctx.createBufferSource();
      srcA.buffer = bufA;
      srcA.connect(ar.ctx.destination);
      pr.playingSource = srcA;
      srcA.start(0);

      ghostBand.stop();
      setIsPlaying(true); isPlayRef.current=true;
      setLoadingBand(false);
      addLog('[Pre-render] Chunk A playing. Rendering B in background...');

      // в”Ђв”Ђ Background: render chunk B WHILE A is playing в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      pr.renderingNext = true;
      pr.nextBuffer    = null;

      const renderNextChunk = async(fromAR)=>{
        if(!isPlayRef.current){ pr.renderingNext=false; return; }
        try{
          const simNext = simulateBand(CHUNK, fromAR, brain.q);
          const renderNext = renderEventsToBuffer(simNext.events, CHUNK, fromAR);
          const to = new Promise((_,rej)=>setTimeout(()=>rej(new Error('render_timeout')),18000));
          const bufNext = await Promise.race([renderNext, to]);
          pr.nextBuffer       = bufNext;
          pr.nextVisualFrames = simNext.visualFrames;
          pr.nextEndAR = {

      // в”Ђв”Ђ On A ending: swap to B with zero gap в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

  const startBand=async()=>{

        if(isPlayRef.current)scheduler();

    }

  const togglePlay=async()=>{
    if(!AR.current.ctx)AR.current.ctx=(()=>{const SR=DeviceComp.score<0.45?22050:44100;try{return new(window.AudioContext||window.webkitAudioContext)({sampleRate:SR,latencyHint:'playback'});}catch(e){return new(window.AudioContext||window.webkitAudioContext)();}})();

  // -- SCHEDULE NOTE ---------------------------------------------------------
  const scheduleNote=(beat,time)=>{
    const ar=AR.current;const voices=voicesRef.current;
    // Motif phase vars -- used by drums, bass AND mid so must be at function scope
    const motifShape   = ar._motifShape||{densityMod:1,chaosMod:1,leadMod:1};
    const isCall       = ar._motifPhase==='call';
    const isResponse   = ar._motifPhase==='response';
    const isTurnaround = ar._motifPhase==='turnaround';
    const{ctx,chaos,density,stepsPerMeasure,warpMultiplier,userRole,chordType}=ar;
    const rootMidi=ar.lockedRoot??ar.rootMidi;
    const mutes=mutesRef.current;
    const ie=ar.inputEnergy||0.5;
    const tick=ar.tick++;
    // Follow-vs-lead signal visible to every drum sub-block in this scheduleNote.
    const userIsDrummer = (userRole === 'drum') || ((ar._onsetRate||0) > 2.3);
    Object.values(voices).forEach(v=>v.tick());
    // Keep brain in sync with current chord context
    brain.setChord(chordType);

    // -- BREATHING: if voices are harmonically clashing, pull them back -----
    // Clash = winding score low AND multiple voices active simultaneously.
    // We don't silence anything -- just reduce gain so the mix breathes.
    // Each voice checks if the others are "loud" and scales back proportionally.
    const activeVoices = Object.values(voices).filter(v=>v.glow>0.1).length;
    // Harmony score: brain quality 0-1. Low = dissonant, high = consonant.
    const harmonyScore = Math.max(0, Math.min(1, brain.quality||0.5));
    // breathe: 1.0 = full volume, lower = ducked. More active voices + low harmony = more ducking.
    // Lead ducks most (piercing). Mid ducks slightly. Bass/drum never duck.
    const breathLead = activeVoices>2 ? Math.max(0.45, harmonyScore*0.7+0.3) : 1.0;
    const breathMid  = activeVoices>3 ? Math.max(0.60, harmonyScore*0.5+0.5) : 1.0;
    // ar._breathe stores per-voice multiplier used inside each synth call via vol scaling

      ar.measureCount=(ar.measureCount||0)+1;

      // Motif phase: call(1-2) / response(3) / turnaround(4) within each phrase
      ar._motifPhase = structureEngine.motifPhase(ar.measuresThisChord);
      ar._motifShape = structureEngine.motifShape(ar._motifPhase);
      // Turnaround: temporarily color notes with pivot chord without changing progression
      // The structure engine still controls the real chord change timing

        ? structureEngine.turnaroundChord(chordType) : null;
      // Evolve taste based on current energy
      const windingEnergy=voices.lead.winding*0.5+voices.mid.winding*0.3+voices.bass.winding*0.2;
      bandTaste.evolve(windingEnergy, chaos);
      brain.auto(userRole,[0,4,7,11],chaos,chordType); collectiveBrainSave();
      // Conductor: update every bar based on who the user is playing as.

      }

          });

        }
      }
      // Feed this bar's inputs into the per-install soundbank.
      userSoundbank.observe({
        chaosAvg:   chaos,
        densityAvg: density,
        swingAvg:   ar.lockedSwing ?? ar.swing ?? 0.55,
        bpmNorm:    Math.min(1, (ar.lockedBpm||ar.bpm||110)/180),

        onsetRate:  ar._onsetRate||0,
      });
      // Commit last measure's rhythm pattern to memory
      const windingSum=(voices.drum.winding+voices.bass.winding+voices.mid.winding+voices.lead.winding)*0.25;
      rhythmMemory.commitMeasure(chordType, windingSum, stepsPerMeasure);
      // -- LEARNING ENGINES --------------------------------------------------

      chaosRewardEngine.update(sim3Ch, chordType);
      progressionMemory.push(chordType, sim3Ch);
      convergenceTracker.push(sim3Ch, chordType, completedPhrases.length);

      // -- STRUCTURE: autonomous chord changes --------------------------------
      // Build a target sequence if we don't have one
      if(!ar.targetChordSeq || ar.targetChordSeq.length===0){
        ar.targetChordSeq = structureEngine.buildPhrase(
          chordType, chaos, bandTaste.darkness, brain
        );
        ar.phrasePosition = 0;
        ar.measuresThisChord = 0;
        ar.measuresPerChord = Math.max(1, structureEngine.chordDuration(chaos, ar.structurePhase||'verse', brain.n));
        ar.structurePhase = structureEngine.advanceSection(Math.floor(ar.measureCount/4));
      }
      // Change chord when we've played enough measures on this one
      if(ar.measuresThisChord >= (ar.measuresPerChord||4)){
        ar.phrasePosition = ((ar.phrasePosition||0)+1) % ar.targetChordSeq.length;
        const nextC = ar.targetChordSeq[ar.phrasePosition];
        if(nextC && CHORDS[nextC]){
          ar.chordType = nextC; setCChord(nextC);
        }
        ar.measuresThisChord = 0;
        ar.measuresPerChord = Math.max(1, structureEngine.chordDuration(chaos, ar.structurePhase||'verse', brain.n));
        // When we complete a phrase (position wraps to 0), build a new one
        if(ar.phrasePosition===0){
          ar.targetChordSeq = structureEngine.buildPhrase(
            ar.chordType, chaos, bandTaste.darkness, brain
          );
          setProgSuggestion(ar.targetChordSeq.join(' > '));
        }
      }
      // Still allow manual brain suggestion to interject occasionally
      const sugg=progressionMemory.suggest(chordType);
      if(sugg&&CHORDS[sugg]&&Math.random()<0.15){ar.chordType=sugg;setCChord(sugg);}
      // Update convergence score display
      setConvergenceScore(convergenceTracker.sessionScore);
      if(Math.random()<chaos*0.2){
        const ms=[12,14,16,20];const m=ms[Math.floor(Math.random()*ms.length)];
        ar.stepsPerMeasure=m;setTS(m);
      }
      // Rhythm haptic mode -- vibrate the full beat pattern
      if(hapticModeRef.current==='rhythm'){
        const spb=Math.round(60000/(ar.lockedBpm||ar.bpm));
        hap.rhythm([spb,spb,spb,spb]);
      }
      // Echo motif -- fifth echo
      const echoResult=motifEng.popEcho();
      if(echoResult&&userRole!=='lead'&&!mutes.lead){
        echoResult.ivs.forEach(function(iv,ei){
          const echoNote=echoResult.root+iv+echoResult.transpose;
          if(echoNote>=24&&echoNote<=96){

          }
        });
        setMotifFlag(true);setTimeout(function(){setMotifFlag(false);},1100);hap.motif();
      }
      // -- PUBLISH TO GENESIS BRAIN every measure -------------------------
      // All sims receive this via realtime WS push -- no polling
      gbWrite({
        bpm:       ar.lockedBpm||ar.bpm,
        beat_phase:beat,
        root_midi: rootMidi,
        chord_type:chordType,
        chaos,
        density,
        swing:     ar.lockedSwing||ar.swing,
        steps:     stepsPerMeasure,
        warp:      warpMultiplier,
        user_role: userRole,
        winding_drum: voices.drum?.winding||0,
        winding_bass: voices.bass?.winding||0,
        winding_mid:  voices.mid?.winding||0,
        winding_lead: voices.lead?.winding||0,
        sub_active:  !mutes.sub,
        bass_active: !mutes.bass,
        invRadius:   Math.round(60 + (ar.lockedBpm||ar.bpm) * 0.5), // radius hint for sims
      });
    }

    const bk=beat%stepsPerMeasure;
    const hist=ar.rhythmHistory[bk]||{k:false,s:false,h:false,b:false,m:false,l:false};
    // Check rhythm memory for a suggested pattern -- nudges probability
    const rhythmSuggest=rhythmMemory.suggest(chordType,stepsPerMeasure);
    const rSug=rhythmSuggest&&rhythmSuggest[bk]?rhythmSuggest[bk]:{};
    const bb=Math.floor(stepsPerMeasure/2);
    const sup={drum:userRole==='drum',bass:userRole==='bass',mid:userRole==='mid',lead:userRole==='lead'};

    // -- DRUMS (groove-archetype driven) ------------------------------------
    if(!sup.drum&&!mutes.drum){
      // Pick archetype once per measure (beat 0), carry it forward
      if(beat===0){ ar._groove=bandTaste.pickArchetype(); }
      const groove=ar._groove||'fourOnFloor';
      const b16=beat%16;

      // -- GROOVE TEMPLATE (deterministic when AI leads) --------------------
      // Real drummers don't roll dice per step; they play a groove. The
      // archetype templates in bandTaste are treated as VELOCITY MAPS:
      // template[i] = how loud that step plays (0 = rest, 1 = accent,
      // 0.3 = ghost). When AI is leading, every non-zero step fires at

      // user can be the loudest thing in the room.

        const baseRat = ar.drumRationality ?? 0.75;

          ? Math.max(0, Math.min(1, baseRat * 0.55))
          : Math.max(0, Math.min(1, Math.max(baseRat, 0.82)));
        const arc = bandTaste.grooveArchetypes[groove] || bandTaste.grooveArchetypes.fourOnFloor;
        // dp.k/s/h stored as velocity [0..1]. 0 means rest.
        const dp = {k:new Array(16).fill(0), s:new Array(16).fill(0),

        // Thresholds: below these, a step is a rest. Above, it fires
        // at the template velocity. Ghost notes fire quiet but still fire.
        const kickFloor  = userIsDrummer ? 0.85 : 0.35;  // AI leads = play everything >= 0.35
        const snareFloor = userIsDrummer ? 0.85 : 0.45;
        const hatFloor   = userIsDrummer ? 0.75 : 0.40;
        // When AI leads, play ALL template steps at their velocity (deterministic).
        // When user drums, only fire if random chance AND velocity is high -- we become supportive.
        const fire = (vel, floor) => {
          if(vel < floor) return 0;
          if(userIsDrummer){
            // Sparse follow: high-velocity hits fire ~70% of the time, quieter ones skip
            return Math.random() < (vel-floor)*1.1 ? vel*0.75 : 0;
          }
          return vel;
        };

        for(let st=0;st<16;st++){
          dp.k[st] = fire(arc.k[st] * kMod0, kickFloor);
          // snare can't fire on same step as kick
          if(dp.k[st] > 0) continue;
          dp.s[st] = fire(arc.s[st] * sMod0, snareFloor);
        }
        // Hat: separate pass, allowed to overlap with kick/snare (real kits do this)
        const hatSparsity = userIsDrummer ? 0.75 : 0.6;
        for(let st=0;st<16;st++){
          const hv = arc.h[st] * hMod0 * hatSparsity;
          dp.h[st] = fire(hv, hatFloor);
          const isDesignatedOpen0 = bandTaste.isOpenStep(st, groove);
          // Open-hat only on designated steps, and only when that step actually plays
          dp.hOpen[st] = isDesignatedOpen0 && dp.h[st] > 0 && (Math.random() < 0.55 + chaos*0.2);
        }
        // Fills: only at the end of a 4-bar phrase, and only when AI leads.
        // This is the one controlled place we allow off-template hits.
        const endOfPhrase = (ar.measureCount % 4) === 3;
        if(!userIsDrummer && endOfPhrase && Math.random() < 0.55){
          // Add a fill on the last two beats (steps 12-15): extra snare hits
          for(let st=12; st<16; st++){
            if(dp.k[st] === 0 && dp.s[st] === 0 && Math.random() < 0.55){

            }

      }
      const dp=ar._drumPattern||{k:new Array(16).fill(0),s:new Array(16).fill(0),h:new Array(16).fill(0),hOpen:new Array(16).fill(false)};
      const kVel = dp.k[b16]||0;
      const sVel = dp.s[b16]||0;
      const hVel = dp.h[b16]||0;
      const playK  = kVel > 0;
      const playS  = sVel > 0;

        const hatVel = Math.max(0.18, Math.min(1.0, hVel*0.85 + (Math.random()-0.5)*0.08));
        const grooveOff = (styleP().hatGrooveOffset||0) * (0.7 + Math.random()*0.6);
        // Swing tween: per-voice smoothly-animating push that rides on top of the
        // style's microJitter. Zero-centered around 0.18, up to ~+16ms push at 1.0.
        const drumSwingPush = (motionTween.swingFor('drum') - 0.18) * 0.020;
        const hatT = time + (Math.random()-0.5)*styleP().microJitter*1.5 + grooveOff + drumSwingPush;
        synthHat(ctx,hatT,dp.hOpen[b16],chaos,warpMultiplier,bus.getInput('drum'),ie,hatVel);
        rhythmMemory.mark(beat,stepsPerMeasure,{h:true});
      }

      // Only fire when the user IS drumming (so the AI fills in between
