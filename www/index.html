<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Live AI Band — Beyond Bound</title>
<!-- v3 - neural bass, improv tab, phrase recorder, echoMotif fix -->
<script src="vendor/react.production.min.js"></script>
<script src="vendor/react-dom.production.min.js"></script>

<link rel="stylesheet" href="tailwind.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');
*{box-sizing:border-box;} body{font-family:'Space Mono',monospace;background:#050810;margin:0;}
input[type=range]{-webkit-appearance:none;background:transparent;width:100%;}
input[type=range]::-webkit-slider-track{height:3px;background:#1e2535;border-radius:99px;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;height:14px;width:14px;border-radius:99px;background:#22d3ee;cursor:pointer;box-shadow:0 0 10px rgba(34,211,238,0.5);margin-top:-5.5px;}
.syne{font-family:'Syne',sans-serif;}
.tap-zone{touch-action:none;user-select:none;-webkit-user-select:none;}
@keyframes pr{0%{transform:scale(1);opacity:.9}100%{transform:scale(2.4);opacity:0}}
.pr{animation:pr 0.55s ease-out forwards;}
@keyframes lg{0%,100%{box-shadow:0 0 8px #22d3ee44}50%{box-shadow:0 0 28px #22d3eeaa}}
.locked{animation:lg 1.5s ease-in-out infinite;}
@keyframes bg{0%,100%{box-shadow:0 0 12px #10b98155}50%{box-shadow:0 0 30px #10b981cc}}
.bass-pulse{animation:bg 0.4s ease-out;}
@keyframes guide-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.guide-in{animation:guide-in 0.4s ease-out;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:#0a0f18;}
::-webkit-scrollbar-thumb{background:#1e2535;border-radius:2px;}
.muted{opacity:0.28;filter:grayscale(0.6);}
.section-btn{transition:all 0.15s;}
</style>
</head>
<body class="bg-[#050810] text-slate-300 overflow-x-hidden">
<div id="loading-screen" style="position:fixed;inset:0;background:#050810;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999;">
  <div style="font-family:monospace;font-size:11px;color:#22d3ee;letter-spacing:0.3em;text-transform:uppercase;">Live AI Band</div>
  <div style="width:48px;height:48px;border:2px solid #1e2535;border-top-color:#22d3ee;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
  <div id="load-status" style="font-family:monospace;font-size:9px;color:#475569;letter-spacing:0.15em;">Loading engine...</div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</div>
<div id="root"></div>
<script>
// Catch ANY error and display it on the loading screen
window.onerror = function(msg, src, line, col, err) {
  var ls = document.getElementById('loading-screen');
  if (!ls) return;
  ls.style.display = 'flex';
  ls.innerHTML = '<div style="font-family:monospace;padding:20px;max-width:90vw;font-size:11px;line-height:1.8;word-break:break-all;color:#f43f5e;">'
    + '<div style="color:#fff;font-size:14px;margin-bottom:12px;">JS Error</div>'
    + '<b>Message:</b> ' + msg + '<br>'
    + '<b>Line:</b> ' + line + ' Col: ' + col + '<br>'
    + '<b>File:</b> ' + (src||'').split('/').pop()
    + '</div>';
};
window.onunhandledrejection = function(e) {
  var ls = document.getElementById('loading-screen');
  if (!ls) return;
  ls.style.display = 'flex';
  ls.innerHTML = '<div style="font-family:monospace;padding:20px;max-width:90vw;font-size:11px;line-height:1.8;word-break:break-all;color:#f87171;">'
    + '<div style="color:#fff;font-size:14px;margin-bottom:12px;">Async Error</div>'
    + String(e.reason)
    + '</div>';
};
</script>
<script>
// ── SIMCOLT BRIDGE ──────────────────────────────────────────────────────────
// Receives BPM sync messages from the sim3colts parent frame (index.html).
// Band state is persisted locally via IndexedDB (see genesisLocal below).

window._externalBpm   = null;   // set by postMessage from simcolt parent
window._fpsSyncActive = false;

window.addEventListener('message', function(e) {
  if (!e.data || e.data.type !== 'BAND_BPM_SYNC') return;
  var bpm = parseInt(e.data.bpm);
  if (bpm >= 40 && bpm <= 240) {
    window._externalBpm   = bpm;
    window._fpsSyncActive = true;
    var ls = document.getElementById('load-status');
    if (ls && ls.parentNode && ls.parentNode.style.display !== 'none') {
      ls.textContent = 'FPS sync: ' + (e.data.fps || '?') + ' fps → ' + bpm + ' bpm';
    }
  }
});
</script>
<script src="app.js"></script>
</body>
</html>
