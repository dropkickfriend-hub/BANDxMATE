  // -- SCHEDULE NOTE ---------------------------------------------------------
  const scheduleNote=(beat,time)=>{
    const ar=AR.current;const voices=voicesRef.current;
    // Expose voices globally so stateless synth functions can observe winding
    // for deepDesign rewards without threading a ref argument through every
    // call site.
    if(typeof window!=='undefined') window._bandVoices = voices;
    // Motif phase vars -- used by drums, bass AND mid so must be at function scope
    const motifShape   = ar._motifShape||{densityMod:1,chaosMod:1,leadMod:1};
    const isCall       = ar._motifPhase==='call';
    const isResponse   = ar._motifPhase==='response';
    const isTurnaround = ar._motifPhase==='turnaround';
    const{ctx,chaos,density,stepsPerMeasure,warpMultiplier,userRole,chordType}=ar;
    // tempoWarp governs step-to-step timing (includes halftime); pitch is
    // carried separately via warpMultiplier so halftime doesn't lower pitch.
    const tempoWarp = ar.tempoWarp || warpMultiplier || 1;
    // Octave-shift offset in semitones. Default 0; user can toggle -12/+12
    // via the OCT button so the whole band drops (or lifts) an octave
    // without changing the detected key.
    const _octShift = ar._octShift || 0;
    const rootMidi=(ar.lockedRoot??ar.rootMidi) + _octShift;
    const mutes=mutesRef.current;
    const ie=ar.inputEnergy||0.5;
    const tick=ar.tick++;
    // Follow-vs-lead signal visible to every drum sub-block in this scheduleNote.
    const userIsDrummer = (userRole === 'drum') || ((ar._onsetRate||0) > 2.3);
    Object.values(voices).forEach(v=>v.tick());
    // Keep brain in sync with current chord context
    brain.setChord(chordType);

    // -- BREATHING: if voices are harmonically clashing, pull them back -----
    // Clash = winding score low AND multiple voices active simultaneously.
    // We don't silence anything -- just reduce gain so the mix breathes.
    // Each voice checks if the others are "loud" and scales back proportionally.
    const activeVoices = Object.values(voices).filter(v=>v.glow>0.1).length;
    // Harmony score: brain quality 0-1. Low = dissonant, high = consonant.
    const harmonyScore = Math.max(0, Math.min(1, brain.quality||0.5));
    // breathe: 1.0 = full volume, lower = ducked. More active voices + low harmony = more ducking.
    // Lead ducks most (piercing). Mid ducks slightly. Bass/drum never duck.
    const breathLead = activeVoices>2 ? Math.max(0.45, harmonyScore*0.7+0.3) : 1.0;
    const breathMid  = activeVoices>3 ? Math.max(0.60, harmonyScore*0.5+0.5) : 1.0;
    // ar._breathe stores per-voice multiplier used inside each synth call via vol scaling
    ar._breathLead = breathLead;
    ar._breathMid  = breathMid;

    if(beat===0){
      ar.measureCount=(ar.measureCount||0)+1;
      // Grossbeat gate pattern advance -- rotates pattern every bar boundary.
      try{ if(typeof grossbeat!=='undefined') grossbeat.onBar(); }catch(_){}
      // Groove field: tick the bar, evaluate anomalies per role. Voices
      // that drift far from centroid raise anomalyHeat -- echoInvite()
      // then boosts the OTHER voices' prob so they catch the new direction.
      try{
        if(typeof grooveField !== 'undefined'){
          grooveField.tickBar();
          for(const r of ['drum','bass','mid','lead']){
            const bars = grooveField.onsets[r];
            const last = bars && bars[bars.length-1];
            if(last) grooveField.evaluateAnomaly(r, last);
          }
        }
      }catch(_){}
      // Genre-favorite observation: track per-genre config performance via
      // combined winding so the app learns which combo works best per style.
      try{
        const wSum = (voices.drum?.winding||0) + (voices.bass?.winding||0) +
                     (voices.mid?.winding||0) + (voices.lead?.winding||0);
        genreFavorites.observe(kickStyle, {
          bass:  _bassKit.mode,
          lead:  styleP().leadMode || 'saw',
          feel:  ar._drumFeelActive || 'normal',
          spread: !!ar._spreadVoicings,
        }, wSum);
      }catch(_){}
      // Dissonance bank observe: use winding delta from last bar as reward
      // for the prior chord's interval set. Teaches "good dissonance" vs "bad
      // dissonance" in the context of this chord type.
      try{
        const wNow = (voices.mid?.winding||0) + (voices.lead?.winding||0);
        const wLast = ar._dbLastWind ?? wNow;
        const rPc = ((rootMidi%12)+12)%12;
        const ct0 = CHORDS[ar._dbLastChord||chordType]||CHORDS.maj;
        dissonanceBank.observe(ar._dbLastChord||chordType, ct0.iv, (wNow-wLast)*0.15, rPc);
        ar._dbLastWind  = wNow;
        ar._dbLastChord = chordType;
      }catch(_){}
      // Per-voice pause system: voices can take 1-2 bars off so the groove
      // can breathe. New rests are seeded sparingly (roughly every 6-10
      // bars per voice) and only when tension is low.
      if(!ar._restBars) ar._restBars = {bass:0, mid:0, lead:0};
      for(const r of ['bass','mid','lead']){
        if(ar._restBars[r] > 0) ar._restBars[r]--;
      }
      const arcTension = tensionArc.currentFor('lead').h;
      if(arcTension < 0.35){
        // Seed a fresh rest at low tension
        for(const r of ['bass','mid','lead']){
          if(ar._restBars[r] === 0 && Math.random() < 0.10){
            ar._restBars[r] = Math.random() < 0.65 ? 1 : 2;
            addLog('[REST] '+r+' pauses '+ar._restBars[r]+' bar'+(ar._restBars[r]>1?'s':''));
          }
        }
      }
      flushBarQueue(); // Apply queued user inputs at bar boundary

      // -- LIVE MIC REACTIVITY: call/response + vamp detection ---------------
      // Runs at every bar boundary. `_userIsActive` is true if the user hit
      // a mic onset in the last ~1.5 seconds. Consecutive active bars pile
      // up into vamp mode; a bar going silent right after activity triggers
      // a band response on this very bar.
      const _nowSec = ctx.currentTime;
      const _userFresh = ar._userLastOnsetAt != null && (_nowSec - ar._userLastOnsetAt) < 1.5;
      ar._userIsActive = _userFresh;
      const _wasActive = !!ar._userWasActiveLastBar;
      if(_userFresh){
        ar._userActiveBars = (ar._userActiveBars||0) + 1;
        ar._userSilentBars = 0;
      } else {
        ar._userSilentBars = (ar._userSilentBars||0) + 1;
        ar._userActiveBars = Math.max(0, (ar._userActiveBars||0) - 1);
      }
      // Vamp mode: user has been playing consistently for 3+ bars → band
      // locks into the current chord longer and fills more.
      ar._vampMode = (ar._userActiveBars||0) >= 3;
      // Call/response: user just stopped playing after being active → next
      // bar is the band's turn to answer.
      ar._callResponseDue = _wasActive && !_userFresh && (ar._userSilentBars===1);
      ar._userWasActiveLastBar = _userFresh;
      if(ar._callResponseDue) addLog('[RESPOND] Band answering…');
      if(ar._vampMode && !ar._vampLogged){ ar._vampLogged=true; addLog('[VAMP] Locked in with you.'); }
      if(!ar._vampMode) ar._vampLogged=false;

      // -- ARRANGEMENT: intro + breakdowns -------------------------------
      // Intro: hat-only for the first ~2 bars. Every other voice stays
      // silent so the groove establishes before the band lands.
      // Breakdown: kick+snare+sub drop out, but bass/mid/lead keep going
      // — classic breakdown feel, not dead silence.
      if((ar._introBars||0) > 0){
        ar._introBars -= 1;
        ar._quietBar = true;   // kills kick / snare / sub
        ar._introActive = true; // also kills bass / mid / lead
        if(ar._introBars === 0) addLog('[INTRO] Band drops in.');
      } else {
        ar._introActive = false;
        // Dynamic breakdowns: every ~8 bars, drop the kick/snare for 1 bar
        // so the groove breathes. Randomize placement ±3 bars.
        if(typeof ar._breakdownIn === 'number') ar._breakdownIn -= 1;
        if(ar._breakdownIn != null && ar._breakdownIn <= 0){
          ar._quietBar = true;
          ar._breakdownIn = 7 + Math.floor(Math.random()*4); // next in 7-10 bars
          addLog('[BREAKDOWN]');
        } else {
          ar._quietBar = false;
        }
      }

      ar.measuresThisChord=(ar.measuresThisChord||0)+1;
      // Motif phase: call(1-2) / response(3) / turnaround(4) within each phrase
      ar._motifPhase = structureEngine.motifPhase(ar.measuresThisChord);
      ar._motifShape = structureEngine.motifShape(ar._motifPhase);
      // FULL-MEASURE PAUSE: between call and response (and sometimes after
      // response) roll a quiet bar so the band breathes. Jazz lands on it
      // more often since space is the language. User explicitly asked for
      // "full-measure pauses between responses".
      const pauseOdds = (kickStyle==='jazz') ? 0.35 : 0.18;
      ar._quietBar = (ar._motifPhase==='response' && Math.random() < pauseOdds) ||

      c.beginPath();c.moveTo(W/2,0);c.lineTo(W/2,H);c.stroke();c.setLineDash([]);
      c.fillStyle='rgba(255,255,255,.65)';c.font='bold 9px Space Mono';c.textAlign='center';
      c.fillText('YOU',W*.25,H-8);c.fillText(midiToNote(AR.current.lockedRoot??AR.current.rootMidi),W*.25,bY-6);
      c.fillText('BAND',W*.75,H-8);c.fillText(`${midiToNote((aiPc+60)%128)} ${AR.current.chordType}`,W*.75,aY-6);
      c.textAlign='left';

      // Beat tick
      if(isPlayRef.current&&AR.current.ctx){
        const spb=60/((AR.current.lockedBpm||AR.current.bpm)*AR.current.warpMultiplier);
        const phase=(AR.current.ctx.currentTime%spb)/spb;
        const tx=W*.04+phase*(W*.92);
        c.fillStyle=phase<0.06?'rgba(255,55,55,.95)':'rgba(255,255,255,.4)';c.fillRect(tx-1,H-7,2,7);
      }

      // -- MIC ANALYSIS -- runs every frame so onsets aren't missed ---------
      // Adaptive noise-floor tracking + band-onset rejection so the mic
      // doesn't mistake the band's own speaker output for user playing.
      if(micActive&&AR.current.analyser){
        const an=AR.current.analyser;const fd=new Uint8Array(an.frequencyBinCount);an.getByteFrequencyData(fd);
        let rms=0,maxIdx=0,maxVal=0;
        for(let i=0;i<fd.length;i++){rms+=fd[i]*fd[i];if(fd[i]>maxVal){maxVal=fd[i];maxIdx=i;}}
        rms=Math.sqrt(rms/fd.length);
        AR.current.inputEnergy=rms/128;setInputEnergy(Math.min(1,rms/100));

        // Adaptive noise floor: slow-decay EMA of the quietest ~15% of frames.
        // Threshold = floor + margin; adapts to room / mic sensitivity.
        AR.current._micFloor = AR.current._micFloor==null ? rms : (AR.current._micFloor*0.995 + Math.min(rms, AR.current._micFloor*1.05)*0.005);
        const micFloor = AR.current._micFloor||0;
        const onsetThreshold = Math.max(8, micFloor + 10);

        const now2=Date.now();
        // Intensity = transient strength × volume-to-harmony ratio. Bigger
        // transient at higher RMS with low tonal coherence = more intense.
        AR.current._userIntensity = Math.max(0, Math.min(1,
          (rms/100) * (0.5 + (AR.current.pitchConfLow ? 0.5 : 0))
        ));
        const isOnset=rms>20&&rms>AR.current.previousEnergy*1.42&&(now2-AR.current.lastOnset)>120;
        if(isOnset){
          const delta=now2-AR.current.lastOnset;AR.current.lastOnset=now2;onsetRate++;
          motifEng.addOnset(now2);
          // User-activity tracking: scheduler reads these to duck the band
          // when the user is singing and to trigger a response on silence.
          // Timestamp uses the AudioContext clock so it lines up with the
          // scheduled band-onset times in ar._bandOnsets.
          const ctxNow = (AR.current.ctx ? AR.current.ctx.currentTime : now2/1000);
          AR.current._userLastOnsetAt = ctxNow;
          AR.current._userIsActive = true;
          const result=motifEng._analyzeRhythm();
          if(result&&!lockedRef.current){
            const{bpm:ab,swingPct,subdivisions:sub}=result;
            if(ab>=40&&ab<=250){
              if(Math.abs(ab-AR.current.bpm)>6&&frame%10===0){addLog(`TEMPO: ${ab} BPM`);setTCFlag(true);setTimeout(()=>setTCFlag(false),1500);}
              // Tighter snap: 2 BPM delta, UI update every 12 frames
              if(Math.abs(ab-AR.current.bpm)>2){AR.current.bpm=ab;if(frame%12===0)setBpm(ab);}
            }
            if(swingPct>0&&frame%20===0){setSwing(swingPct);AR.current.swing=swingPct;setDSwing(swingPct);}
            if(sub>2&&frame%40===0)setSubdivisions(sub);
            // Auto-pick groove based on detected tempo + subdivision so the
            // AI kit actually follows what the user's playing, not a static
            // default. Only re-picks once every ~2 seconds (frame%80).
            if(frame%80===0){
              let pick = 'standard';
              if(sub===3 || swingPct > 25)         pick = 'jazzSwing';
              else if(ab < 80)                     pick = 'halfTime';
              else if(ab > 135)                    pick = 'fourOnFloor';
              else if(AR.current._userIntensity > 0.65) pick = 'hiphop';
              if(pick !== AR.current._userGroove){
                AR.current._userGroove = pick;
                AR.current._groove = pick;   // adopt immediately
                addLog(`GROOVE: ${pick} (${ab}bpm sub ${sub})`);
              }
            }
          }
        }
        AR.current.previousEnergy=rms;

        // HPS pitch detection
        const nyq=AR.current.ctx.sampleRate/2;let bF=0,bV=0;
        const mn=Math.floor(40/nyq*fd.length),mx=Math.floor(2000/nyq*fd.length);
        for(let i=mn;i<mx;i++){const v=(fd[i]/255)*(fd[Math.min(fd.length-1,i*2)]/255)*(fd[Math.min(fd.length-1,i*3)]/255+0.1);if(v>bV){bV=v;bF=(i/fd.length)*nyq;}}

        if(bF>40&&maxVal>33){
          const midi=Math.round(69+12*Math.log2(bF/440));
          if(midi>=24&&midi<=96){
            if(!lockedRef.current){
              if(motifEng.detectKeyChange(prevRootRef.current%12,midi%12)&&frame%25===0){
                setKCFlag(true);setTimeout(()=>setKCFlag(false),2500);
                addLog(`KEY: ${midiToNote(prevRootRef.current)} -> ${midiToNote(midi)}`);hap.keyChange();
              }
              AR.current.rootMidi=midi;prevRootRef.current=midi;
            }
            const pc=midi%12;pitchHistRef.current[pc]+=0.06;
            if(isOnset){
              motifEng.addPitch(midi,now2);
              // DUET ON TURNAROUND: when the band is in turnaround phase and
              // the user sings a pitch, the lead fires a harmony note (3rd
              // or 4th depending on chord quality) so the two voices are
              // singing together rather than the band watching silently.
              try{
                if(AR.current._motifPhase === 'turnaround' && !mutesRef.current.lead && AR.current.ctx){
                  const harmMidi = motifEng.harmonizeNote(midi, AR.current.chordType);
                  if(typeof harmMidi === 'number' && harmMidi >= 48 && harmMidi <= 96){
                    // Schedule at the next audio-context tick so we ride the
                    // user's attack rather than racing ahead.
                    const dT = Math.max(0.003, AR.current.ctx.currentTime);
                    if(typeof playLeadStereo === 'function'){
                      playLeadStereo(AR.current.ctx, dT, harmMidi, 0.3,
                        AR.current.warpMultiplier||1, bus.getInput('lead'), 0.18, 0.8);
                    } else if(typeof synthLead === 'function'){
                      synthLead(AR.current.ctx, dT, harmMidi, 0.3,
                        AR.current.warpMultiplier||1, bus.getInput('lead'), 0.18);
                    }
                    motifEng.logBandPitch(harmMidi, Date.now());
                  }
                }
              }catch(_){}
            }
            if(frame%8===0){setDMidi(midi);const c=Math.round(maxVal/255*100);setConf(c);confidenceRef.current=c;}
          }
        }else if(frame%8===0){setConf(0);confidenceRef.current=0;}

        // Scale + chord detection
        if(frame%45===0){
          const root=((AR.current.lockedRoot??AR.current.rootMidi)%12+12)%12;
          const rot=Array(12).fill(0).map((_,i)=>pitchHistRef.current[((i+root)%12)]);
          const det=bestScale(rot);AR.current.scale=det.sc;setScaleMode(det.name);
          const active=pitchHistRef.current.map((v,i)=>({v,i})).filter(x=>x.v>.4).map(x=>x.i);
          if(active.length>=2){const ct=bestChord(active);AR.current.chordType=ct;setCChord(ct);}
        }

        // Role classification
        if(frame%38===0){
          const normOnsets=onsetRate/38;
          AR.current._onsetRate = normOnsets; // expose to scheduler for follow-vs-lead
          const nr=classifyRole(bF,rms,confidenceRef.current,normOnsets);onsetRate=0;
          if(nr!==AR.current.userRole){
            AR.current.userRole=nr;setUserRole(nr);
            if(nr!=='unknown')addLog(`You: ${nr.toUpperCase()} . AI fills: ${['drum','bass','mid','lead'].filter(r=>r!==nr).join(', ')}`);
          }
        }
        for(let i=0;i<12;i++)pitchActRef.current[i]*=0.89;
      }
      requestRef.current=requestAnimationFrame(renderLoop);
    };
    requestRef.current=requestAnimationFrame(renderLoop);
    return()=>cancelAnimationFrame(requestRef.current);
  },[micActive]);

  // -- TAP CANVAS RENDER -----------------------------------------------------
  useEffect(()=>{

      const c=canvas.getContext('2d');const W=canvas.width,H=canvas.height;

      c.fillStyle='rgba(5,8,16,0.25)';c.fillRect(0,0,W,H);

      // Draw tap dots that fade out
      const now=Date.now();
      tapVizRef.current=tapVizRef.current.filter(dot=>now-dot.t<2000);
      for(const dot of tapVizRef.current){
        const age=(now-dot.t)/2000;const opacity=1-age;const radius=8+age*30;
        const x=dot.x*W,y=dot.y*H;
        // Color by midi note if available
        const col=dot.midi?PC[dot.midi%12]:[34,211,238];
        const gr=c.createRadialGradient(x,y,0,x,y,radius);
        gr.addColorStop(0,`rgba(${col[0]},${col[1]},${col[2]},${opacity*.9})`);
        gr.addColorStop(1,`rgba(${col[0]},${col[1]},${col[2]},0)`);
        c.fillStyle=gr;c.beginPath();c.arc(x,y,radius,0,Math.PI*2);c.fill();
      }

      // Beat pulse ring on downbeat
      if(isPlayRef.current&&AR.current.ctx){
        const spb=60/((AR.current.lockedBpm||AR.current.bpm)*AR.current.warpMultiplier);
        const phase=(AR.current.ctx.currentTime%spb)/spb;
        if(phase<0.1){

          c.strokeStyle=`rgba(255,80,80,${1-r})`;c.lineWidth=2;
          c.beginPath();c.arc(W/2,H/2,20+r*30,0,Math.PI*2);c.stroke();
        }
      }

      c.fillStyle='rgba(34,211,238,0.15)';c.fillRect(0,H-4,W,4);
      c.fillStyle=`rgba(34,211,238,${0.5+energy*.5})`;c.fillRect(0,H-4,W*energy,4);

      }
      balls.slice(0,30).forEach((b,i)=>{

        const bx=b.x*W, by=b.y*H;
        const col=b.color||'#22d3ee';
        const winding=b.winding||0, glow=b.glow||0;
        if(!trails[i])trails[i]=[];

        if(trails[i].length>60)trails[i].shift();
        if(trails[i].length>1){
          for(let j=1;j<trails[i].length;j++){
            ctx.beginPath();ctx.moveTo(trails[i][j-1].x,trails[i][j-1].y);
            ctx.lineTo(trails[i][j].x,trails[i][j].y);
            ctx.strokeStyle=col;ctx.globalAlpha=Math.max(0,(j/trails[i].length)*0.5*glow);
            ctx.lineWidth=0.8;ctx.stroke();
          }
        }
        ctx.globalAlpha=1;
        if(winding>0){
          ctx.beginPath();ctx.arc(bx,by,6+(winding%15)*2,0,Math.PI*2);
          ctx.strokeStyle=col;ctx.globalAlpha=0.12+glow*0.15;ctx.lineWidth=1;ctx.stroke();
          ctx.globalAlpha=1;
        }
        ctx.shadowBlur=10+glow*20;ctx.shadowColor=col;ctx.fillStyle=col;
        ctx.beginPath();ctx.arc(bx,by,3+glow*4,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
      });
      ctx.fillStyle='rgba(5,8,16,0.7)';ctx.fillRect(0,0,W,28);
      ctx.font='10px monospace';ctx.fillStyle='#22d3ee';
      const chaosStr=chaos2?Number(chaos2).toFixed(3):'--';

      }
    };
    render();
    return()=>cancelAnimationFrame(sim3AnimRef.current);
  },[]);

                    {micAnalysis.keyChanges.map((kc,i)=>(
                      <div key={i} className="text-[8px] text-slate-300">
                        {kc.from} → {kc.to} at bar {kc.atBar}
                      </div>
                    ))}
                  </div>
                )}

                <div className="text-[7px] text-emerald-400 uppercase tracking-widest">
                  ✓ Applied to config · {micAnalysis.onsetCount} onsets · {micAnalysis.pitchCount} pitch frames
                </div>
              </div>
            )}

            {!micRecording&&!micAnalysis&&(
              <div className="text-[8px] text-slate-600 text-center">Press Record and play or sing for a few bars, then Stop</div>
            )}
          </div>
        )}

        {/* ── MANUAL CONFIG (always shown below tabs, as review/edit) ─────── */}
        <div className="space-y-3">
          {configTab!=='tap'&&configTab!=='mic'&&(
            <div className="text-[8px] text-slate-500 uppercase tracking-widest">Song settings</div>
          )}
          {(configTab==='tap'||configTab==='mic')&&(
            <div className="text-[8px] text-slate-500 uppercase tracking-widest border-t border-slate-800 pt-3">
              Review &amp; adjust detected settings
            </div>
          )}

          {/* Track name */}
          <div>
            <label className="text-[9px] text-slate-400 uppercase tracking-widest block mb-1.5">Track Name</label>
            <input value={trackConfig.name} onChange={e=>setTrackConfig(c=>({...c,name:e.target.value}))}
              placeholder="Untitled" className="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-slate-500"/>
          </div>

          {/* Genre */}
          <div>
            <label className="text-[9px] text-slate-400 uppercase tracking-widest block mb-1.5">Genre / Style</label>
            <div className="grid grid-cols-4 gap-1.5">
              {[
                ['jazz',      'Jazz',        'border-sky-400/60 text-sky-300 bg-sky-500/10'],
                ['pop',       'Pop/Rock',    'border-emerald-400/60 text-emerald-300 bg-emerald-500/10'],
                ['hiphop',    'Hip-Hop',     'border-violet-400/60 text-violet-300 bg-violet-500/10'],
                ['edm',       'EDM',         'border-rose-400/60 text-rose-300 bg-rose-500/10'],
                ['westcoast', 'West Coast',  'border-yellow-400/60 text-yellow-300 bg-yellow-500/10'],
                ['eastcoast', 'East Coast',  'border-orange-400/60 text-orange-300 bg-orange-500/10'],
                ['african',   'African',     'border-amber-400/60 text-amber-300 bg-amber-500/10'],
                ['indian',    'Indian',      'border-pink-400/60 text-pink-300 bg-pink-500/10'],
              ].map(([k,lbl,ac])=>(
                <button key={k} onClick={()=>setTrackConfig(c=>({...c,genre:k}))}
                  className={"py-1.5 rounded-lg text-[8px] font-bold uppercase border transition-all "+(trackConfig.genre===k?ac:'border-slate-700 text-slate-500 bg-slate-800/50')}>
                  {lbl}
                </button>
              ))}
            </div>
          </div>

          {/* BPM */}
          <div>
            <div className="flex justify-between mb-1.5">
              <label className="text-[9px] text-slate-400 uppercase tracking-widest">BPM</label>
              <span className="text-[9px] text-white font-bold">{trackConfig.bpm}</span>
            </div>
            <input type="range" min="60" max="200" value={trackConfig.bpm}
              onChange={e=>setTrackConfig(c=>({...c,bpm:parseInt(e.target.value)}))}
              className="w-full accent-indigo-500"/>
          </div>

          {/* Key */}
          <div>
            <label className="text-[9px] text-slate-400 uppercase tracking-widest block mb-1.5">Root Key</label>
            <div className="grid grid-cols-6 gap-1.5">
              {['C','D','E','F','G','A','Bb','B','C#','Eb','F#','Ab'].map(k=>(
                <button key={k} onClick={()=>setTrackConfig(c=>({...c,key:k}))}
                  className={"py-1 rounded text-[8px] font-bold border transition-all "+(trackConfig.key===k?'bg-indigo-500/20 text-indigo-300 border-indigo-500/50':'border-slate-700 text-slate-500 bg-slate-800/50')}>
                  {k}
                </button>
              ))}
            </div>
          </div>

          {/* Intensity */}
          <div>
            <div className="flex justify-between mb-1.5">
              <label className="text-[9px] text-slate-400 uppercase tracking-widest">Intensity</label>
              <span className="text-[9px] text-white">{trackConfig.intensity<0.35?'Chill':trackConfig.intensity<0.65?'Moderate':'Intense'}</span>
            </div>
            <input type="range" min="0" max="100" value={Math.round(trackConfig.intensity*100)}
              onChange={e=>setTrackConfig(c=>({...c,intensity:parseInt(e.target.value)/100}))}
              className="w-full accent-violet-500"/>
          </div>

          {/* Mood */}
          <div>
            <div className="flex justify-between mb-1.5">
              <label className="text-[9px] text-slate-400 uppercase tracking-widest">Mood</label>
              <span className="text-[9px] text-white">{trackConfig.darkness<0.35?'Bright':trackConfig.darkness<0.65?'Neutral':'Dark'}</span>
            </div>
            <input type="range" min="0" max="100" value={Math.round(trackConfig.darkness*100)}
              onChange={e=>setTrackConfig(c=>({...c,darkness:parseInt(e.target.value)/100}))}
              className="w-full accent-amber-500"/>
          </div>
        </div>

        {/* Generate / progress */}
        {renderProgress===0?(
          <button onClick={()=>renderFullTrack(trackConfig)}
            className="w-full py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white font-bold text-sm uppercase tracking-wider transition-all">
            Generate Song →
          </button>
        ):(
          <div className="space-y-2">
            <div className="flex justify-between text-[9px]">
              <span className="text-slate-400 uppercase tracking-widest">{renderStage}</span>
              <span className="text-white font-bold">{renderProgress}%</span>
            </div>
            <div className="w-full bg-slate-800 rounded-full h-2">
              <div className="bg-indigo-500 h-2 rounded-full transition-all duration-300" style={{width:renderProgress+'%'}}/>
            </div>
            <div className="text-[8px] text-slate-600 text-center">
              Intro → Verse → Chorus → Bridge → Verse → Chorus → Turnaround → Outro
            </div>
          </div>
        )}

        <button onClick={()=>setShowConfig(false)}
          className="w-full py-2 text-[9px] text-slate-600 hover:text-slate-400 uppercase tracking-widest transition-all">
          Skip → Go to live controls
        </button>

      </div>
      </div>
    </div>
  )}

    {/* HEADER */}
    <header className="flex justify-between items-start border-b border-slate-800/60 pb-2.5">
      <div>
        <h1 className="syne text-2xl font-black text-white tracking-tight">LIVE AI BAND</h1>
        <p className="text-[8px] text-slate-600 tracking-[0.22em] uppercase">Beyond Bound . Neural Ensemble</p>
      </div>
      <div className="flex flex-wrap gap-1.5 justify-end">
        {/* Perf mode toggle -- kills canvas on weak devices */}
      <button onClick={()=>{
        const next=!perfMode;setPerfMode(next);perfModeRef.current=next;
      }} className={"text-[8px] px-2 py-0.5 rounded-full border "+(perfMode?'bg-emerald-500/10 text-emerald-400 border-emerald-500/30':'bg-slate-800 text-slate-500 border-slate-700')}>
        {perfMode?'AUDIO ONLY':'[*] VIZ'}
      </button>
      {motifFlag&&<span className="text-[8px] bg-purple-500/15 text-purple-300 border border-purple-500/35 px-2 py-0.5 rounded-full animate-pulse">Echo Motif</span>}
        {keyChangeFlag&&<span className="text-[8px] bg-amber-400/15 text-amber-300 border border-amber-400/35 px-2 py-0.5 rounded-full animate-pulse">Key Change!</span>}
        {phraseRecording&&<span className="text-[8px] bg-rose-500/20 text-rose-300 border border-rose-500/40 px-2 py-0.5 rounded-full animate-pulse">REC Phrase...</span>}
        <span className="text-[8px] bg-slate-800 text-slate-400 border border-slate-700 px-2 py-0.5 rounded-full">{meterLabel} . {subLabel[subdivisions]||subdivisions+'div'}</span>
        <span className="text-[8px] bg-slate-800 text-slate-400 border border-slate-700 px-2 py-0.5 rounded-full">{scaleMode}</span>
        <span className="text-[8px] bg-slate-800 text-cyan-400 border border-cyan-900 px-2 py-0.5 rounded-full" title={"Ghost: "+ghostBand.measure+" measures | Groove: "+(AR.current._groove||"?")+" | Dark: "+Math.round(bandTaste.darkness*100)+"%"}>Brain {Math.round(brainQ*100)}% {!isPlaying&&ghostBand.running?"[g]":""}</span>
        <span className="text-[8px] bg-slate-800 text-slate-500 border border-slate-700 px-2 py-0.5 rounded-full" title={`Device score: ${DeviceComp.score.toFixed(2)} | Lookahead: ${DeviceComp.lookahead.toFixed(2)}s | Max BPM: ${DeviceComp.maxBpm}`}>[cfg] {DeviceComp.label}</span>
        {learningMode!=='none'&&<span className={"text-[8px] px-2 py-0.5 rounded-full border "+(learningMode==='chaos'?'bg-cyan-500/10 text-cyan-300 border-cyan-800':learningMode==='progression'?'bg-purple-500/10 text-purple-300 border-purple-800':'bg-amber-500/10 text-amber-300 border-amber-800')}>{learningMode==='chaos'?'!! Cross-Sense':learningMode==='progression'?'[*] Prog Mem':'~ Converge'}{learningMode==='convergence'?' '+convergenceScore+'%':''}</span>}
      </div>
    </header>

    {/* TAB BAR */}
    <div className="flex gap-2">
      {[['band','BAND'],['improv','IMPROV'],['billboard','BILLBOARD']].map(([id,label])=>(
        <button key={id} onClick={()=>setActiveTab(id)}
          className={"px-4 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-widest border transition-all "+(activeTab===id?'bg-cyan-500/15 text-cyan-300 border-cyan-500/40':'bg-slate-800/40 text-slate-500 border-slate-700 hover:border-slate-500')}>
          {label}
        </button>
      ))}
      {/* Phrase buttons always visible */}
      <div className="ml-auto flex gap-1.5">
        <button onClick={startPhrase} disabled={phraseRecording||!micActive}
          className={"px-3 py-1.5 rounded-lg text-[9px] font-bold uppercase border transition-all "+(phraseRecording?'opacity-30 cursor-not-allowed bg-slate-800 border-slate-700 text-slate-600':'bg-rose-500/10 border-rose-500/30 text-rose-400 hover:bg-rose-500/20 disabled:opacity-30')}>
          {phraseRecording?'Recording...':'START PHRASE'}
        </button>
        <button onClick={endPhrase} disabled={!phraseRecording}
          className="px-3 py-1.5 rounded-lg text-[9px] font-bold uppercase border transition-all bg-emerald-500/10 border-emerald-500/30 text-emerald-400 hover:bg-emerald-500/20 disabled:opacity-30">
          END PHRASE
        </button>
      </div>
    </div>

    {/* GUIDE */}
    {guideVisible&&(
      <div className="bg-[#0b1120] border border-cyan-500/20 rounded-xl p-4">
        <div className="text-[9px] text-cyan-400 uppercase tracking-widest mb-1">{GUIDE_STEPS.find(g=>g.id===guideStep)?.title}</div>
        <p className="text-[11px] text-slate-300 leading-relaxed mb-3 whitespace-pre-line">{GUIDE_STEPS.find(g=>g.id===guideStep)?.msg}</p>
        <div className="flex flex-wrap gap-2">
          {(GUIDE_STEPS.find(g=>g.id===guideStep)?.choices||[]).map(ch=>(
            <button key={ch} onClick={()=>{
              if(guideStep==='welcome'){
                if(ch.includes('sing'))setGuideStep('motif_tutorial');
                else if(ch.includes('instrument'))setGuideStep('instrument');
                else if(ch.includes('drum'))setGuideStep('drummer');
                else setGuideStep('listen');
              }else{
                setGuideVisible(false);
                if(ch.includes('Mic')||ch.includes('Tutorial'))toggleMic();
                if(ch.includes('Start'))togglePlay();
              }
            }}
            className="px-3 py-1.5 bg-cyan-500/10 border border-cyan-500/30 text-cyan-400 text-[10px] font-bold uppercase tracking-widest rounded-lg hover:bg-cyan-500/20 transition-all">
              {ch}
            </button>
          ))}
          <button onClick={()=>setGuideVisible(false)} className="px-3 py-1.5 bg-slate-800/60 border border-slate-700 text-slate-500 text-[10px] rounded-lg">Skip</button>
        </div>
      </div>
    )}

    {/* LAST PHRASE ANALYSIS */}
    {lastPhrase&&(
      <div className="bg-[#0b1120] border border-purple-500/20 rounded-xl p-3 flex flex-wrap gap-3 text-[9px]">
        <div className="text-purple-400 uppercase tracking-widest font-bold self-center">Last Phrase</div>
        <span className="bg-slate-800 px-2 py-1 rounded text-white">Key: {NOTE_NAMES[lastPhrase.root]}</span>
        <span className="bg-slate-800 px-2 py-1 rounded text-purple-300">Chord: {lastPhrase.reharmonSuggestion}</span>
        <span className="bg-slate-800 px-2 py-1 rounded text-amber-300">Time: {lastPhrase.timeSig}/4</span>
        <span className="bg-slate-800 px-2 py-1 rounded text-cyan-300">Inv: {chordInvLabels[lastPhrase.inversion]||'Root'}</span>
        {lastPhrase.hasTA&&<span className="bg-rose-500/20 border border-rose-500/30 text-rose-300 px-2 py-1 rounded">Turnaround detected</span>}
        <span className="text-slate-600 self-center">{lastPhrase.ivs.slice(0,6).map(v=>v>0?'+'+v:v).join(' ')}</span>
      </div>
    )}

    {/* NOTICES */}
    {micActive&&!lockedIn&&<div className="bg-amber-500/8 border border-amber-500/22 rounded-lg px-3 py-1.5 text-[9px] text-amber-300/80">Mic active -- Lock In your feel then stop mic for best sound.</div>}
    {lockedIn&&!micActive&&<div className="bg-cyan-500/8 border border-cyan-500/22 rounded-lg px-3 py-1.5 text-[9px] text-cyan-300/80">Hands-free. Band locked to your groove.</div>}

    {/* =================================================================== */}
    {/* BAND TAB */}
    {/* =================================================================== */}
    {activeTab==='band'&&(<div className="space-y-3">


        {/* Track ready panel */}
        {trackReady&&fullTrackBuffer&&(
          <div className="bg-slate-900/80 border border-indigo-500/30 rounded-xl p-3 space-y-3">
            {/* Header row */}
            <div className="flex items-center justify-between">
              <div>
                <div className="text-[9px] text-indigo-400 uppercase tracking-widest font-bold">
                  {trackConfig.name||'Untitled'} · {trackConfig.key} {trackConfig.genre} · {trackConfig.bpm}bpm
                </div>
                <div className="text-[7px] text-slate-600 mt-0.5">Intro→Verse→Chorus→Bridge→Verse→Chorus→Turn→Outro</div>
              </div>
              <button onClick={()=>{setShowConfig(true);setTrackReady(false);setRenderProgress(0);}}
                className="text-[8px] text-slate-500 hover:text-indigo-300 uppercase tracking-widest transition-all border border-slate-700 hover:border-indigo-500/50 rounded px-2 py-1">
                ↺ New Song
              </button>
            </div>

            {/* Play + full download */}
            <div className="grid grid-cols-2 gap-2">
              <button onClick={playFullTrack}
                className={"py-2 rounded-lg text-[8px] font-bold uppercase border transition-all "+(isPlaying?'bg-emerald-500/15 text-emerald-300 border-emerald-500/40':'bg-slate-800/60 text-slate-400 border-slate-700 hover:border-emerald-500/40 hover:text-emerald-300')}>
                {isPlaying?'▐▐  Playing':'▶  Play Full Track'}
              </button>
              <button onClick={()=>downloadBuffer(fullTrackBuffer,(trackConfig.name||'LiveAIBand')+'_FULL.wav')}
                className="py-2 rounded-lg text-[8px] font-bold uppercase border bg-indigo-500/10 text-indigo-300 border-indigo-500/40 hover:bg-indigo-500/20 transition-all">
                ↓ Full Mix WAV
              </button>
            </div>

            {/* Stem downloads */}
            {stemBuffers&&(
              <div>
                <div className="text-[8px] text-slate-500 uppercase tracking-widest mb-1.5">Download Stems</div>
                <div className="grid grid-cols-4 gap-1.5">
                  {[
                    ['drums','Drums','text-orange-300 border-orange-500/40 bg-orange-500/8 hover:bg-orange-500/15'],
                    ['bass', 'Bass', 'text-yellow-300 border-yellow-500/40 bg-yellow-500/8 hover:bg-yellow-500/15'],
                    ['mid',  'Keys', 'text-sky-300 border-sky-500/40 bg-sky-500/8 hover:bg-sky-500/15'],
                    ['lead', 'Lead', 'text-rose-300 border-rose-500/40 bg-rose-500/8 hover:bg-rose-500/15'],
                  ].map(([stem,lbl,cls])=>(
                    <button key={stem}
                      onClick={()=>stemBuffers[stem]&&downloadBuffer(stemBuffers[stem],(trackConfig.name||'LiveAIBand')+'_'+stem+'.wav')}
                      disabled={!stemBuffers[stem]}
                      className={"py-1.5 rounded-lg text-[8px] font-bold uppercase border transition-all "+cls+(stemBuffers[stem]?'':' opacity-30 cursor-not-allowed')}>
                      ↓ {lbl}
                    </button>
                  ))}
                </div>
                <button onClick={()=>{
                  ['full','drums','bass','mid','lead'].forEach(stem=>{
                    const buf = stem==='full'?fullTrackBuffer:stemBuffers[stem];
                    if(buf) setTimeout(()=>downloadBuffer(buf,(trackConfig.name||'LiveAIBand')+'_'+stem+'.wav'),stem==='full'?0:300);
                  });
                }} className="w-full mt-1.5 py-1.5 rounded-lg text-[8px] font-bold uppercase border border-slate-700 text-slate-400 bg-slate-800/60 hover:border-indigo-500/40 hover:text-indigo-300 transition-all">
                  ↓ Download All Stems
                </button>
              </div>
            )}

            {/* Re-generate with tweaks */}
            <div>
              <div className="text-[8px] text-slate-500 uppercase tracking-widest mb-1.5">Flip &amp; Regenerate</div>
              <div className="grid grid-cols-4 gap-1.5">
                <button onClick={()=>{setTrackConfig(c=>({...c,bpm:Math.round(c.bpm*(0.85+Math.random()*0.3))}));}}
                  className="py-1.5 rounded-lg text-[8px] font-bold uppercase border border-slate-700 text-slate-400 bg-slate-800/60 hover:border-amber-500/40 hover:text-amber-300 transition-all">
                  ± BPM
                </button>
                <button onClick={()=>{const keys=['C','D','E','F','G','A','Bb','B','C#','Eb','F#','Ab'];setTrackConfig(c=>({...c,key:keys[Math.floor(Math.random()*keys.length)]}));}}
                  className="py-1.5 rounded-lg text-[8px] font-bold uppercase border border-slate-700 text-slate-400 bg-slate-800/60 hover:border-sky-500/40 hover:text-sky-300 transition-all">
                  ± Key
                </button>
                <button onClick={()=>{const g=['jazz','pop','edm'];const cur=g.indexOf(trackConfig.genre);setTrackConfig(c=>({...c,genre:g[(cur+1)%3]}));}}
                  className="py-1.5 rounded-lg text-[8px] font-bold uppercase border border-slate-700 text-slate-400 bg-slate-800/60 hover:border-rose-500/40 hover:text-rose-300 transition-all">
                  ± Genre
                </button>
              </div>
              <button onClick={()=>{setTrackReady(false);renderFullTrack(trackConfig);}}
                className="w-full mt-1.5 py-2 rounded-xl bg-violet-600/80 hover:bg-violet-500 text-white font-bold text-[9px] uppercase tracking-wider transition-all border border-violet-500/40">
                ↻ Generate New Song (brain evolves)
              </button>
            </div>
          </div>
        )}

      {/* MAIN CANVAS + TAP */}
      <div className="grid grid-cols-1 md:grid-cols-4 gap-3">
        <div className="md:col-span-2 relative bg-[#080c14] rounded-xl border border-slate-800/50 overflow-hidden">
          <canvas ref={canvasRef} width={700} height={220} className="w-full h-[180px] md:h-[220px] block"/>
          <div className="absolute top-2 left-2">
            <div className="flex items-center gap-1.5 px-2 py-1 rounded-lg border text-[8px] font-bold uppercase"
              style={{background:roleColors[userRole]+'18',borderColor:roleColors[userRole]+'50',color:roleColors[userRole]}}>
              {roleIcons[userRole]} You: {userRole}
            </div>
          </div>
          <div className="absolute top-2 right-2 text-right">
            <div className="text-[8px] text-slate-500"><span className="text-white font-bold text-sm">{bpm}</span> BPM</div>
            <div className="text-[8px] text-purple-300">{midiToNote(detectedMidi)} . {currentChord}</div>
            <div className="text-[7px] text-amber-400/80 font-mono">{AR.current.structurePhase||'intro'} . {AR.current._motifPhase||'call'}{halftime?' [1/2]':''} . {AR.current.targetChordSeq?.join('>')||''}</div>
            {lockedIn&&<div className="text-[7px] text-cyan-400 animate-pulse">[lock] locked</div>}
          </div>
          {/* Neural bass mode indicator */}
          <div className="absolute bottom-2 left-2 text-[7px] font-mono text-emerald-400/60">
            Neural Bass Active . {completedPhrases.length} phrase{completedPhrases.length!==1?'s':''} learned
          </div>
        </div>

        <div className="relative bg-[#080c14] rounded-xl border border-slate-800/50 overflow-hidden flex flex-col">
          <div className="text-[8px] text-emerald-400 uppercase tracking-widest font-bold px-3 pt-2 pb-1">Tap Input</div>
          <div className="relative flex-1 tap-zone cursor-pointer"
            onPointerDown={e=>{const r=e.currentTarget.getBoundingClientRect();handleTap(e,(e.clientX-r.left)/r.width,(e.clientY-r.top)/r.height);}}
            role="button" aria-label="Tap pad" tabIndex={0}
            onKeyDown={e=>(e.key===' '||e.key==='Enter')&&handleTap(e,0.5,0.5)}>
            <canvas ref={tapCanvasRef} width={280} height={180} className="w-full h-full block"/>
            {tapPulse&&<div className="absolute inset-0 flex items-center justify-center pointer-events-none">
              <div className="w-12 h-12 rounded-full border-2 border-emerald-400 pr"/>
            </div>}
            <div className="absolute bottom-2 left-0 right-0 text-center pointer-events-none">
              <div className="text-[8px] text-slate-600 uppercase tracking-widest">
                {tapCount===0?'Tap here':tapCount<4?tapCount+' taps':bpm+'BPM'}
              </div>
            </div>
          </div>
          <div className="px-3 py-2 border-t border-slate-800/50 grid grid-cols-2 gap-2">
            <div className="text-center">
              <div className="text-[7px] text-slate-600 uppercase mb-0.5">Taps</div>
              <div className="text-sm font-black text-emerald-400">{tapCount}</div>
            </div>
            <div className="text-center">
              <div className="text-[7px] text-slate-600 uppercase mb-0.5">Input</div>
              <div className="w-full h-1.5 bg-slate-800 rounded-full overflow-hidden mt-1">
                <div className="h-full bg-cyan-400 rounded-full transition-all duration-100" style={{width:(inputEnergy*100)+'%'}}/>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* CONTROLS */}
      <div className="grid grid-cols-1 md:grid-cols-4 gap-3">

        {/* COL 1: Sections + Reharm */}
        <div className="bg-[#0b1120] border border-slate-800/60 rounded-xl p-3.5 space-y-3">
          <div className="text-[9px] text-slate-400 uppercase tracking-[0.2em] font-bold">Sections</div>
          <div className="grid grid-cols-5 gap-1.5">
            {[{role:'drum',label:'DRUM'},{role:'sub',label:'SUB'},{role:'bass',label:'BASS'},{role:'mid',label:'MID'},{role:'lead',label:'LEAD'}].map(({role,label})=>{
              const hex={drum:'#f43f5e',sub:'#06b6d4',bass:'#f59e0b',mid:'#a855f7',lead:'#22d3ee'}[role];
              const muted=mutes[role];
              return(
                <button key={role} onClick={()=>toggleMute(role)}
                  className="py-2 rounded-lg text-[7px] font-bold uppercase tracking-widest border transition-all section-btn"
                  style={{background:muted?'#0d0d0d':hex+'15',borderColor:muted?'#334':hex+'60',color:muted?'#475569':hex}}>
                  {muted?'[M]':''}{label}
                </button>
              );
            })}
          </div>
          <button onClick={()=>{
            // Wipe learned synth params + soundbank EMA so drumSeed produces a
            // completely fresh timbral distribution on next hit. Doesn't touch
            // Q-table or groove -- just the SOUND DESIGN of each voice.
            paramMemory.voices = {drum:{m:{},n:0}, bass:{m:{},n:0}, mid:{m:{},n:0}, lead:{m:{},n:0}};
            userSoundbank.ema = null;
            genesisLocal.put('soundbank', {ema:null, _ts:Date.now()});
            addLog('[SOUND] Regenerated -- voices will drift into a new timbre');
          }}
            className="w-full py-1.5 rounded-lg text-[9px] font-bold uppercase tracking-widest border bg-slate-800/60 text-emerald-400 border-emerald-500/30 hover:bg-emerald-500/15 hover:border-emerald-500/50 transition-all">
            Regen Sound Design
          </button>
          <div className="text-[7px] text-slate-600 uppercase">Neural sub+bass . never stack</div>
          {isPlaying&&<div className="space-y-1">
            <div className="text-[7px] text-slate-600 uppercase tracking-widest">GR meters</div>
            {[{label:'Master',val:gainReduction.master,col:'#22d3ee'},{label:'Drums',val:gainReduction.drum,col:'#f43f5e'},{label:'Bass',val:gainReduction.bass,col:'#f59e0b'},{label:'Sub',val:gainReduction.sub,col:'#06b6d4'}].map(({label,val,col})=>(
              <div key={label} className="flex items-center gap-1.5">
                <div className="text-[6px] w-8 text-slate-600">{label}</div>
                <div className="flex-1 h-1 bg-slate-900 rounded-full overflow-hidden">
                  <div className="h-full rounded-full transition-all duration-100" style={{width:Math.min(100,Math.abs(val||0)*5)+'%',background:col,opacity:0.7}}/>
                </div>
                <div className="text-[6px] w-6 text-right" style={{color:col}}>{val||0}dB</div>
              </div>
            ))}
          </div>}
          <button onClick={restartBand} disabled={!isPlaying}
            className="w-full py-1.5 rounded-lg text-[9px] font-bold uppercase border border-slate-700 text-slate-400 hover:border-cyan-500/40 hover:text-cyan-400 transition-all disabled:opacity-30">
            Restart Band
          </button>
          <div className="text-[9px] text-purple-400 uppercase tracking-widest font-bold">Reharm</div>
          <div className="grid grid-cols-4 gap-1.5">
            {[['maj','Major'],['min','Minor'],['quar','4ths'],['dom7','Dom 7'],['min7','Min 7'],['maj7','Maj 7'],['dom9','Dom 9'],['dim','Dim'],['aug','Aug']].map(([type,label])=>(
              <button key={type} onClick={()=>reharm(type)}
                className={"py-1.5 rounded-lg text-[8px] font-bold uppercase tracking-widest border transition-all "+(currentChord===type?'bg-purple-500/20 text-purple-200 border-purple-500/50':'bg-slate-800/50 text-slate-500 border-slate-700 hover:border-purple-500/30 hover:text-purple-400')}>
                {label}
              </button>
            ))}
          </div>
        </div>

        {/* COL 2: Modulation */}
        <div className="bg-[#0b1120] border border-slate-800/60 rounded-xl p-3.5 space-y-3">
          <div className="text-[9px] text-cyan-400 uppercase tracking-[0.2em] font-bold">Modulation</div>
          {[
            {l:'Chaos',c:'text-cyan-400',v:Math.round(chaos*100)+'%',min:0,max:1,step:.01,val:chaos,set:setChaos,f:true},
            {l:'Density',c:'text-purple-400',v:Math.round(density*100)+'%',min:0,max:1,step:.01,val:density,set:setDensity,f:true},
            {l:'Tempo',c:'text-slate-400',v:bpm+' BPM (max '+DeviceComp.maxBpm+')',min:40,max:DeviceComp.maxBpm,step:1,val:Math.min(bpm,DeviceComp.maxBpm),set:setBpm,f:false},
            {l:'Swing',c:'text-amber-400',v:swing+'%',min:0,max:100,step:1,val:swing,set:setSwing,f:false},
            {l:'Arc',c:'text-emerald-400',v:arcName+(arcName!=='—'?' '+(arcBar+1)+'/8':'')+' · '+arcIntensity+'%',min:0,max:100,step:1,val:arcIntensity,set:setArcIntensity,f:false},
          ].map(({l,c,v,min,max,step,val,set,f})=>(
            <div key={l}>
              <div className="flex justify-between text-[8px] uppercase tracking-widest mb-1">
                <span className={c}>{l}</span><span className="text-white font-bold">{v}</span>
              </div>
              <input type="range" min={min} max={max} step={step} value={val} onChange={e=>set(f?parseFloat(e.target.value):parseInt(e.target.value))}/>
            </div>
          ))}
          <div>
            <div className="text-[9px] text-cyan-400 uppercase tracking-widest font-bold mb-2">Key / Root</div>
            <div className="grid grid-cols-2 gap-2 mb-2">
              <div className="bg-black/50 p-2 rounded-lg border border-slate-800 text-center">
                <p className="text-[7px] text-slate-600 uppercase mb-0.5">Root</p>
                <p className="text-base font-black text-white">{midiToNote(detectedMidi)}</p>
              </div>
              <div className="bg-black/50 p-2 rounded-lg border border-slate-800 text-center">
                <p className="text-[7px] text-slate-600 uppercase mb-0.5">Chord</p>
                <p className="text-base font-black text-purple-300">{currentChord}</p>
              </div>
            </div>
            {!micActive&&<input type="range" min="36" max="84" step="1" value={detectedMidi}
              onChange={e=>{const v=parseInt(e.target.value);setDMidi(v);AR.current.rootMidi=v;}}/>}
          </div>
          <button onClick={toggleMic}
            className={"w-full py-2 rounded-lg text-[10px] font-bold tracking-widest uppercase border transition-all flex items-center justify-center gap-2 "+(micActive?'bg-rose-500/10 text-rose-400 border-rose-500/40':'bg-cyan-500/10 text-cyan-400 border-cyan-500/30 hover:bg-cyan-500/20')}>
            {micActive && (
              <span
                style={{
                  width: 8, height: 8, borderRadius: 999,
                  background: inputEnergy>0.04 ? '#34d399' : '#64748b',
                  boxShadow: inputEnergy>0.04 ? '0 0 '+(4+inputEnergy*20)+'px #34d399' : 'none',
                  transition: 'box-shadow 80ms linear, background 120ms linear'
                }}
              />
            )}
            {micActive?'Stop Mic':'Open Mic'}
            {micActive && <span className="text-[7px] text-slate-400 font-mono">{Math.round(inputEnergy*100)}</span>}
          </button>
          {micActive && (
            <div className="flex items-center justify-between text-[7px] font-mono text-slate-500">
              <span>{bpm} BPM · {midiToNote(detectedMidi)} · {currentChord}</span>
              <span className={AR.current._userIsActive?'text-emerald-400':'text-slate-600'}>
                {AR.current._callResponseDue ? 'RESPOND' : AR.current._vampMode ? 'VAMP' : AR.current._userIsActive ? 'YOU' : 'LISTEN'}
              </span>
            </div>
          )}
          {/* Tap-tempo fallback: reliable BPM set even when the mic can't
              pick out onsets cleanly (noisy room, band bleed, etc.). */}
          <button onClick={(e)=>handleTap(e,0.5,0.5)}
            className="w-full py-1.5 rounded-lg text-[10px] font-bold tracking-widest uppercase border transition-all bg-emerald-500/10 text-emerald-400 border-emerald-500/30 hover:bg-emerald-500/20">
            Tap Tempo {tapCount>0 && tapCount<4 ? '('+tapCount+'/4)' : ''}
          </button>
          <button onClick={handleLockIn}
            className={"w-full py-1.5 rounded-lg text-[10px] font-bold tracking-widest uppercase border transition-all "+(lockedIn?'bg-cyan-500/12 text-cyan-300 border-cyan-500/45 locked':'bg-slate-800/60 text-slate-400 border-slate-700 hover:border-cyan-500/30')}>
            {lockedIn?'[lock] Locked In':'[unlock] Lock In Groove'}
          </button>
          <div>
            <div className="text-[9px] text-emerald-400 uppercase tracking-widest font-bold mb-1.5">Soundbank</div>
            <div className="grid grid-cols-2 gap-1.5">
              <button onClick={exportSoundbank}
                className="py-1.5 rounded-lg text-[9px] font-bold uppercase tracking-widest border bg-emerald-500/10 text-emerald-400 border-emerald-500/30 hover:bg-emerald-500/20 transition-all">
                Export
              </button>
              <label className="py-1.5 rounded-lg text-[9px] font-bold uppercase tracking-widest border bg-slate-800/60 text-slate-400 border-slate-700 hover:border-emerald-500/40 hover:text-emerald-400 text-center cursor-pointer transition-all">
                Import
                <input type="file" accept="application/json" className="hidden"
                  onChange={e=>{importSoundbank(e.target.files[0]); e.target.value='';}}/>
              </label>
            </div>
          </div>
        </div>

        {/* COL 3: FX + Launch */}
        <div className="bg-[#0b1120] border border-slate-800/60 rounded-xl p-3.5 space-y-3">
          <div className="text-[9px] text-amber-400 uppercase tracking-[0.2em] font-bold">FX + Launch</div>
          <div>
            <div className="flex justify-between text-[8px] uppercase tracking-widest mb-1">
              <span className="text-rose-400">DJ Warp</span><span className="text-white">{recordScratch}</span>
            </div>
            <input type="range" min="-100" max="100" step="1" value={recordScratch}
              onChange={e=>setRS(parseInt(e.target.value))} onMouseUp={()=>setRS(0)} onTouchEnd={()=>setRS(0)}/>
          </div>
          <div>
            <div className="flex justify-between items-center mb-1.5">
              <div className="text-[8px] text-slate-500 uppercase tracking-widest">Effects</div>
              <div className="flex gap-1">
                <button onClick={()=>setAutoFxActive(v=>!v)}
                  title="Auto-FX learner: picks reverb/delay/chorus/fuzz per context and learns what works."
                  className={"px-1.5 py-0.5 rounded text-[7px] font-bold uppercase tracking-widest border transition-all "+(autoFxActive?'bg-indigo-500/20 text-indigo-300 border-indigo-500/50':'bg-slate-800/60 text-slate-500 border-slate-700 hover:border-indigo-500/30')}>
                  Auto
                </button>
                <button onClick={()=>setGateActive(v=>!v)}
                  title="Artifact gate: softens drum/bass/lead hits whose random seed is far from the learned-good region."
                  className={"px-1.5 py-0.5 rounded text-[7px] font-bold uppercase tracking-widest border transition-all "+(gateActive?'bg-rose-500/20 text-rose-300 border-rose-500/50':'bg-slate-800/60 text-slate-500 border-slate-700 hover:border-rose-500/30')}>
                  Gate
                </button>
              </div>
            </div>
            <div className="grid grid-cols-5 gap-1.5">
              {['reverb','delay','chorus','fuzz','crush'].map(n=>(
                <button key={n} onClick={()=>toggleFx(n)}
                  className={"py-1.5 rounded-lg text-[8px] font-bold uppercase border transition-all "+(fxOn[n]?'bg-emerald-500/15 text-emerald-300 border-emerald-500/40':'bg-slate-800/60 text-slate-500 border-slate-700 hover:border-slate-500')}>
                  {n}{autoFxActive?' *':''}
                </button>
              ))}
            </div>
            <div className="grid grid-cols-2 gap-1.5 mt-1.5">
              <button onClick={()=>setHalftime(h=>{
                const next=!h;
                const pw=Math.pow(2,(AR.current._recordScratch||0)/100);
                AR.current.pitchWarp=pw;
                AR.current.tempoWarp=pw*(next?0.5:1);
                AR.current.warpMultiplier=pw;
                return next;
              })}
                className={"py-1.5 rounded-lg text-[8px] font-bold uppercase border transition-all "+(halftime?'bg-violet-500/20 text-violet-300 border-violet-500/50':'bg-slate-800/60 text-slate-500 border-slate-700 hover:border-slate-500')}>
                {halftime ? '1/2  ON' : '1/2 TIME'}
              </button>
              <div></div>
            </div>
            <div>
              <div className="text-[8px] text-slate-500 uppercase tracking-widest mb-1.5">Style</div>
              <div className="grid grid-cols-4 gap-1.5">
                {[
                  ['jazz','Jazz','text-sky-300 bg-sky-500/15 border-sky-500/40'],
                  ['pop','Pop','text-emerald-300 bg-emerald-500/15 border-emerald-500/40'],
                  ['hiphop','Hip','text-violet-300 bg-violet-500/15 border-violet-500/40'],
                  ['edm','EDM','text-rose-300 bg-rose-500/15 border-rose-500/40'],
                  ['westcoast','WC','text-yellow-300 bg-yellow-500/15 border-yellow-500/40'],
                  ['eastcoast','EC','text-orange-300 bg-orange-500/15 border-orange-500/40'],
                  ['african','AFR','text-amber-300 bg-amber-500/15 border-amber-500/40'],
                  ['indian','IND','text-pink-300 bg-pink-500/15 border-pink-500/40'],
                  ['rock','Rock','text-red-300 bg-red-500/15 border-red-500/40'],
                  ['hardstyle','Hard','text-lime-300 bg-lime-500/15 border-lime-500/40'],
                  ['dubstep','Dub','text-teal-300 bg-teal-500/15 border-teal-500/40'],
                  ['phonk','Phonk','text-fuchsia-300 bg-fuchsia-500/15 border-fuchsia-500/40'],
                ].map(([k,lbl,activeClass])=>(
                  <button key={k} onClick={()=>setKickStyleState(k)}
                    className={"py-1.5 rounded-lg text-[8px] font-bold uppercase border transition-all "+(kickStyleState===k?activeClass:'bg-slate-800/60 text-slate-500 border-slate-700 hover:border-slate-500')}>
                    {lbl}
                  </button>
                ))}
              </div>
            </div>
          </div>
          <div>
            <div className="text-[8px] text-slate-500 uppercase tracking-widest mb-1.5">Haptic</div>
            <div className="grid grid-cols-2 gap-1.5">
              {Object.entries({standard:'Standard',bass:'Bass Pulse',rhythm:'Rhythm',chord:'Chord'}).map(([k,label])=>(
                <button key={k} onClick={()=>{setHapticMode(k);hap.chordQuality('maj');}}
                  className={"py-1.5 rounded-lg text-[8px] font-bold uppercase border transition-all "+(hapticMode===k?'bg-emerald-500/15 text-emerald-300 border-emerald-500/40':'bg-slate-800/60 text-slate-500 border-slate-700')}>
                  {label}
                </button>
              ))}
            </div>
          </div>
          <button onClick={()=>setDeafMode(d=>{const n=!d;if(n){addLog('Deaf Mode: Sub-bass boosted.');hap.subBass(bpm);}return n;})}
            className={"w-full py-1.5 rounded-lg text-[9px] font-bold uppercase border transition-all "+(deafMode?'bg-emerald-500/15 text-emerald-300 border-emerald-500/40':'bg-slate-800/60 text-slate-500 border-slate-700')}>
            {deafMode?'Deaf Mode ON':'Deaf Mode'}
          </button>
          {/* FLIP BUTTONS */}
          <div className="space-y-1.5">
            <div className="flex justify-between items-center">
              <div className="text-[8px] text-rose-400 uppercase tracking-widest font-bold">Flip</div>
              {flipLabel&&<span className="text-[8px] text-rose-300 animate-pulse font-mono">{flipLabel}</span>}
            </div>
            <div className="grid grid-cols-3 gap-1.5">
              <button onClick={doFlipInversion}
                className="py-2 rounded-lg text-[8px] font-bold uppercase border border-rose-500/30 bg-rose-500/8 text-rose-400 hover:bg-rose-500/18 transition-all active:scale-95">
                Chord Inv
              </button>
              <button onClick={doFlipProgression}
                className="py-2 rounded-lg text-[8px] font-bold uppercase border border-amber-500/30 bg-amber-500/8 text-amber-400 hover:bg-amber-500/18 transition-all active:scale-95">
                Prog Inv
              </button>
              <button onClick={doFlipTritone}
                className="py-2 rounded-lg text-[8px] font-bold uppercase border border-purple-500/30 bg-purple-500/8 text-purple-400 hover:bg-purple-500/18 transition-all active:scale-95">
                Trit Sub
              </button>
            </div>
          </div>

          {/* EXTRA INSTRUMENT */}
          <div className="space-y-1.5">
            <div className="flex justify-between items-center">
              <div className="text-[8px] text-cyan-400 uppercase tracking-widest font-bold">Extra Instrument</div>
              <button onClick={()=>{ beatDropEngine.active = !beatDropEngine.active; setDropEngineOn(beatDropEngine.active); addLog('[DROP] engine '+(beatDropEngine.active?'ON':'OFF')); }}
                title="Beat drop engine: 2-bar stutter buildup + filter swell every 16 bars, with a layered mega-kick on the drop bar."
                className={"px-1.5 py-0.5 rounded text-[7px] font-bold uppercase tracking-widest border transition-all "+(dropEngineOn?'bg-amber-500/20 text-amber-300 border-amber-500/50':'bg-slate-800/60 text-slate-500 border-slate-700 hover:border-amber-500/30')}>
                Drop
              </button>
            </div>
            <div className="grid grid-cols-3 gap-1.5">
              {[['none','Off'],['auto','Auto'],['arp','Arp'],['perc','Perc'],['shaker','Shaker'],['cowbell','Cowbell'],['pad','Pad'],['noisepad','Noise']].map(([id,label])=>(
                <button key={id} onClick={()=>setExtraInst(id)}
                  className={"py-1.5 rounded-lg text-[8px] font-bold uppercase border transition-all "+(extraInst===id?'bg-cyan-500/15 text-cyan-300 border-cyan-500/40':'bg-slate-800/50 text-slate-500 border-slate-700 hover:border-cyan-500/20')}>
                  {label}
                </button>
              ))}
            </div>
          </div>

          <div className="grid grid-cols-2 gap-2">
            <button onClick={async()=>{setPreRenderMode(true);await startPreRenderedBand();}}
              disabled={isPlaying||loadingBand}
              className={"py-3 rounded-xl font-black text-xs uppercase tracking-widest transition-all "+(loadingBand?'bg-slate-700 text-slate-400 animate-pulse':'bg-indigo-600 text-white hover:bg-indigo-500 disabled:opacity-40')}>
              {loadingBand?'Rendering...':'Load Band'}
            </button>
            <button onClick={togglePlay}
              className={"py-3 rounded-xl font-black text-xs uppercase tracking-widest "+(isPlaying?'bg-rose-500 text-white':'bg-emerald-500 text-slate-900')}>
              {isPlaying?'Halt':'Live'}
            </button>
          </div>
          {preRenderMode&&!isPlaying&&<div className="text-[7px] text-indigo-400 text-center animate-pulse">Next 60s rendering in background...</div>}
        </div>
      </div>

      {/* VOICE MEMORY */}
      <div className="bg-[#0b1120] border border-slate-800/60 rounded-xl p-3 grid grid-cols-4 gap-2">
        {Object.entries(voicesRef.current).map(([role,v])=>{
          const isU=userRole===role;const hex=roleColors[role];const pct=Math.min(100,v.winding*5);
          return(
            <div key={role} className={"relative p-2.5 rounded-lg border text-center transition-all cursor-pointer "+(isU?'opacity-30 border-white/10':'border-slate-800')+" "+(mutes[role]?'grayscale opacity-40':'')}
              style={{background:hex+'0d'}} onClick={()=>toggleMute(role)}>
              <button title={`Reseed ${role}`}
                onClick={(e)=>{e.stopPropagation();reseedInstrument(role);}}
                className="absolute top-1 right-1 text-[9px] leading-none px-1 py-0.5 rounded bg-slate-800/60 hover:bg-slate-700/80 text-slate-300">
                {'\u{1F3B2}'}
              </button>
              <div className="text-[7px] uppercase tracking-widest mb-1" style={{color:hex}}>{isU?'YOU':mutes[role]?'[M]':role}</div>
              <div className="w-full h-1.5 bg-slate-800 rounded-full overflow-hidden mb-1">
                <div className="h-full rounded-full transition-all duration-700" style={{width:pct+'%',background:hex,boxShadow:'0 0 5px '+hex}}/>
              </div>
              <div className="text-[8px] text-white font-bold">{v.winding.toFixed(1)}<span className="text-slate-600 ml-0.5">w</span></div>
            </div>
          );
        })}
      </div>

      {/* ─── INSTRUMENT CONTROLS ────────────────────────────────────────
          Big, labeled, visible. The previous tiny 🎲 icons in the voice
          card corners got missed — these don't. If the drummer sucks,
          hit "New Drummer". If the piano is annoying, hit "Next Sound".
      */}
      <div className="bg-[#0b1120] border border-slate-800/60 rounded-xl p-3 space-y-2.5">
        <div className="flex items-center justify-between">
          <span className="text-[9px] text-amber-400 uppercase tracking-widest font-bold">Instruments</span>
          <button onClick={()=>reseedInstrument('all')}
            className="px-3 py-1 bg-amber-500/15 border border-amber-500/40 rounded text-[9px] font-bold uppercase tracking-widest text-amber-300 hover:bg-amber-500/25">
            {'\u{1F3B2}'} Reshuffle Band
          </button>
        </div>

        {/* Drums row */}
        <div className="flex items-center gap-1.5">
          <span className="w-12 text-[9px] uppercase tracking-widest font-bold text-rose-400">Drums</span>
          <button onClick={()=>reseedInstrument('drum')}
            className="flex-1 px-2 py-1.5 bg-rose-500/15 border border-rose-500/40 rounded text-[9px] font-bold uppercase tracking-widest text-rose-300 hover:bg-rose-500/25">
            {'\u{1F3B2}'} New Drummer
          </button>
          <button onClick={()=>reseedInstrument('kick')}   title="Reseed just the kick"
            className="px-2 py-1.5 bg-slate-800/60 hover:bg-rose-500/20 border border-slate-700 rounded text-[9px] uppercase tracking-widest text-slate-300">
            Kick
          </button>
          <button onClick={()=>reseedInstrument('snare')}  title="Reseed just the snare"
            className="px-2 py-1.5 bg-slate-800/60 hover:bg-rose-500/20 border border-slate-700 rounded text-[9px] uppercase tracking-widest text-slate-300">
            Snare
          </button>
          <button onClick={()=>reseedInstrument('hat')}    title="Reseed just the hat"
            className="px-2 py-1.5 bg-slate-800/60 hover:bg-rose-500/20 border border-slate-700 rounded text-[9px] uppercase tracking-widest text-slate-300">
            Hat
          </button>
        </div>

        {/* Drum feel + Grossbeat gate */}
        <div className="flex items-center gap-1.5">
          <span className="w-12 text-[9px] uppercase tracking-widest font-bold text-rose-400">Feel</span>
          <button onClick={()=>{ const n = (typeof cycleDrumFeel==='function') ? cycleDrumFeel() : null; if(n) addLog('[DRUMS] feel='+n); }}
            title="Cycle drum feel: auto, normal, halftime, doubletime, delta_sparse (lots of empty bars), ballad"
            className="flex-1 px-2 py-1.5 bg-slate-800/60 hover:bg-rose-500/20 border border-slate-700 rounded text-[9px] font-bold uppercase tracking-widest text-rose-200">
            {(AR.current._drumFeel||'auto')}
          </button>
          <button onClick={()=>{ const on = (typeof grossbeat!=='undefined') ? grossbeat.toggle() : false; addLog('[GATE] grossbeat '+(on?'ON':'OFF')); }}
            title="Grossbeat-style auto DJ gate: tempo-synced cuts, stutters, and reverse swells rotated every 4 bars"
            className="px-2 py-1.5 bg-slate-800/60 hover:bg-fuchsia-500/20 border border-slate-700 rounded text-[9px] font-bold uppercase tracking-widest text-fuchsia-200">
            Gate
          </button>
        </div>

        {/* Octave shift + spread voicings + Barry Harris mode */}
        <div className="flex items-center gap-1.5">
          <span className="w-12 text-[9px] uppercase tracking-widest font-bold text-emerald-400">Voice</span>
          <button onClick={()=>{
              const ar=AR.current;
              ar._octShift = ((ar._octShift||0) === 0) ? -12 : ((ar._octShift === -12) ? 12 : 0);
              addLog('[OCT] shift '+(ar._octShift>0?'+12':ar._octShift<0?'-12':'0'));
            }}
            title="Drop the whole band down an octave (or lift up). 3-way toggle: 0 → -12 → +12 → 0."
            className="flex-1 px-2 py-1.5 bg-slate-800/60 hover:bg-emerald-500/20 border border-slate-700 rounded text-[9px] font-bold uppercase tracking-widest text-emerald-200">
            OCT {(AR.current._octShift||0)>0?'+12':(AR.current._octShift||0)<0?'-12':'0'}
          </button>
          <button onClick={()=>{
              const ar=AR.current;
              ar._spreadVoicings = !ar._spreadVoicings;
              addLog('[VOICING] spread '+(ar._spreadVoicings?'ON':'OFF'));
            }}
            title="Force mid/lead chord voicings to open/spread shapes (drop-2, piano-trio) instead of stacked triads"
            className="px-2 py-1.5 bg-slate-800/60 hover:bg-violet-500/20 border border-slate-700 rounded text-[9px] font-bold uppercase tracking-widest text-violet-200">
            Spread
          </button>
          <button onClick={()=>{
              if(typeof barryHarris!=='undefined'){
                barryHarris.active = !barryHarris.active;
                addLog('[BARRY] 6-dim '+(barryHarris.active?'ON':'OFF'));
              }
            }}
            title="Barry Harris 6-dim system: alternate I6 / ♭II°7 chromatic dance + secondary dominants on the 4th/5th"
            className="px-2 py-1.5 bg-slate-800/60 hover:bg-amber-500/20 border border-slate-700 rounded text-[9px] font-bold uppercase tracking-widest text-amber-200">
            Barry
          </button>
        </div>

        {/* Bass row */}
        <div className="flex items-center gap-1.5">
          <span className="w-12 text-[9px] uppercase tracking-widest font-bold text-amber-400">Bass</span>
          <button onClick={()=>reseedInstrument('bass')}
            className="flex-1 px-2 py-1.5 bg-amber-500/10 border border-amber-500/30 rounded text-[9px] font-bold uppercase tracking-widest text-amber-200 hover:bg-amber-500/20">
            {'\u{1F3B2}'} New Bassist
          </button>
        </div>

        {/* Mid row */}
        <div className="flex items-center gap-1.5">
          <span className="w-12 text-[9px] uppercase tracking-widest font-bold text-violet-400">Mid</span>
          <button onClick={()=>reseedInstrument('mid')}
            className="flex-1 px-2 py-1.5 bg-violet-500/10 border border-violet-500/30 rounded text-[9px] font-bold uppercase tracking-widest text-violet-200 hover:bg-violet-500/20">
            {'\u{1F3B2}'} Reshuffle Mid
          </button>
          <button onClick={()=>{ if(typeof bumpMidCharacter==='function') bumpMidCharacter(); addLog('[MID] Next sound'); }}
            title="Jump to the next mid character right now"
            className="px-3 py-1.5 bg-slate-800/60 hover:bg-violet-500/20 border border-slate-700 hover:border-violet-500/40 rounded text-[9px] font-bold uppercase tracking-widest text-slate-300 hover:text-violet-200">
            → Next Sound
          </button>
        </div>

        {/* Lead row */}
        <div className="flex items-center gap-1.5">
          <span className="w-12 text-[9px] uppercase tracking-widest font-bold text-cyan-400">Lead</span>
          <button onClick={()=>reseedInstrument('lead')}
            className="flex-1 px-2 py-1.5 bg-cyan-500/10 border border-cyan-500/30 rounded text-[9px] font-bold uppercase tracking-widest text-cyan-200 hover:bg-cyan-500/20">
            {'\u{1F3B2}'} Reshuffle Lead
          </button>
          <button onClick={()=>{ if(typeof bumpLeadMode==='function') bumpLeadMode(); addLog('[LEAD] Next sound'); }}
            title="Jump to the next lead character right now"
            className="px-3 py-1.5 bg-slate-800/60 hover:bg-cyan-500/20 border border-slate-700 hover:border-cyan-500/40 rounded text-[9px] font-bold uppercase tracking-widest text-slate-300 hover:text-cyan-200">
            → Next Sound
          </button>
        </div>
      </div>

      {/* SAMPLE LOADER -- drop any WAV/MP3 into kick / snare / hat and the
          band plays that instead of the synth. Use royalty-free breaks
          from freesound.org, Splice, or anything you own the rights to. */}
      <div className="bg-[#0b1120] border border-slate-800/60 rounded-xl p-2">
        <div className="text-[9px] text-amber-400 uppercase tracking-widest font-bold mb-1.5">Samples — drop WAV/MP3</div>
        <div className="grid grid-cols-4 gap-2">
          {['kick','snare','hat','mid'].map(slot=>(
            <label key={slot}
              onDragOver={e=>{e.preventDefault();}}
              onDrop={e=>{e.preventDefault();const f=e.dataTransfer.files&&e.dataTransfer.files[0];if(f)loadDrumSample(slot,f);}}
              className={"cursor-pointer relative border rounded px-2 py-2 text-center text-[9px] uppercase tracking-widest transition-all "+(sampleNames[slot]?'bg-emerald-500/10 border-emerald-500/40 text-emerald-300':'bg-slate-800/40 border-slate-700 border-dashed text-slate-500 hover:border-amber-500/40 hover:text-amber-300')}>
              <input type="file" accept="audio/*" className="hidden"
                onChange={e=>{const f=e.target.files&&e.target.files[0];if(f)loadDrumSample(slot,f);e.target.value='';}}/>
              <div className="font-bold">{slot}</div>
              <div className="text-[8px] font-mono mt-0.5 truncate">
                {sampleNames[slot] ? sampleNames[slot] : 'drop / click'}
              </div>
              {sampleNames[slot] && (
                <button onClick={e=>{e.preventDefault();e.stopPropagation();removeDrumSample(slot);}}
                  className="absolute top-0 right-1 text-[9px] text-rose-400 hover:text-rose-300">×</button>
              )}
            </label>
          ))}
        </div>
        <div className="text-[8px] text-slate-600 mt-1.5">Synth engine is used when a slot is empty. Short one-shots work best.</div>
      </div>

      {/* CLOUD BRAIN — connect to a background worker running on your VM
          so the band plays progressions it discovers while you're away.
          Paste the URL the install script printed on the VM. */}
      <div className="bg-[#0b1120] border border-slate-800/60 rounded-xl p-2">
        <div className="flex items-center justify-between mb-1.5">
          <div className="text-[9px] text-sky-400 uppercase tracking-widest font-bold">Cloud Brain (optional)</div>
          <div className={"text-[8px] font-mono uppercase tracking-widest "+
            (cloudStatus==='ok'?'text-emerald-400':
             cloudStatus==='testing'?'text-amber-400':
             cloudStatus==='fail'?'text-rose-400':'text-slate-500')}>
            {cloudStatus==='ok' ? '✓ connected · '+cloudCount+' progressions' :
             cloudStatus==='testing' ? 'testing…' :
             cloudStatus==='fail' ? 'unreachable' :
             cloudUrl ? 'saved — click connect' : 'not connected'}
          </div>
        </div>
        <div className="flex gap-1.5">
          <input
            type="text"
            value={cloudUrl}
            onChange={e=>setCloudUrl(e.target.value)}
            placeholder="http://VM_IP:8080/progressions.json"
            spellCheck={false}
            className="flex-1 bg-slate-900/80 border border-slate-700 rounded px-2 py-1 text-[10px] font-mono text-slate-200 placeholder:text-slate-600 focus:border-sky-500/60 focus:outline-none"
          />
          <button onClick={()=>connectCloud(cloudUrl)}
            className="px-3 py-1 rounded text-[9px] font-bold uppercase tracking-widest bg-sky-500/15 border border-sky-500/40 text-sky-300 hover:bg-sky-500/25">
            Connect
          </button>
          {cloudUrl && (
            <button onClick={()=>{setCloudUrl(''); connectCloud('');}}
              className="px-2 py-1 rounded text-[9px] font-bold uppercase tracking-widest bg-slate-800/60 border border-slate-700 text-slate-400 hover:border-rose-500/40 hover:text-rose-300">
              Clear
            </button>
          )}
        </div>
        <div className="text-[8px] text-slate-600 mt-1.5">
          Paste the URL from the install script output. If you don't have a worker running, leave this blank — the band still plays fine offline.
        </div>
      </div>

    </div>)}

    {/* =================================================================== */}
    {/* IMPROV TAB */}
    {/* =================================================================== */}
    {activeTab==='improv'&&(<div className="space-y-3">

      {/* SONG UPLOAD */}
      <div className="bg-[#0b1120] border border-amber-500/20 rounded-xl p-4">
        <div className="text-[9px] text-amber-400 uppercase tracking-widest font-bold mb-2">Song Upload -- AI Analysis</div>
        <p className="text-[10px] text-slate-400 mb-3">Upload any audio file. The AI extracts key and tempo and locks the band to your song.</p>
        <div className="flex gap-2 items-center flex-wrap">
          <button onClick={()=>fileInputRef.current&&fileInputRef.current.click()}
            className="px-4 py-2 bg-amber-500/10 border border-amber-500/30 text-amber-400 text-[10px] font-bold uppercase rounded-lg hover:bg-amber-500/20 transition-all">
            Choose Audio File
          </button>
          <input ref={fileInputRef} type="file" accept="audio/*" className="hidden" onChange={handleUpload}/>
          {uploadStatus&&<span className="text-[9px] font-mono text-emerald-400">{uploadStatus}</span>}
        </div>
      </div>

      {/* PHRASE LIBRARY */}
      <div className="bg-[#0b1120] border border-purple-500/20 rounded-xl p-4">
        <div className="text-[9px] text-purple-400 uppercase tracking-widest font-bold mb-2">Phrase Library ({completedPhrases.length} recorded)</div>
        {completedPhrases.length===0?(
