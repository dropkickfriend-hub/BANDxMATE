          <p className="text-[10px] text-slate-600">No phrases yet. Open Mic, sing a melody, then use START/END PHRASE buttons above.</p>
        ):(
          <div className="space-y-1.5 max-h-48 overflow-y-auto">
            {completedPhrases.map((ph,i)=>(
              <div key={i} className="flex items-center gap-2 bg-slate-900/60 rounded-lg px-3 py-2">
                <span className="text-[8px] text-purple-300 font-bold w-4">{i+1}</span>
                <span className="text-[8px] text-white font-mono">{NOTE_NAMES[ph.root]}</span>
                <span className="text-[8px] text-purple-400">{ph.reharmonSuggestion}</span>
                <span className="text-[8px] text-amber-400">{ph.timeSig}/4</span>
                <span className="text-[8px] text-cyan-400">{chordInvLabels[ph.inversion]||'Root'}</span>
                {ph.hasTA&&<span className="text-[7px] text-rose-400">TA</span>}
                <span className="text-[7px] text-slate-600 font-mono ml-auto">{ph.ivs.slice(0,5).map(v=>v>0?'+'+v:v).join(' ')}</span>
                <button onClick={()=>{AR.current.chordType=ph.reharmonSuggestion;setCChord(ph.reharmonSuggestion);AR.current.rootMidi=60+ph.root;setDMidi(60+ph.root);addLog('Phrase '+( i+1)+' applied');}}
                  className="text-[7px] px-2 py-0.5 bg-purple-500/10 border border-purple-500/30 text-purple-400 rounded hover:bg-purple-500/20">
                  Apply
                </button>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* MIDI SOUND CREATOR */}
      <div className="bg-[#0b1120] border border-cyan-500/20 rounded-xl p-4">
        <div className="text-[9px] text-cyan-400 uppercase tracking-widest font-bold mb-3">MIDI Sound Creator -- Chord Inversions</div>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div className="space-y-2">
            <div className="text-[8px] text-slate-500 uppercase tracking-widest">Root Note</div>
            <div className="grid grid-cols-6 gap-1">
              {NOTE_NAMES.map((n,i)=>(
                <button key={n} onClick={()=>{setImprovRoot(60+i);AR.current.rootMidi=60+i;setDMidi(60+i);}}
                  className={"py-1.5 rounded text-[8px] font-bold border transition-all "+(improvRoot===60+i?'bg-cyan-500/20 text-cyan-200 border-cyan-500/50':'bg-slate-800/50 text-slate-500 border-slate-700 hover:border-cyan-500/30')}>
                  {n}
                </button>
              ))}
            </div>
          </div>
          <div className="space-y-2">
            <div className="text-[8px] text-slate-500 uppercase tracking-widest">Chord Quality + Inversion</div>
            <div className="grid grid-cols-2 gap-1.5">
              {Object.entries(CHORDS).slice(0,8).map(([type,def])=>(
                <button key={type} onClick={()=>{setImprovChord(type);AR.current.chordType=type;setCChord(type);if(!isPlayRef.current)startBand();}}
                  className={"py-1.5 rounded-lg text-[8px] font-bold uppercase border transition-all "+(improvChord===type?'bg-purple-500/20 text-purple-200 border-purple-500/50':'bg-slate-800/50 text-slate-500 border-slate-700 hover:border-purple-500/30')}>
                  {def.label}
                </button>
              ))}
            </div>
            <div className="text-[7px] text-slate-600 mt-1">Tap any chord to instantly apply. Band starts if not playing.</div>
          </div>
        </div>
        {/* Inversion selector */}
        <div className="mt-3">
          <div className="text-[8px] text-slate-500 uppercase tracking-widest mb-1.5">Voice Inversion</div>
          <div className="flex gap-2">
            {[['Root pos','root'],[' 1st inv','first'],['2nd inv','second']].map(([label,inv])=>(
              <button key={inv} onClick={()=>{
                const ct=CHORDS[improvChord]||CHORDS.maj;
                const rootOff={root:0,first:ct.iv[1]||4,second:ct.iv[2]||7}[inv];
                AR.current.rootMidi=(improvRoot-12+rootOff);
                setDMidi(improvRoot-12+rootOff);
                addLog('Inversion: '+label+' -- bass note '+NOTE_NAMES[((improvRoot+rootOff)%12+12)%12]);
              }}
              className="px-3 py-1.5 bg-slate-800/60 border border-slate-700 text-slate-400 text-[8px] font-bold rounded-lg hover:border-cyan-500/30 hover:text-cyan-400 transition-all">
                {label}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* MEMORY STORE STATUS */}
      <div className="bg-[#0b1120] border border-slate-800/60 rounded-xl p-3">
        <div className="text-[9px] text-slate-400 uppercase tracking-widest font-bold mb-2">Memory Store</div>
        <div className="grid grid-cols-3 gap-2 text-center text-[8px]">
          <div className="bg-slate-900/60 rounded-lg p-2">
            <div className="text-slate-600 uppercase text-[7px] mb-0.5">Phrases Saved</div>
            <div className="text-purple-400 font-black text-lg">{completedPhrases.length}</div>
          </div>
          <div className="bg-slate-900/60 rounded-lg p-2">
            <div className="text-slate-600 uppercase text-[7px] mb-0.5">Collective XP</div>
            <div className="text-emerald-400 font-black text-lg">{brain.n}</div>
          </div>
          <div className="bg-slate-900/60 rounded-lg p-2">
            <div className="text-slate-600 uppercase text-[7px] mb-0.5">Neural Bass</div>
            <div className="text-cyan-400 font-black text-lg">{Math.round(Math.min(100,bassBrain.history.length/32*100))}%</div>
          </div>
          <div className="bg-slate-900/60 rounded-lg p-2 col-span-3">
            <div className="text-slate-600 uppercase text-[7px] mb-0.5">Chord Voicings Learned</div>
            <div className="flex flex-wrap gap-1 mt-1">{Object.entries(brain.voicingMem).filter(([,v])=>v.length>0).map(([ct,pool])=>(<span key={ct} className="text-[7px] bg-purple-500/10 text-purple-300 border border-purple-500/20 px-1.5 py-0.5 rounded font-mono">{ct}:{pool.length}</span>))}</div>
            {Object.keys(brain.voicingMem).length===0&&<div className="text-[8px] text-slate-600 mt-1">Play for a few measures to start learning voicings.</div>}
          </div>
        </div>
      </div>

      {/* LEARNING MODE SELECTOR */}
      <div className="bg-[#0b1120] border border-violet-500/25 rounded-xl p-3">
        <div className="flex justify-between items-center mb-2">
          <div className="text-[9px] text-violet-400 uppercase tracking-widest font-bold">Deep Learning Mode</div>
          {learningMode!=='none'&&<span className="text-[7px] text-violet-300 animate-pulse">* ACTIVE</span>}
        </div>
        <div className="grid grid-cols-2 gap-1.5 mb-2">
          {[
            ['none',    'OFF',         'Standard Q-learning only','text-slate-500','border-slate-700'],
            ['chaos',   'CROSS-SENSE', 'sim3 chaos rewards harmony','text-cyan-400','border-cyan-800'],
            ['progression','PROG MEM', 'Learn chord sequences','text-purple-400','border-purple-800'],
            ['convergence','CONVERGE', 'Loss fn + auto exploration','text-amber-400','border-amber-800'],
          ].map(([id,label,desc,col,border])=>(
            <button key={id} onClick={()=>setLearningMode(id)}
              className={"p-2 rounded-lg border text-left transition-all "+(learningMode===id?`bg-slate-800 ${border} ${col}`:`bg-slate-900/40 border-slate-800 text-slate-600 hover:border-slate-600`)}>
              <div className={"text-[9px] font-bold uppercase tracking-wide "+(learningMode===id?col:'text-slate-500')}>{label}</div>
              <div className="text-[7px] text-slate-600 mt-0.5 leading-tight">{desc}</div>
            </button>
          ))}
        </div>
        {learningMode==='chaos'&&(
          <div className="text-[8px] text-cyan-400/70 bg-cyan-500/5 border border-cyan-500/10 rounded p-2">
            sim3 chaos: <span className="font-bold">{sim3Chaos!=null?Number(sim3Chaos).toFixed(3):'waiting...'}</span>
            {' . '}rewarding {(sim3Chaos||0)>0.55?'dissonant':'consonant'} chords
          </div>
        )}
        {learningMode==='progression'&&(
          <div className="text-[8px] text-purple-400/70 bg-purple-500/5 border border-purple-500/10 rounded p-2">
            Library: <span className="font-bold">{progressionMemory.library.length} sequences</span>
            {progressionSuggestion&&<span> . next: <span className="text-purple-300 font-bold">{CHORDS[progressionSuggestion]?.label||progressionSuggestion}</span></span>}
          </div>
        )}
        {learningMode==='convergence'&&(
          <div className="text-[8px] text-amber-400/70 bg-amber-500/5 border border-amber-500/10 rounded p-2">
            Score: <span className="font-bold text-amber-300">{convergenceScore}/100</span>
            {' . '}eps: <span className="font-mono">{brain.eps.toFixed(3)}</span>
            {' . '}{convergenceScore>70?'converging ok':convergenceScore>40?'learning...':'exploring'}
          </div>
        )}
      </div>

      {/* RECORDING */}
      <div className="bg-[#0b1120] border border-rose-500/20 rounded-xl p-3">
        <div className="text-[9px] text-rose-400 uppercase tracking-widest font-bold mb-2">In-App Recording</div>
        <div className="flex gap-2 items-center flex-wrap">
          <button onClick={toggleRecording}
            className={"px-4 py-2 text-[10px] font-bold uppercase rounded-lg border transition-all "+(isRecording?'bg-rose-500/20 border-rose-500/50 text-rose-300 animate-pulse':'bg-slate-800/60 border-slate-700 text-slate-400 hover:border-rose-500/30 hover:text-rose-400')}>
            {isRecording?'Stop Recording':'Record Session'}
          </button>
          {recordingUrl&&(
            <a href={recordingUrl} download="live_ai_band_session.webm"
              className="px-4 py-2 bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-[10px] font-bold uppercase rounded-lg hover:bg-emerald-500/20">
              Download
            </a>
          )}
          {isRecording&&<span className="text-[8px] text-rose-400 animate-pulse">Recording...</span>}
        </div>
      </div>

      {/* BILLBOARD TOP 10 */}
      <div className="bg-[#0b1120] border border-amber-500/20 rounded-xl p-3">
        <div className="text-[9px] text-amber-400 uppercase tracking-widest font-bold mb-2">Billboard Top 10 -- Your Inputs</div>
        {billboard.length===0?(
          <p className="text-[9px] text-slate-600">No entries yet. Record phrases to populate.</p>
        ):(
          <div className="space-y-1">
            {billboard.map(function(entry,idx){return(
              <div key={idx} className="flex items-center gap-2 bg-slate-900/60 rounded px-2 py-1.5">
                <span className="text-[8px] font-black w-4" style={{color:idx===0?'#f59e0b':idx<3?'#94a3b8':'#475569'}}>#{idx+1}</span>
                <span className="text-[8px] text-white font-mono">{entry.key}</span>
                <span className="text-[8px] text-purple-400">{entry.chord}</span>
                <span className="text-[8px] text-amber-400">{entry.timeSig}/4</span>
                {entry.hasTA&&<span className="text-[7px] text-rose-400">TA</span>}
                <span className="text-[7px] text-slate-500 font-mono ml-1">{entry.ivs}</span>
                <span className="text-[7px] text-slate-700 ml-auto">{entry.t}</span>
              </div>
            );})}
          </div>
        )}
      </div>

      {/* SIM3COLTS LIVE FEED */}
      {sim3Balls.length>0&&(
        <div className="bg-[#0b1120] border border-emerald-500/20 rounded-xl p-3">
          <div className="text-[9px] text-emerald-400 uppercase tracking-widest font-bold mb-2">sim3colts Live -- {sim3Balls.length} balls</div>
          <div className="relative h-20 bg-black/50 rounded-lg overflow-hidden">
            {sim3Balls.slice(0,20).map(function(b,i){
              const x=(b.x||0.5)*100;
              const y=(b.y||0.5)*100;
              const col=b.color||'#22d3ee';
              const size=4+((b.winding||0)*0.8);
              return(
                <div key={i} className="absolute rounded-full transition-all duration-500"
                  style={{left:x+'%',top:y+'%',width:size+'px',height:size+'px',
                    background:col,boxShadow:'0 0 '+size+'px '+col,
                    transform:'translate(-50%,-50%)'}}/>
              );
            })}
          </div>
          <div className="text-[7px] text-slate-700 mt-1">chaos: {sim3Chaos!==null?Number(sim3Chaos).toFixed(2):'--'}</div>
        </div>
      )}

      {/* Launch from improv tab */}
      <button onClick={togglePlay}
        className={"w-full py-3 rounded-xl font-black text-sm uppercase tracking-widest "+(isPlaying?'bg-rose-500 text-white':'bg-emerald-500 text-slate-900')}>
        {isPlaying?'HALT BAND':'START BAND'}
      </button>

    </div>)}

    {/* BILLBOARD TAB -- record a track, capture per-voice stems, rate, and
        rank into a weekly Top-10 per genre. The #1 per genre each week is
        featured for the community remix competition. */}
    {activeTab==='billboard'&&(<div className="space-y-3">
      <div className="bg-[#0b1120] border border-fuchsia-500/30 rounded-xl p-3 space-y-2">
        <div className="text-[10px] text-fuchsia-300 uppercase tracking-widest font-bold">Record a Track</div>
        <div className="grid grid-cols-2 gap-2">
          <input type="text" placeholder="Track title"
            value={bbForm.title}
            onChange={e=>setBbForm(f=>({...f,title:e.target.value}))}
            className="bg-slate-900/80 border border-slate-700 rounded px-2 py-1 text-[10px] text-white placeholder-slate-500"/>
          <input type="text" placeholder="Socials URL (https://...)"
            value={bbForm.socials}
            onChange={e=>setBbForm(f=>({...f,socials:e.target.value}))}
            className="bg-slate-900/80 border border-slate-700 rounded px-2 py-1 text-[10px] text-white placeholder-slate-500"/>
        </div>
        <div className="grid grid-cols-3 gap-2 items-center">
          <select value={bbForm.genre} onChange={e=>setBbForm(f=>({...f,genre:e.target.value}))}
            className="bg-slate-900/80 border border-slate-700 rounded px-2 py-1 text-[10px] text-white">
            {['pop','jazz','edm','hiphop','westcoast','eastcoast','african','indian'].map(g=>(
              <option key={g} value={g}>{g.toUpperCase()}</option>
            ))}
          </select>
          <select value={bbForm.duration} onChange={e=>setBbForm(f=>({...f,duration:parseInt(e.target.value)}))}
            className="bg-slate-900/80 border border-slate-700 rounded px-2 py-1 text-[10px] text-white">
            {[15,30,45,60,90].map(d=>(<option key={d} value={d}>{d}s</option>))}
          </select>
          <button onClick={startBillboardRecord} disabled={bbRec.on}
            className={"py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-widest border transition-all "+
              (bbRec.on?'bg-rose-500/20 text-rose-300 border-rose-500/50 animate-pulse':'bg-fuchsia-500 text-slate-900 border-fuchsia-400 hover:bg-fuchsia-400')}>
            {bbRec.on ? ('REC · '+bbRec.remaining+'s') : 'RECORD'}
          </button>
        </div>
        <div className="text-[8px] text-slate-500">Captures master + 4 stems (drum / bass / mid / lead). Stems become rateable and downloadable.</div>
      </div>

      {/* Genre picker for the top-10 view */}
      <div className="bg-[#0b1120] border border-slate-800/60 rounded-xl p-3">
        <div className="flex items-center justify-between mb-2">
          <div className="text-[10px] text-amber-300 uppercase tracking-widest font-bold">
            Top 10 · {bbViewGenre.toUpperCase()}
          </div>
          <select value={bbViewGenre} onChange={e=>setBbViewGenre(e.target.value)}
            className="bg-slate-900/80 border border-slate-700 rounded px-2 py-1 text-[9px] text-amber-200">
            {['pop','jazz','edm','hiphop','westcoast','eastcoast','african','indian'].map(g=>(
              <option key={g} value={g}>{g.toUpperCase()}</option>
            ))}
          </select>
        </div>
        {billboard.deepTop(bbViewGenre, 10).length === 0 && (
          <div className="text-[9px] text-slate-500 py-3 text-center">No tracks yet. Record one above to seed the chart.</div>
        )}
        {billboard.deepTop(bbViewGenre, 10).map((e,i)=>{
          const blobs = bbBlobsRef.current[e.id] || {};
          const isChamp = i===0 && e.ratingCount>0;
          return (
            <div key={e.id} className={"rounded-lg border mb-2 p-2 "+(isChamp?'border-amber-400/60 bg-amber-500/5':'border-slate-700 bg-slate-900/40')}>
              <div className="flex items-center gap-2 mb-1">
                <span className={"text-xs font-black w-6 "+(isChamp?'text-amber-300':'text-slate-500')}>#{i+1}</span>
                <div className="flex-1 min-w-0">
                  <div className="text-[11px] text-white font-bold truncate">{e.title}</div>
                  <div className="text-[8px] text-slate-500">
                    {e.genre.toUpperCase()} · {e.ratingCount} rating{e.ratingCount===1?'':'s'} · avg {e.totalRating.toFixed(2)}/5
                    {e.socials && <> · <a href={e.socials} target="_blank" rel="noreferrer" className="text-cyan-400 hover:underline">socials</a></>}
                  </div>
                </div>
                {isChamp && e.ratingCount>0 && (
                  <button onClick={()=>remixChampion(e.id)}
                    className="px-2 py-1 bg-amber-500/20 border border-amber-500/40 rounded text-[8px] font-bold uppercase text-amber-200 hover:bg-amber-500/30">
                    Remix
                  </button>
                )}
                <button onClick={()=>deleteBillboardEntry(e.id)}
                  className="px-2 py-1 text-[10px] text-slate-500 hover:text-rose-400">×</button>
              </div>

              {/* Master playback */}
              {blobs.master && (
                <audio controls src={blobs.master} className="w-full h-6 mb-1" style={{height:'24px'}}/>
              )}

              {/* Per-voice rating + download */}
              <div className="grid grid-cols-2 gap-1.5 text-[9px]">
                {['drum','bass','mid','lead'].map(v=>(
                  <div key={v} className="flex items-center gap-1 bg-slate-900/60 rounded px-1.5 py-1 border border-slate-800">
                    <span className={"w-10 uppercase tracking-widest font-bold "+(
                      v==='drum'?'text-rose-400':v==='bass'?'text-amber-400':v==='mid'?'text-violet-400':'text-cyan-400'
                    )}>{v}</span>
                    {[1,2,3,4,5].map(s=>(
                      <button key={s} onClick={()=>rateBillboard(e.id, v, s)}
                        className={"w-4 h-4 text-[10px] leading-none "+
                          (s <= Math.round(e.ratings[v]) ? 'text-amber-300' : 'text-slate-700 hover:text-amber-400')}>
                        ★
                      </button>
                    ))}
                    <span className="text-[8px] text-slate-500 w-6">{e.ratings[v].toFixed(1)}</span>
                    {blobs.stems?.[v] && (
                      <button onClick={()=>downloadBillboardBlob(e.id, v)}
                        title={'Download '+v+' stem'}
                        className="ml-auto px-1 text-[8px] text-cyan-400 hover:text-cyan-300">⇩</button>
                    )}
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>

      {/* Weekly champion / competition card */}
      <div className="bg-[#0b1120] border border-amber-500/30 rounded-xl p-3">
        <div className="text-[10px] text-amber-300 uppercase tracking-widest font-bold mb-2">Weekly Competition</div>
        <div className="text-[9px] text-slate-400 leading-relaxed mb-2">
          Every week the deep-learned #1 per genre is crowned. Tap <span className="text-amber-300 font-bold">Remix</span> on a #1 entry above to load its stems as samples, then jam over them and record your own entry. Top-rated remix next week wins a featured slot with a link to your socials.
        </div>
        <div className="grid grid-cols-2 gap-1 text-[9px]">
          {['pop','jazz','edm','hiphop','westcoast','eastcoast','african','indian'].map(g=>{
            const top = billboard.deepTop(g, 1)[0];
            return (
              <div key={g} className="flex items-center gap-1 bg-slate-900/60 rounded px-2 py-1 border border-slate-800">
                <span className="uppercase text-amber-400 font-bold w-12 text-[8px]">{g}</span>
                <span className="text-[9px] text-white truncate flex-1">{top?top.title:'—'}</span>
                {top && <span className="text-[8px] text-amber-300">{top.totalRating.toFixed(1)}★</span>}
              </div>
            );
          })}
        </div>
      </div>
    </div>)}

    {/* SIM3 VIZ TAB */}
    {activeTab==='sim3'&&(<div className="space-y-3">

      <div className="bg-[#0b1120] border border-emerald-500/20 rounded-xl overflow-hidden">
        <canvas ref={sim3CanvasRef} width={600} height={400}
          style={{width:'100%',height:'auto',display:'block',background:'#050810'}}/>
      </div>

      <div className="grid grid-cols-3 gap-2">
        <div className="bg-[#0b1120] border border-slate-800/60 rounded-xl p-3 text-center">
          <div className="text-[7px] text-slate-600 uppercase tracking-widest mb-1">Balls Tracked</div>
          <div className="text-emerald-400 font-black text-xl">{sim3Balls.length}</div>
        </div>
        <div className="bg-[#0b1120] border border-slate-800/60 rounded-xl p-3 text-center">
          <div className="text-[7px] text-slate-600 uppercase tracking-widest mb-1">Chaos Ratio</div>
          <div className="text-cyan-400 font-black text-xl">{sim3Chaos!=null?Number(sim3Chaos).toFixed(3):'--'}</div>
        </div>
        <div className="bg-[#0b1120] border border-slate-800/60 rounded-xl p-3 text-center">
          <div className="text-[7px] text-slate-600 uppercase tracking-widest mb-1">Band Status</div>
          <div className={`font-black text-xl ${isPlaying?'text-rose-400':'text-slate-600'}`}>{isPlaying?'LIVE':'IDLE'}</div>
        </div>
      </div>

      {sim3Balls.length>0&&(
        <div className="bg-[#0b1120] border border-slate-800/60 rounded-xl p-3">
          <div className="text-[9px] text-slate-400 uppercase tracking-widest font-bold mb-2">Top Winding Nodes</div>
          <div className="space-y-1">
            {[...sim3Balls].sort((a,b)=>(b.winding||0)-(a.winding||0)).slice(0,6).map((b,i)=>(
              <div key={i} className="flex items-center gap-2 bg-slate-900/60 rounded px-2 py-1">
                <div style={{width:8,height:8,borderRadius:'50%',background:b.color||'#22d3ee',boxShadow:'0 0 6px '+(b.color||'#22d3ee')}}/>
                <span className="text-[8px] font-mono text-slate-400">W#{b.winding||0}</span>
                <span className="text-[8px] text-slate-600">x:{((b.x||0)*100).toFixed(1)}% y:{((b.y||0)*100).toFixed(1)}%</span>
                <span className="text-[7px] ml-auto" style={{color:b.color||'#22d3ee'}}>glow:{((b.glow||0)*100).toFixed(0)}%</span>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="bg-[#0b1120] border border-cyan-500/10 rounded-xl p-3">
        <div className="text-[9px] text-slate-400 uppercase tracking-widest font-bold mb-2">Sim3 -> Band Feed</div>
        <div className="text-[8px] text-slate-500 leading-relaxed">Chaos ratio from sim3colts V3 modulates band harmonic density. High chaos drives irrational FM ratios, wider scale exploration, neural bass growl mode. Low chaos locks closed orbits, melodic resolution, sub bass bloom.</div>
        <div className="mt-2 h-2 rounded-full bg-slate-800 overflow-hidden">
          <div className="h-full rounded-full transition-all duration-500"
            style={{width:((sim3Chaos||0)*100)+'%',background:'linear-gradient(90deg,#22d3ee,#f43f5e)'}}/>
        </div>
        <div className="flex justify-between text-[7px] text-slate-700 mt-0.5"><span>CLOSED ORBIT</span><span>CHAOS VOID</span></div>
      </div>

      {/* FPS → BPM sync panel (shown when loaded inside simcolt iframe) */}
      <div className="bg-[#0b1120] border border-cyan-500/15 rounded-xl p-3">
        <div className="text-[9px] text-cyan-400 uppercase tracking-widest font-bold mb-2">BPM / FPS Sync</div>
        <div className="flex items-center gap-3 flex-wrap">
          <div className="text-[9px] font-mono text-slate-400">
            Current BPM: <span className="text-white font-bold">{bpm}</span>
          </div>
          {window._fpsSyncActive&&(
            <div className="text-[8px] font-mono text-cyan-400 animate-pulse">⟳ FPS SYNC ACTIVE</div>
          )}
        </div>
        <div className="mt-2 flex items-center gap-2">
          <input type="range" min="60" max="200" value={bpm}
            onChange={e=>{const nb=parseInt(e.target.value);setBpm(nb);AR.current.bpm=nb;bus.updateDelayTime(nb);}}
            className="flex-1"/>
          <span className="text-[9px] text-white font-bold font-mono w-8 text-right">{bpm}</span>
        </div>
        <div className="text-[7px] text-slate-700 mt-1">Drag to change BPM · sim FPS sync overrides when active</div>
      </div>

      {/* Drum Rationality */}
      <div className="bg-[#0b1120] border border-purple-500/20 rounded-xl p-3">
        <div className="flex justify-between mb-1.5">
          <div className="text-[9px] text-purple-400 uppercase tracking-widest font-bold">Drum Rationality</div>
          <span className="text-[9px] font-mono text-white font-bold">
            {drumRationality<0.25?'CHAOS':drumRationality<0.55?'LOOSE':drumRationality<0.82?'GROOVE':'MACHINE'}
          </span>
        </div>
        <div className="mt-1 flex items-center gap-2">
          <input type="range" min="0" max="100" value={Math.round(drumRationality*100)}
            onChange={e=>{const v=parseInt(e.target.value)/100;setDrumRationality(v);AR.current.drumRationality=v;}}
            className="flex-1 accent-purple-500"/>
          <span className="text-[9px] text-purple-300 font-bold font-mono w-8 text-right">{Math.round(drumRationality*100)}</span>
        </div>
        <div className="flex justify-between text-[7px] text-slate-700 mt-0.5"><span>CHAOS</span><span>ARCHETYPE</span></div>
      </div>

      <button onClick={togglePlay}
        className={"w-full py-3 rounded-xl font-black text-sm uppercase tracking-widest "+(isPlaying?'bg-rose-500 text-white':'bg-emerald-500 text-slate-900')}>
        {isPlaying?'HALT BAND':'START BAND'}
      </button>

    </div>)}

    {/* LOG -- always visible */}
    <div className="bg-black/50 border border-slate-800/50 rounded-xl p-2.5 h-24 overflow-y-auto space-y-0.5">
      {log.map((m,i)=><div key={i} className="text-[8px] text-slate-500 leading-relaxed">{m}</div>)}
    </div>

    <p className="text-center text-[8px] text-slate-800 uppercase tracking-widest pb-1">Beyond Bound . Neural Bass . Collective Brain . Every Session Teaches</p>
  </div>
  </div>
  );
}

const root=createRoot(document.getElementById('root'));
try {
  root.render(<App/>);
  setTimeout(()=>{const ls=document.getElementById('loading-screen');if(ls)ls.style.display='none';},300);
} catch(err) {
  const ls=document.getElementById('loading-screen');
  if(ls){
    ls.innerHTML='<div style="font-family:monospace;color:#f43f5e;padding:24px;max-width:340px;font-size:11px;line-height:1.8;word-break:break-all;">'
      +'<div style="font-size:13px;margin-bottom:12px;color:#fff;">Render Error</div>'
      +String(err)+'<br><br>'
      +(err.stack||'').split('\n').slice(0,4).join('<br>')
      +'</div>';
  }
}
</script>
</body>
</html>
