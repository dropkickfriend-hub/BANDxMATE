// resonant filters, so it breathes, whispers, and shifts as the LFOs move.
// The "groove orbit" affects the resonance depth so it pulses with the bar.
function synthNoisePad(ctx, t, notes, chaos, warp, dest, durationBars=1, bpm=110){
  if(!dest || !Array.isArray(notes) || !notes.length) return;
  const s = drumSeed();
  const beatSec = 60/bpm;
  const dur = beatSec * 4 * durationBars / warp;
  // Shared noise source -- fill a stereo buffer long enough for the duration
  const nLen = Math.floor(ctx.sampleRate * dur);
  const nBuf = ctx.createBuffer(2, nLen, ctx.sampleRate);
  for(let ch=0; ch<2; ch++){
    const nd = nBuf.getChannelData(ch);
    for(let i=0; i<nLen; i++) nd[i] = (Math.random()*2-1)*0.6;
  }
  const src = ctx.createBufferSource(); src.buffer = nBuf;
  // Master envelope with slow swell (fade in over 300ms, out over 25% of dur)
  const master = ctx.createGain();
  master.gain.setValueAtTime(0, t);
  master.gain.linearRampToValueAtTime(0.18 + s.tone*0.06, t + 0.3);
  master.gain.setValueAtTime(0.18 + s.tone*0.06, t + dur*0.75);
  master.gain.linearRampToValueAtTime(0.0001, t + dur);
  // One bandpass per chord tone -- the notes "pitch" the noise without any
  // actual oscillator, and LFO sweeps the Q so resonance breathes.
  for(const note of notes){
    const freq = 440 * Math.pow(2, (note-69)/12) * warp;
    const bp = ctx.createBiquadFilter(); bp.type = 'bandpass';
    bp.frequency.value = freq;
    bp.Q.value = 12 + chaos*18;
    // LFO on Q for the "formant breathing" effect
    const qLfo = ctx.createOscillator(); qLfo.type='sine';
    qLfo.frequency.value = 0.15 + s.color*0.25;
    const qAmt = ctx.createGain();
    qAmt.gain.value = 8 + tensionArc.currentFor('mid').r*12;   // groove-aware
    qLfo.connect(qAmt); qAmt.connect(bp.Q);
    const bpGain = ctx.createGain();
    bpGain.gain.value = 0.32;
    src.connect(bp); bp.connect(bpGain); bpGain.connect(master);
    qLfo.start(t); qLfo.stop(t + dur + 0.05);
    autoClean(bp, qLfo, qAmt, bpGain);
  }
  master.connect(dest);
  src.start(t); src.stop(t + dur + 0.05);
  autoClean(src, master);
}

// Sustained pad: layered detuned sine/triangle oscillators with a slow
// filter sweep. Plays the current chord tones for a full bar or longer.
function synthPad(ctx, t, notes, chaos, warp, dest, durationBars=1, bpm=110){
  if(!dest || !Array.isArray(notes) || !notes.length) return;
  const s = drumSeed();
  const beatSec = 60/bpm;
  const dur = beatSec * 4 * durationBars / warp;   // 1 bar of 4/4
  // One oscillator per chord tone, plus a detune partner for width
  const master = ctx.createGain();
  master.gain.setValueAtTime(0, t);
  master.gain.linearRampToValueAtTime(0.22 + s.tone*0.08, t + 0.18);  // slow swell
  master.gain.setValueAtTime(0.22 + s.tone*0.08, t + dur*0.75);
  master.gain.linearRampToValueAtTime(0.0001, t + dur);
  const lpf = ctx.createBiquadFilter(); lpf.type='lowpass';
  lpf.Q.value = 0.7;
  lpf.frequency.setValueAtTime((500 + chaos*800) * warp, t);
  lpf.frequency.linearRampToValueAtTime((1200 + chaos*1600) * warp, t + dur*0.6);
  lpf.frequency.exponentialRampToValueAtTime(Math.max(100,(600 + chaos*300) * warp), t + dur);
  master.connect(lpf); lpf.connect(dest);
  for(const note of notes){
    const freq = 440*Math.pow(2,(note-69)/12) * warp;
    for(let d=-1; d<=1; d++){
      const osc = ctx.createOscillator();
      osc.type = d===0 ? 'triangle' : 'sine';
      osc.frequency.value = freq;
      osc.detune.value = d * (6 + s.color*8);
      osc.connect(master);
      osc.start(t); osc.stop(t + dur + 0.05);
      autoClean(osc);
    }
  }
  autoClean(master, lpf);
}

// -- SESSION JUDGE -----------------------------------------------------------
// Scores each bar 0..1 and funnels that into brain.reward + bandTaste so the
// band actually learns in session. Starts with priors from music theory (see
// Brain._seedPriors) so it isn't brute-forcing; the judge nudges taste toward
// what's landing well THIS session.
// Inputs:
//   voiceWinding: average winding of mid+lead (proxy for "is this interesting?")
//   arcAlignment: did the bar's dissonance match tensionArc's target? [0..1]
//   userAlignment: did the mic/MIDI user play align with the AI? [0..1]
// Output: score rolled into an EMA; feeds the brain's recent picks and the
//   bandTaste groove-archetype weight.
const sessionJudge = {
  score: 0.5,            // running EMA of quality [0..1]
  barsJudged: 0,

  evaluate({voiceWinding=0, arcAlignment=0.5, userAlignment=0.5}){
    // Weight: voice winding 50%, arc alignment 30%, user alignment 20%.
    const raw = voiceWinding*0.5 + arcAlignment*0.3 + userAlignment*0.2;
    const quality = Math.max(0, Math.min(1, raw));
    // EMA so a single bad bar doesn't nuke weeks of learning
    this.score = this.score*0.85 + quality*0.15;
    this.barsJudged++;
    return this.score;
  },

  // Feed the quality score back into the brain + taste. Recent Q entries that
  // led to a high-scoring bar get a small positive reinforcement; low-scoring
  // bars get a small negative.
  feedback(recentPicks, currentGroove){
    const delta = this.score - 0.5;    // negative = below average, positive = above
    const gain = delta * 0.08;          // small step; learning adds up over time
    for(const pick of recentPicks){
      const k = `${pick.role}_${((pick.iv%12)+12)%12}_${pick.chord||'global'}`;
      brain.q[k] = Math.max(0, Math.min(1, (brain.q[k]??0.5) + gain));
    }
    if(currentGroove && bandTaste.archetypeWeights[currentGroove] != null){
      bandTaste.reinforceArchetype(currentGroove, Math.max(0.1, Math.min(0.9, this.score)));
    }
  },

  serialize(){ return {score:this.score, barsJudged:this.barsJudged}; },
  load(d){ if(!d) return; if(typeof d.score==='number') this.score=d.score; if(typeof d.barsJudged==='number') this.barsJudged=d.barsJudged; },
};
if(typeof window!=='undefined') window.sessionJudge=sessionJudge;

  // -- SWARM -----------------------------------------------------------------
  useEffect(()=>{

  // -- SYNC LEARNING MODE to engine objects --------------------------------

  // Sync latest values to window refs for sim3 canvas loop (avoids stale closures)

  useEffect(()=>{window._sim3ChaosLatest=sim3Chaos;},[sim3Chaos]);
  useEffect(()=>{window._isPlayingLatest=isPlaying;},[isPlaying]);

  // -- AUTO CHAOS + DISPLAY --------------------------------------------------
  useEffect(()=>{
    if(!isPlaying)return;

    const iv=setInterval(()=>{
      t+=0.04;
      setChaos(p=>Math.min(1,Math.max(0.05,p+Math.sin(t)*0.007)));
      setBrainQ(brain.quality);
      const vd={};for(const[r,v]of Object.entries(voicesRef.current))vd[r]=Math.min(100,v.winding*5);
      setVoiceDisp({...vd});
      // Poll compression gain reduction for metering
      setGainReduction(bus.getGainReduction());
    },160);
    return()=>clearInterval(iv);
  },[isPlaying]);

  // -- SYNC REFS -------------------------------------------------------------
  useEffect(()=>{AR.current.chaos=chaos;AR.current.density=density;AR.current.swing=swing;AR.current.bpm=bpm;AR.current.drumRationality=drumRationality;
    // Split pitch from tempo so halftime doesn't pitch the whole band down.
    // - pitchWarp: record-scratch only (affects both pitch and step rate).
    // - tempoWarp: pitchWarp × halftime-factor (affects scheduler timing only).
    // warpMultiplier kept as an alias for legacy synths that still read it;
    // it holds pitchWarp so pitch stays stable when halftime toggles.
    const pitchWarp = Math.pow(2,recordScratch/100);
    const tempoWarp = pitchWarp * (halftime?0.5:1);
    AR.current.pitchWarp     = pitchWarp;
    AR.current.tempoWarp     = tempoWarp;
    AR.current.warpMultiplier= pitchWarp;   // legacy -- pitch only, not tempo
    bus.updateDelayTime(bpm);
    // If we're locked, also move lockedBpm/swing with the slider so the drummer
    // actually follows tempo/swing changes instead of staying at the locked value.
    if(AR.current.lockedBpm!=null)   AR.current.lockedBpm  = bpm;
    if(AR.current.lockedSwing!=null) AR.current.lockedSwing= swing;
  },[chaos,density,swing,bpm,drumRationality,recordScratch,halftime]);

  // Push arc-intensity slider into the tensionArc module; poll for the current
  // arc name + bar so the UI reflects whatever the conductor picked.
  useEffect(()=>{ tensionArc.intensity = arcIntensity/100; },[arcIntensity]);
  useEffect(()=>{ autoFx.active = autoFxActive; },[autoFxActive]);
  useEffect(()=>{ paramMemory.gateOn = gateActive; },[gateActive]);
  useEffect(()=>{
    const iv=setInterval(()=>{
      setArcName(tensionArc.currentArc?.name||'—');
      setArcBar(tensionArc.arcIndex||0);
      // Drop engine can be auto-enabled by style; sync its UI toggle.
      if(dropEngineOn !== beatDropEngine.active) setDropEngineOn(beatDropEngine.active);
      // Keep FX button LEDs in sync when autoFx flips toggles under us.
      if(autoFx.active && bus && bus.fxEnabled){
        setFxOn(p=>{
          const b=bus.fxEnabled;
          if(p.reverb===b.reverb && p.delay===b.delay && p.chorus===b.chorus && p.fuzz===b.fuzz && p.crush===b.crush) return p;
          return {reverb:!!b.reverb, delay:!!b.delay, chorus:!!b.chorus, fuzz:!!b.fuzz, crush:!!b.crush};
        });
      }
    },500);
    return()=>clearInterval(iv);
  },[]);

  // -- EXPOSE AR TO WINDOW so the SimColt bridge can read/write it -----------
  useEffect(()=>{ window._bandAR = AR.current; },[]);

  // -- POLL FOR EXTERNAL BPM (from simcolt FPS sync via postMessage) ---------
  useEffect(()=>{
    const iv = setInterval(()=>{
      if(window._externalBpm !== null && window._externalBpm !== bpm){
        const nb = window._externalBpm;
        window._externalBpm = null; // consume once
        setBpm(nb);
        AR.current.bpm = nb;
        bus.updateDelayTime(nb);
        addLog('[FPS SYNC] BPM set to '+nb+' from sim FPS');
      }
    }, 500);
    return ()=>clearInterval(iv);
  },[bpm]);
  useEffect(()=>{
    kickStyle=kickStyleState||'pop';
    // Fresh drum kit timbre + pattern on style change
    reseedDrum('kick'); reseedDrum('snare'); reseedDrum('hat');
    reseedDrumPattern('all');
    // EDM + hardstyle + dubstep + phonk all want the animated audiophile
    // delay (LFO on delay, volume gate, pitch-wobble on the LFO itself).
    // Phonk also enables the dedicated "gods-mode" mix (slam comp + fuzz +
    // crush + hotter bus gains).
    try{
      bus.setEdmDelay(['edm','hardstyle','dubstep','phonk'].includes(kickStyle));
      bus.setPhonkMode(kickStyle === 'phonk');
    }catch(_){}
    const sp = STYLE_PROFILES[kickStyle]||STYLE_PROFILES.pop;
    // Hip-hop tempo bias: 33% chance lock into the Dilla pocket (78-92 BPM)
    if(sp.tempoBias && Math.random() < sp.tempoBias.prob){
      const [lo,hi] = sp.tempoBias.range;
      const nb = Math.round(lo + Math.random()*(hi-lo));
      setBpm(nb); AR.current.bpm=nb;
      addLog(`[STYLE] ${sp.label} → ${nb} BPM (Dilla pocket)`);
    }
    // EDM double-time: 50% of sessions use a 2× grid (16ths become 32nds)
    if(sp.doubleTimeBias && Math.random() < sp.doubleTimeBias){
      AR.current._gridMul = 2;
      addLog(`[STYLE] ${sp.label} → double-time grid`);
    } else {
      AR.current._gridMul = 1;
    }
  },[kickStyleState]);
  useEffect(()=>{AR.current.userRole=userRole;},[userRole]);
  useEffect(()=>{isPlayRef.current=isPlaying;},[isPlaying]);
  useEffect(()=>{lockedRef.current=lockedIn;},[lockedIn]);
  useEffect(()=>{mutesRef.current=mutes;},[mutes]);
  useEffect(()=>{hapticModeRef.current=hapticMode;},[hapticMode]);
  useEffect(()=>{deafModeRef.current=deafMode;},[deafMode]);

  useEffect(()=>{perfModeRef.current=perfMode;},[perfMode]);

  // -- WEB MIDI SETUP --------------------------------------------------------
  useEffect(()=>{

        input.onmidimessage=e=>{
          const[status,note,velocity]=e.data;

            // Note on -> treat as pitch input
            AR.current.rootMidi=note;
            setDMidi(note);
            motifEng.addPitch(note,Date.now());

            if(!isPlayRef.current)startBand();
          }
        };
      });
      addLog('MIDI connected.');
    }).catch(()=>{});
  },[]);

  // -- ROLE CLASSIFICATION ---------------------------------------------------
  const classifyRole=(freq,rms,pitchConf,onsetRate)=>{
    if(pitchConf<25&&onsetRate>2.5)return'drum';
    if(freq>0&&freq<180)return'bass';
    if(freq>=180&&freq<900)return'mid';
    if(freq>=900)return'lead';
    return'unknown';
  };

  // -- LOCK IN ---------------------------------------------------------------
  const handleLockIn=()=>{
    const ar=AR.current;

      ar.lockedBpm=ar.bpm;ar.lockedSwing=ar.swing;ar.lockedRoot=ar.rootMidi;

      ar.lockedBpm=null;ar.lockedSwing=null;ar.lockedRoot=null;

  // -- MIC -------------------------------------------------------------------
  const toggleMic=async()=>{
    if(micActive){
      if(AR.current.micStream)AR.current.micStream.getTracks().forEach(t=>t.stop());
      AR.current.analyser=null;setMicActive(false);setConf(0);setUserRole('unknown');
      if(lockedIn)addLog('Mic off . Hands-free mode active.');
      else addLog('Mic off.');return;
    }
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
      addLog('[MIC] Browser has no mic API. Try Chrome/Safari.');
      return;
    }
    // Some laptop mics reject detailed constraints. Try the tuned config
    // first, fall back to the plain `{audio:true}` on OverconstrainedError.
    const openStream=async()=>{
      try{
        return await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
      }catch(e){
        if(e && (e.name==='OverconstrainedError' || e.name==='NotReadableError')){
          addLog('[MIC] Retrying with relaxed constraints…');
          return await navigator.mediaDevices.getUserMedia({audio:true});
        }
        throw e;
      }
    };
    try{
      const stream=await openStream();
      if(!AR.current.ctx)AR.current.ctx=(()=>{const SR=DeviceComp.score<0.45?22050:44100;try{return new(window.AudioContext||window.webkitAudioContext)({sampleRate:SR,latencyHint:'playback'});}catch(e){return new(window.AudioContext||window.webkitAudioContext)();}})();
      if(AR.current.ctx.state==='suspended')await AR.current.ctx.resume();
      bus.init(AR.current.ctx);
      const src=AR.current.ctx.createMediaStreamSource(stream);
      const an=AR.current.ctx.createAnalyser();an.fftSize=8192;an.smoothingTimeConstant=0.76;
      src.connect(an);AR.current.micStream=stream;AR.current.analyser=an;

      if(tr){
        const lbl=(tr.label||'(unknown mic)').substring(0,40);
        addLog('[MIC] Opened: '+lbl);
      }
      // Self-test: after ~300 ms check if any frequency data is arriving.
      // If nothing, the OS is routing the stream to a muted device.
      setTimeout(()=>{
        if(!AR.current.analyser) return;
        const fd=new Uint8Array(AR.current.analyser.frequencyBinCount);
        AR.current.analyser.getByteFrequencyData(fd);
        let peak=0;for(let i=0;i<fd.length;i++)if(fd[i]>peak)peak=fd[i];
        if(peak<2) addLog('[MIC] Warning: no signal detected. Check system mic permissions / input device.');
        else addLog('[MIC] Signal OK (peak '+peak+'/255). Play — AI follows.');
      }, 300);
    }catch(e){
      const name=(e&&e.name)||'Error';
      if(name==='NotAllowedError')      addLog('[MIC] Permission denied. Allow mic in browser/OS settings.');
      else if(name==='NotFoundError')   addLog('[MIC] No mic found on this device.');
      else if(name==='NotReadableError')addLog('[MIC] Mic busy. Another app is using it — close & retry.');
      else                              addLog('[MIC] Error: '+name);
    }
  };

  // -- SECTION MUTE ----------------------------------------------------------
  const toggleMute=role=>{

      hap.mute();

  // -- PER-INSTRUMENT RESEED -----------------------------------------------
  // Each instrument can be reseeded independently in case one voice is
  // ruining the groove. Drums split further into kick/snare/hat so a bad
  // kick tone or snare placement can be rerolled without touching the hat.
  const reseedInstrument=(which)=>{
    if(which==='kick'||which==='snare'||which==='hat'){
      reseedDrum(which);
      reseedDrumPattern(which);
      addLog(`[RESEED] ${which.toUpperCase()} reshuffled.`);
    } else if(which==='drum'){
      reseedDrum('kick'); reseedDrum('snare'); reseedDrum('hat');
      reseedDrumPattern('all');
      addLog('[RESEED] Drum kit reshuffled.');
    } else if(which==='bass'||which==='mid'||which==='lead'){
      const v=voicesRef.current[which];
      if(v){ v.lastNote=null; v.glow=0; v.winding=Math.max(0, v.winding*0.4); }
      // Soft-reset brain weights for that role -- clears recent phrase memory
      // without wiping learned voicings.
      try{
        if(brain&&brain.q){
          const prefix=which+'_';
          Object.keys(brain.q).forEach(k=>{ if(k.indexOf(prefix)===0) brain.q[k]=brain.q[k]*0.25; });
        }
      }catch(_){}
      // Bass / mid / lead reseeds also advance the live timbre so the user
      // hears a different instrument immediately, not just fresh vocab.
      if(which==='bass' && typeof reseedBassKit === 'function'){
        reseedBassKit();
        addLog(`[RESEED] BASS mode -> ${_bassKit.mode}`);
      } else if(which==='mid' && typeof bumpMidCharacter === 'function'){
        bumpMidCharacter();
        const sp = (typeof styleP==='function') ? styleP() : null;
        const bank = (sp && sp.midBank) || ['grand-piano'];
        const idx = Math.abs((Math.floor((AR.current.measureCount||0)/4)+_midCharBump)) % bank.length;
        addLog(`[RESEED] MID character -> ${bank[idx]}`);
      } else if(which==='lead' && typeof bumpLeadMode === 'function'){
        bumpLeadMode();
        const sp = (typeof styleP==='function') ? styleP() : null;
        const bank = (sp && sp.leadBank) || [sp?.leadMode || 'saw'];
        const idx = Math.abs((Math.floor((AR.current.measureCount||0)/4)+_leadModeBump)) % bank.length;
        addLog(`[RESEED] LEAD mode -> ${bank[idx]}`);
      } else {
        addLog(`[RESEED] ${which.toUpperCase()} vocabulary shuffled.`);
      }
    } else if(which==='all'){
      reseedDrum('kick'); reseedDrum('snare'); reseedDrum('hat');
      reseedDrumPattern('all');
      ['bass','mid','lead'].forEach(r=>reseedInstrument(r));
      addLog(`[RESEED] Full band reshuffled. Kick=${_drumRecipes.kick} Snare=${_drumRecipes.snare} Hat=${_drumRecipes.hat} Bass=${_bassKit.mode}`);
    }
    hap.tap();
  };

  // -- REHARM ----------------------------------------------------------------
  const reharm=type=>{
    AR.current.chordType=type;setCChord(type);
    const label=CHORDS[type]?.label||type;
    addLog(`Reharm -> ${label}`);
    hap.chordQuality(type);
  };

  // -- RESTART BAND ----------------------------------------------------------
  // -- BAR-QUANTIZED INPUT -----------------------------------------------
  // All user inputs (chord changes, flips, key changes) are buffered here
  // and applied at the next bar boundary. This prevents mid-bar jarring
  // transitions and lets the band finish the current rhythmic phrase.
  const barQueueRef=useRef([]);
  const lastBarBeatRef=useRef(0);

  const queueInput=(fn, label)=>{
    barQueueRef.current.push({fn, label, queued:Date.now()});
    addLog('[Q] '+label+' queued -- applies at next bar');
  };

  // Called by scheduler on beat===0 to flush queued inputs
  const flushBarQueue=()=>{
    const q=barQueueRef.current;
    if(!q.length)return;
    barQueueRef.current=[];
    q.forEach(function(item){
      try{ item.fn(); addLog('[Q] Applied: '+item.label); }
      catch(e){ console.error('[Q] Failed:',e); }
    });
  };

  // -- FLIP HANDLERS ----------------------------------------------------------
  const doFlipInversion=()=>{
    const ar=AR.current;
    const res=flipEngine.chordInversion(ar.chordType, ar.lockedRoot??ar.rootMidi);
    ar.lockedRoot=res.newRoot; ar.rootMidi=res.newRoot;
    setDMidi(res.newRoot);
    setFlipLabel(res.label);
    addLog('[FLIP] '+res.label+' -- root: '+midiToNote(res.newRoot));
    hap.chordQuality(ar.chordType);
    setTimeout(()=>setFlipLabel(''),2000);
  };

  const doFlipProgression=()=>{
    const ar=AR.current;
    // Collect last 4 chord changes from progression memory window
    const win=progressionMemory.window.slice(-4);
    const res=flipEngine.progressionInversion(win);
    if(!res){addLog('[FLIP] Not enough progression history yet');return;}
    // Queue the reversed sequence -- play each chord for 1 measure
    let delay=0;
    res.sequence.forEach(function(ct){
      setTimeout(function(){
        if(CHORDS[ct]){ar.chordType=ct;setCChord(ct);}
      }, delay*((60000/(ar.lockedBpm||ar.bpm))*ar.stepsPerMeasure/4));
      delay++;
    });
    setFlipLabel(res.label);
    addLog('[FLIP] '+res.label);
    hap.motif();
    setTimeout(()=>setFlipLabel(''),4000);
  };

  const doFlipTritone=()=>{
    const ar=AR.current;
    const res=flipEngine.tritoneSubstitution(ar.chordType, ar.lockedRoot??ar.rootMidi);
    ar.chordType=res.newChord; setCChord(res.newChord);
    ar.lockedRoot=res.newRoot; ar.rootMidi=res.newRoot;
    setDMidi(res.newRoot);
    setFlipLabel(res.label);
    addLog('[FLIP] '+res.label);
    hap.keyChange();
    setTimeout(()=>setFlipLabel(''),2500);
    // reward the new chord to reinforce this direction
    brain.auto('mid',(CHORDS[res.newChord]||CHORDS.maj).iv,ar.chaos,res.newChord);
  };

  const restartBand=()=>{
    if(!isPlaying)return;
    clearTimeout(AR.current.timerID);
    AR.current.current16thNote=0;AR.current.rhythmHistory={};
    AR.current.nextNoteTime=AR.current.ctx.currentTime+0.05;
    scheduler();
    addLog('Band restarted. Locked state preserved.');
    hap.restart();
  };
  // -- IN-APP RECORDING ----------------------------------------------------------
  const toggleRecording=async()=>{
    unlockHaptics();
    if(isRecording){
      if(mediaRecorderRef.current)mediaRecorderRef.current.stop();
      setIsRecording(false);
      return;
    }
    try{
      const ar=AR.current;
      if(!ar.ctx){addLog('Start band first to record');return;}
      const dest=ar.ctx.createMediaStreamDestination();
      if(bus&&bus.master)bus.master.connect(dest);
      const mr=new MediaRecorder(dest.stream,{mimeType:'audio/webm;codecs=opus'});
      recordChunksRef.current=[];
      mr.ondataavailable=function(e){if(e.data.size>0)recordChunksRef.current.push(e.data);};
      mr.onstop=function(){
        const blob=new Blob(recordChunksRef.current,{type:'audio/webm'});
        const url=URL.createObjectURL(blob);
        setRecordingUrl(url);
        addLog('Recording saved -- tap Download to save');
      };
      mr.start(100);
      mediaRecorderRef.current=mr;
      setIsRecording(true);
      addLog('Recording started...');
    }catch(err){addLog('Recording error: '+err.message);}
  };

  // -- BILLBOARD RECORDING ----------------------------------------------------
  // Starts a fixed-duration recording of the master bus + four per-voice
  // stems (drum, bass, mid, lead) in parallel. At stop, stashes blob URLs
  // per entry id and pushes a new metadata record into the billboard module.
  const startBillboardRecord = async () => {
    const ar = AR.current;
    if(!ar.ctx || !bus || !bus.master){ addLog('Start the band first -- nothing to record.'); return; }
    if(bbRec.on){ addLog('Billboard: already recording.'); return; }
    const dur = Math.max(5, Math.min(90, bbForm.duration|0));
    try{
      const ctx = ar.ctx;
      const streams = {
        master: ctx.createMediaStreamDestination(),
        drum:   ctx.createMediaStreamDestination(),
        bass:   ctx.createMediaStreamDestination(),
        mid:    ctx.createMediaStreamDestination(),
        lead:   ctx.createMediaStreamDestination(),
      };
      bus.master.connect(streams.master);
      if(bus.drumBus) bus.drumBus.connect(streams.drum);
      if(bus.bassBus) bus.bassBus.connect(streams.bass);
      if(bus.midBus)  bus.midBus.connect(streams.mid);
      if(bus.leadBus) bus.leadBus.connect(streams.lead);
      const chunks = {master:[], drum:[], bass:[], mid:[], lead:[]};
      const mrs = {};
      for(const k of Object.keys(streams)){
        const mr = new MediaRecorder(streams[k].stream, {mimeType:'audio/webm;codecs=opus'});
        mr.ondataavailable = e => { if(e.data && e.data.size>0) chunks[k].push(e.data); };
        mr.start(100);
        mrs[k] = mr;
      }
      bbActiveRecRef.current = {mrs, streams, chunks, start:Date.now(), dur};
      setBbRec({on:true, remaining:dur});

      const tick = setInterval(()=>{
        const rem = dur - Math.floor((Date.now()-bbActiveRecRef.current.start)/1000);
        if(rem <= 0){ clearInterval(tick); finish(); }
        else setBbRec({on:true, remaining:rem});
      }, 500);

      const finish = async ()=>{
        try{
          for(const mr of Object.values(mrs)){ try{ mr.stop(); }catch(_){} }
          // Wait for final dataavailable flushes
          await new Promise(r=>setTimeout(r, 180));
          for(const k of Object.keys(streams)){
            try{
              if(k==='master') bus.master.disconnect(streams[k]);
              else if(bus[k+'Bus']) bus[k+'Bus'].disconnect(streams[k]);
            }catch(_){}
          }
          const blobs = {};
          for(const k of Object.keys(chunks)){
            blobs[k] = chunks[k].length ? new Blob(chunks[k], {type:'audio/webm'}) : null;
          }
          const entry = await billboard.add({
            title: bbForm.title || 'Untitled '+new Date().toLocaleTimeString(),
            genre: bbForm.genre,
            socials: bbForm.socials,
            master: blobs.master ? {dur, sr: ctx.sampleRate, ch: 2} : null,
            stems:  {
              drum: blobs.drum ? {dur, sr: ctx.sampleRate, ch: 2} : null,
              bass: blobs.bass ? {dur, sr: ctx.sampleRate, ch: 2} : null,
              mid:  blobs.mid  ? {dur, sr: ctx.sampleRate, ch: 2} : null,
              lead: blobs.lead ? {dur, sr: ctx.sampleRate, ch: 2} : null,
            },
          });
          bbBlobsRef.current[entry.id] = {
            master: blobs.master ? URL.createObjectURL(blobs.master) : null,
            stems: {
              drum: blobs.drum ? URL.createObjectURL(blobs.drum) : null,
              bass: blobs.bass ? URL.createObjectURL(blobs.bass) : null,
              mid:  blobs.mid  ? URL.createObjectURL(blobs.mid)  : null,
              lead: blobs.lead ? URL.createObjectURL(blobs.lead) : null,
            },
            rawBlobs: blobs,
          };
          setBbEntries(Array.isArray(billboard.entries)?billboard.entries.slice():[]);
          setBbRec({on:false, remaining:0});
          collectiveBrainSave();
          // Opt-in cloud sync: if bandx.cloudUrl is set, upload metadata to
          // the worker so this entry counts toward the global Top-10.
          billboard.cloudUpload(entry).then(ok=>{
            if(ok) addLog('[BILLBOARD] Synced to cloud.');
          });
          addLog('[BILLBOARD] Track saved: '+entry.title+' ('+entry.genre+')');
        }catch(e){
          console.warn('[billboard] finish failed', e);
          setBbRec({on:false, remaining:0});
        }
      };
    }catch(err){ addLog('Billboard record error: '+err.message); setBbRec({on:false, remaining:0}); }
  };

  const rateBillboard = (entryId, voice, stars) => {
    billboard.rate(entryId, voice, stars);
    setBbEntries(Array.isArray(billboard.entries)?billboard.entries.slice():[]);
    collectiveBrainSave();
    billboard.cloudRate(entryId, voice, stars);
  };

  const deleteBillboardEntry = (entryId) => {
    billboard.remove(entryId);
    const b = bbBlobsRef.current[entryId];
    if(b){
      [b.master, b.stems?.drum, b.stems?.bass, b.stems?.mid, b.stems?.lead]
        .forEach(u => { try{ if(u) URL.revokeObjectURL(u); }catch(_){} });
      delete bbBlobsRef.current[entryId];
    }
    setBbEntries(Array.isArray(billboard.entries)?billboard.entries.slice():[]);
    collectiveBrainSave();
  };

  // "Remix" the #1 champion: loads its stems as drum/mid samples so the user
  // can jam over them. The user's new recording becomes a competition entry.
  const remixChampion = (entryId) => {
    const e = billboard.entries.find(x=>x.id===entryId); if(!e) return;
    const b = bbBlobsRef.current[entryId]; if(!b){ addLog('[BILLBOARD] Stems unavailable (memory-only).'); return; }
    (async ()=>{
      try{
        const ctx = AR.current.ctx || new (window.AudioContext||window.webkitAudioContext)();
        const loadTo = async (blob, slot)=>{
          if(!blob) return;
          const ab = await ctx.decodeAudioData(await blob.arrayBuffer());
          setDrumSample(slot, ab);
        };
        if(b.rawBlobs){
          await loadTo(b.rawBlobs.drum, 'kick');   // drop drum stem into kick slot
          await loadTo(b.rawBlobs.mid,  'mid');
        }
        addLog('[BILLBOARD] Remix mode: stems from "'+e.title+'" loaded. Start jamming, record with Record Billboard.');
      }catch(err){ addLog('Remix load failed: '+err.message); }
    })();
  };

  const downloadBillboardBlob = (entryId, voice) => {
    const b = bbBlobsRef.current[entryId]; if(!b){ addLog('Blob unavailable.'); return; }
    const url = voice==='master' ? b.master : b.stems?.[voice];
    if(!url){ addLog('No '+voice+' stem.'); return; }
    const e = billboard.entries.find(x=>x.id===entryId);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${(e?.title||'track').replace(/\s+/g,'_')}-${voice}.webm`;
    document.body.appendChild(a); a.click(); a.remove();
  };

  // -- PHRASE RECORDING -------------------------------------------------------
  const startPhrase=()=>{
    motifEng.startPhrase();
    setPhraseRecording(true);
    addLog('[REC] Phrase started -- sing your motif now');
    hap.tap();
  };

  const endPhrase=()=>{
    const result=motifEng.endPhrase();
    setPhraseRecording(false);
    if(!result){addLog('[REC] Too short -- sing at least 3 notes');return;}
    // Echo detection: how much does the user's phrase match what the band
    // was just playing? >= 0.65 = clear echo.
    try{
      const echoScore = motifEng.userEchoScore();
      motifEng.lastUserEchoScore = echoScore;
      if(echoScore >= 0.65){
        addLog(`[ECHO] User echoed the band (${Math.round(echoScore*100)}%)`);
      }
    }catch(_){}
    setLastPhrase(result);
    setCompletedPhrases(p=>[result,...p].slice(0,8));
    improvState.phrases.push(result);
    // Apply detected time sig to scheduler
    const ts=motifEng.dominantTimeSig();
    if(ts>=2&&ts<=9){
      AR.current.stepsPerMeasure=ts*4;
      setTS(ts*4);
    }
    // Apply reharmonization suggestion
    if(result.reharmonSuggestion){
      AR.current.chordType=result.reharmonSuggestion;
      setCChord(result.reharmonSuggestion);
    }
    // Billboard entry
    setBillboard(prev=>{
      const entry={
        rank:prev.length+1,
        key:NOTE_NAMES[result.root],
        chord:result.reharmonSuggestion,
        timeSig:result.timeSig,
        hasTA:result.hasTA,
        t:new Date().toLocaleTimeString(),
        ivs:result.ivs.slice(0,4).map(function(v){return v>0?'+'+v:String(v);}).join(' ')
      };
      return [entry,...prev].slice(0,10);
    });
    addLog(`[REC] Phrase done: key=${NOTE_NAMES[result.root]} chord=${result.reharmonSuggestion} time=${result.timeSig}/4${result.hasTA?' TURNAROUND':''} inv=${result.inversion}`);
    // Save phrase locally for memory
    genesisLocal.put('phrases',{root:result.root,ivs:result.ivs,timeSig:result.timeSig,
      reharmonSuggestion:result.reharmonSuggestion,hasTA:result.hasTA,
      inversion:result.inversion,_ts:Date.now()});
    hap.motif();
    if(!isPlayRef.current)startBand();
  };

  // -- SONG UPLOAD ------------------------------------------------------------
  const handleUpload=async(e)=>{
    const file=e.target.files[0]; if(!file)return;
    setUploadStatus('Analyzing...');
    try{
      if(!AR.current.ctx)AR.current.ctx=(()=>{const SR=DeviceComp.score<0.45?22050:44100;try{return new(window.AudioContext||window.webkitAudioContext)({sampleRate:SR,latencyHint:'playback'});}catch(e){return new(window.AudioContext||window.webkitAudioContext)();}})();
      if(AR.current.ctx.state==='suspended')await AR.current.ctx.resume();
      const ab=await file.arrayBuffer();
      const audio=await AR.current.ctx.decodeAudioData(ab);
      // Analyze: extract tempo via onset detection on downmixed buffer
      const ch=audio.getChannelData(0);
      const sr=audio.sampleRate;
      const hop=Math.floor(sr*0.01); // 10ms hop
      const onsets=[];
      let prev=0;
      for(let i=0;i<ch.length-hop;i+=hop){
        let rms=0;for(let j=0;j<hop;j++)rms+=ch[i+j]*ch[i+j];
        rms=Math.sqrt(rms/hop);
        if(rms>prev*1.5&&rms>0.02&&(onsets.length===0||i/sr-onsets[onsets.length-1]>0.15))
          onsets.push(i/sr);
        prev=rms*0.85+prev*0.15;
      }
      // Estimate tempo from onset intervals
      let detectedBpm=120;
      if(onsets.length>4){
        const gaps=onsets.slice(1).map((ot,oi)=>ot-onsets[oi]);
        const med=gaps.sort((a,b)=>a-b)[Math.floor(gaps.length/2)];
        detectedBpm=Math.round(60/med);
        if(detectedBpm<40)detectedBpm*=2;
        if(detectedBpm>200)detectedBpm=Math.round(detectedBpm/2);
        detectedBpm=Math.max(60,Math.min(200,detectedBpm));
      }
      // Estimate key from spectral centroid per chroma bin (simplified)
      const fftSize=2048;
      const chroma=new Array(12).fill(0);
      for(let i=0;i<Math.min(ch.length,sr*10);i+=fftSize){
        const slice=ch.slice(i,i+fftSize);
        for(let j=0;j<slice.length;j++){
          if(Math.abs(slice[j])>0.01){
            const pitchEst=Math.round(69+12*Math.log2(Math.max(0.001,Math.abs(slice[j]))*440/0.02));
            chroma[((pitchEst%12)+12)%12]+=Math.abs(slice[j]);
          }
        }
      }
      const detectedRoot=chroma.indexOf(Math.max(...chroma));
      improvState.uploadedKey=detectedRoot;
      improvState.uploadedTempo=detectedBpm;
      AR.current.rootMidi=60+detectedRoot;
      AR.current.bpm=detectedBpm;
      setBpm(detectedBpm);
      setDMidi(60+detectedRoot);
      addLog(`Song analyzed: ${NOTE_NAMES[detectedRoot]} @ ${detectedBpm}BPM -- band locked to song`);
      setUploadStatus(`${NOTE_NAMES[detectedRoot]} @ ${detectedBpm}BPM`);
      if(!isPlayRef.current)startBand();
    }catch(err){
      setUploadStatus('Error: '+err.message);
      addLog('Upload failed: '+err.message);
    }
  };

  // -- HAPTIC MODES ----------------------------------------------------------
  const hapticModeDescriptions={
    standard:'Light tap per hit',
    bass:'Long deep pulse on every beat (best for deaf users)',
    rhythm:'Full rhythm pattern vibrated each measure',
    chord:'Chord quality encoded in vibration pattern',
  };

  // -- TAP PAD ---------------------------------------------------------------
  const tapRef=useRef({times:[],lastTap:0});
  const handleTap=useCallback(async(e,x,y)=>{
    e.preventDefault();
    if(hapticModeRef.current==='bass')hap.subBass(AR.current.bpm);
    else hap.tap();

    setTapPulse(true);setTimeout(()=>setTapPulse(false),260);

    if(!AR.current.ctx)AR.current.ctx=(()=>{const SR=DeviceComp.score<0.45?22050:44100;try{return new(window.AudioContext||window.webkitAudioContext)({sampleRate:SR,latencyHint:'playback'});}catch(e){return new(window.AudioContext||window.webkitAudioContext)();}})();
    if(AR.current.ctx.state==='suspended')await AR.current.ctx.resume();
    bus.init(AR.current.ctx);

    const now=Date.now();const tap=tapRef.current;
    if(now-tap.lastTap>3000)tap.times=[];
    tap.times.push(now);tap.lastTap=now;setTapCount(tap.times.length);

    // Visual tap dot on tap canvas
    const rect=e.currentTarget?.getBoundingClientRect?.();
    const tx=rect?(e.clientX-rect.left)/rect.width:0.5;
    const ty=rect?(e.clientY-rect.top)/rect.height:0.5;
    tapVizRef.current.push({x:tx,y:ty,t:now,intensity:1});
    // Also register as input energy for hands-free detection
    AR.current.inputEnergy=1.0;
    setInputEnergy(1.0);setTimeout(()=>{AR.current.inputEnergy=0;setInputEnergy(0);},200);

    if(tap.times.length>=4){
      const result=motifEng.addOnset(now);
      if(result){
        const{bpm:tb,swingPct,subdivisions:sub}=result;
        if(tb>=30&&tb<=280){
          setBpm(tb);AR.current.bpm=tb;
          if(Math.abs(tb-bpm)>6){setTCFlag(true);setTimeout(()=>setTCFlag(false),1500);}
        }
        if(swingPct>0){setSwing(swingPct);AR.current.swing=swingPct;setDSwing(swingPct);}
        setSubdivisions(sub||2);
        const subLabel={1:'whole',2:'8th',3:'triplet/jazz',4:'16th',5:'quintuplet',6:'sextuplet',7:'septuplet'};
        if(sub>2)addLog(`Rhythm: ${subLabel[sub]||sub+'-tuplet'} feel`);
      }
    }else{
      motifEng.addOnset(now); // always register onset, result only used after 4+
    }

    if(!isPlayRef.current)startBand();
  },[bpm]);

  // -- START / STOP ----------------------------------------------------------
  // - PRE-RENDER ENGINE -
  // Renders 60s of audio ahead using OfflineAudioContext.
  // While it plays, renders the next chunk in background.
  // Visual frames pre-computed as lightweight state snapshots.
  const preRenderRef=useRef({
    // -- DOUBLE BUFFER --------------------------------------------------
    // playingBuffer: currently playing AudioBufferSourceNode
    // nextBuffer:    already rendered, ready to swap in with zero gap
    // endAR:         AR snapshot at end of current chunk (for next chunk)
    playingSource:null,
    nextBuffer:null,
    nextVisualFrames:[],
    endAR:null,          // AR state at end of playing chunk
    renderingNext:false, // is the background render running?
    chunkSec:30,         // chunk duration in seconds
    // -- VISUAL PLAYBACK ------------------------------------------------
    visualFrames:[],
    frameIdx:0,
    playStartCtxTime:0,
  });

  // Simulate the band brain forward in time, collecting events
  // Returns {events, visualFrames} -- pure computation, no audio nodes
  const simulateBand=(durationSec, startAR, startBrainState)=>{
    const SR = DeviceComp.score<0.45?22050:44100;
    const ar = {...startAR, ctx:{currentTime:0, sampleRate:SR}};
    const bpm = ar.lockedBpm||ar.bpm||110;
    const spb = 60.0/(bpm*(ar.warpMultiplier||1));
    const stepDur = 0.25*spb;
    const totalSteps = Math.ceil(durationSec/stepDur)+4;
    const events=[]; // {t, type, note, velocity, voice, chordType, rootMidi}
    const visualFrames=[]; // sampled at ~30fps
    const FPS=30;
    const frameDur=1/FPS;
    let nextFrameT=0;

    // Lightweight brain clone -- just the Q table for note choices
    const qClone={...startBrainState};
    const choose=(role,opts,chaos,ct)=>{
      if(!opts||!opts.length)return opts[0];
      let b=opts[0],bw=-Infinity;
      for(const v of opts){
        const k=`${role}_${((v%12)+12)%12}_${ct}`;
        const w=((qClone[k]??0.5)*0.7+(qClone[`${role}_${((v%12)+12)%12}_global`]??0.5)*0.3);
        if(w>bw){bw=w;b=v;}
      }
      return b;
    };

    let simChordType=ar.chordType||'maj';
    let simRoot=ar.rootMidi||60;
    let simMeasure=ar.measureCount||0;
    let simMeasuresOnChord=ar.measuresThisChord||0;
    let simMeasuresPerChord=ar.measuresPerChord||4;
    let simPhrase=ar.targetChordSeq?[...ar.targetChordSeq]:[];
    let simPhrasePos=ar.phrasePosition||0;
    let simGroove=ar._groove||bandTaste.pickArchetype();
    let simPhaseLabel=ar.structurePhase||'intro';
    const simVoices={drum:{w:0},bass:{w:0,last:null},mid:{w:0},lead:{w:0,last:null}};
    const simMutes={}; // offline sim always plays all voices

    for(let step=0;step<totalSteps;step++){
      const t=step*stepDur;
      if(t>=durationSec)break;
      const beat=step%((ar.stepsPerMeasure||16));

      // Measure boundary
      if(beat===0){
        simMeasure++;
        simMeasuresOnChord++;
        simGroove=bandTaste.pickArchetype();
        if(simMeasuresOnChord>=simMeasuresPerChord){
          if(!simPhrase.length){
            simPhrase=structureEngine.buildPhrase(simChordType,ar.chaos||0.3,bandTaste.darkness,brain);
          }
          simPhrasePos=(simPhrasePos+1)%simPhrase.length;
          simChordType=simPhrase[simPhrasePos]||simChordType;
          simMeasuresOnChord=0;
          simMeasuresPerChord=structureEngine.chordDuration(ar.chaos||0.3,simPhaseLabel,brain.n);
          simPhaseLabel=structureEngine.advanceSection(Math.floor(simMeasure/4));
          if(simPhrasePos===0)simPhrase=structureEngine.buildPhrase(simChordType,ar.chaos||0.3,bandTaste.darkness,brain);
        }
      }

      const ct=CHORDS[simChordType]||CHORDS.maj;
      const chaos=ar.chaos||0.3;
      const density=ar.density||0.55;
      const b16=beat%16;

      // Drums with motif shaping
      if(!simMutes.drum){
        const simMotif = structureEngine.motifPhase(simMeasuresOnChord);
        const kMod = simMotif==='call'?1.2:simMotif==='response'?0.65:simMotif==='turnaround'?1.4:1;
        const sMod = simMotif==='call'?1.0:simMotif==='response'?0.80:simMotif==='turnaround'?1.6:1;
        const hMod = simMotif==='call'?0.9:simMotif==='response'?1.30:simMotif==='turnaround'?0.7:1;
        const kP=bandTaste.stepProb('k',b16,simGroove,chaos)*kMod;
        const sP=bandTaste.stepProb('s',b16,simGroove,chaos)*sMod;
        const hP=bandTaste.stepProb('h',b16,simGroove,chaos)*0.85*hMod;
        if(beat===0||Math.random()<kP) events.push({t,type:'kick',v:0.8+Math.random()*0.2});
        if(beat===8||Math.random()<sP) events.push({t,type:'snare',v:0.6+Math.random()*0.3});
        if(Math.random()<hP){
          const isDesignatedOpen = bandTaste.isOpenStep(b16, simGroove);
          const openH=Math.random()<(isDesignatedOpen ? 0.55+chaos*0.25 : chaos*0.12)*(simGroove==='jazzSwing'?1.8:simGroove==='bossaNova'?1.3:1);
          const isCrash=openH&&chaos>0.65&&Math.random()<0.18;
          events.push({t,type:'hat',v:0.3+Math.random()*0.4,open:openH,isCrash});
        }
        // Crash on turnaround downbeat
        if(simMotif==='turnaround'&&beat===0&&simMeasuresOnChord===1&&Math.random()<0.5)
          events.push({t,type:'crash',v:0.7});
      }

      // Sub bass on downbeats -- raised one octave per user request (C2-C4).
      if(!simMutes.bass&&(beat===0||(beat===8&&Math.random()<0.75))){
        const subPC=((simRoot)%12+12)%12;
        let sn=36+subPC; while(sn<36)sn+=12; while(sn>48)sn-=12;
        events.push({t,type:'sub',note:sn,chordType:simChordType});
      }
      // Bass (simplified -- pitch class + register). Raised one octave.
      if(!simMutes.bass&&(beat===0||beat===4||beat===8||beat===12||Math.random()<density*0.3)){
        const bassPC=((simRoot+choose('bass',[0,5,7],chaos,simChordType))%12+12)%12;
        let n=36+bassPC; while(n<40)n+=12; while(n>64)n-=12;
        events.push({t,type:'bass',note:n,chordType:simChordType,bassMode:styleP().bassMode,prevNote:simVoices.bass.last||n});
        simVoices.bass.last=n;
      }

      // Mid chord (less frequent)
      if(!simMutes.mid&&(beat===0||Math.random()<chaos*0.4*density)){
        const ivs=ct.iv.slice(0,3);
        const notes=ivs.map(v=>{let n2=simRoot+v;while(n2<48)n2+=12;while(n2>72)n2-=12;return n2;});
        events.push({t,type:'mid',notes,chordType:simChordType,midMode:styleP().midMode});
      }

      // Wood percussion events (African + Indian genres)
      if(styleP().woodPerc && !simMutes.drum && Math.random()<0.65){
        const _wv=0.35+Math.random()*0.50;
        const _wp=0.8+Math.random()*0.5;
        const _wt=t+(Math.random()-0.5)*styleP().microJitter*3;
        events.push({t:Math.max(0,_wt),type:'woodperc',velocity:_wv,pitch:_wp});
      }

      // Lead (sparse)
      if(!simMutes.lead&&Math.random()<density*0.35){
        const iv=choose('lead',ct.iv.map(v=>v+12),chaos,simChordType);
        let ln=simRoot+iv; while(ln<60)ln+=12; while(ln>84)ln-=12;
        events.push({t,type:'lead',note:ln,chordType:simChordType});
        simVoices.lead.last=ln;
      }

      // Visual frame snapshot
      if(t>=nextFrameT){
        visualFrames.push({
          t, beat, chordType:simChordType, rootMidi:simRoot,
          chaos, density, phase:simPhaseLabel,
          groove:simGroove,
          drumW:simVoices.drum.w, bassW:simVoices.bass.w,
          midW:simVoices.mid.w, leadW:simVoices.lead.w,
          kick:events[events.length-1]?.type==='kick',
          snare:events[events.length-1]?.type==='snare',
        });
        nextFrameT+=frameDur;
        // Update voice winding (fake)
        simVoices.drum.w=Math.min(10,(simVoices.drum.w||0)*0.97+0.2);
        simVoices.bass.w=Math.min(10,(simVoices.bass.w||0)*0.97+0.15);
        simVoices.mid.w=Math.min(10,(simVoices.mid.w||0)*0.97+0.1);
        simVoices.lead.w=Math.min(10,(simVoices.lead.w||0)*0.97+0.08);
      }
    }
    return{
      events, visualFrames,
      endChordType:     simChordType,
      endRoot:          simRoot,
      endMeasure:       simMeasure,
      endMeasuresOnChord: simMeasuresOnChord,
      endMeasuresPerChord: simMeasuresPerChord,
      endPhrase:        simPhrase,
      endPhrasePos:     simPhrasePos,
      endPhaseLabel:    simPhaseLabel,
      endGroove:        simGroove,
    };
  };

  // Render events into an OfflineAudioContext and return an AudioBuffer
  const renderEventsToBuffer=async(events,durationSec,baseAR)=>{
    const SR=22050; // always use 22050 for offline render -- halves computation
    const offCtx=new OfflineAudioContext(2,Math.ceil(SR*durationSec),SR);
    const offBus=new AudioBus();
    offBus.init(offCtx, true); // lean=true: skip reverb/delay/chorus for speed

    for(const ev of events){
      const t=ev.t;
      const warp=baseAR.warpMultiplier||1;
      const chaos=baseAR.chaos||0.3;
      try{
        if(ev.type==='kick')   synthKick(offCtx,t,warp,offBus.getInput('drum'),0.5);
        if(ev.type==='snare')  synthSnare(offCtx,t,chaos,warp,offBus.getInput('drum'),0.5);
        if(ev.type==='hat')    synthHat(offCtx,t,ev.open||false,chaos,warp,offBus.getInput('drum'),0.3);
        if(ev.type==='crash')  synthCrash(offCtx,t,chaos,warp,offBus.getInput('drum'),ev.v||0.6);
        if(ev.type==='sub')    synthSubBass(offCtx,t,ev.note,chaos,warp,0.05,0,offBus.getInput('sub'));
        if(ev.type==='bass'){
          const _bm=ev.bassMode||styleP().bassMode||'electric';
          const _bd=offBus.getInput('bass');
          if(_bm==='808')         synth808(offCtx,t,ev.note,chaos,warp,0.05,_bd);
          else if(_bm==='upright')synthUprightBass(offCtx,t,ev.note,chaos,warp,0.05,_bd);
          else if(_bm==='gfunk')  synthGFunkBass(offCtx,t,ev.note,chaos,warp,0.05,ev.prevNote||ev.note,_bd);
          else if(_bm==='boombap')synthBoomBapBass(offCtx,t,ev.note,chaos,warp,0.05,_bd);
          else if(_bm==='afrosub')synthAfroSub(offCtx,t,ev.note,chaos,warp,0.5,0.05,_bd);
          else if(_bm==='tanpura')synthTanpuraBass(offCtx,t,ev.note,chaos,warp,0.05,_bd);
          else                    synthBass(offCtx,t,ev.note,chaos,warp,0.05,0.5,0,_bd);
        }
        if(ev.type==='mid'&&ev.notes){
          const _midm=ev.midMode||styleP().midMode||'keys';
          if(_midm==='rhodes') synthRhodes(offCtx,t,ev.notes,ev.chordType,chaos,warp,offBus.getInput('mid'),0.05);
          else synthMid(offCtx,t,ev.notes,ev.chordType,chaos,warp,offBus.getInput('mid'),0.05);
        }
        if(ev.type==='woodperc') synthWoodPerc(offCtx,t,ev.velocity||0.6,ev.pitch||1,warp,offBus.getInput('drum'));
        if(ev.type==='lead')   synthLead(offCtx,t,ev.note,chaos,warp,offBus.getInput('lead'),0.05);
      }catch(e){}
    }
    return await offCtx.startRendering();
  };



  // ── TAP MOTIF HANDLER ─────────────────────────────────────────────────────
  const handleConfigTap = () => {
    const now = Date.now();
    const times = tapTimesRef.current;
    // Reset if >3s since last tap
    if(times.length > 0 && now - times[times.length-1] > 3000){
      tapTimesRef.current = []; setTapTimes([]);
    }
    times.push(now);
    tapTimesRef.current = [...times];
    setTapTimes([...times]);
    clearTimeout(tapResetRef.current);

    if(times.length >= 4){
      // Compute inter-tap intervals
      const intervals = [];
      for(let i=1;i<times.length;i++) intervals.push(times[i]-times[i-1]);
      const avgInterval = intervals.reduce((a,b)=>a+b,0)/intervals.length;
      const bpm = Math.round(60000/avgInterval);
      // Detect pattern: normalize intervals to shortest unit
      const minInterval = Math.min(...intervals);
      const pattern = intervals.map(iv=>Math.round(iv/minInterval));
      // Bars: how many 4-beat groups do the taps span?
      const totalMs = times[times.length-1]-times[0];
      const beatsPerMs = bpm/60000;
      const totalBeats = totalMs*beatsPerMs;
      const bars = Math.max(1, Math.round(totalBeats/4));
      const clampedBpm = Math.max(60, Math.min(200, bpm));
      setTapMotif({bpm:clampedBpm, pattern, bars, intervals, tapCount:times.length});
      setTrackConfig(c=>({...c, bpm:clampedBpm}));
      // Save tap pattern into motifEngine
      try{ motifEng.record({intervals:intervals.map(ms=>ms/1000), type:'tap'}); }catch(e){}
    }

    // Auto-commit after 2s silence
    tapResetRef.current = setTimeout(()=>{
      if(tapTimesRef.current.length>0){ setTapTimes([]); tapTimesRef.current=[]; }
    }, 2500);
  };

  // ── CONFIG MIC: record + full analysis ────────────────────────────────────
  const startConfigMic = async () => {
    const ref = configMicRef.current;
    if(ref.stream) return;
    setMicRecording(true); setMicAnalysis(null); setMicProgress('Listening...');
    try{
      const stream = await navigator.mediaDevices.getUserMedia({
        audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false,sampleRate:44100}
      });
      const ctx = new(window.AudioContext||window.webkitAudioContext)({sampleRate:44100});
      const src = ctx.createMediaStreamSource(stream);
      const an  = ctx.createAnalyser(); an.fftSize=8192; an.smoothingTimeConstant=0.7;
      src.connect(an);
      ref.stream=stream; ref.ctx=ctx; ref.analyser=an;
      ref.onsets=[]; ref.pitches=[]; ref.chunks=[];

      // MediaRecorder for waveform capture
      const mr = new MediaRecorder(stream, {mimeType:'audio/webm'});
      mr.ondataavailable = e=>{ if(e.data.size>0) ref.chunks.push(e.data); };
      mr.start(100); ref.recorder=mr;

      // Real-time pitch + onset analysis loop
      const buf = new Float32Array(an.fftSize);
      const freqBuf = new Uint8Array(an.frequencyBinCount);
      let prevEnergy = 0, frameCount = 0;
      const loop = () => {
        ref.animFrame = requestAnimationFrame(loop);
        frameCount++;
        an.getFloatTimeDomainData(buf);
        an.getByteFrequencyData(freqBuf);
        const energy = buf.reduce((s,v)=>s+v*v,0)/buf.length;
        const rms = Math.sqrt(energy);
        // Onset: sudden energy spike
        if(rms > 0.015 && energy > prevEnergy*1.8 && frameCount>3){
          ref.onsets.push({t:ctx.currentTime, energy:rms});
          frameCount=0;
        }
        prevEnergy = energy*0.85 + prevEnergy*0.15;
        // Pitch via autocorrelation (every 4th frame for perf)
        if(frameCount%4===0 && rms > 0.02){
          const pitch = autocorrPitch(buf, ctx.sampleRate);
          if(pitch > 60 && pitch < 1500) ref.pitches.push(pitch);
        }
      };
      loop();
    }catch(e){
      setMicRecording(false); setMicProgress('Mic error: '+e.message);
    }
  };

  const stopConfigMic = async () => {
    const ref = configMicRef.current;
    if(!ref.stream) return;
    setMicProgress('Analysing...');
    cancelAnimationFrame(ref.animFrame);
    if(ref.recorder&&ref.recorder.state!=='inactive') ref.recorder.stop();
    ref.stream.getTracks().forEach(t=>t.stop());
    if(ref.ctx) ref.ctx.close();

    const onsets = ref.onsets;
    const pitches = ref.pitches;
    ref.stream=null; ref.ctx=null; ref.analyser=null;
    setMicRecording(false);

    // ── TEMPO ANALYSIS ─────────────────────────────────────────────────────
    let detectedBpm = 120, tempoChanges = [];
    if(onsets.length >= 4){
      const iois = [];
      for(let i=1;i<onsets.length;i++) iois.push(onsets[i].t - onsets[i-1].t);
      // Filter plausible IOIs (60-200bpm range = 0.3-1.0s)
      const valid = iois.filter(v=>v>0.28&&v<1.1);
      if(valid.length >= 3){
        const median = valid.slice().sort((a,b)=>a-b)[Math.floor(valid.length/2)];
        detectedBpm = Math.round(60/median);
        detectedBpm = Math.max(60, Math.min(200, detectedBpm));

        // Detect tempo changes: sliding window of 4 IOIs
        const wins = [];
        for(let i=0;i<=valid.length-4;i++){
          const win = valid.slice(i,i+4);
          wins.push(60/( win.reduce((a,b)=>a+b,0)/win.length ));
        }
        for(let i=1;i<wins.length;i++){
          if(Math.abs(wins[i]-wins[i-1]) > wins[i-1]*0.12){
            tempoChanges.push({at:onsets[i+1]?.t?.toFixed(1)||'?', from:Math.round(wins[i-1]), to:Math.round(wins[i])});
          }
        }
      }
    }

    // ── BAR COUNT ──────────────────────────────────────────────────────────
    const totalSec = onsets.length>=2 ? onsets[onsets.length-1].t - onsets[0].t : 0;
    const bars = totalSec>0 ? Math.max(1, Math.round(totalSec * detectedBpm / 240)) : 0;

    // ── PITCH / KEY ANALYSIS ───────────────────────────────────────────────
    let detectedKey = 'C', keyChanges = [];
    if(pitches.length >= 8){
      // Bin pitches into pitch classes
      const pcBins = new Array(12).fill(0);
      for(const p of pitches){
        const midi = Math.round(12*Math.log2(p/440)+69);
        pcBins[((midi%12)+12)%12] += 1;
      }
      // Krumhansl-Schmuckler key profiles
      const majorP=[6.35,2.23,3.48,2.33,4.38,4.09,2.52,5.19,2.39,3.66,2.29,2.88];
      const minorP=[6.33,2.68,3.52,5.38,2.60,3.53,2.54,4.75,3.98,2.69,3.34,3.17];
      const NOTE_NAMES=['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'];
      let bestScore=-Infinity, bestRoot=0, bestIsMinor=false;
      for(let root=0;root<12;root++){
        for(const [prof,isMinor] of [[majorP,false],[minorP,true]]){
          let score=0;
          for(let pc=0;pc<12;pc++) score+=pcBins[(pc+root)%12]*prof[pc];
          if(score>bestScore){bestScore=score;bestRoot=root;bestIsMinor=isMinor;}
        }
      }
      detectedKey = NOTE_NAMES[bestRoot]+(bestIsMinor?' min':'');

      // Detect key changes: split pitches into 4 windows
      const wSize = Math.floor(pitches.length/4);
      if(wSize>=4){
        const winKeys=[];
        for(let w=0;w<4;w++){
          const wp=pitches.slice(w*wSize,(w+1)*wSize);
          const wb=new Array(12).fill(0);
          wp.forEach(p=>{const m=Math.round(12*Math.log2(p/440)+69);wb[((m%12)+12)%12]++;});
          let bs=-Infinity,br=0,bm=false;
          for(let r=0;r<12;r++){
            for(const[pr,im] of[[majorP,false],[minorP,true]]){
              let sc=0;for(let pc=0;pc<12;pc++)sc+=wb[(pc+r)%12]*pr[pc];
              if(sc>bs){bs=sc;br=r;bm=im;}
            }
          }
          winKeys.push(NOTE_NAMES[br]+(bm?' min':''));
        }
        for(let i=1;i<winKeys.length;i++){
          if(winKeys[i]!==winKeys[i-1]) keyChanges.push({from:winKeys[i-1],to:winKeys[i],atBar:Math.round(i*bars/4)});
        }
      }
    }

    // Extract just the root for config (strip " min")
    const keyRoot = detectedKey.replace(' min','').trim();
    const isMinor = detectedKey.includes('min');

    const analysis = {bpm:detectedBpm, key:keyRoot, isMinor, bars, tempoChanges, keyChanges, onsetCount:onsets.length, pitchCount:pitches.length};
    setMicAnalysis(analysis);
    setMicProgress('');
    // Apply to config
    setTrackConfig(c=>({...c, bpm:detectedBpm, key:keyRoot, darkness:isMinor?Math.max(c.darkness,0.55):c.darkness}));
    // Store in motifEngine
    try{ if(pitches.length>0) motifEng.record({pitches:pitches.slice(0,32), bpm:detectedBpm, bars, type:'mic'}); }catch(e){}
  };

  // ── Autocorrelation pitch detection (reuse from existing system) ──────────
  const autocorrPitch = (buf, sr) => {
    const SIZE = buf.length;
    const MAX_PERIOD = Math.floor(sr/60);
    const MIN_PERIOD = Math.floor(sr/1500);
    let bestPeriod=0, bestCorr=-1;
    for(let p=MIN_PERIOD;p<MAX_PERIOD;p++){
      let corr=0;
      for(let i=0;i<SIZE-p;i++) corr+=buf[i]*buf[i+p];
      corr/=(SIZE-p);
      if(corr>bestCorr){bestCorr=corr;bestPeriod=p;}
    }
    return bestPeriod>0?sr/bestPeriod:0;
  };

  // ── SONG FINGERPRINT & NO-REPEAT ENGINE ──────────────────────────────────
  // Fingerprints are normalized to C (root subtracted) so "same song in D" is caught
  const songHistory = {
    seen: [],     // [{fp, bpm, key, genre, ts}]
    maxHistory: 20,

    fingerprint(events, bpmVal, rootNote, genreStr){
      // Normalize: transpose all notes to C, bucket tempo into slow/mid/fast
      const rootPC = ((rootNote%12)+12)%12;
      const chordSeq = [...new Set(events.filter(e=>e.chordType).map(e=>e.chordType))].join(',');
      const noteSet = [...new Set(events.filter(e=>e.note).map(e=>((((e.note%12)-rootPC)+12)%12)))].sort().join('');
      const bpmBucket = bpmVal<85?'slow':bpmVal<125?'mid':'fast';
      const density = Math.round(events.length/100)*100; // bucket to nearest 100 events
      return `${bpmBucket}|${genreStr}|${chordSeq}|${noteSet}|${density}`;
    },

    isTooSimilar(fp){
      // Check if fingerprint is within edit distance 1 of any seen song
      for(const s of this.seen){
        const a = fp.split('|'), b = s.fp.split('|');
        let diff = 0;
        for(let i=0;i<Math.max(a.length,b.length);i++) if(a[i]!==b[i]) diff++;
        if(diff<=1) return true;  // 1 or fewer fields differ = too similar
      }
      return false;
    },

    record(fp, bpmVal, key, genre){
      this.seen.unshift({fp, bpm:bpmVal, key, genre, ts:Date.now()});
      if(this.seen.length>this.maxHistory) this.seen.pop();
    },

    // Penalize Q-table entries that match seen chord progressions.
    // Drums get a much lighter penalty (factor 0.92 vs 0.75) because a rational
    // groove is SUPPOSED to recur -- we don't want to un-learn the backbeat.
    penalizeBrain(events, rootPC){
      const seenPCs = new Set(events.filter(e=>e.note).map(e=>((((e.note%12)-rootPC)+12)%12)));
      const ROLE_FACTOR = {lead:0.75, mid:0.75, bass:0.75, drum:0.92};
      for(const pc of seenPCs){
        for(const role of['lead','mid','bass','drum']){
          const key=`${role}_${pc}`;
          for(const k of Object.keys(brain.q)){
            if(k.startsWith(key)) brain.q[k] = (brain.q[k]||0.5)*ROLE_FACTOR[role];
          }
        }
      }
    },

    serialize(){ return {seen:this.seen.slice(0,this.maxHistory)}; },
    load(d){ if(d&&d.seen) this.seen=d.seen; },
  };

  // ── FULL SONG RENDER ──────────────────────────────────────────────────────
  // Proper 3-minute structure: Intro→Verse→Chorus→Bridge→Verse→Chorus→Turn→Outro
  // Each section renders into its own buffer, then concatenated.
  // Stems rendered separately so user can download drum/bass/mid/lead individually.

  const renderStemBuffer = async (events, durationSec, baseAR, stemTypes) => {
    // Render only the event types in stemTypes array
    const SR = 22050;
    const filtered = events.filter(e => stemTypes.includes(e.type));
    const offCtx = new OfflineAudioContext(2, Math.ceil(SR*durationSec)+256, SR);
    const offBus = new AudioBus();
    offBus.init(offCtx, true);
    const warp = baseAR.warpMultiplier||1;
    const chaos = baseAR.chaos||0.3;
    for(const ev of filtered){
      const t = Math.max(0, ev.t);
      try{
        if(ev.type==='kick')   synthKick(offCtx,t,warp,offBus.getInput('drum'),0.5);
        if(ev.type==='snare')  synthSnare(offCtx,t,chaos,warp,offBus.getInput('drum'),0.5);
        if(ev.type==='hat')    synthHat(offCtx,t,ev.open||false,chaos,warp,offBus.getInput('drum'),0.3);
        if(ev.type==='crash')  synthCrash(offCtx,t,chaos,warp,offBus.getInput('drum'),ev.v||0.6);
        if(ev.type==='sub')    synthSubBass(offCtx,t,ev.note,chaos,warp,0.05,0,offBus.getInput('sub'));
        if(ev.type==='bass'){
          const _bm=ev.bassMode||styleP().bassMode||'electric';
          const _bd=offBus.getInput('bass');
          if(_bm==='808')         synth808(offCtx,t,ev.note,chaos,warp,0.05,_bd);
          else if(_bm==='upright')synthUprightBass(offCtx,t,ev.note,chaos,warp,0.05,_bd);
          else if(_bm==='gfunk')  synthGFunkBass(offCtx,t,ev.note,chaos,warp,0.05,ev.prevNote||ev.note,_bd);
          else if(_bm==='boombap')synthBoomBapBass(offCtx,t,ev.note,chaos,warp,0.05,_bd);
          else if(_bm==='afrosub')synthAfroSub(offCtx,t,ev.note,chaos,warp,0.5,0.05,_bd);
          else if(_bm==='tanpura')synthTanpuraBass(offCtx,t,ev.note,chaos,warp,0.05,_bd);
          else                    synthBass(offCtx,t,ev.note,chaos,warp,0.05,0.5,0,_bd);
        }
        if(ev.type==='mid'&&ev.notes) synthMid(offCtx,t,ev.notes,ev.chordType,chaos,warp,offBus.getInput('mid'),0.05);
        if(ev.type==='lead')   synthLead(offCtx,t,ev.note,chaos,warp,offBus.getInput('lead'),0.05);
      }catch(e){}
    }
    return offCtx.startRendering();
  };

  const concatBuffers = async (buffers, SR) => {
    const totalSamples = buffers.reduce((s,b)=>s+(b?b.length:0), 0);
    if(totalSamples === 0) return null;
    const out = new OfflineAudioContext(2, totalSamples, SR);
    let offset = 0;
    for(const buf of buffers){
      if(!buf) continue;
      const src = out.createBufferSource(); src.buffer = buf;
      src.connect(out.destination);
      src.start(offset/SR);
      offset += buf.length;
    }
    return out.startRendering();
  };

  const renderFullTrack = async (cfg) => {
    const KEYS={'C':60,'C#':61,'Db':61,'D':62,'D#':63,'Eb':63,'E':64,'F':65,'F#':66,'Gb':66,'G':67,'G#':68,'Ab':68,'A':69,'A#':70,'Bb':70,'B':71};
    const bpm    = parseInt(cfg.bpm)||110;
    const rootNote = KEYS[cfg.key]||60;
    const rootPC   = ((rootNote%12)+12)%12;
    const spb      = 60.0/bpm;
    const barsToSec = b => b*4*spb;
    const SR = 22050; // always 22050 for offline speed

    // Apply style
    kickStyle = ['jazz','pop','edm','hiphop','westcoast','eastcoast','african','indian'].includes(cfg.genre)?cfg.genre:'pop';

    // Seed AR
    const baseAR = {
      ...AR.current,
      bpm, warpMultiplier: 1,
      chaos:   Math.min(0.9, cfg.intensity*0.7),
      density: Math.min(1.0, cfg.intensity),
      darkness: cfg.darkness||0.35,
      root: rootNote, lockedRoot: rootNote,
      chordType: cfg.genre==='jazz'?'min7':'maj',
      measureCount:0, measuresThisChord:0,
      targetChordSeq:null, phrasePosition:0,
      structurePhase:'intro', _groove:null,
    };

    // Song structure — 92 bars ≈ 3.3 min at 110bpm
    // [label, bars, chaosΔ, densityΔ]
    const sections = [
      ['intro',       8,  -0.15, -0.25],
      ['verse',      16,   0.00,  0.00],
      ['chorus',     16,   0.14,  0.18],
      ['bridge',      8,   0.06, -0.12],
      ['verse',      16,   0.02,  0.05],
      ['chorus',     16,   0.16,  0.20],
      ['turnaround',  4,   0.22,  0.12],
      ['outro',       8,  -0.22, -0.30],
    ];
    const totalBars = sections.reduce((s,[,b])=>s+b,0);

    // Per-stem event buckets  
    const STEM_GROUPS = {
      drums: ['kick','snare','hat','crash'],
      bass:  ['sub','bass'],
      mid:   ['mid'],
      lead:  ['lead'],
    };

    // Accumulate events PER SECTION (we'll render stems per section then concat)
    const stemSectionBufs = {drums:[], bass:[], mid:[], lead:[]};
    let sectionAR = {...baseAR};
    let progressBase = 0;
    let allEvents = []; // for fingerprinting

    setRenderProgress(2); setRenderStage('Starting...');

    for(let si=0;si<sections.length;si++){
      const [label, bars, chaosD, densD] = sections[si];
      const secSec = barsToSec(bars);
      setRenderStage(`${label} (${si+1}/${sections.length})`);

      const secAR = {
        ...sectionAR,
        structurePhase: label,
        chaos:   Math.max(0.05, Math.min(0.95, baseAR.chaos + chaosD)),
        density: Math.max(0.10, Math.min(1.00, baseAR.density + densD)),
      };

      // Per-section timeout: 3× the audio duration (generous headroom)
      const sectionTimeout = Math.max(30000, secSec * 3000);

      try{
        const sim = simulateBand(secSec, secAR, brain.q);
        allEvents = allEvents.concat(sim.events.map(e=>({...e, t:e.t}))); // for fingerprint

        // Render each stem group for this section in parallel
        const stemPromises = Object.entries(STEM_GROUPS).map(async ([name, types]) => {
          const p = renderStemBuffer(sim.events, secSec, secAR, types);
          const to = new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),sectionTimeout));
          return [name, await Promise.race([p, to])];
        });

        for(const [name, buf] of results){

        }

        sectionAR = {
          ...secAR,
          chordType:          sim.endChordType,
          rootMidi:           sim.endRoot,

  // Download helper — AudioBuffer → 16-bit WAV
  const downloadBuffer = (buf, filename) => {
    if(!buf){ addLog('No buffer to download.'); return; }
    const numCh=buf.numberOfChannels, len=buf.length, SR=buf.sampleRate;
    const wav = new ArrayBuffer(44 + len*numCh*2);
    const view = new DataView(wav);
    const ws = (off,s)=>{for(let i=0;i<s.length;i++)view.setUint8(off+i,s.charCodeAt(i));};
    ws(0,'RIFF'); view.setUint32(4,36+len*numCh*2,true);
    ws(8,'WAVE'); ws(12,'fmt ');
    view.setUint32(16,16,true); view.setUint16(20,1,true);
    view.setUint16(22,numCh,true); view.setUint32(24,SR,true);
    view.setUint32(28,SR*numCh*2,true); view.setUint16(32,numCh*2,true);
    view.setUint16(34,16,true); ws(36,'data');
    view.setUint32(40,len*numCh*2,true);
    let off=44;
    for(let i=0;i<len;i++) for(let c=0;c<numCh;c++){
      view.setInt16(off, Math.max(-32768,Math.min(32767,Math.round(buf.getChannelData(c)[i]*32767))),true); off+=2;
    }
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([wav],{type:'audio/wav'}));
    a.download=filename; a.click(); URL.revokeObjectURL(a.href);
  };

    const startPreRenderedBand=async()=>{
    // -- DOUBLE-BUFFER PIPELINE ------------------------------------------
    // Step 1: Render chunk A (blocking, user sees "Loading...")
    // Step 2: Start playing chunk A immediately
    // Step 3: Render chunk B in background while A plays
    // Step 4: On A.onended -> swap to B instantly (zero gap)
    // Step 5: Immediately render chunk C in background, repeat forever
    // --------------------------------------------------------------------
    const ar=AR.current;
    const pr=preRenderRef.current;
    const CHUNK=pr.chunkSec||30;

    // Ensure audio context exists
    if(!ar.ctx){
      ar.ctx=(()=>{
        const SR=DeviceComp.score<0.45?22050:44100;
        try{return new(window.AudioContext||window.webkitAudioContext)({sampleRate:SR,latencyHint:'playback'});}
        catch(e){return new(window.AudioContext||window.webkitAudioContext)();}
      })();
    }
    if(ar.ctx.state==='suspended')await ar.ctx.resume();
    bus.init(ar.ctx);

    setLoadingBand(true);
    setPreRenderMode(true);

    try{
      // ── CHUNK A: render now (user waits for this, ~2-5s) ──────────────
      const simA = simulateBand(CHUNK, ar, brain.q);
      const renderA = renderEventsToBuffer(simA.events, CHUNK, ar);
      const timeout15 = new Promise((_,rej)=>setTimeout(()=>rej(new Error('render_timeout')),15000));
      const bufA = await Promise.race([renderA, timeout15]);

      // Store the end-state so chunk B continues from where A left off
      pr.endAR = {
        ...ar,
        chordType:        simA.endChordType,
        rootMidi:         simA.endRoot,
        measureCount:     simA.endMeasure,
        measuresThisChord: simA.endMeasuresOnChord||0,
        measuresPerChord:  simA.endMeasuresPerChord||4,
        targetChordSeq:   simA.endPhrase||null,
        phrasePosition:   simA.endPhrasePos||0,
        structurePhase:   simA.endPhaseLabel||'verse',
        _groove:          simA.endGroove||null,
      };
      pr.visualFrames    = simA.visualFrames;
      pr.frameIdx        = 0;
      pr.playStartCtxTime = ar.ctx.currentTime;

      // ── Play chunk A ──────────────────────────────────────────────────
      const srcA = ar.ctx.createBufferSource();
      srcA.buffer = bufA;
      srcA.connect(ar.ctx.destination);
      pr.playingSource = srcA;
      srcA.start(0);

      ghostBand.stop();
      setIsPlaying(true); isPlayRef.current=true;
      setLoadingBand(false);
      addLog('[Pre-render] Chunk A playing. Rendering B in background...');

      // ── Background: render chunk B WHILE A is playing ─────────────────
      pr.renderingNext = true;
      pr.nextBuffer    = null;

      const renderNextChunk = async(fromAR)=>{
        if(!isPlayRef.current){ pr.renderingNext=false; return; }
        try{
          const simNext = simulateBand(CHUNK, fromAR, brain.q);
          const renderNext = renderEventsToBuffer(simNext.events, CHUNK, fromAR);
          const to = new Promise((_,rej)=>setTimeout(()=>rej(new Error('render_timeout')),18000));
          const bufNext = await Promise.race([renderNext, to]);
          pr.nextBuffer       = bufNext;
          pr.nextVisualFrames = simNext.visualFrames;
          pr.nextEndAR = {
            ...fromAR,
            chordType:        simNext.endChordType,
            rootMidi:         simNext.endRoot,
            measureCount:     simNext.endMeasure,
            measuresThisChord: simNext.endMeasuresOnChord||0,
            measuresPerChord:  simNext.endMeasuresPerChord||4,
            targetChordSeq:   simNext.endPhrase||null,
            phrasePosition:   simNext.endPhrasePos||0,
            structurePhase:   simNext.endPhaseLabel||'verse',
            _groove:          simNext.endGroove||null,
          };
          pr.renderingNext = false;
          addLog('[Pre-render] Next chunk ready.');
        }catch(e){
          pr.renderingNext = false;
          pr.nextBuffer    = null;
          console.warn('[Pre-render] Background render failed:',e.message);
        }
      };

      // Start background render immediately (don't await -- runs in parallel)
      renderNextChunk(pr.endAR);

      // ── On A ending: swap to B with zero gap ──────────────────────────
      srcA.onended = ()=>{
        if(!isPlayRef.current) return;

        if(pr.nextBuffer){
          // B is ready -- swap instantly, no gap
          const ctx = AR.current.ctx;
          const srcB = ctx.createBufferSource();
          srcB.buffer = pr.nextBuffer;
          srcB.connect(ctx.destination);
          pr.playingSource     = srcB;
          pr.visualFrames      = pr.nextVisualFrames||[];
          pr.frameIdx          = 0;
          pr.playStartCtxTime  = ctx.currentTime;
          const nextEndAR      = pr.nextEndAR||pr.endAR;
          pr.nextBuffer        = null;
          pr.nextVisualFrames  = [];
          srcB.start(0);
          addLog('[Pre-render] Seamless swap to next chunk.');

          // Immediately render the chunk after B
          pr.renderingNext = true;
          renderNextChunk(nextEndAR);

          srcB.onended = srcA.onended; // chain forever
        } else {
          // B not ready (render took too long) -- fall back to live
          addLog('[Pre-render] Next chunk not ready, switching to live mode.');
          setPreRenderMode(false);
          startBand();
        }
      };

    }catch(e){
      console.error('[Pre-render]',e);
      pr.renderingNext = false;
      setLoadingBand(false);
      setPreRenderMode(false);
      addLog('[Pre-render] '+(e.message==='render_timeout'?'Timed out':'Error: '+e.message)+', using live mode.');
      startBand();
    }
  };


  const startBand=async()=>{
