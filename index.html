    // Feedback gain controls decay length; randomize so each pluck rings
    // differently
    const fb = ctx.createGain();
    const damp = 0.970 + Math.random()*0.022;  // 0.97-0.992
    fb.gain.value = damp;
    dLine.connect(lp); lp.connect(fb); fb.connect(dLine);

    // Excitation: short burst of filtered noise shaped by pick position
    const excLen = Math.floor(SR*(0.006+pickPos*0.012));
    const excBuf = ctx.createBuffer(1, excLen, SR);
    const eD = excBuf.getChannelData(0);
    // Shape: early spike then comb filter via sin(2*pi*pickPos*i) — classic
    // KS pick-position model
    for(let i=0;i<excLen;i++){
      const n=(Math.random()*2-1);
      const env=Math.pow(1-i/excLen, 0.3+pickPos*0.5);
      const comb=1-Math.cos(2*Math.PI*pickPos*(i/(excLen||1)));
      eD[i]=n*env*comb*0.9;
    }
    const exc=ctx.createBufferSource(); exc.buffer=excBuf;

    // Per-pluck gain envelope (stagger chord notes slightly so it sounds
    // strummed not slammed)
    const stagger = idx * (0.008 + Math.random()*0.010);
    const g = ctx.createGain();
    const durT = (0.9 + Math.random()*1.4) * _dscl / warp;
    g.gain.setValueAtTime(0, t+stagger);
    g.gain.linearRampToValueAtTime(0.22 + Math.random()*0.10, t+stagger+0.002);
    g.gain.exponentialRampToValueAtTime(0.0001, t+stagger+durT);

    exc.connect(dLine); dLine.connect(g);
    g.connect(dry); g.connect(body1); g.connect(body2);
    exc.start(t+stagger);

    autoClean(exc, dLine, lp, fb, g);
  });
}

// Acoustic piano (best-effort additive). Real piano strings are stiff so
// their partials stretch — the nth partial lands at n*f * sqrt(1+B*n²)
// where B is the inharmonicity coefficient (typically 0.0003-0.001 for a
// grand). Each partial decays at its own rate (higher = faster) which
// gives the piano its characteristic "bloom then darken" envelope. A
// short wide-band noise burst simulates the hammer strike, and a gentle
// soundboard resonance sits at 80 Hz.
// Honest note: this will not fool a pianist. A convincing sampled piano
// uses 30+ velocity layers per note. But it's clearly "piano" and sits
// miles away from Rhodes/Wurli/Clav.
function synthPiano(ctx, t, notes, chordType, chaos, warp, dest, windBoost=0, durScale=1.0){
  if(!dest)return;
  const _dscl=Math.max(0.25, Math.min(8.0, durScale||1.0));
  const sustain=(1.6+0.5*_dscl)/warp;
  const atk=0.004;
  // Soundboard resonance — gentle peak at 80 Hz shared across all voices
  const board=ctx.createBiquadFilter(); board.type='peaking';
  board.frequency.value=82; board.gain.value=2.5; board.Q.value=1.1;
  board.connect(dest);

  for(const semis of (notes||[0])){
    const freq=440*Math.pow(2,(semis-69)/12)*warp;
    if(freq<=0)continue;
    // Inharmonicity: higher strings are relatively stiffer → B grows in
    // upper register. Rough approximation for a grand.
    const B = 0.0004 + Math.max(0, (semis-60))*0.00002;
    // 6 partials with Fletcher-style stretched frequencies + decay curves
    // tuned so the tone gets darker as it sustains (lower partials
    // outlive upper partials).
    const partials=[
      {n:1, g:0.36, dec:sustain*1.00},
      {n:2, g:0.18, dec:sustain*0.75},
      {n:3, g:0.11, dec:sustain*0.55},
      {n:4, g:0.07, dec:sustain*0.40},
      {n:5, g:0.04, dec:sustain*0.30},
      {n:6, g:0.025,dec:sustain*0.22},
    ];
    partials.forEach(function(p){
      const pf = freq * p.n * Math.sqrt(1 + B*p.n*p.n);
      if(pf > 16000) return; // above the lowpass anyway, save a voice
      const osc=ctx.createOscillator(); osc.type='sine'; osc.frequency.value=pf;
      const g=ctx.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(p.g*(0.85+windBoost*0.20), t+atk);
      g.gain.exponentialRampToValueAtTime(0.0001, t+p.dec);
      osc.connect(g); g.connect(board);
      osc.start(t); osc.stop(t+p.dec+0.02);
      autoClean(osc, g);
    });
    // Hammer strike: short wide-band noise burst, filtered so it sounds
    // like wool hitting metal string (not a snare slap).
    const hLen=Math.floor(ctx.sampleRate*0.014);
    const hBuf=ctx.createBuffer(1,hLen,ctx.sampleRate);
    const hD=hBuf.getChannelData(0);
    for(let i=0;i<hLen;i++) hD[i]=(Math.random()*2-1)*Math.pow(1-i/hLen, 0.8);
    const hNs=ctx.createBufferSource(); hNs.buffer=hBuf;
    const hBp=ctx.createBiquadFilter(); hBp.type='bandpass';
    hBp.frequency.value = Math.min(3500, freq*4 + 800); hBp.Q.value=1.2;
    const hG=ctx.createGain();
    hG.gain.setValueAtTime(0.08+windBoost*0.04, t);
    hG.gain.exponentialRampToValueAtTime(0.0001, t+0.025);
    hNs.connect(hBp); hBp.connect(hG); hG.connect(dest);
    hNs.start(t);
    autoClean(hNs, hBp, hG);
  }
  autoClean(board);
}

// Vibraphone: like marimba but with metallic inharmonic partials (3.0x,
// 5.4x, 9.6x) and a motor-driven tremolo (vanes spinning in the resonator
// tubes at ~6-9 Hz) that cycles amplitude of the sustain. Very long decay
// — that's the vibraphone signature. Softer mallet than xylo.
function synthVibes(ctx, t, notes, chordType, chaos, warp, dest, windBoost=0, durScale=1.0){
  if(!dest)return;
  const s=drumSeed();
  const _dscl=Math.max(0.25, Math.min(8.0, durScale||1.0));
  const decay = (1.4+s.decay*0.8)*_dscl/warp;
  // Motor tremolo shared across all notes in this chord
  const motor=ctx.createOscillator(); motor.type='sine';
  motor.frequency.value = 6.5 + Math.random()*2.5;
  const motorAmt=ctx.createGain(); motorAmt.gain.value = 0.28;
  const motorOut=ctx.createGain(); motorOut.gain.value = 1.0;
  motor.connect(motorAmt); motorAmt.connect(motorOut.gain);
  motor.start(t); motor.stop(t+decay+0.1);
  motorOut.connect(dest);
  autoClean(motor,motorAmt,motorOut);

  for(const semis of (notes||[0])){
    const freq=440*Math.pow(2,(semis-69)/12)*warp;
    if(freq<=0)continue;
    // Fundamental (sine — vibraphone is nearly pure)
    const f0=ctx.createOscillator(); f0.type='sine'; f0.frequency.value=freq;
    const g0=ctx.createGain();
    g0.gain.setValueAtTime(0.30+s.punch*0.04, t);
    g0.gain.exponentialRampToValueAtTime(0.0001, t+decay);
    f0.connect(g0); g0.connect(motorOut);
    f0.start(t); f0.stop(t+decay+0.05);
    // 3x metallic partial
    const f1=ctx.createOscillator(); f1.type='sine';
    f1.frequency.value = freq*(3.0 + (Math.random()-0.5)*0.06);
    const g1=ctx.createGain();
    g1.gain.setValueAtTime(0.11, t);
    g1.gain.exponentialRampToValueAtTime(0.0001, t+decay*0.75);
    f1.connect(g1); g1.connect(motorOut);
    f1.start(t); f1.stop(t+decay*0.8);
    // 5.4x brighter partial (vibraphone tube resonance)
    const f2=ctx.createOscillator(); f2.type='sine';
    f2.frequency.value = freq*5.4;
    const g2=ctx.createGain();
    g2.gain.setValueAtTime(0.04, t);
    g2.gain.exponentialRampToValueAtTime(0.0001, t+decay*0.45);
    f2.connect(g2); g2.connect(motorOut);
    f2.start(t); f2.stop(t+decay*0.5);
    // Mallet click — yarn mallet, dense + soft
    const nLen=Math.floor(ctx.sampleRate*0.010);
    const nBuf=ctx.createBuffer(1,nLen,ctx.sampleRate);
    const nD=nBuf.getChannelData(0);
    for(let i=0;i<nLen;i++) nD[i]=(Math.random()*2-1)*Math.pow(1-i/nLen,1.5);
    const ns=ctx.createBufferSource(); ns.buffer=nBuf;
    const nBp=ctx.createBiquadFilter(); nBp.type='bandpass';
    nBp.frequency.value=1600; nBp.Q.value=2;
    const nG=ctx.createGain();
    nG.gain.setValueAtTime(0.055, t); nG.gain.exponentialRampToValueAtTime(0.0001, t+0.020);
    ns.connect(nBp); nBp.connect(nG); nG.connect(dest);
    ns.start(t);
    autoClean(f0,g0,f1,g1,f2,g2,ns,nBp,nG);
  }
}

// Moog-style analog lead: 3 detuned sawtooths through a resonant lowpass
// with an envelope that opens fast then slowly closes. Subtle saturation
// and a fresh cutoff per note so repeated pitches don't sound identical.
function synthMoogLead(ctx, t, note, chaos, warp, dest, windBoost=0, durScale=1.0){
  if(!dest)return;
  const _dscl=Math.max(0.25, Math.min(6.0, durScale||1.0));
  const s=drumSeed();
  const _ls=styleP();
  const durT=(0.35+s.tone*0.35+windBoost*0.2+chaos*0.20)*_ls.noteLenMult*_dscl/warp;
  const freq=440*Math.pow(2,(note-69)/12)*warp;

  // Resonant lowpass — this is what gives Moog its "singing" quality.
  // Q capped at 4.5 so it doesn't self-oscillate into feedback squeal.
  const flt=ctx.createBiquadFilter(); flt.type='lowpass';
  const openHz = 1200 + Math.random()*3200 + windBoost*600;
  const closeHz = 300 + Math.random()*400;
  flt.frequency.setValueAtTime(closeHz, t);
  flt.frequency.exponentialRampToValueAtTime(openHz, t+0.02);       // fast open
  flt.frequency.exponentialRampToValueAtTime(closeHz*1.3, t+durT*0.9); // slow close
  flt.Q.value = Math.min(4.5, 1.8 + chaos*1.6 + Math.random()*1.2);

  // Soft saturation for warmth
  const sat=ctx.createWaveShaper();
  const cv=new Float32Array(256); for(let i=0;i<256;i++){const x=i*2/256-1; cv[i]=Math.tanh(x*1.8);}
  sat.curve=cv; sat.oversample='2x';

  const master=ctx.createGain();
  master.gain.setValueAtTime(0, t);
  master.gain.linearRampToValueAtTime(0.14+s.punch*0.04, t+0.006);
  master.gain.setTargetAtTime(0.10, t+0.04, 0.2);
  master.gain.linearRampToValueAtTime(0.0001, t+durT);

  flt.connect(sat); sat.connect(master); master.connect(dest);
  autoClean(flt,sat,master);

  // 3 detuned saws = Moog stack-of-three feel
  const detunes=[-9+Math.random()*4, 0, 9-Math.random()*4];
  detunes.forEach(dt=>{
    const o=ctx.createOscillator(); o.type='sawtooth';
    o.frequency.value=freq; o.detune.value=dt;
    o.connect(flt);
    o.start(t); o.stop(t+durT+0.02);
    autoClean(o);
  });

  // Sub osc for body (octave below, triangle)
  const sub=ctx.createOscillator(); sub.type='triangle';
  sub.frequency.value=freq*0.5;
  const subG=ctx.createGain(); subG.gain.value=0.25;
  sub.connect(subG); subG.connect(flt);
  sub.start(t); sub.stop(t+durT+0.02);
  autoClean(sub,subG);
}

// ═══════════════════════════════════════════════════════════════════════════════
// VOICING LIBRARY — rotates chord shapes across measures so mid never plays
// the same [root, 3rd, 5th] triad forever. Applies to any chord intervals.
// ═══════════════════════════════════════════════════════════════════════════════
function voicingForShape(iv, shape){
  const v = (iv||[0,4,7]).slice().sort(function(a,b){return a-b;});
  const n = v.length;
  // When band-level "spread voicings" is on, force the shape into one of the
  // wide/open cases so chords never pile up in a single octave triad.
  const spreadMode = (typeof window!=='undefined' && window._bandAR && window._bandAR._spreadVoicings);
  let s = ((shape%12)+12)%12;
  if(spreadMode){
    // Rotate through only the spread/open cases: drop-2, open, spread, drop-2-4.
    const SPREAD_POOL = [5, 6, 8, 12, 13];
    s = SPREAD_POOL[Math.abs(shape) % SPREAD_POOL.length];
  }
  switch(s){
    case 0:  return v;                                                // root position
    case 1:  return v.slice(1).concat([v[0]+12]);                     // 1st inversion
    case 2:  return n>2 ? v.slice(2).concat([v[0]+12, v[1]+12]) : v;  // 2nd inversion
    case 3:  return v.concat([14]);                                   // add 9
    case 4:  return v.concat([9]);                                    // add 6
    case 5: {                                                         // drop-2 (2nd-from-top down 12)
      if(n<3) return v;
      const r=v.slice(); r[r.length-2]-=12;
      return r.sort(function(a,b){return a-b;});
    }
    case 6:  return [v[0], (v[2]||v[1]||7), (v[1]||4)+12];            // open voicing
    case 7:  return v.concat([v[0]+12]);                              // octave-doubled root
    case 8:  return [v[0], v[1]||4, v[2]||7, (v[0]||0)+19];           // spread (1-3-5-3 across 2 oct)
    case 9:  return v.slice(1).concat([14, 17]);                      // rootless w/ 9 & 11
    case 10: return [v[0], (v.length>3?v[3]:v[v.length-1])];          // shell (root + top)
    case 11: return v.concat([(v[1]||4)+12]);                         // doubled 3rd up 8va
    case 12: {                                                        // drop-2-and-4 (bigger spread)
      if(n<4) return [v[0]-12, v[2]||7, (v[1]||4)+12, (v[3]||10)+12];
      const r=v.slice(); r[r.length-2]-=12; r[r.length-4]-=12;
      return r.sort((a,b)=>a-b);
    }
    case 13: {                                                        // wide "piano trio" voicing
      // Root LOW, 7th (or 3rd) middle, 9th/3rd/5th upper. Never stacks
      // inside a single octave -- always occupies ~2.5 octaves of space.
      const seventh = n>3 ? v[3] : (v[2]||7);
      const color   = v[1]||4;
      return [v[0]-12, seventh, color+12, (v[2]||7)+12];
    }
    default: return v;
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════════════════
// MID-VOICE GENERATIVE ENGINE — reads MID_CHARACTERS profile + rolls fresh
// per-hit jitter so every note is microtimbrally unique. Replaces the old
// one-synth-per-timbre system; each character is a recipe, this function
// is the kitchen.
//
// Layers per note (profile decides which are active):
//   body       — core tone: additive / FM / saw / KS / multisaw / wavetable
//   harmonics  — auxiliary additive partials (often folded into body)
//   air        — noise burst at attack (hammer / pick) or continuous bed (tape hiss)
//   sub        — triangle at 0.5×, key-fade in low register
//   release    — damper noise / resonant ring after envelope closes
//
// Per-note random rolls (jitter): filter cutoff ±15%, filter Q ±20%, detune
// depth ±30%, attack peak ±20%, noise duration ±25%, stereo balance ±12%.
// ═══════════════════════════════════════════════════════════════════════════════

// ── Chord-strum helper: spread voice starts so chords feel played, not slammed
function _midStrumOffset(idx, msMin, msMax){
  return idx * (msMin + Math.random() * (msMax - msMin)) * 0.001;
}

// ── Build the per-voice group chain: filter → trem → chorus → out → dest.
// Returns { input, out } — feed oscillators to .input, audio comes out .out.
function _buildMidGroup(ctx, t, sustain, prof, chaos){
  const J_cut = 1 + (Math.random() - 0.5) * 0.30; // ±15%
  const J_Q   = 1 + (Math.random() - 0.5) * 0.40; // ±20%
  const out   = ctx.createGain(); out.gain.value = 1.0;
  let head    = out;
  let tailNode = out;

  // Chorus (triple-tap for string-ensemble, single for rhodes, none for others)
  if(prof.chorus){
    const delays = Array.isArray(prof.chorus.delayMs) ? prof.chorus.delayMs : [prof.chorus.delayMs];
    const lfos   = Array.isArray(prof.chorus.lfoHz)   ? prof.chorus.lfoHz   : [prof.chorus.lfoHz];
    const chMix  = ctx.createGain(); chMix.gain.value = prof.chorus.mix || 0.35;
    const chorusIn = ctx.createGain(); chorusIn.gain.value = 1.0;
    delays.forEach((dms, i)=>{
      const d = ctx.createDelay(0.1);
      d.delayTime.value = (dms + Math.random()*2) * 0.001;
      const lfo = ctx.createOscillator(); lfo.type='sine';
      lfo.frequency.value = (lfos[i % lfos.length] || 0.5);
      const lfoG = ctx.createGain(); lfoG.gain.value = 0.0018 + Math.random()*0.0010;
      lfo.connect(lfoG); lfoG.connect(d.delayTime);
      lfo.start(t); lfo.stop(t + sustain + 0.5);
      chorusIn.connect(d); d.connect(chMix);
      autoClean(d, lfo, lfoG);
    });
    chMix.connect(head);
    head = chorusIn;
    chorusIn.connect(out); // dry path
    autoClean(chMix, chorusIn);
  }

  // Tremolo (amplitude LFO on group out)
  if(prof.trem){
    const rate = prof.trem.rateHz[0] + Math.random() * (prof.trem.rateHz[1] - prof.trem.rateHz[0]);
    const trem = ctx.createOscillator(); trem.type='sine';
    trem.frequency.value = rate;
    const trG = ctx.createGain(); trG.gain.value = prof.trem.depth;
    trem.connect(trG); trG.connect(out.gain);
    trem.start(t); trem.stop(t + sustain + 0.5);
    autoClean(trem, trG);
  }

  // Filter stage (the input/entry point for oscillators)
  let input = head;
  if(prof.filter){
    const f = ctx.createBiquadFilter();
    f.type = prof.filter.type || 'lowpass';
    const cMin = prof.filter.cutoff[0], cMax = prof.filter.cutoff[1];
    const cutoff = (cMin + Math.random()*(cMax - cMin)) * J_cut;
    const Q = (prof.filter.Q[0] + Math.random()*(prof.filter.Q[1]-prof.filter.Q[0])) * J_Q;
    f.Q.value = Math.min(2.6, Q);
    if(prof.filter.wah){
      // Wah envelope: open hard on attack, close over 0.6s
      f.frequency.setValueAtTime(cutoff * 0.55, t);
      f.frequency.exponentialRampToValueAtTime(cutoff * 1.35, t + 0.04);
      f.frequency.exponentialRampToValueAtTime(cutoff, t + sustain * 0.6);
    } else if(prof.filter.sweep){
      // Slow filter sweep (string pad / prophet)
      const sweepHz = prof.filter.sweepHz ? prof.filter.sweepHz[0] + Math.random()*(prof.filter.sweepHz[1]-prof.filter.sweepHz[0]) : 0.12;
      const sLfo = ctx.createOscillator(); sLfo.type='sine';
      sLfo.frequency.value = sweepHz;
      const sG = ctx.createGain(); sG.gain.value = cutoff * 0.35;
      f.frequency.value = cutoff;
      sLfo.connect(sG); sG.connect(f.frequency);
      sLfo.start(t); sLfo.stop(t + sustain + 0.5);
      autoClean(sLfo, sG);
    } else {
      f.frequency.setValueAtTime(cutoff, t);
    }
    f.connect(head);
    input = f;
    autoClean(f);
  }

  // Saturation stage (wurli/brass)
  if(prof.satAmount){
    const ws = ctx.createWaveShaper();
    const n = 512, cv = new Float32Array(n);
    const k = prof.satAmount;
    for(let i=0;i<n;i++){ const x = i*2/n - 1; cv[i] = Math.tanh(x * k) / Math.tanh(k); }
    ws.curve = cv; ws.oversample = '2x';
    ws.connect(input);
    input = ws;
    autoClean(ws);
  }

  autoClean(out);
  return { input, out };
}

// ── Roll per-hit jitter for a single note
function _rollMidJitter(prof){
  return {
    detuneMul: 1 + (Math.random() - 0.5) * 0.60,     // ±30% of profile detune
    attackMul: 1 + (Math.random() - 0.5) * 0.40,     // ±20% of attack time
    airDurMul: 1 + (Math.random() - 0.5) * 0.50,     // ±25% noise burst length
    balance:   (Math.random() - 0.5) * 0.24,         // ±12% stereo balance (unused for mono-sum)
    partialMix:(Math.random() * 0.40) - 0.20,        // ±20% additive partial level shift
  };
}

// ── Main mid engine
function synthMidVoice(ctx, t, notes, chordType, chaos, warp, dest, windBoost=0, durScale=1.0, characterName='grand-piano'){
  if(!dest) return;

  // Sample override: drop a mid WAV in the UI slot → band plays that instead
  if(typeof _drumSamples !== 'undefined' && _drumSamples.mid){
    const buf = _drumSamples.mid;
    (notes || []).slice(0, 4).forEach((note, idx)=>{
      const src = ctx.createBufferSource(); src.buffer = buf;
      // Sample assumed at C4 (MIDI 60); pitch-shift for other notes.
      const ratio = Math.pow(2, (note - 60) / 12);
      src.playbackRate.value = ratio * (1 + (Math.random() - 0.5) * 0.03);
      const g = ctx.createGain();
      g.gain.value = 0.28 * (1 + (Math.random() - 0.5) * 0.10) / Math.max(1, (notes.length * 0.5));
      src.connect(g); g.connect(dest);
      const offset = idx * 0.008 + Math.random() * 0.005;
      src.start(t + offset);
      autoClean(src, g);
    });
    return;
  }

  const prof = MID_CHARACTERS[characterName] || MID_CHARACTERS['grand-piano'];
  const _dscl   = Math.max(0.25, Math.min(8.0, durScale || 1.0));
  const _mStyle = (typeof styleP === 'function') ? styleP() : { noteLenMult:1, attackMult:1 };
  const sustain = (1.0 + 0.45 * _dscl) * (_mStyle.noteLenMult || 1) / warp;

  const group = _buildMidGroup(ctx, t, sustain, prof, chaos);
  group.out.connect(dest);

  const notesArr = (notes || []).slice(0, 4);
  notesArr.forEach((note, idx)=>{
    const freq = 440 * Math.pow(2, (note - 69) / 12) * warp;
    if(freq <= 0 || freq > 8000) return;
    const J = _rollMidJitter(prof);
    const strumOff = prof.chordStrum ? _midStrumOffset(idx, prof.chordStrum.msPerNote[0], prof.chordStrum.msPerNote[1]) : idx * 0.006;
    const nT = t + strumOff;
    _playMidBody(ctx, nT, freq, note, idx, prof, J, sustain, chaos, windBoost, group.input);
    _playMidAir (ctx, nT, freq, note, prof, J, group.input, dest);
    _playMidSub (ctx, nT, freq, note, prof, J, sustain, group.input);
    _playMidTail(ctx, nT + sustain, freq, note, prof, J, dest);
  });
}

// ── Body layer dispatch by profile.body.type
function _playMidBody(ctx, t, freq, note, idx, prof, J, sustain, chaos, windBoost, dest){
  const atk = Math.max(0.002, (prof.attack.peakMs * 0.001) * J.attackMul);
  const curve = prof.attack.curve || 0.6;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(1.0, t + atk);
  g.gain.setTargetAtTime(curve, t + atk + 0.01, sustain * 0.20);
  g.gain.exponentialRampToValueAtTime(0.0001, t + sustain);
  g.connect(dest);
  autoClean(g);

  const body = prof.body;
  if(body.type === 'additive'){
    const B = body.inharmonicity || 0;
    body.partials.forEach(function(p){
      const n = p.n || 1;
      const pf = freq * n * Math.sqrt(1 + B*n*n);
      if(pf > 16000) return;
      const osc = ctx.createOscillator(); osc.type = 'sine'; osc.frequency.value = pf;
      if(body.flutterHz){
        const fMin = body.flutterHz[0], fMax = body.flutterHz[1];
        const lfo = ctx.createOscillator(); lfo.type='sine';
        lfo.frequency.value = fMin + Math.random()*(fMax - fMin);
        const lG = ctx.createGain(); lG.gain.value = pf * (body.flutterCents/1200) * Math.log(2);
        lfo.connect(lG); lG.connect(osc.frequency);
        lfo.start(t); lfo.stop(t + sustain + 0.1);
        autoClean(lfo, lG);
      }
      const pg = ctx.createGain();
      const gainVal = p.g * (1 + J.partialMix * (Math.random()>0.5?1:-1));
      const pDec = sustain * (1.0 - Math.min(0.8, (n-1) * 0.12)); // upper partials decay faster
      pg.gain.setValueAtTime(gainVal, t);
      pg.gain.exponentialRampToValueAtTime(0.0001, t + pDec);
      osc.connect(pg); pg.connect(g);
      osc.start(t); osc.stop(t + pDec + 0.02);
      autoClean(osc, pg);
    });
  } else if(body.type === 'fm-alg5'){
    body.pairs.forEach(function(pair){
      const carF = pair.suboct ? freq * 0.5 : freq;
      const car = ctx.createOscillator(); car.type='sine'; car.frequency.value = carF;
      const mod = ctx.createOscillator(); mod.type='sine';
      mod.frequency.value = carF * pair.ratio * (1 + (Math.random()-0.5)*0.02);
      const modG = ctx.createGain();
      const midx = pair.modIdx[0] + Math.random()*(pair.modIdx[1] - pair.modIdx[0]);
      modG.gain.setValueAtTime(carF * midx, t);
      modG.gain.exponentialRampToValueAtTime(carF * midx * 0.1, t + pair.modDecay);
      mod.connect(modG); modG.connect(car.frequency);
      const cg = ctx.createGain(); cg.gain.value = pair.carGain;
      car.connect(cg); cg.connect(g);
      car.start(t); mod.start(t);
      car.stop(t + sustain + 0.05); mod.stop(t + sustain + 0.05);
      autoClean(car, mod, modG, cg);
    });
    if(body.extraBuzz){
      const buzz = ctx.createOscillator(); buzz.type='square';
      buzz.frequency.value = freq * body.extraBuzz.ratio;
      const bg = ctx.createGain();
      bg.gain.setValueAtTime(body.extraBuzz.gain, t);
      bg.gain.exponentialRampToValueAtTime(0.002, t + 0.12);
      buzz.connect(bg); bg.connect(g);
      buzz.start(t); buzz.stop(t + 0.2);
      autoClean(buzz, bg);
    }
  } else if(body.type === 'sawtooth'){
    const o = ctx.createOscillator(); o.type='sawtooth'; o.frequency.value = freq;
    o.detune.value = (idx - 1) * 4 * J.detuneMul;
    o.connect(g);
    o.start(t); o.stop(t + sustain + 0.05);
    autoClean(o);
  } else if(body.type === 'karplus-strong'){
    const pickPos = body.pickPosRange[0] + Math.random()*(body.pickPosRange[1] - body.pickPosRange[0]);
    const period = 1/freq;
    const dLine = ctx.createDelay(1); dLine.delayTime.value = period;
    const lp = ctx.createBiquadFilter(); lp.type='lowpass';
    lp.frequency.value = 2200 + Math.random()*2000 + windBoost*600;
    lp.Q.value = 0.4;
    const fb = ctx.createGain();
    fb.gain.value = body.feedbackRange[0] + Math.random()*(body.feedbackRange[1]-body.feedbackRange[0]);
    dLine.connect(lp); lp.connect(fb); fb.connect(dLine);
    // Pick-position comb excitation
    const SR = ctx.sampleRate;
    const eLen = Math.floor(SR*(0.006 + pickPos*0.012));
    const eBuf = ctx.createBuffer(1, eLen, SR);
    const eD = eBuf.getChannelData(0);
    for(let i=0;i<eLen;i++){
      const n = Math.random()*2-1;
      const env = Math.pow(1 - i/eLen, 0.3 + pickPos*0.5);
      const comb = 1 - Math.cos(2*Math.PI*pickPos*(i/(eLen||1)));
      eD[i] = n * env * comb * 0.9;
    }
    const exc = ctx.createBufferSource(); exc.buffer = eBuf;
    exc.connect(dLine); dLine.connect(g);
    exc.start(t);
    autoClean(exc, dLine, lp, fb);
    // Body resonance (nylon guitar)
    if(prof.bodyResonance){
      prof.bodyResonance.peaks.forEach(function(pk){
        const bp = ctx.createBiquadFilter(); bp.type='bandpass';
        bp.frequency.value = pk[0]; bp.Q.value = pk[1];
        const bpg = ctx.createGain(); bpg.gain.value = 0.12;
        dLine.connect(bp); bp.connect(bpg); bpg.connect(g);
        autoClean(bp, bpg);
      });
    }
  } else if(body.type === 'multisaw'){
    const n = body.voices || 4;
    const spread = body.spreadCents || 10;
    for(let i=0;i<n;i++){
      const dt = ((i - (n-1)/2) / Math.max(1, (n-1)/2)) * spread * J.detuneMul;
      const o = ctx.createOscillator(); o.type='sawtooth';
      o.frequency.value = freq; o.detune.value = dt;
      const og = ctx.createGain(); og.gain.value = 1 / n;
      o.connect(og); og.connect(g);
      o.start(t); o.stop(t + sustain + 0.05);
      autoClean(o, og);
    }
    if(body.pwmSquare){
      const sq = ctx.createOscillator(); sq.type='square'; sq.frequency.value = freq;
      const pwmLfo = ctx.createOscillator(); pwmLfo.type='sine';
      const pr = body.pwmRateHz[0] + Math.random()*(body.pwmRateHz[1]-body.pwmRateHz[0]);
      pwmLfo.frequency.value = pr;
      const pG = ctx.createGain(); pG.gain.value = 8;
      pwmLfo.connect(pG); pG.connect(sq.detune);
      const sqG = ctx.createGain(); sqG.gain.value = 0.25;
      sq.connect(sqG); sqG.connect(g);
      sq.start(t); pwmLfo.start(t);
      sq.stop(t + sustain + 0.05); pwmLfo.stop(t + sustain + 0.05);
      autoClean(sq, pwmLfo, pG, sqG);
    }
  } else if(body.type === 'wavetable'){
    // Approximate wavetable morph via two oscillators crossfading over time
    const o1 = ctx.createOscillator(); o1.type='sawtooth'; o1.frequency.value = freq;
    const o2 = ctx.createOscillator(); o2.type='triangle'; o2.frequency.value = freq;
    const o3 = ctx.createOscillator(); o3.type='square';   o3.frequency.value = freq;
    const g1 = ctx.createGain(), g2 = ctx.createGain(), g3 = ctx.createGain();
    const morphHz = body.morphHz[0] + Math.random()*(body.morphHz[1]-body.morphHz[0]);
    const morph = ctx.createOscillator(); morph.type='sine';
    morph.frequency.value = morphHz;
    const mg1 = ctx.createGain(); mg1.gain.value = 0.4;
    const mg2 = ctx.createGain(); mg2.gain.value = 0.4;
    const mg3 = ctx.createGain(); mg3.gain.value = 0.4;
    g1.gain.value = 0.4; g2.gain.value = 0.4; g3.gain.value = 0.2;
    morph.connect(mg1); mg1.connect(g1.gain);
    morph.connect(mg2); mg2.connect(g2.gain);
    morph.connect(mg3); mg3.connect(g3.gain);
    o1.connect(g1); o2.connect(g2); o3.connect(g3);
    g1.connect(g); g2.connect(g); g3.connect(g);
    const stopT = t + sustain + 0.05;
    o1.start(t); o2.start(t); o3.start(t); morph.start(t);
    o1.stop(stopT); o2.stop(stopT); o3.stop(stopT); morph.stop(stopT);
    autoClean(o1,o2,o3,g1,g2,g3,morph,mg1,mg2,mg3);
  }

  // Slow FM layer (prophet-pad only)
  if(prof.fm){
    const ratio = prof.fm.ratio[0] + Math.random()*(prof.fm.ratio[1]-prof.fm.ratio[0]);
    const depth = prof.fm.depth[0] + Math.random()*(prof.fm.depth[1]-prof.fm.depth[0]);
    const rate  = prof.fm.rateHz[0] + Math.random()*(prof.fm.rateHz[1]-prof.fm.rateHz[0]);
    const fmM = ctx.createOscillator(); fmM.type='sine';
    fmM.frequency.value = rate;
    const fmD = ctx.createGain(); fmD.gain.value = freq * depth;
    fmM.connect(fmD);
    // Note: can't easily modulate all voices' freq individually; attach to a
    // shared modulator that biases the group filter for psychoacoustic FM feel
    fmM.start(t); fmM.stop(t + sustain + 0.1);
    autoClean(fmM, fmD);
  }
}

// ── Air layer (attack noise burst or continuous bed)
function _playMidAir(ctx, t, freq, note, prof, J, dest, rawDest){
  if(!prof.air) return;
  const SR = ctx.sampleRate;
  if(prof.air.burst){
    const dur = Math.max(0.002, (prof.air.durMs * 0.001) * J.airDurMul);
    const len = Math.max(32, Math.floor(SR * dur));
    const buf = ctx.createBuffer(1, len, SR);
    const d = buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 0.7);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const f = ctx.createBiquadFilter();
    if(prof.air.bpCenter){
      const cMin = prof.air.bpCenter[0], cMax = prof.air.bpCenter[1];
      f.type = 'bandpass';
      f.frequency.value = cMin + Math.random()*(cMax-cMin);
      f.Q.value = prof.air.bpQ || 1.2;
    } else if(prof.air.hpCenter){
      f.type = 'highpass';
      f.frequency.value = prof.air.hpCenter[0] + Math.random()*(prof.air.hpCenter[1]-prof.air.hpCenter[0]);
    } else {
      f.type = 'highpass'; f.frequency.value = 800;
    }
    const g = ctx.createGain();
    g.gain.setValueAtTime(prof.air.gain, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur * 2);
    src.connect(f); f.connect(g); g.connect(dest);
    src.start(t);
    autoClean(src, f, g);
  } else if(prof.air.continuousBed){
    // Continuous low-level noise bed for tape/pad room feel. ~200ms burst.
    const dur = 0.25;
    const len = Math.floor(SR * dur);
    const buf = ctx.createBuffer(1, len, SR);
    const d = buf.getChannelData(0);
    for(let i=0;i<len;i++) d[i] = (Math.random()*2-1) * 0.5;
    const src = ctx.createBufferSource(); src.buffer = buf; src.loop = true;
    const lp = ctx.createBiquadFilter(); lp.type='lowpass';
    lp.frequency.value = prof.air.lpCenter || 3500;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(prof.air.gain, t + 0.08);
    g.gain.setValueAtTime(prof.air.gain, t + 0.5);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 1.5);
    src.connect(lp); lp.connect(g); g.connect(dest);
    src.start(t); src.stop(t + 1.6);
    autoClean(src, lp, g);
  }
}

// ── Sub layer (triangle 0.5× with key fade)
function _playMidSub(ctx, t, freq, note, prof, J, sustain, dest){
  if(!prof.sub || !prof.sub.enabled) return;
  const fade = prof.sub.keyFade;
  const keyGain = fade ? Math.max(0, 1 - Math.max(0, (note - fade.top)) * fade.slope) : 1.0;
  if(keyGain <= 0.02) return;
  const sub = ctx.createOscillator(); sub.type='triangle';
  sub.frequency.value = freq * 0.5;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.18 * keyGain, t + 0.006);
  g.gain.exponentialRampToValueAtTime(0.0001, t + sustain * 0.9);
  sub.connect(g); g.connect(dest);
  sub.start(t); sub.stop(t + sustain + 0.05);
  autoClean(sub, g);
}

// ── Release tail: damper noise / resonant partial ring after note-off
function _playMidTail(ctx, releaseStart, freq, note, prof, J, rawDest){
  if(!prof.tail) return;
  const durMs = prof.tail.durMs;
  const d = (durMs[0] + Math.random()*(durMs[1] - durMs[0])) * 0.001;
  if(prof.tail.damperNoise){
    const SR = ctx.sampleRate;
    const len = Math.floor(SR * Math.min(0.06, d));
    const buf = ctx.createBuffer(1, len, SR);
    const nd = buf.getChannelData(0);
    for(let i=0;i<len;i++) nd[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 1.2);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const hp = ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value = 1500;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.04, releaseStart);
    g.gain.exponentialRampToValueAtTime(0.0001, releaseStart + 0.05);
    src.connect(hp); hp.connect(g); g.connect(rawDest);
    src.start(releaseStart);
    autoClean(src, hp, g);
  }
  if(prof.tail.resonantPartials){
    // One faint sine at the fundamental ringing out for the damper duration
    const osc = ctx.createOscillator(); osc.type='sine'; osc.frequency.value = freq;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.025, releaseStart);
    g.gain.exponentialRampToValueAtTime(0.0001, releaseStart + d);
    osc.connect(g); g.connect(rawDest);
    osc.start(releaseStart); osc.stop(releaseStart + d + 0.02);
    autoClean(osc, g);
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// MID SYNTH ROUTER — reads styleP().midBank array + rotation index off AR.
// Rotates every 4 measures so within one song you hear different timbres.
// ═══════════════════════════════════════════════════════════════════════════════
// Per-voice manual advance: incremented by a UI button so the user can
// force the next character immediately instead of waiting 4 bars.
let _midCharBump = 0;
let _leadModeBump = 0;
function bumpMidCharacter(){ _midCharBump = (_midCharBump + 1) | 0; }
function bumpLeadMode(){ _leadModeBump = (_leadModeBump + 1) | 0; }
if(typeof window!=='undefined'){
  window.bumpMidCharacter = bumpMidCharacter;
  window.bumpLeadMode = bumpLeadMode;
}

function pickMidSynthName(ar){
  const sp = (typeof styleP==='function')?styleP():null;
  const bank = (sp && sp.midBank) || [sp && sp.midMode || 'keys'];
  const barIdx = Math.floor(((ar&&ar.measureCount)||0) / 4);
  const idx = ((barIdx + _midCharBump) % bank.length + bank.length) % bank.length;
  return bank[idx];
}
// Legacy-name → new-character aliases so existing midBank arrays keep working
// while we migrate. Each old name maps to its closest new character profile.
const _MID_CHAR_ALIAS = {
  piano:   'grand-piano',
  rhodes:  'rhodes-mk2',
  wurli:   'wurlitzer-200',
  clav:    'clavinet-d6',
  xylo:    'vibraphone',     // closest metallic-bar profile
  marimba: 'vibraphone',     // (vibes covers mallet territory; could add later)
  vibes:   'vibraphone',
  guitar:  'nylon-guitar',
  keys:    'grand-piano',
  mid:     'prophet-pad',
};
function runMidSynth(name, ctx, t, notes, chordType, chaos, warp, dest, windBoost, durScale){
  const character = (MID_CHARACTERS[name] ? name : _MID_CHAR_ALIAS[name]) || 'grand-piano';
  // Stereo doubling with DIFFERENT character per side. Hard-pan both, but
  // the L side gets a short bright reverb (40 ms tail, HP 800Hz) and the
  // R side gets a slightly longer darker reverb (90 ms, LP 4kHz). Plus a
  // ~3.5 ms Haas delay on the R side. Result: notes feel naturally wide
  // and three-dimensional instead of just-the-same-sound-in-both-ears.
  const pL = ctx.createStereoPanner(); pL.pan.value = -0.95; pL.connect(dest);
  const pR = ctx.createStereoPanner(); pR.pan.value = +0.95; pR.connect(dest);
  // Per-side micro-reverbs (generated short noise IRs). Different lengths
  // and frequency tilt = distinct character.
  const _midSideReverb = (lenMs, hpHz, lpHz) => {
    const irLen = Math.floor(ctx.sampleRate * (lenMs/1000));
    const irBuf = ctx.createBuffer(1, irLen, ctx.sampleRate);
    const d = irBuf.getChannelData(0);
    for(let i=0; i<irLen; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/irLen, 2.6);
    const cv = ctx.createConvolver(); cv.buffer = irBuf;
    const hp = ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value = hpHz; hp.Q.value = 0.7;
    const lp = ctx.createBiquadFilter(); lp.type='lowpass';  lp.frequency.value = lpHz; lp.Q.value = 0.5;
    const wet = ctx.createGain(); wet.gain.value = 0.25;
    cv.connect(hp); hp.connect(lp); lp.connect(wet);
    return { input: cv, output: wet };
  };
  const revL = _midSideReverb( 40, 800, 7500); // bright + short
  const revR = _midSideReverb( 90, 200, 4500); // dark + longer
  revL.output.connect(pL); revR.output.connect(pR);
  // Per-hit microtonal drift: ±5 cents per side, independent
  const driftL = (Math.random() - 0.5) * 0.10;
  const driftR = (Math.random() - 0.5) * 0.10;
  const notesL = notes.map(n => n + driftL);
  const notesR = notes.map(n => n + driftR);
  // Each side: dry pan + send to its reverb (parallel, so dry hits + tail blend)
  const dryL = ctx.createGain(); dryL.gain.value = 1.0; dryL.connect(pL); dryL.connect(revL.input);
  const dryR = ctx.createGain(); dryR.gain.value = 1.0; dryR.connect(pR); dryR.connect(revR.input);
  synthMidVoice(ctx, t,            notesL, chordType, chaos, warp, dryL, windBoost, durScale * 0.99, character);
  // 3.5 ms Haas delay on the right side — perceived width without phase issues
  synthMidVoice(ctx, t + 0.0035,   notesR, chordType, chaos, warp, dryR, windBoost, durScale * 1.01, character);
  // Explicit cleanup — autoClean would no-op on these (panner/filter/gain
  // don't fire onended). Schedule a disconnect 2 s after the note so the
  // wrapper nodes can't pile up over a long session.
  const _killT = (durScale > 4 ? 8 : 2) * 1000;
  setTimeout(()=>{
    try { pL.disconnect(); pR.disconnect();
          revL.input.disconnect(); revL.output.disconnect();
          revR.input.disconnect(); revR.output.disconnect();
          dryL.disconnect(); dryR.disconnect(); }
    catch(e){}
  }, _killT);
}

// LEAD mode rotation: picks a name out of styleP().leadBank; synthLead reads
// the mode via _overrideLeadMode if we set it, otherwise styleP().leadMode.
let _overrideLeadMode = null;
function pickLeadMode(ar){
  const sp = (typeof styleP==='function')?styleP():null;
  const bank = (sp && sp.leadBank) || [sp && sp.leadMode || 'saw'];
  const barIdx = Math.floor(((ar&&ar.measureCount)||0) / 4);
  const idx = ((barIdx + _leadModeBump) % bank.length + bank.length) % bank.length;
  return bank[idx];
}

function synthBass(ctx, t, note, chaos, warp, windBoost=0, inputChar=0.5, beat=0, destIn=null){
  const dest=destIn||bus.getInput('bass'); if(!dest)return;
  const freq=440*Math.pow(2,(note-69)/12)*warp;
  const s=drumSeed();
  const pc=((note%12)+12)%12; const pcMod=pc/12;
  // Deep-design move for this hit. Routed into vibrato/tremolo/pitch-bend
  // /staccato/drive based on the Q-learner's pick. The module scores itself
  // off voice winding so annoying moves eventually lose weight.
  let _dd=null;
  try{
    const arcName = (typeof tensionArc!=='undefined' && tensionArc.currentArc && tensionArc.currentArc.name) || '-';
    const chName  = (typeof window!=='undefined' && window._bandAR) ? (window._bandAR.chordType||'-') : '-';
    _dd = deepDesign.pick('bass', {chord:chName, arc:arcName, tBucket: windBoost>0.5?'hi':windBoost>0.25?'mid':'lo'});
  }catch(_){}
  // LFO: slow drift on cutoff offset, med drift on the presence harmonic
  // gain (below). No fast LFO on bass -- 2Hz vibrato on low notes = cartoon.
  const lSlow = lfoBank.get('slow',t);
  const lMed  = lfoBank.get('med',t);
  // Bias a few per-hit parameters toward learned-good bass values.
  s.punch = paramMemory.bias('bass','punch', s.punch);
  s.tone  = paramMemory.bias('bass','tone',  s.tone);
  // Gate bass if the remaining seed is still far off the learned norm.
  if(!s._wild && paramMemory.shouldGate('bass', s)){
    s.punch *= 0.65; s.tone *= 0.8; windBoost *= 0.6;
  }

  // Neural inputs -- same brain as sub, different inference
  const inputs=bassBrain.update(windBoost*10, chaos, pcMod, beat);
  const nn=bassBrain.infer(inputs);

  // Select synthesis mode. Bass kit can override the neural pick so the
  // user's reseed actually changes the bass character. 'clean' / 'finger' /
  // 'pick' / 'upright' / 'acoustic' give varieties beyond the reece-ish
  // growl/sustain modes.
  let mode;
  if(_bassKit.mode === 'auto'){
    // Tilt auto selection toward the gentler modes; growl only at high chaos.
    const modeVal=(nn.harmonicMix + chaos*0.3 + windBoost*0.2 + pcMod*0.15) % 1.0;
    if(chaos < 0.25 && windBoost < 0.35) mode = 'finger';
    else if(modeVal<0.22)               mode = 'pluck';
    else if(modeVal<0.42)               mode = 'finger';
    else if(modeVal<0.60)               mode = 'pick';
    else if(modeVal<0.78)               mode = 'sustain';
    else if(modeVal<0.90)               mode = 'slap';
    else                                mode = 'growl';
  } else {
    mode = _bassKit.mode;
  }
  // Delegate upright/acoustic to the dedicated pluck-with-body synth.
  if(mode==='upright' || mode==='acoustic'){
    synthUprightBass(ctx, t, note, chaos, warp, windBoost, dest);
    return;
  }

  const _styleLen=styleP().noteLenMult;
  // CLEAN bass path: the wobble-free option. Pure pulse through a gentle
  // lowpass, no ring mod, no filter LFO, no detune wobble. Returns early so
  // none of the subtractive modulation below fires.
  if(mode === 'clean'){
    const dur = 0.32 * _styleLen / warp;
    const osc = ctx.createOscillator(); osc.type = 'square';
    osc.frequency.value = freq;
    osc.detune.value = (pcMod*4-2);
    const lpf = ctx.createBiquadFilter(); lpf.type='lowpass';
    lpf.frequency.value = Math.max(180, (650 + inputChar*500 + pcMod*200)*warp);
    lpf.Q.value = 0.8;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.55 + windBoost*0.10, t + 0.006);
    g.gain.linearRampToValueAtTime(0.40 + windBoost*0.05, t + dur*0.7);
    g.gain.linearRampToValueAtTime(0.0001, t + dur);
    osc.connect(lpf); lpf.connect(g); g.connect(dest);
    osc.start(t); osc.stop(t + dur + 0.03);
    autoClean(osc, lpf, g);
    return;
  }
  // Envelope tween: scale decay by the slow-moving envelope target for bass.
  // Tight (low env) = shorter/punchier. Open (high env) = longer, breathier.
  const _bassEnv = motionTween.envFor('bass');
  const _DT = {pluck:0.22,slap:0.18,sustain:0.55,growl:0.40,finger:0.28,pick:0.20};
  const _BT = {pluck:'triangle',slap:'square',sustain:'sawtooth',growl:'sawtooth',finger:'triangle',pick:'sawtooth'};
  const decayTime=(_DT[mode] ?? 0.28)*_styleLen/warp * (0.6 + _bassEnv*0.8);
  const bodyType=_BT[mode] || 'triangle';

  // -- BODY OSCILLATOR ---------------------------------------------------
  const body=ctx.createOscillator(); body.type=bodyType;
  // IMPROV ORNAMENTS: slides, bends, grace notes per hit so bass doesn't
  // sound like it's holding one note. Picked stochastically; a grace note
  // schedules an extra short osc, slide/bend just shape body.frequency.
  const ornRoll = Math.random();
  const _freqAt = (semi)=> freq * Math.pow(2, semi/12);
  let ornament = null;
  if(ornRoll < 0.22)      ornament = 'slide_up';    // portamento from -2..-3
  else if(ornRoll < 0.38) ornament = 'slide_down';  // portamento from +2..+4
  else if(ornRoll < 0.52) ornament = 'bend_up';     // pitch rises +1..+2 st mid-note
  else if(ornRoll < 0.62) ornament = 'bend_down';   // pitch falls -1..-2 st at tail
  else if(ornRoll < 0.72) ornament = 'grace';       // quick pre-hit note

  if(ornament==='slide_up'){
    const from = _freqAt(-(2 + Math.random()*2));
    body.frequency.setValueAtTime(from, t);
    body.frequency.exponentialRampToValueAtTime(freq*(1+s.color*0.004), t + 0.060);
  } else if(ornament==='slide_down'){
    const from = _freqAt(+(2 + Math.random()*2));
    body.frequency.setValueAtTime(from, t);
    body.frequency.exponentialRampToValueAtTime(freq*(1+s.color*0.004), t + 0.060);
  } else if(ornament==='bend_up'){
    body.frequency.setValueAtTime(freq*(1+s.color*0.004), t);
    // Hold, then bend up between 40% and 70% of the note, release back toward target.
    const bendAt = t + 0.14;
    const bendSemi = 1 + Math.random()*1.2;
    body.frequency.exponentialRampToValueAtTime(_freqAt(bendSemi), bendAt);
    body.frequency.exponentialRampToValueAtTime(freq, bendAt + 0.16);
  } else if(ornament==='bend_down'){
    body.frequency.setValueAtTime(freq*(1+s.color*0.004), t);
    const bendAt = t + 0.18;
    body.frequency.exponentialRampToValueAtTime(_freqAt(-(1 + Math.random()*1.2)), bendAt);
  } else if(ornament==='grace'){
    body.frequency.value = freq*(1+s.color*0.004);
    // Extra short grace-note osc a whole-step below, tucked 60 ms before the hit.
    const gT = Math.max(0, t - 0.055);
    const graceOsc = ctx.createOscillator(); graceOsc.type = bodyType;
    graceOsc.frequency.value = _freqAt(-2);
    const gg = ctx.createGain();
    gg.gain.setValueAtTime(0, gT);
    gg.gain.linearRampToValueAtTime(0.55, gT + 0.003);
    gg.gain.exponentialRampToValueAtTime(0.0001, gT + 0.055);
    graceOsc.connect(gg); gg.connect(dest);
    graceOsc.start(gT); graceOsc.stop(gT + 0.060);
    autoClean(graceOsc, gg);
  } else {
    body.frequency.value=freq*(1+s.color*0.004);
  }
  // Per-hit detune only. No LFO vibrato here -- a 2Hz wobble on bass sounds cartoony.
  body.detune.value=(pcMod*8-4)+(s.color*5-2.5);

  // -- RESONANT FILTER: neural cutoff + mode-specific envelope ----------
  const flt=ctx.createBiquadFilter(); flt.type='lowpass';
  const _BQ={pluck:4.5,slap:6.0,sustain:2.5,growl:8.0,finger:1.8,pick:3.2};
  const baseQ=_BQ[mode] ?? 2.5;
  flt.Q.value=baseQ+chaos*(mode==='finger'?2:8)+nn.filterCutoff*5+s.punch*3;

  // Filter envelope: each mode has distinct shape. Keep LFO contribution
  // tiny and SLOW only -- enough to make consecutive hits differ, not enough
  // to modulate the cutoff audibly within a note.
  const _FO={pluck:800,slap:2200,sustain:600,growl:1400,finger:900,pick:1800};
  const _FC={pluck:80,slap:120,sustain:180,growl:60,finger:220,pick:260};
  const fOpen=_FO[mode] ?? 800;
  const fClose=_FC[mode] ?? 150;
  const lfoCutoff = lSlow*45;
  flt.frequency.setValueAtTime(Math.max(80,(fOpen+windBoost*400+inputChar*600+chaos*1200+pcMod*300+lfoCutoff)*warp), t);
  flt.frequency.exponentialRampToValueAtTime(Math.max(40,(fClose+pcMod*30)*warp), t+decayTime);

  // -- GAIN ENVELOPE -----------------------------------------------------
  const _atk=styleP().attackMult;
  const _AT={pluck:0.003,slap:0.001,sustain:0.020,growl:0.008,finger:0.006,pick:0.0015};
  const attackT=(_AT[mode] ?? 0.008)*_atk;
  const g=ctx.createGain();
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(0.80+windBoost*0.12+pcMod*0.05, t+attackT);
  g.gain.linearRampToValueAtTime(0.0001, t+decayTime+0.03);
  g.gain.setValueAtTime(0, t+decayTime+0.05);

  // -- GROWL MODE: ring mod layer was squidward-ish. Disabled outright;
  // growl now relies on the filter env + saw body for bite, nothing else.

  // -- SLAP MODE: transient click layer ---------------------------------
  if(mode==='slap'){
    const click=ctx.createOscillator(); click.type='square';
    click.frequency.setValueAtTime(freq*4,t);
    click.frequency.exponentialRampToValueAtTime(freq,t+0.02/warp);
    const cg=ctx.createGain();
    cg.gain.setValueAtTime(s.punch*0.55,t);
    cg.gain.linearRampToValueAtTime(0.0001,t+0.025/warp);
    click.connect(cg); cg.connect(dest);
    click.start(t); click.stop(t+0.03/warp);
    autoClean(click,cg);
  }

  // -- PICK MODE: bright filtered click that reads as a pick-attack -----
  if(mode==='pick'){
    const click=ctx.createOscillator(); click.type='triangle';
    click.frequency.setValueAtTime(freq*5.5,t);
    click.frequency.exponentialRampToValueAtTime(freq*2,t+0.008/warp);
    const cg=ctx.createGain();
    cg.gain.setValueAtTime(s.punch*0.40,t);
    cg.gain.linearRampToValueAtTime(0.0001,t+0.014/warp);
    click.connect(cg); cg.connect(dest);
    click.start(t); click.stop(t+0.02/warp);
    autoClean(click,cg);
  }

  // -- FINGER MODE: no click, a soft flesh-on-string thump via a short
  // lowpassed noise burst. Very gentle, warm, "real bass" feel.
  if(mode==='finger'){
    const nLen=Math.floor(ctx.sampleRate*0.018);
    const nBuf=ctx.createBuffer(1,nLen,ctx.sampleRate);
    const nd=nBuf.getChannelData(0);
    for(let i=0;i<nLen;i++) nd[i]=(Math.random()*2-1)*Math.pow(1-i/nLen,2.0);
    const ns=ctx.createBufferSource(); ns.buffer=nBuf;
    const nlp=ctx.createBiquadFilter(); nlp.type='lowpass';
    nlp.frequency.value=Math.min(900, freq*3.5); nlp.Q.value=0.6;
    const ng=ctx.createGain();
    ng.gain.setValueAtTime(0.22+s.punch*0.10,t);
    ng.gain.exponentialRampToValueAtTime(0.0001,t+0.020);
    ns.connect(nlp); nlp.connect(ng); ng.connect(dest);
    ns.start(t); ns.stop(t+0.025);
    autoClean(ns,nlp,ng);
  }

  // Presence harmonic removed -- was adding the high-end fizz the user
  // complained about. Bass stays fundamental-only; the body osc plus
  // filter env carries all the character.

  // Bass filter LFO removed too (was the squidward wah). The filter env
  // in the flt.frequency ramp does the work. No per-note wobble.
  if(false && mode==='growl'){
    const bassLfo=ctx.createOscillator(); bassLfo.type='sine';
    bassLfo.frequency.value=0.8+s.color*1.4;
    const bassLfoGain=ctx.createGain();
    bassLfoGain.gain.value=40+chaos*110;
    bassLfo.connect(bassLfoGain); bassLfoGain.connect(flt.frequency);
    bassLfo.start(t); bassLfo.stop(t+decayTime+0.05);
    autoClean(bassLfo,bassLfoGain);
  }

  body.connect(flt); flt.connect(g); g.connect(dest);
  body.start(t); body.stop(t+decayTime+0.08);
  autoClean(body,flt,g);
  // Apply deepDesign move (live sound-design). The module picks one of
  // staccato / vibrato / tremolo / bend per hit when active.
  try{
    if(_dd && deepDesign.active){
      if(_dd.move==='staccato'){
        // Already started; shorten envelope by re-scheduling an early fade.
        g.gain.cancelScheduledValues(t+decayTime*0.4);
        g.gain.exponentialRampToValueAtTime(0.0001, t+decayTime*0.5);
      } else if(_dd.move==='vibrato'){
        // Very gentle bass vibrato (5 cents max) -- bigger depth reads as squidward.
        const [lfo,g2] = expressionFX.vibrato(ctx, body.frequency, freq, 4.8, 5, t, decayTime+0.05);
        autoClean(lfo,g2);
      } else if(_dd.move==='tremolo' && (mode==='sustain'||mode==='growl'||mode==='finger')){
        const [lfo,g2] = expressionFX.tremolo(ctx, g.gain, 0.4, 6.5, 0.20, t, decayTime+0.05);
        autoClean(lfo,g2);
      } else if(_dd.move==='bend'){
        // Bend up one semitone over the first 40% of the note.
        expressionFX.pitchBend(body.frequency, freq*0.94, freq, t, decayTime*0.40);
      }
    }
    // Observe winding delta once per hit; voice winding comes from the
    // scheduler via window._bandVoices.
    const _bv = (typeof window!=='undefined') ? window._bandVoices : null;
    if(_bv && _bv.bass){
      const annoyance = s._wild ? 0.25 : 0;
      deepDesign.observe('bass', _bv.bass.winding||0, annoyance);
    }
  }catch(_){}
  // Teach the bass "good-params" distribution on strong, non-wildcard hits.
  if(!s._wild && windBoost > 0.28){
    paramMemory.observe('bass', {punch:s.punch,tone:s.tone,color:s.color,pitch:s.pitch}, Math.min(1, windBoost*1.6));
  }
}

function synthMid(ctx,t,notes,chordType,chaos,warp,dest,windBoost=0,durScale=1.0){
  const ct=CHORDS[chordType]||CHORDS.maj;
  const s=drumSeed();
  const dark=bandTaste.darkness;

  // Chord character based on taste: dark=minor-flavored FM, bright=cleaner
  const fmR=ct.fm*(1+dark*0.15)+(chaos*0.1-0.05)+(s.tone*0.06-0.03);

  // Envelope
  const _mStyle=styleP();
  const _dscl=Math.max(0.25, Math.min(8.0, durScale||1.0));
  const atkT=(0.02+s.decay*0.035)*_mStyle.attackMult/warp;
  const susT=(1.1+s.tone*0.5+windBoost*0.35)*_mStyle.noteLenMult*_dscl/warp;
  const maxVoices=DeviceComp.score<0.45?2:3;
  const voiceNotes=notes.slice(0,maxVoices);

  voiceNotes.forEach(function(note,idx){
    const freq=440*Math.pow(2,(note-69)/12)*warp;
    const vS=s.color+idx*0.17+dark*0.1;

    // Carrier: sine blended with triangle for warmth (not harsh square)
    const car=ctx.createOscillator();
    car.type=vS>0.7?'triangle':'sine';
    car.frequency.value=freq;
    // Slight chorus detune per voice -- makes chords feel thick not thin
    car.detune.value=(idx===0?0:idx===1?-8:+8)+(s.punch*6-3);

    // Modulator with unique ratio
    const mod=ctx.createOscillator();
    mod.type='sine';
    mod.frequency.value=freq*fmR*(1+vS*0.04);
    const mG=ctx.createGain();
    // FM depth: more for jazz/dark, less for clean bright
    mG.gain.value=freq*(0.18+dark*0.25+chaos*0.18+s.sub*0.12+windBoost*0.08);

    // Second harmonic layer -- adds body
    const harm=ctx.createOscillator();
    harm.type='sine';
    harm.frequency.value=freq*2.01;
    const hG=ctx.createGain();
    hG.gain.value=0.12+dark*0.08+s.tone*0.06;

    // Resonant filter -- unique character per hit
    const flt=ctx.createBiquadFilter();
    flt.type='lowpass';
    const fOpen=(1800+chaos*3000+s.color*2000+windBoost*500)*warp;
    const fClose=(300+dark*400+chaos*200)*warp;
    flt.frequency.setValueAtTime(fOpen,t);
    flt.frequency.linearRampToValueAtTime(fClose,t+susT*0.6);
    flt.Q.value=Math.min(2.6, 0.8+s.punch*1.2+chaos*0.7);

    // Envelope
    const g=ctx.createGain();
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.22+windBoost*0.06,t+atkT);
    g.gain.setValueAtTime(0.18+windBoost*0.04,t+susT*0.5);
    g.gain.linearRampToValueAtTime(0.0001,t+susT);
    g.gain.setValueAtTime(0,t+susT+0.005);

    mod.connect(mG); mG.connect(car.frequency);
    harm.connect(hG); hG.connect(flt);
    car.connect(flt); flt.connect(g); g.connect(dest);

    const stopT=t+susT+0.01;
    mod.start(t); mod.stop(stopT);
    car.start(t); car.stop(stopT);
    harm.start(t); harm.stop(stopT);
    autoClean(car,flt,g);
    autoClean(mod,mG);
    autoClean(harm,hG);
  });
}


// -- LEAD: multi-mode synth engine --------------------------------------------
// leadMode is set per style profile and evolves via brain reinforcement.
// Modes: 'saw' (poly detuned), 'fm' (FM stab), 'bell' (FM bell), 'pluck' (KS pluck), 'whistle' (sine+vib)

// Stereo-doubled lead: hard-pan + per-side reverb so the lead sits wide
// instead of being a single mono note in the centre. Different reverb
// character per side (L: bright/short, R: dark/long) plus a 4 ms Haas
// delay on the right makes each note feel three-dimensional. Microtonal
// drift (±5 cents per side, independent) breaks phase symmetry too.
function playLeadStereo(ctx, t, note, chaos, warp, dest, windBoost, durScale){
  if(!dest) return;
  const pL = ctx.createStereoPanner(); pL.pan.value = -0.95; pL.connect(dest);
  const pR = ctx.createStereoPanner(); pR.pan.value = +0.95; pR.connect(dest);
  const _sideRev = (lenMs, hpHz, lpHz) => {
    const irLen = Math.floor(ctx.sampleRate * (lenMs/1000));
    const irBuf = ctx.createBuffer(1, irLen, ctx.sampleRate);
    const d = irBuf.getChannelData(0);
    for(let i=0; i<irLen; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/irLen, 2.4);
    const cv = ctx.createConvolver(); cv.buffer = irBuf;
    const hp = ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value = hpHz; hp.Q.value = 0.7;
    const lp = ctx.createBiquadFilter(); lp.type='lowpass';  lp.frequency.value = lpHz; lp.Q.value = 0.5;
    const wet = ctx.createGain(); wet.gain.value = 0.18;
    cv.connect(hp); hp.connect(lp); lp.connect(wet);
    return { input: cv, output: wet };
  };
  const revL = _sideRev( 55, 1200, 8000); // bright + short
  const revR = _sideRev(110,  400, 5000); // dark + longer
  revL.output.connect(pL); revR.output.connect(pR);
  const dryL = ctx.createGain(); dryL.gain.value = 1.0; dryL.connect(pL); dryL.connect(revL.input);
  const dryR = ctx.createGain(); dryR.gain.value = 1.0; dryR.connect(pR); dryR.connect(revR.input);
  // ±5 cent independent microtonal drift
  const driftL = (Math.random() - 0.5) * 0.10;
  const driftR = (Math.random() - 0.5) * 0.10;
  synthLead(ctx, t,          note + driftL, chaos, warp, dryL, windBoost, (durScale||1) * 0.99);
  synthLead(ctx, t + 0.0040, note + driftR, chaos, warp, dryR, windBoost, (durScale||1) * 1.01);
  // Same explicit cleanup as the mid doubler — autoClean is a no-op on
  // panner/filter/gain nodes so we schedule disconnect ourselves.
  setTimeout(()=>{
    try { pL.disconnect(); pR.disconnect();
          revL.input.disconnect(); revL.output.disconnect();
          revR.input.disconnect(); revR.output.disconnect();
          dryL.disconnect(); dryR.disconnect(); }
    catch(e){}
  }, 2000);
}

function synthLead(ctx,t,note,chaos,warp,dest,windBoost=0,durScale=1.0){
  const s=drumSeed();
  const _lStyle=styleP();
  // Deep-design pick for lead
  let _ddL=null;
  try{
    const arcName = (typeof tensionArc!=='undefined' && tensionArc.currentArc && tensionArc.currentArc.name) || '-';
    const chName  = (typeof window!=='undefined' && window._bandAR) ? (window._bandAR.chordType||'-') : '-';
    _ddL = deepDesign.pick('lead', {chord:chName, arc:arcName, tBucket: windBoost>0.5?'hi':windBoost>0.25?'mid':'lo'});
  }catch(_){}
  // Per-hit lead mode rotation: style default ~60% of the time, but 40% of
  // hits pick a different lead character (saw / fm / bell / whistle / pluck).
  // Wildcards always rotate. Makes the lead stop sounding like one patch.
  const LEAD_POOL = ['saw','fm','bell','whistle','pluck','strat','sax','trumpet'];
  const defaultLead = _lStyle.leadMode || 'saw';
  const mode = (s._wild || Math.random() < 0.40)
    ? LEAD_POOL[Math.floor(Math.random()*LEAD_POOL.length)]
    : defaultLead;
  const freq=440*Math.pow(2,(note-69)/12)*warp;
  // LFO only for long-form timbre drift. No note-length / volume wobble --
  // those made phrases sound like they were breathing wrong.
  const lSlow = lfoBank.get('slow',t);
  // Bias random params toward learned-good lead values
  s.punch = paramMemory.bias('lead','punch', s.punch);
  s.tone  = paramMemory.bias('lead','tone',  s.tone);
  s.color = paramMemory.bias('lead','color', s.color);
  // Artifact gate for lead -- if params drift far from learned-good, soften.
  if(!s._wild && paramMemory.shouldGate('lead', s)){
    s.punch *= 0.7; s.decay *= 0.8; windBoost *= 0.7;
  }
  // Envelope tween for lead: longer, more-open envelope when motionTween
  // targets higher values. At low env = punchy/tight, at high env = sustained.
  const _leadEnv = motionTween.envFor('lead');
  let durT=(0.22+s.tone*0.50+windBoost*0.18+chaos*0.25)*_lStyle.noteLenMult*(0.65 + _leadEnv*0.75)/warp;
  const atk = _lStyle.attackMult * 0.006 * (0.75 + _leadEnv*0.5);
  const vol = 0.09+windBoost*0.04+s.punch*0.03;

  // deepDesign staccato: shorten the note length BEFORE any branch runs.
  if(_ddL && _ddL.move==='staccato' && deepDesign.active){
    durT = durT * expressionFX.staccatoFactor();
  }

  // Hard ceiling: 10kHz lowpass on ALL lead modes -- prevents deafening highs
  // Gentle slope (Q=0.5) so it doesn't ring, just rolls off
  const ceiling=ctx.createBiquadFilter(); ceiling.type='lowpass';
  ceiling.frequency.value=10000; ceiling.Q.value=0.5;
  // Insert a post-branch gain node for tremolo (deepDesign.move=='tremolo').
  // All branches write into `leadDest` which is this gain; the gain then
  // feeds the ceiling filter and out to the real dest. Makes tremolo
  // possible without touching each branch's internal envelope.
  const postG = ctx.createGain(); postG.gain.value = 1.0;
  postG.connect(ceiling); ceiling.connect(dest);
  const leadDest=postG;
  if(_ddL && _ddL.move==='tremolo' && deepDesign.active){
    const [lfo,tg] = expressionFX.tremolo(ctx, postG.gain, 1.0, 5.8, 0.35, t, durT+0.2);
    autoClean(lfo, tg);
  }
  autoClean(ceiling, postG);

  if(mode==='saw'){
    // Classic detuned poly-saw -- 2-4 osc, portamento, lowpass filter sweep
    const portInterval = s.color>0.6?-12:s.color>0.3?-7:-5;
    const from=440*Math.pow(2,((note+portInterval)-69)/12)*warp;
    const portTime=(0.04+s.decay*0.08)/warp;
    const maxV=DeviceComp.score<0.4?2:4;
    const voiceCount=Math.min(maxV,2+Math.floor(s.punch*2+chaos*1.5));
    const detuneSpread=5+s.color*18+chaos*12;
    const fOpen=(900+chaos*3800+s.punch*1200+windBoost*600)*warp;
    const fClose=(200+s.tone*400+windBoost*200)*warp;
    const fQ=Math.min(3.5, 1.2+chaos*1.8+s.color*1.0);
    const master=ctx.createGain();
    const flt=ctx.createBiquadFilter();flt.type='lowpass';
    flt.frequency.setValueAtTime(fOpen,t+portTime*0.5);
    flt.frequency.linearRampToValueAtTime(fClose,t+durT*0.75);
    flt.Q.value=fQ;
    if(s.color>0.5){
      const flt2=ctx.createBiquadFilter();flt2.type='bandpass';
      flt2.frequency.value=(2000+s.punch*3000)*warp;flt2.Q.value=0.4+s.tone*0.8;
      master.connect(flt);flt.connect(flt2);flt2.connect(leadDest);
    }else{master.connect(flt);flt.connect(leadDest);}
    for(let vi=0;vi<voiceCount;vi++){
      const detune=voiceCount===1?0:((vi/(voiceCount-1))*2-1)*detuneSpread;
      const o=ctx.createOscillator();o.type='sawtooth';o.detune.value=detune;
      o.frequency.setValueAtTime(from,t);
      o.frequency.linearRampToValueAtTime(freq,t+portTime);
      if(vi>0&&s.sub>0.5){
        const vib=ctx.createOscillator();vib.type='sine';vib.frequency.value=4.5+s.color*3.5;
        const vg=ctx.createGain();vg.gain.value=freq*(0.002+s.sub*0.004);
        vib.connect(vg);vg.connect(o.frequency);vib.start(t);vib.stop(t+durT+0.01);autoClean(vib,vg);
      }
      o.connect(master);o.start(t);o.stop(t+durT+0.01);autoClean(o);
    }
    master.gain.setValueAtTime(0,t);
    master.gain.linearRampToValueAtTime(vol,t+atk);
    master.gain.linearRampToValueAtTime(0.0001,t+durT-0.008);
    master.gain.setValueAtTime(0,t+durT);
    setTimeout(()=>{try{master.disconnect();flt.disconnect();}catch(e){}},Math.ceil((durT+0.05)*1000));

  }else if(mode==='sax' || mode==='trumpet'){
    // Reed/brass lead: additive odd-partial stack, breath-noise onset, tube
    // saturation, gentle vibrato. Sax leans on the 3rd+5th partial (reedy);
    // trumpet boosts the 2nd partial (brassy).
    const isTrumpet = mode==='trumpet';
    const partials = isTrumpet
      ? [[1,0.34],[2,0.28],[3,0.18],[4,0.10],[5,0.05]]
      : [[1,0.36],[2,0.12],[3,0.22],[4,0.07],[5,0.13],[7,0.05]];
    const master=ctx.createGain();
    master.gain.setValueAtTime(0.0001,t);
    master.gain.linearRampToValueAtTime(vol*1.1, t+0.025);      // medium attack
    master.gain.setValueAtTime(vol*0.95, t+Math.max(0.05, durT*0.25));
    master.gain.exponentialRampToValueAtTime(0.0001, t+durT+0.05);
    // Tube saturation
    const sat=ctx.createWaveShaper();
    const crv=new Float32Array(1024);
    const drive = 1.6 + chaos*0.8 + s.punch*0.7;
    for(let i=0;i<1024;i++){ const x=(i*2/1024)-1; crv[i]=Math.tanh(x*drive); }
    sat.curve=crv; sat.oversample='2x';
    // Band-limit to the instrument range
    const bp=ctx.createBiquadFilter(); bp.type='lowpass';
    bp.frequency.value = isTrumpet ? 3800 : 3200; bp.Q.value = 0.6;
    master.connect(sat); sat.connect(bp); bp.connect(leadDest);
    // Partials
    partials.forEach(([n, g])=>{
      const o=ctx.createOscillator(); o.type='sine';
      o.frequency.value=freq*n;
      const og=ctx.createGain(); og.gain.value=g;
      o.connect(og); og.connect(master);
      o.start(t); o.stop(t+durT+0.08);
      autoClean(o,og);
    });
    // Breath/chuff onset
    const brLen=Math.floor(ctx.sampleRate*0.030);
    const brBuf=ctx.createBuffer(1,brLen,ctx.sampleRate);
    const bd=brBuf.getChannelData(0);
    for(let i=0;i<brLen;i++) bd[i]=(Math.random()*2-1)*Math.pow(1-i/brLen, 2.0);
    const br=ctx.createBufferSource(); br.buffer=brBuf;
    const brHpf=ctx.createBiquadFilter(); brHpf.type='highpass';
    brHpf.frequency.value = isTrumpet ? 1600 : 1100;
    const brG=ctx.createGain(); brG.gain.value = isTrumpet ? 0.06 : 0.08;
    br.connect(brHpf); brHpf.connect(brG); brG.connect(leadDest);
    br.start(t);
    // Vibrato on the master via per-partial freq isn't easy, so apply a
    // subtle amplitude tremolo for that reed growl.
    const trem=ctx.createOscillator(); trem.type='sine';
    trem.frequency.value = isTrumpet ? 5.2 : 4.8;
    const tg=ctx.createGain(); tg.gain.value = vol*0.08;
    trem.connect(tg); tg.connect(master.gain);
    trem.start(t+0.06); trem.stop(t+durT+0.08);
    autoClean(master, sat, bp, br, brHpf, brG, trem, tg);

  }else if(mode==='fm'){
    // 2-op FM stab: carrier + modulator, mod ratio shapes timbre
    // ratio > 1 = metallic/bright, ratio < 1 = warm/hollow
    const ratios=[1,1.5,2,2.5,3.5,4][Math.floor(s.color*5+chaos*1.5)%6];
    const modIdx=2+chaos*8+windBoost*4+s.punch*3; // modulation index
    const carrier=ctx.createOscillator(); carrier.type='sine'; carrier.frequency.value=freq;
    const modulator=ctx.createOscillator(); modulator.type='sine'; modulator.frequency.value=freq*ratios;
    const modGain=ctx.createGain();
    modGain.gain.setValueAtTime(freq*modIdx,t);
    modGain.gain.exponentialRampToValueAtTime(freq*(modIdx*0.1+0.5),t+durT*0.4); // mod decay = brightness decay
    const ampEnv=ctx.createGain();
    // Hard attack for FM stabs
    ampEnv.gain.setValueAtTime(0.0001,t);
    ampEnv.gain.linearRampToValueAtTime(vol*1.1,t+atk*0.5);
    ampEnv.gain.exponentialRampToValueAtTime(vol*0.4,t+durT*0.3);
    ampEnv.gain.exponentialRampToValueAtTime(0.0001,t+durT);
    modulator.connect(modGain); modGain.connect(carrier.frequency);
    carrier.connect(ampEnv); ampEnv.connect(leadDest);
    carrier.start(t);carrier.stop(t+durT+0.02);
    modulator.start(t);modulator.stop(t+durT+0.02);
    autoClean(carrier,modulator,modGain,ampEnv);

  }else if(mode==='bell'){
    // FM bell: multiple partials with independent decays -- floating, harmonic
    const partials=[1, 2.756, 5.404, 8.933]; // inharmonic bell ratios
    const partialGains=[1.0, 0.45, 0.22, 0.10];
    const master=ctx.createGain();
    master.gain.setValueAtTime(0.0001,t);
    master.gain.linearRampToValueAtTime(vol*0.85,t+0.002);
    master.gain.exponentialRampToValueAtTime(0.0001,t+durT*1.6); // bells ring long
    master.connect(leadDest);
    partials.forEach((ratio,pi)=>{
      const pFreq=freq*ratio*(1+s.color*0.008*pi); // slight inharmonicity
      const pModFreq=pFreq*(1.5+s.tone*0.5);
      const pModIdx=(3-pi*0.5+chaos*2)*s.punch;
      const c=ctx.createOscillator();c.type='sine';c.frequency.value=pFreq;
      const m=ctx.createOscillator();m.type='sine';m.frequency.value=pModFreq;
      const mg=ctx.createGain();
      mg.gain.setValueAtTime(pFreq*pModIdx,t);
      mg.gain.exponentialRampToValueAtTime(0.001,t+durT*(0.3+pi*0.15));
      const pg=ctx.createGain();
      pg.gain.setValueAtTime(partialGains[pi]*0.3,t);
      pg.gain.exponentialRampToValueAtTime(0.0001,t+durT*(0.8+pi*0.3));
      m.connect(mg);mg.connect(c.frequency);c.connect(pg);pg.connect(master);
      c.start(t);c.stop(t+durT*2+0.05);m.start(t);m.stop(t+durT*2+0.05);
      autoClean(c,m,mg,pg);
    });
    setTimeout(()=>{try{master.disconnect();}catch(e){}},Math.ceil((durT*2+0.1)*1000));

  }else if(mode==='pluck'){
    // Karplus-Strong physical model pluck -- sampler-like, no downloads
    const bufLen=Math.max(2,Math.floor(ctx.sampleRate/freq));
    const pluckBuf=ctx.createBuffer(1,bufLen*2,ctx.sampleRate);
    const pd=pluckBuf.getChannelData(0);
    for(let i=0;i<bufLen*2;i++) pd[i]=(Math.random()*2-1)*(i<bufLen?1:0); // initial noise
    const src=ctx.createBufferSource();src.buffer=pluckBuf;src.loop=true;
    src.loopStart=0;src.loopEnd=bufLen/ctx.sampleRate;
    // One-pole lowpass inside the loop gives natural pluck decay
    const lpf=ctx.createBiquadFilter();lpf.type='lowpass';
    lpf.frequency.value=freq*(3+s.tone*4+chaos*2);lpf.Q.value=0.5+s.color;
    const ampEnv=ctx.createGain();
    ampEnv.gain.setValueAtTime(0.0001,t);
    ampEnv.gain.linearRampToValueAtTime(vol*1.3,t+0.001); // instant attack = pluck
    ampEnv.gain.exponentialRampToValueAtTime(0.0001,t+durT*0.8);
    src.connect(lpf);lpf.connect(ampEnv);ampEnv.connect(leadDest);
    src.start(t);src.stop(t+durT+0.05);
    autoClean(src,lpf,ampEnv);

  }else if(mode==='strat'){
    // Stratocaster-style single-coil lead. Signal chain models a vibrating
    // string fed through a single-coil pickup into a pushed tube amp:
    //   sawtooth + square mix  (string-like harmonic series)
    //   tiny detune (~4 cents)  (string imperfection + pickup beat)
    //   bandpass 700-3200 Hz    (single-coil pickup response)
    //   tanh waveshaper         (tube saturation)
    //   lowpass ~6 kHz          (amp cab)
    // Gives the cutting, nasal, Skynyrd/Hendrix-ish bite even at low gain.
    const osc1=ctx.createOscillator(); osc1.type='sawtooth'; osc1.frequency.value=freq;
    const osc2=ctx.createOscillator(); osc2.type='square';   osc2.frequency.value=freq;
    osc1.detune.value = -4; osc2.detune.value = +4;          // pickup beat
    // Single-coil bandpass: 700-3200 Hz is where the pickup lives.
    const bp=ctx.createBiquadFilter(); bp.type='bandpass';
    bp.frequency.value=1200 + chaos*800 + s.color*600;
    bp.Q.value=0.95 + s.punch*0.4;
    // Tube saturation (asymmetric tanh for warmer even harmonics).
    const drive=1.4 + chaos*2.0 + windBoost*1.5 + s.punch*1.2;
    const shaper=ctx.createWaveShaper();
    const N=1024, crv=new Float32Array(N);
    for(let i=0;i<N;i++){ const x=(i*2/N)-1; crv[i] = Math.tanh(x*drive + 0.2*x*x); }
    shaper.curve=crv; shaper.oversample='4x';
    // Amp cab lowpass -- rolls off the fizz above 6 kHz.
    const cab=ctx.createBiquadFilter(); cab.type='lowpass';
    cab.frequency.value=5500 + s.tone*2200; cab.Q.value=0.6;
    // Envelope: fast attack, sustained mid, exponential release.
    const env=ctx.createGain();
    env.gain.setValueAtTime(0.0001, t);
    env.gain.linearRampToValueAtTime(vol*1.35, t + 0.004);
    env.gain.setValueAtTime(vol*1.0, t + 0.05);
    env.gain.exponentialRampToValueAtTime(0.0001, t + durT*1.2);
    // Pickup mix (2nd position = out-of-phase, thinner; neck = fatter).
    const mix1=ctx.createGain(); mix1.gain.value=0.55;
    const mix2=ctx.createGain(); mix2.gain.value=0.45;
    osc1.connect(mix1); osc2.connect(mix2);
    mix1.connect(bp); mix2.connect(bp);
    bp.connect(shaper); shaper.connect(cab); cab.connect(env); env.connect(leadDest);
    osc1.start(t); osc2.start(t);
    osc1.stop(t+durT*1.2+0.03); osc2.stop(t+durT*1.2+0.03);
    autoClean(osc1,osc2,mix1,mix2,bp,shaper,cab,env);
  }else{ // 'whistle' -- sine + vibrato, breathy, vocal-like
    // Classic hip-hop/G-Funk whistle lead: pure sine with slow vib + slight sub octave
    const carrier=ctx.createOscillator();carrier.type='sine';carrier.frequency.value=freq;
    // Vibrato
    const vib=ctx.createOscillator();vib.type='sine';vib.frequency.value=5.5+chaos*2+s.color*1.5;
    const vibGain=ctx.createGain();
    // Vib depth grows after attack (natural breath vibrato)
    vibGain.gain.setValueAtTime(0,t);
    vibGain.gain.linearRampToValueAtTime(freq*(0.008+chaos*0.012),t+durT*0.35);
    vib.connect(vibGain);vibGain.connect(carrier.frequency);
    // Sub octave sine for body
    const sub=ctx.createOscillator();sub.type='sine';sub.frequency.value=freq*0.5;
    const subGain=ctx.createGain();subGain.gain.value=0.18+s.sub*0.12;
    sub.connect(subGain);
    // Gentle lowpass for air
    const lpf=ctx.createBiquadFilter();lpf.type='lowpass';lpf.frequency.value=(2000+chaos*3000)*warp;lpf.Q.value=0.5;
    const master=ctx.createGain();
    master.gain.setValueAtTime(0.0001,t);
    master.gain.linearRampToValueAtTime(vol*0.95,t+atk*1.5); // slightly slower attack = breath
    master.gain.setValueAtTime(vol*0.95,t+durT*0.6);
    master.gain.exponentialRampToValueAtTime(0.0001,t+durT);
    carrier.connect(lpf);subGain.connect(lpf);lpf.connect(master);master.connect(leadDest);
    carrier.start(t);carrier.stop(t+durT+0.02);
    vib.start(t);vib.stop(t+durT+0.02);
    sub.start(t);sub.stop(t+durT+0.02);
    autoClean(carrier,vib,vibGain,sub,subGain,lpf,master);
  }
  // Teach the lead "good-params" distribution on strong, non-wildcard hits.
  if(!s._wild && windBoost > 0.25){
    paramMemory.observe('lead', {punch:s.punch,tone:s.tone,color:s.color,decay:s.decay}, Math.min(1, windBoost*1.8));
  }
  // Observe deepDesign reward based on current lead winding.
  try{
    const _bv = (typeof window!=='undefined') ? window._bandVoices : null;
    if(_bv && _bv.lead){
      const annoyance = s._wild ? 0.20 : 0;
      deepDesign.observe('lead', _bv.lead.winding||0, annoyance);
    }
  }catch(_){}
}

// -- FLIP ENGINE ----------------------------------------------------------
// Three endless flip modes that cycle to produce new variations:
// 1. CHORD INV: root -> 1st inv -> 2nd inv -> 3rd inv, cycles
// 2. PROG INV: reverses current chord progression sequence
// 3. TRIT SUB: tritone substitution -- replaces with chord a tritone away
const flipEngine={
  inversionStep: 0,
  progWindow: [],
  lastFlipMode: null,

  // Cycle chord inversion: shifts bass voice by 1 each call
  chordInversion(chordType, rootMidi){
    this.inversionStep=(this.inversionStep+1)%4;
    const ct=CHORDS[chordType]||CHORDS.maj;
    const iv=this.inversionStep===0?0:
              this.inversionStep===1?(ct.iv[1]||4):
              this.inversionStep===2?(ct.iv[2]||7):
              this.inversionStep===3?(ct.iv[ct.iv.length-1]||10):0;
    const label=['Root','1st inv','2nd inv','3rd inv'][this.inversionStep];
    return{newRoot:rootMidi-12+iv, label, step:this.inversionStep};
  },

  // Progression inversion: reverses the last 4 chords heard
  progressionInversion(window){
    if(!window||window.length<2)return null;
    const reversed=[...window].reverse();
    return{sequence:reversed, label:'Prog inv: '+reversed.slice(0,3).join('->')};
  },

  // Tritone substitution: move root up/down by tritone (6 semitones)
  // Also swaps chord quality: dom7 <-> maj7, min <-> aug, maj <-> dim
  tritoneSubstitution(chordType, rootMidi){
    const swaps={dom7:'maj7',maj7:'dom7',min:'aug',aug:'min',maj:'dim',dim:'maj',
                 min7:'dom9',dom9:'min7',quar:'min7'};
    const newChord=swaps[chordType]||chordType;
    const newRoot=rootMidi+6; // tritone = 6 semitones
    return{newRoot, newChord, label:'Trit sub: '+NOTE_NAMES[((newRoot%12)+12)%12]+' '+newChord};
  }
};

// -- SYNTH: ARP (arpeggiated plucked synth) -----------------------------------
// Physical model: Karplus-Strong style pluck + resonator
// Each arp note is uniquely generated
function synthArp(ctx, t, note, chaos, warp, dest, windBoost=0, durScale=1.0){
  const s=drumSeed();
  const freq=440*Math.pow(2,(note-69)/12)*warp;
  const _dscl=Math.max(0.25, Math.min(8.0, durScale||1.0));
  // Exciter: short noise burst (the "pluck")
  const excLen=Math.floor(ctx.sampleRate*(0.008+s.punch*0.012));
  const excBuf=ctx.createBuffer(1,excLen,ctx.sampleRate);
  const excD=excBuf.getChannelData(0);
  for(let i=0;i<excLen;i++){
    excD[i]=(Math.random()*2-1)*Math.pow(1-i/excLen,0.4+s.tone);
  }
  const exc=ctx.createBufferSource();exc.buffer=excBuf;
  // Body resonator: bandpass at fundamental + 2nd harmonic
  const res1=ctx.createBiquadFilter();res1.type='bandpass';
  res1.frequency.value=freq;res1.Q.value=18+chaos*30+windBoost*12;
  const res2=ctx.createBiquadFilter();res2.type='bandpass';
  res2.frequency.value=freq*(2+s.color*0.08);res2.Q.value=8+chaos*12;
  // Mix resonators
  const mix=ctx.createGain();mix.gain.value=1;
  const g1=ctx.createGain();g1.gain.value=0.7+s.tone*0.2;
  const g2=ctx.createGain();g2.gain.value=0.3+chaos*0.2;
  // Envelope
  const durT=(0.18+s.decay*0.45+windBoost*0.2+chaos*0.15)*_dscl/warp;
  const env=ctx.createGain();
  env.gain.setValueAtTime(0.6+windBoost*0.15,t);
  env.gain.linearRampToValueAtTime(0.0001,t+durT);
  env.gain.setValueAtTime(0,t+durT+0.005);
  exc.connect(res1);exc.connect(res2);
  res1.connect(g1);res2.connect(g2);
  g1.connect(mix);g2.connect(mix);
  mix.connect(env);env.connect(dest);
  exc.start(t);exc.stop(t+excLen/ctx.sampleRate+0.01);
  autoClean(exc,res1,res2,g1,g2,mix,env);
}

// Cowbell: classic Roland/Yamaha TR-style cowbell. Two detuned square
// oscillators at 540Hz and 800Hz (industry-standard cowbell partials) put
// through a bandpass, with a sharp amplitude envelope.
function synthCowbell(ctx, t, warp, dest, velocity=0.6){
  if(!dest) return;
  const s = drumSeed();
  const f1 = 540 * warp * (1 + (s.pitch-0.85)*0.05);
  const f2 = 800 * warp * (1 + (s.pitch-0.85)*0.05);
  const o1 = ctx.createOscillator(); o1.type='square'; o1.frequency.value=f1;
  const o2 = ctx.createOscillator(); o2.type='square'; o2.frequency.value=f2;
  const bp = ctx.createBiquadFilter(); bp.type='bandpass';
  bp.frequency.value = 800 * warp; bp.Q.value = 1.8 + s.tone*0.8;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(velocity*0.5, t+0.001);
  g.gain.exponentialRampToValueAtTime(0.0001, t + (0.15 + s.decay*0.10)/warp);
  o1.connect(bp); o2.connect(bp); bp.connect(g); g.connect(dest);
  o1.start(t); o2.start(t);
  o1.stop(t+0.30/warp); o2.stop(t+0.30/warp);
  autoClean(o1,o2,bp,g);
}

// Shaker / cabasa texture. Granular noise burst bandpassed in the shaker
// frequency range. Each call produces a slightly different shake.
function synthShaker(ctx, t, warp, dest, velocity=0.4){
  if(!dest) return;
  const s = drumSeed();
  const len = Math.floor(ctx.sampleRate * (0.045 + s.tone*0.03));
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  // Granular: fast exponential decay + micro-bursts to simulate beads
  for(let i=0; i<len; i++){
    const burst = (i % Math.floor(6 + s.color*6) === 0) ? 1.6 : 1.0;
    d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 3.2) * burst;
  }
  const src = ctx.createBufferSource(); src.buffer = buf;
  const bp = ctx.createBiquadFilter(); bp.type = 'bandpass';
  bp.frequency.value = (5500 + s.click*3000) * warp;
  bp.Q.value = 1.8 + s.tone*1.4;
  const hp = ctx.createBiquadFilter(); hp.type = 'highpass';
  hp.frequency.value = 2000 * warp;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(velocity*0.9, t + 0.002);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.050/warp);
  src.connect(hp); hp.connect(bp); bp.connect(g); g.connect(dest);
  src.start(t); src.stop(t + 0.08/warp);
  autoClean(src,hp,bp,g);
}

// Noise-substitute pad: pure white noise through three parallel bandpass
// filters tuned to the chord root / 5th / octave, with LFO-driven formant
// sweeps. No oscillators at all -- every tonal element is noise shaped by
