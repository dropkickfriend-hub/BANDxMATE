  g.gain.exponentialRampToValueAtTime(0.0001, t+decay+0.04);
  src.connect(bp); bp.connect(g); g.connect(dest);
  src.start(t); src.stop(t+decay+0.06);
  // Thin sine sub so it still feels like a kick, not a snare
  const sub = ctx.createOscillator(); sub.type='sine';
  sub.frequency.setValueAtTime(f0, t);
  sub.frequency.exponentialRampToValueAtTime(f1, t+decay*0.8);
  const sg = ctx.createGain();
  sg.gain.setValueAtTime(punch*0.45, t);
  sg.gain.exponentialRampToValueAtTime(0.0001, t+decay);
  sub.connect(sg); sg.connect(dest);
  sub.start(t); sub.stop(t+decay+0.04);
  autoClean(src,bp,g,sub,sg);
}
// Pick one recipe per kick hit. Weighted so sine-sweep stays the backbone
// but fm and noise variants surface often enough that you hear the kit change.
function pickKickRecipe(s){
  const r = Math.random();
  if(s._wild) return r<0.5 ? kickFM : kickNoiseBody;   // wildcards lean weird
  if(r < 0.50) return kickSineSweep;
  if(r < 0.78) return kickFM;
  return kickNoiseBody;
}

function synthKick(ctx,t,warp,dest,inputEnergy=0.5){
  const s=humanizedSeed('kick', 0.06);   // uses the locked kit, humanized
  s._wild = false;                 // drums never go wildcard
  const sp=styleP(); // current style profile

  // HIP-HOP: the 808 replaces both the kick drum AND the sub bass. We call
  // synth808 with the current root pitch and return -- no kick body is
  // rendered at all in this style. The rest of the scheduler skips the
  // sub bass voice for hip-hop (see sub-bass routing).
  if(kickStyle === 'hiphop'){
    const rm = (typeof window!=='undefined' && window._bandAR)
      ? (window._bandAR.lockedRoot ?? window._bandAR.rootMidi ?? 36)
      : 36;
    // Pitch the 808 to the root an octave below the track root so it sits
    // in the sub register. synth808 will drop it another octave internally.
    if(typeof synth808 === 'function'){
      synth808(ctx, t, rm, 0.5, warp, inputEnergy*0.4, dest);
    }
    return;
  }

  // Per-hit articulation (drummer behaviour, not randomness):
  //   80% regular · 12% soft (ghost kick) · 8% accent (louder, longer).
  // Scales input energy and decay so ghost hits are short thuds and
  // accented downbeats are meaty booms.
  const rArt = Math.random();
  const art = rArt < 0.08 ? 'accent' : rArt < 0.20 ? 'soft' : 'regular';
  if(art === 'soft')   inputEnergy = Math.max(0.08, inputEnergy * 0.55);
  if(art === 'accent') inputEnergy = Math.min(1.00, inputEnergy * 1.30 + 0.10);
  const decayMul = art === 'soft' ? 0.55 : art === 'accent' ? 1.35 : 1.0;

  // ── Style-shaped parameters ───────────────────────────────────────────
  const f0 = styleLerp(sp.kickF0, s.pitch+inputEnergy*0.3) * warp;
  const f1 = styleLerp(sp.kickF1, s.pitch) * warp;
  const decay = styleLerp(sp.kickDecay, s.decay+inputEnergy*0.2) * decayMul / warp;
  const punch = styleLerp(sp.kickPunch, s.punch) * (0.8+inputEnergy*0.2);

  // Body recipe from the locked kit -- reseedDrum('kick') cycles this
  // between sineSweep / fm / noiseBody for genuinely different sounds.
  const recipe = _drumRecipes.kick;
  if(recipe === 'fm' && typeof kickFM === 'function'){
    kickFM(ctx, t, warp, dest, f0, f1, decay, punch, s, sp);
  } else if(recipe === 'noiseBody' && typeof kickNoiseBody === 'function'){
    kickNoiseBody(ctx, t, warp, dest, f0, f1, decay, punch, s, sp);
  } else {
    kickSineSweep(ctx, t, warp, dest, f0, f1, decay, punch, s, sp);
  }

  // DROP MODE: when beatDropEngine says this is the drop bar, stack the
  // kick much heavier. Extra 200Hz EQ bump, longer decay, extra 808 layer.
  const isDrop = !!(typeof window!=='undefined' && window._bandAR && window._bandAR._isDrop);
  if(isDrop){
    // Big 200Hz peaking EQ for chest thump
    const dropEq = ctx.createBiquadFilter(); dropEq.type='peaking';
    dropEq.frequency.value = 160; dropEq.Q.value = 1.2;
    dropEq.gain.value = 10;     // +10dB at ~160Hz on drop
    const dropEq2 = ctx.createBiquadFilter(); dropEq2.type='peaking';
    dropEq2.frequency.value = 60; dropEq2.Q.value = 0.9;
    dropEq2.gain.value = 6;     // +6dB at 60Hz for sub shelf
    dropEq.connect(dropEq2); dropEq2.connect(dest);
    // Re-run the sine-sweep body into this EQ chain for extra thump
    const dropBody = ctx.createOscillator(); dropBody.type='sine';
    dropBody.frequency.setValueAtTime(f0*1.05, t);
    dropBody.frequency.exponentialRampToValueAtTime(f1*0.8, t + decay*1.6);
    const dbg = ctx.createGain();
    dbg.gain.setValueAtTime(0, t);
    dbg.gain.linearRampToValueAtTime(punch*0.9, t+0.003);
    dbg.gain.exponentialRampToValueAtTime(0.0001, t + decay*1.6 + 0.04);
    dropBody.connect(dbg); dbg.connect(dropEq);
    dropBody.start(t); dropBody.stop(t + decay*1.6 + 0.06);
    autoClean(dropBody, dbg, dropEq, dropEq2);
  }

  // Old 808-style sub layer inside the kick removed -- it generated the
  // bloomy bass the user complained about. Hip-hop now gets a real synth808
  // earlier in this function, and other styles rely on the sub-bass voice
  // + the bass voice playing simultaneously for low-end body.

  // ── EDM extra: pre-kick click burst (the "knock") ────────────────────
  // Shared across recipes -- it's a style cue, not a body character.
  if(kickStyle==='edm'){
    const knock=ctx.createOscillator(); knock.type='square';
    knock.frequency.setValueAtTime(f0*2.5,t);
    knock.frequency.exponentialRampToValueAtTime(f0*0.5,t+0.008/warp);
    const kg=ctx.createGain();
    kg.gain.setValueAtTime(0.55,t); kg.gain.linearRampToValueAtTime(0.0001,t+0.012/warp);
    knock.connect(kg); kg.connect(dest); knock.start(t); knock.stop(t+0.015/warp);
    autoClean(knock,kg);
  }

  // Bottom sub layers + ckVol click removed. The transient-only kick recipe
  // above already includes the click and the 150 Hz bump; adding those sub
  // sines here was what made the kick compete with the bass for body.
}

// -- SNARE RECIPE BANK -------------------------------------------------------
// Three body types per hit: classic tonal thump + ring, FM metallic crack, or
// stacked clap bursts. The noise crack + wire tail are shared downstream so
// snares still sound like snares, not like three different instruments.
function snareClassic(ctx,t,bodyFreq,warp,dest,s){
  const body=ctx.createOscillator();
  body.type=s.color>0.5?'triangle':'sine';
  body.frequency.setValueAtTime(bodyFreq,t);
  body.frequency.exponentialRampToValueAtTime(bodyFreq*(0.55+s.tone*0.2),t+0.09/warp);
  const bg=ctx.createGain();
  bg.gain.setValueAtTime(s.punch*0.62,t);
  bg.gain.linearRampToValueAtTime(0.0001,t+(0.13+s.decay*0.08)/warp);
  bg.gain.setValueAtTime(0,t+(0.14+s.decay*0.08)/warp);
  body.connect(bg);bg.connect(dest);body.start(t);body.stop(t+(0.15+s.decay*0.08)/warp);
  autoClean(body,bg);
  // Ring overtone -- adds metallic character on some hits
  if(s.color>0.3){
    const ring=ctx.createOscillator();ring.type='sine';
    ring.frequency.value=bodyFreq*(1.4+s.color*0.8);
    const rg=ctx.createGain();
    rg.gain.setValueAtTime(s.color*0.22,t);
    rg.gain.linearRampToValueAtTime(0.0001,t+(0.06+s.color*0.06)/warp);
    ring.connect(rg);rg.connect(dest);ring.start(t);ring.stop(t+0.16/warp);
    autoClean(ring,rg);
  }
}
function snareFM(ctx,t,bodyFreq,warp,dest,s){
  // FM body: carrier modulated by sine at ratio ~2.3 with rapidly-decaying
  // index. Produces a sharp metallic crack distinct from sine+ring.
  const car=ctx.createOscillator(); car.type='sine';
  car.frequency.setValueAtTime(bodyFreq*1.1,t);
  car.frequency.exponentialRampToValueAtTime(bodyFreq*0.45,t+0.11/warp);
  const mod=ctx.createOscillator(); mod.type='sine';
  mod.frequency.value=bodyFreq*(1.8+s.color*1.2);
  const idx=ctx.createGain();
  idx.gain.setValueAtTime(bodyFreq*(3.5+s.punch*4),t);
  idx.gain.exponentialRampToValueAtTime(bodyFreq*0.3,t+0.06/warp);
  mod.connect(idx); idx.connect(car.frequency);
  const g=ctx.createGain();
  g.gain.setValueAtTime(s.punch*0.55,t);
  g.gain.exponentialRampToValueAtTime(0.0001,t+(0.10+s.decay*0.06)/warp);
  g.gain.setValueAtTime(0,t+(0.12+s.decay*0.06)/warp);
  car.connect(g); g.connect(dest);
  car.start(t); mod.start(t);
  car.stop(t+0.14/warp); mod.stop(t+0.14/warp);
  autoClean(car,mod,idx,g);
}
function snareClap(ctx,t,bodyFreq,warp,dest,s){
  // Clap: 3-4 tiny noise bursts offset by a few ms each, bandpassed in the
  // 1.2-3kHz region -- the classic TR-808-style clap feel.
  const nLen=Math.floor(ctx.sampleRate*0.05);
  const makeBurst=(offset,gain)=>{
    const buf=ctx.createBuffer(1,nLen,ctx.sampleRate);
    const nd=buf.getChannelData(0);
    for(let i=0;i<nLen;i++) nd[i]=(Math.random()*2-1)*Math.pow(1-i/nLen,3);
    const src=ctx.createBufferSource(); src.buffer=buf;
    const bp=ctx.createBiquadFilter(); bp.type='bandpass';
    bp.frequency.value=(1100+s.color*1800)*warp;
    bp.Q.value=2.2+s.tone*2.5;
    const g=ctx.createGain();
    g.gain.setValueAtTime(0,t+offset);
    g.gain.linearRampToValueAtTime(gain*s.punch,t+offset+0.001);
    g.gain.exponentialRampToValueAtTime(0.0001,t+offset+0.035/warp);
    src.connect(bp); bp.connect(g); g.connect(dest);
    src.start(t+offset); src.stop(t+offset+0.06/warp);
    autoClean(src,bp,g);
  };
  // Four closely-spaced bursts with slight timing variation each hit
  makeBurst(0,        0.45);
  makeBurst(0.009/warp,0.70);
  makeBurst(0.017/warp,0.60);
  makeBurst(0.028/warp+ (Math.random()*0.004), 0.40);
}
function pickSnareRecipe(s){
  const r = Math.random();
  if(s._wild) return r<0.5 ? snareFM : snareClap;
  if(r < 0.50) return snareClassic;
  if(r < 0.80) return snareFM;
  return snareClap;
}

// Snare kit model: which machine / drum the current kit emulates. Rolls a
// fresh pick whenever the snare is reseeded. Articulations (ghost / rimshot
// / rim / flam) still work across all three models.
function pickSnareModel(){
  const r=Math.random();
  if(r<0.38) return '909';
  if(r<0.70) return '808';
  return 'acoustic';
}
let _snareModel = pickSnareModel();

// TR-808 snare: two short noise bursts (bandpass body + hipass crack). No
// pitched body. The dry toy-like snap.
function synthSnare808(ctx, t, warp, dest, vel, s){
  const SR=ctx.sampleRate;
  const n1Len=Math.floor(SR*0.040);
  const n1Buf=ctx.createBuffer(1,n1Len,SR);
  const n1D=n1Buf.getChannelData(0);
  for(let i=0;i<n1Len;i++) n1D[i]=(Math.random()*2-1)*Math.pow(1-i/n1Len, 1.8);
  const n1=ctx.createBufferSource(); n1.buffer=n1Buf;
  const bp=ctx.createBiquadFilter(); bp.type='bandpass';
  bp.frequency.value=(1800+s.tone*900)*warp; bp.Q.value=1.4;
  const g1=ctx.createGain();
  g1.gain.setValueAtTime(vel*0.42, t);
  g1.gain.exponentialRampToValueAtTime(0.0001, t+(0.08+s.decay*0.04)/warp);
  n1.connect(bp); bp.connect(g1); g1.connect(dest);
  n1.start(t);
  const n2Len=Math.floor(SR*0.020);
  const n2Buf=ctx.createBuffer(1,n2Len,SR);
  const n2D=n2Buf.getChannelData(0);
  for(let i=0;i<n2Len;i++) n2D[i]=(Math.random()*2-1)*Math.pow(1-i/n2Len, 0.6);
  const n2=ctx.createBufferSource(); n2.buffer=n2Buf;
  const hp=ctx.createBiquadFilter(); hp.type='highpass';
  hp.frequency.value=(5500+s.click*1500)*warp;
  const g2=ctx.createGain();
  g2.gain.setValueAtTime(vel*0.55, t);
  g2.gain.exponentialRampToValueAtTime(0.0001, t+0.030/warp);
  n2.connect(hp); hp.connect(g2); g2.connect(dest);
  n2.start(t);
  autoClean(n1,bp,g1,n2,hp,g2);
}

// TR-909 snare: tuned body tone (~180 Hz) sweeping down + dense mid noise
// + bright hipass crack. Classic house/techno snap.
function synthSnare909(ctx, t, warp, dest, vel, s){
  const SR=ctx.sampleRate;
  const bFreq=(180+s.pitch*60)*warp;
  const body=ctx.createOscillator(); body.type='triangle';
  body.frequency.setValueAtTime(bFreq*1.25, t);
  body.frequency.exponentialRampToValueAtTime(bFreq*0.82, t+0.060/warp);
  const bg=ctx.createGain();
  bg.gain.setValueAtTime(vel*0.38, t);
  bg.gain.exponentialRampToValueAtTime(0.0001, t+(0.10+s.decay*0.05)/warp);
  body.connect(bg); bg.connect(dest);
  body.start(t); body.stop(t+(0.12+s.decay*0.06)/warp);
  const nLen=Math.floor(SR*0.060);
  const nBuf=ctx.createBuffer(1,nLen,SR);
  const nD=nBuf.getChannelData(0);
  for(let i=0;i<nLen;i++) nD[i]=(Math.random()*2-1)*Math.pow(1-i/nLen, 0.8);
  const n=ctx.createBufferSource(); n.buffer=nBuf;
  const bp=ctx.createBiquadFilter(); bp.type='bandpass';
  bp.frequency.value=(2400+s.tone*1400)*warp; bp.Q.value=0.8;
  const ng=ctx.createGain();
  ng.gain.setValueAtTime(vel*0.48, t);
  ng.gain.exponentialRampToValueAtTime(0.0001, t+0.08/warp);
  n.connect(bp); bp.connect(ng); ng.connect(dest);
  n.start(t);
  const cLen=Math.floor(SR*0.008);
  const cBuf=ctx.createBuffer(1,cLen,SR);
  const cD=cBuf.getChannelData(0);
  for(let i=0;i<cLen;i++) cD[i]=(Math.random()*2-1)*Math.pow(1-i/cLen, 0.25);
  const c=ctx.createBufferSource(); c.buffer=cBuf;
  const hp=ctx.createBiquadFilter(); hp.type='highpass';
  hp.frequency.value=(6500+s.click*2000)*warp;
  const cg=ctx.createGain();
  cg.gain.setValueAtTime(vel*0.6, t);
  cg.gain.exponentialRampToValueAtTime(0.0001, t+0.018/warp);
  c.connect(hp); hp.connect(cg); cg.connect(dest);
  c.start(t);
  autoClean(body,bg,n,bp,ng,c,hp,cg);
}

// Snare articulation picker: most hits are regular backbeats, a few are
// ghosts / rim-shots / rims / flams for expressive variation.
function pickSnareArticulation(){
  const r=Math.random();
  if(r<0.08) return 'ghost';
  if(r<0.14) return 'rimshot';
  if(r<0.16) return 'rim';
  if(r<0.19) return 'flam';
  return 'regular';
}

function synthSnare(ctx,t,chaos,warp,dest,inputTight=0.5,articulation){
  // User sample override first — if a WAV was dropped in the snare slot
  // the band plays that. Ghost / rim / flam still fall through to synthesis
  // so articulations stay expressive.
  if(articulation!=='ghost' && articulation!=='rim' && articulation!=='flam'){
    const vel = articulation==='rimshot' ? 1.1 : 0.90;
    if(typeof playDrumSample==='function' && playDrumSample('snare', ctx, t, dest, vel)) return;
  }
  // Flam: schedule a quiet leading grace note, continue with the main hit.
  if(articulation==='flam'){
    synthSnare(ctx, t-0.028/warp, chaos, warp, dest, inputTight*0.55, 'ghost');
    articulation='regular';
  }
  const art = articulation || pickSnareArticulation();
  const s = humanizedSeed('snare', 0.08);

  // Machine-preset routing: 808 / 909 / acoustic. Ghost + rim always use
  // the acoustic path so the subtle articulations work.
  if((_snareModel==='808'||_snareModel==='909') && art!=='ghost' && art!=='rim'){
    const baseVel = Math.max(0.2, 0.75 + (Math.random()-0.5)*0.25 + inputTight*0.2);
    const v = baseVel * (art==='rimshot' ? 1.22 : 1.0);
    if(_snareModel==='808') synthSnare808(ctx, t, warp, dest, v, s);
    else                    synthSnare909(ctx, t, warp, dest, v, s);
    return;
  }

  // Acoustic path: body recipe from the locked kit (_drumRecipes.snare).
  // Reseed cycles classic / fm / clap for real topology changes.
  // Articulation shapes velocity; the kit character stays constant per reseed.
  const vel = art==='ghost' ? 0.30 : art==='rimshot' ? 1.15 : art==='rim' ? 0.85 : 1.0;
  // Key-track body freq to the perfect 5th above root if the tracker is on.
  const _rm = (typeof window!=='undefined' && window._bandAR) ? (window._bandAR.lockedRoot ?? window._bandAR.rootMidi) : null;
  const _keyBody = (typeof drumKeyTracker!=='undefined') ? drumKeyTracker.snareBodyFor(_rm) : null;
  const bodyFreqBase = _keyBody != null ? _keyBody : (155+s.pitch*90+inputTight*50);
  const bodyFreq=bodyFreqBase*warp * (art==='rim'?1.45:1.0);

  // Body recipe: skip for rim (that's a pure stick hit). Ghost/rim always use
  // the quiet classic body so the subtle articulations stay readable.
  if(art!=='rim'){
    const snareRecipe = (art==='ghost') ? 'classic' : _drumRecipes.snare;
    const sForBody = {...s, punch: s.punch*vel};   // velocity bakes into punch
    if(snareRecipe === 'fm' && typeof snareFM === 'function'){
      snareFM(ctx, t, bodyFreq, warp, dest, sForBody);
    } else if(snareRecipe === 'clap' && typeof snareClap === 'function'){
      snareClap(ctx, t, bodyFreq, warp, dest, sForBody);
    } else if(typeof snareClassic === 'function'){
      snareClassic(ctx, t, bodyFreq, warp, dest, sForBody);
    } else {
      // Fallback: inline legacy body (in case recipe helpers aren't defined)
      const body=ctx.createOscillator();
      body.type=s.color>0.5?'triangle':'sine';
      body.frequency.setValueAtTime(bodyFreq,t);
      body.frequency.exponentialRampToValueAtTime(bodyFreq*(0.55+s.tone*0.2),t+0.09/warp);
      const bg=ctx.createGain();
      bg.gain.setValueAtTime(s.punch*0.62*vel,t);
      bg.gain.linearRampToValueAtTime(0.0001,t+(0.13+s.decay*0.08)/warp);
      bg.gain.setValueAtTime(0,t+(0.14+s.decay*0.08)/warp);
      body.connect(bg);bg.connect(dest);
      body.start(t);body.stop(t+(0.15+s.decay*0.08)/warp);
      autoClean(body,bg);
    }
  }
  if(s.color>0.3){
    const ring=ctx.createOscillator();ring.type='sine';
    ring.frequency.value=bodyFreq*(1.4+s.color*0.8);
    const rg=ctx.createGain();
    rg.gain.setValueAtTime(s.color*0.22*vel,t);
    rg.gain.linearRampToValueAtTime(0.0001,t+(0.06+s.color*0.06)/warp);
    ring.connect(rg);rg.connect(dest);
    ring.start(t);ring.stop(t+0.16/warp);
    autoClean(ring,rg);
  }

  // Crack (brighter on rim-shot)
  const crackHpfMul = art==='rimshot' ? 1.25 : 1.0;
  const tightness=s.tone*(0.5+inputTight*0.5);
  const crLen=Math.floor(ctx.sampleRate*(0.028+tightness*0.030));
  const crBuf=ctx.createBuffer(1,crLen,ctx.sampleRate);
  const crD=crBuf.getChannelData(0);
  for(let i=0;i<crLen;i++){
    crD[i]=(Math.random()*2-1)*Math.pow(1-i/crLen,0.6+s.click)*(1+s.color*Math.sin(i*0.08+s.click*10));
  }
  const crack=ctx.createBufferSource();crack.buffer=crBuf;
  const ckHpf=ctx.createBiquadFilter();ckHpf.type='highpass';
  ckHpf.frequency.value=(2200+s.click*2800)*crackHpfMul*warp;
  const cg=ctx.createGain();
  cg.gain.setValueAtTime(s.click*0.90*vel,t);
  cg.gain.linearRampToValueAtTime(0.0001,t+0.045/warp);
  crack.connect(ckHpf);ckHpf.connect(cg);cg.connect(dest);
  crack.start(t);
  autoClean(crack,ckHpf,cg);

  // Snare-wire tail — skip for ghost (too quiet) and rim (no head contact).
  // Halved length + LPF lowered from 8 kHz to 4.5 kHz so the snare thumps
  // and dies instead of hissing on. Matches the "thumpy wet dies quick"
  // character the user wanted.
  if(art==='ghost' || art==='rim') return;
  const tLen=Math.floor(ctx.sampleRate*(0.075+chaos*0.05+s.decay*0.04)/warp);
  const tBuf=ctx.createBuffer(2,tLen,ctx.sampleRate);
  for(let ch=0;ch<2;ch++){
    const td=tBuf.getChannelData(ch);
    for(let i=0;i<tLen;i++){
      td[i]=(Math.random()*2-1)*(ch===0?1+s.color*0.3:1-s.color*0.3)*Math.pow(1-i/tLen, 1.4);
    }
  }
  const tail=ctx.createBufferSource();tail.buffer=tBuf;
  const hpf=ctx.createBiquadFilter();hpf.type='highpass';hpf.frequency.value=(900+chaos*900+s.color*800)*warp;
  const lpf=ctx.createBiquadFilter();lpf.type='lowpass';lpf.frequency.value=(4500+s.click*2000)*warp;
  const tg=ctx.createGain();
  tg.gain.setValueAtTime(s.tone*0.38*vel,t);
  tg.gain.linearRampToValueAtTime(0.0001,t+(0.085+s.decay*0.04)/warp);
  tail.connect(hpf);hpf.connect(lpf);lpf.connect(tg);tg.connect(dest);
  tail.start(t);
  autoClean(tail,hpf,lpf,tg);
}

function synthHat(ctx,t,open,chaos,warp,dest,inputBright=0.5,velocity=0.7,durMult=1.0){
  // User sample override — if a hat WAV is loaded, play it.
  if(typeof _drumSamples!=='undefined' && _drumSamples.hat){
    const src=ctx.createBufferSource(); src.buffer=_drumSamples.hat;
    src.playbackRate.value = (open?0.88:1.0) * (1 + (Math.random()-0.5)*0.04);
    const g=ctx.createGain();
    g.gain.value = Math.max(0.1, Math.min(1.2, velocity*(open?1.1:1.0)));
    src.connect(g); g.connect(dest);
    src.start(t);
    autoClean(src,g);
    return;
  }
  const s=humanizedSeed('hat', 0.07);
  const cymType = open ? 'open' : 'closed';
  // Locked-kit hatMode -- reseedDrum('hat') cycles through metallic / brush /
  // digital / tape / vinyl / shaker / tabla for a new cymbal character.
  const hatMode = _drumRecipes.hat || styleP().hatMode || 'metallic';
  // Per-hit brightness wobble — real hi-hats open/close slightly with foot pressure
  const brJit = inputBright * (1 + (Math.random()-0.5)*0.25);
  synthCymbal(ctx, t, cymType, s, warp, dest, brJit, velocity, hatMode, durMult);
}

// ═══════════════════════════════════════════════════════════════════════════════
// STYLE-AWARE CYMBAL ENGINE
// Each hatMode produces a fundamentally different sound character:
//   metallic - physical model: inharmonic sine partials (pop/default)
//   brush    - jazz brush swish: filtered noise with soft envelope (Purdie feel)
//   digital  - FM noise synthesis: sharp, synthetic, bit-crushed (EDM/trap)
//   tape     - tape-saturated: waveshaper distortion, lo-fi warmth (Dilla MPC feel)
//   vinyl    - dusty vinyl crackle: high-pass filtered, gritty, sample-like
//   shaker   - granular burst: organic micro-grains, like a cabasa/shekere
//   tabla    - pitched membrane + buzz: resonant, tuned, tabla-inspired
// ═══════════════════════════════════════════════════════════════════════════════
function synthCymbal(ctx, t, type, s, warp, dest, brightness=0.5, velocity=0.7, hatMode='metallic', durMult=1.0){
  if(!dest) return;
  const _dm=Math.max(0.6, Math.min(1.4, durMult||1.0));
  const SR = ctx.sampleRate;
  const vel = Math.max(0.05, Math.min(1, velocity));

  // Per-type base timing (all modes share these fundamentals)
  const baseDur = {
    closed: 0.022+s.decay*0.020,
    open:   0.12+s.decay*0.18,
    crash:  0.45+s.decay*0.45,
    ride:   0.20+s.decay*0.24,
  };
  // durMult stretches the tail (hat "ergonomic" groove breath) without changing pitch
  const dur = ((baseDur[type]||baseDur.closed) / warp) * _dm;
  const atk = type==='closed' ? 0.0003+(1-vel)*0.002 : 0.001+(1-vel)*0.004;

  // ── ROUTE BY HAT MODE ─────────────────────────────────────────────────────
  if(hatMode==='brush'){
    // JAZZ BRUSH: Bernard Purdie's ride + hi-hat feel
    // Brushes on a cymbal = dense filtered noise, no sharp transient
    // Velocity controls "weight" -- ghost notes are barely-there wisps
    // Think: swishing brushes across a cymbal, not hitting it
    const brushDur = dur * (1.2 + vel*0.8); // brushes ring longer
    const nLen = Math.min(Math.ceil(SR*(brushDur+0.06)), SR*1.5|0);
    const nBuf = ctx.createBuffer(2, nLen, SR); // stereo for width
    // Per-channel noise with slightly different filtering = natural stereo
    for(let ch=0;ch<2;ch++){
      const nD = nBuf.getChannelData(ch);
      let p0=0,p1=0,p2=0;
      for(let i=0;i<nLen;i++){
        const w=Math.random()*2-1;
        // Deep pink noise -- warmer than standard pink, suits brushes
        p0=0.99765*p0+w*0.0990460; p1=0.96300*p1+w*0.2965164; p2=0.57000*p2+w*0.1;
        nD[i]=(p0+p1+p2+w*0.18)*0.06 * (ch===0?1+s.color*0.15:1-s.color*0.15);
      }
    }
    const ns = ctx.createBufferSource(); ns.buffer=nBuf;
    // Gentle bandpass: 1.5kHz-6kHz = warm brush zone (no harsh highs)
    const bhpf=ctx.createBiquadFilter(); bhpf.type='highpass';
    bhpf.frequency.value=(1200+s.pitch*800); bhpf.Q.value=0.3;
    const blpf=ctx.createBiquadFilter(); blpf.type='lowpass';
    blpf.frequency.value=(4500+brightness*2500+s.color*1500); blpf.Q.value=0.4+s.tone*0.3;
    // Soft envelope -- no click, just a swell and fade
    const bg=ctx.createGain();
    const peakVol = (0.10+vel*0.12)*(0.5+brightness*0.5);
    bg.gain.setValueAtTime(0.0001,t);
    // Slow attack = brush stroke starting. Ghost notes = even slower
    const brushAtk = vel<0.35 ? 0.008+s.decay*0.006 : 0.002+s.decay*0.003;
    bg.gain.linearRampToValueAtTime(peakVol, t+brushAtk);
    // Sustain plateau for open/ride
    if(type!=='closed'){
      bg.gain.setValueAtTime(peakVol*0.7, t+brushDur*0.3);
      bg.gain.exponentialRampToValueAtTime(0.0001, t+brushDur);
    }else{
      bg.gain.exponentialRampToValueAtTime(0.0001, t+brushDur*0.6);
    }
    ns.connect(bhpf); bhpf.connect(blpf); blpf.connect(bg); bg.connect(dest);
    ns.start(t); ns.stop(t+brushDur+0.05);
    autoClean(ns,bhpf,blpf,bg);

    // Brush has very subtle metallic shimmer (1-2 partials only, quiet)
    if(vel>0.3){
      const shimHz=(3800+s.pitch*1200)*warp;
      const shim=ctx.createOscillator(); shim.type='sine'; shim.frequency.value=shimHz;
      const sg=ctx.createGain();
      sg.gain.setValueAtTime(0.0001,t);
      sg.gain.linearRampToValueAtTime(vel*0.03,t+brushAtk);
      sg.gain.exponentialRampToValueAtTime(0.0001,t+brushDur*0.5);
      shim.connect(sg); sg.connect(dest);
      shim.start(t); shim.stop(t+brushDur*0.6);
      autoClean(shim,sg);
    }

  }else if(hatMode==='digital'){
    // EDM/TRAP DIGITAL HAT: FM-synthesized noise, sharp transient, bit-crush feel
    // Think: 808 machine hats but procedural -- tight, synthetic, cutting
    const digDur = type==='closed' ? 0.012+s.decay*0.010 : dur*0.8;
    // FM noise: two oscillators with irrational ratio = pseudo-noise
    const fmCarrier=ctx.createOscillator(); fmCarrier.type='square';
    const fmBase = (6000+s.pitch*4000+brightness*2000)*warp;
    fmCarrier.frequency.value=fmBase;
    const fmMod=ctx.createOscillator(); fmMod.type='square';
    fmMod.frequency.value=fmBase*1.4142; // sqrt(2) = irrational = noise-like
    const fmGain=ctx.createGain();
    fmGain.gain.value=fmBase*(2+s.color*4+vel*2); // high mod index = noisy
    fmMod.connect(fmGain); fmGain.connect(fmCarrier.frequency);
    // Bit-crush effect via waveshaper (staircase curve)
    const crush=ctx.createWaveShaper();
    const steps=Math.floor(6+s.tone*10); // 6-16 steps = more or less crushed
    const cv=new Float32Array(256);
    for(let i=0;i<256;i++){
      const x=i*2/256-1;
      cv[i]=Math.round(x*steps)/steps; // quantize
    }
    crush.curve=cv;
    // Extremely sharp envelope -- digital snap
    const dg=ctx.createGain();
    const dVol=(0.12+vel*0.16)*(0.5+brightness*0.5);
    dg.gain.setValueAtTime(dVol,t);
    dg.gain.setValueAtTime(dVol*0.85,t+0.001);
    dg.gain.exponentialRampToValueAtTime(0.0001,t+digDur);
    // HPF: remove all low end -- digital hats are pure top
    const dhpf=ctx.createBiquadFilter(); dhpf.type='highpass';
    dhpf.frequency.value=(5500+s.pitch*2000); dhpf.Q.value=0.7;
    fmCarrier.connect(crush); crush.connect(dhpf); dhpf.connect(dg); dg.connect(dest);
    fmCarrier.start(t); fmCarrier.stop(t+digDur+0.01);
    fmMod.start(t); fmMod.stop(t+digDur+0.01);
    autoClean(fmCarrier,fmMod,fmGain,crush,dhpf,dg);

    // Open/crash: add filtered noise tail
    if(type!=='closed'){
      const tLen=Math.ceil(SR*dur*0.7)|0;
      const tBuf=ctx.createBuffer(1,Math.max(1,tLen),SR);
      const tD=tBuf.getChannelData(0);
      for(let i=0;i<tLen;i++) tD[i]=(Math.random()*2-1)*Math.pow(1-i/tLen,0.8);
      const ts=ctx.createBufferSource();ts.buffer=tBuf;
      const thpf=ctx.createBiquadFilter();thpf.type='highpass';thpf.frequency.value=4000;
      const tg=ctx.createGain();
      tg.gain.setValueAtTime(0.08+vel*0.06,t+digDur*0.5);
      tg.gain.exponentialRampToValueAtTime(0.0001,t+dur);
      ts.connect(thpf);thpf.connect(tg);tg.connect(dest);
      ts.start(t+digDur*0.3);ts.stop(t+dur+0.05);
      autoClean(ts,thpf,tg);
    }

  }else if(hatMode==='tape'){
    // HIP-HOP TAPE-SAT HAT: J Dilla MPC2000 feel
    // Warm, compressed, slightly distorted, lo-fi but punchy
    // The hat from a dusty sample chopped through an SP-1200
    _synthCymbalMetallic(ctx,t,type,s,warp,brightness,vel,dur,atk,SR,function(signal){
      // Tape saturation: soft-clip waveshaper
      const sat=ctx.createWaveShaper();
      const cv=new Float32Array(512);
      const drive=2.5+s.tone*2.0; // warm but present
      for(let i=0;i<512;i++){const x=i*2/512-1; cv[i]=(3+drive)*x/(3+drive*Math.abs(x));}
      sat.curve=cv; sat.oversample='2x';
      // Lo-fi filter: roll off highs aggressively (tape head = ~8kHz ceiling)
      const lpf=ctx.createBiquadFilter();lpf.type='lowpass';
      lpf.frequency.value=(6000+brightness*2500)*warp; lpf.Q.value=0.6+s.color*0.4;
      // Slight mid bump (tape head resonance ~2.5kHz)
      const mid=ctx.createBiquadFilter();mid.type='peaking';
      mid.frequency.value=2500+s.pitch*500; mid.Q.value=1.2; mid.gain.value=3+vel*2;
      signal.connect(sat); sat.connect(lpf); lpf.connect(mid); mid.connect(dest);
      autoClean(sat,lpf,mid);
    });

  }else if(hatMode==='vinyl'){
    // EAST COAST VINYL HAT: dusty, crackly, sample-era feel
    // Like a hat from a vinyl break -- filtered, with artifacts
    _synthCymbalMetallic(ctx,t,type,s,warp,brightness,vel,dur,atk,SR,function(signal){
      // Vinyl filter: bandpass that mimics vinyl playback frequency response
      const bpf=ctx.createBiquadFilter();bpf.type='bandpass';
      bpf.frequency.value=(3500+s.pitch*1500+brightness*1000);
      bpf.Q.value=0.5+s.tone*0.5;
      signal.connect(bpf); bpf.connect(dest);
      autoClean(bpf);
    });
    // Add vinyl crackle layer
    const crkLen=Math.ceil(SR*dur*0.5)|0;
    const crkBuf=ctx.createBuffer(1,Math.max(1,crkLen),SR);
    const crkD=crkBuf.getChannelData(0);
    for(let i=0;i<crkLen;i++){
      // Sparse impulses = crackle
      crkD[i]=Math.random()<0.02?(Math.random()*2-1)*0.8:0;
    }
    const crk=ctx.createBufferSource();crk.buffer=crkBuf;
    const chpf=ctx.createBiquadFilter();chpf.type='highpass';chpf.frequency.value=2000;
    const cg=ctx.createGain();cg.gain.value=vel*0.04;
    crk.connect(chpf);chpf.connect(cg);cg.connect(dest);
    crk.start(t);crk.stop(t+dur*0.5+0.01);
    autoClean(crk,chpf,cg);

  }else if(hatMode==='shaker'){
    // AFRICAN SHAKER/CABASA: granular noise bursts = organic percussion
    // Multiple micro-grains with individual envelopes = shaker texture
    const shakerDur = type==='closed' ? 0.035+s.decay*0.025 : dur*1.1;
    const grainCount = type==='closed' ? 3+Math.floor(s.tone*4) : 6+Math.floor(s.tone*6);
    const grainLen = Math.floor(SR*0.003)|0; // 3ms micro-grains
    for(let gi=0;gi<grainCount;gi++){
      const gBuf=ctx.createBuffer(1,grainLen,SR);
      const gD=gBuf.getChannelData(0);
      // Each grain: unique filtered noise burst
      const gBright=0.3+Math.random()*0.7;
      for(let i=0;i<grainLen;i++){
        const env=Math.pow(1-i/grainLen,1.5); // fast decay per grain
        gD[i]=(Math.random()*2-1)*env*gBright;
      }
      const gs=ctx.createBufferSource();gs.buffer=gBuf;
      const ghpf=ctx.createBiquadFilter();ghpf.type='highpass';
      ghpf.frequency.value=(2500+Math.random()*3000+s.pitch*1500);
      const gg=ctx.createGain();
      const gVol=(0.06+vel*0.08)*(0.6+brightness*0.4)/(1+gi*0.08);
      gg.gain.value=gVol;
      gs.connect(ghpf);ghpf.connect(gg);gg.connect(dest);
      // Stagger grains across the duration for organic scatter
      const gOffset=gi*(shakerDur/grainCount)*(0.6+Math.random()*0.8);
      gs.start(t+gOffset);gs.stop(t+gOffset+0.004);
      autoClean(gs,ghpf,gg);
    }

  }else if(hatMode==='tabla'){
    // INDIAN TABLA-INSPIRED: pitched membrane + buzz wire resonance
    // Not a cymbal at all -- a tuned percussion sound
    const tabDur = type==='closed' ? 0.04+s.decay*0.03 : dur*0.8;
    // Membrane: pitched sine with pitch bend (like a "na" stroke)
    const memHz = (800+s.pitch*600+brightness*400)*warp;
    const mem=ctx.createOscillator();mem.type='sine';
    mem.frequency.setValueAtTime(memHz*1.15,t); // start slightly sharp
    mem.frequency.exponentialRampToValueAtTime(memHz,t+0.008); // settle
    const mg=ctx.createGain();
    mg.gain.setValueAtTime(0.0001,t);
    mg.gain.linearRampToValueAtTime((0.14+vel*0.14)*(0.5+brightness*0.5),t+0.001);
    mg.gain.exponentialRampToValueAtTime(0.0001,t+tabDur);
    mem.connect(mg);mg.connect(dest);
    mem.start(t);mem.stop(t+tabDur+0.02);
    autoClean(mem,mg);
    // Buzz wires: several very high partials with fast decay
    const buzzRatios=[2.6,4.15,5.82,7.41]; // non-integer = buzzy
    buzzRatios.forEach((ratio,bi)=>{
      const bHz=memHz*ratio*(1+s.color*0.02*bi);
      if(bHz>SR*0.45)return;
      const bo=ctx.createOscillator();bo.type='sine';bo.frequency.value=bHz;
      const bg=ctx.createGain();
      const bVol=vel*0.04/(bi+1);
      bg.gain.setValueAtTime(bVol,t);
      bg.gain.exponentialRampToValueAtTime(0.0001,t+tabDur*0.4/(bi+1));
      bo.connect(bg);bg.connect(dest);
      bo.start(t);bo.stop(t+tabDur*0.5);
      autoClean(bo,bg);
    });
    // Short noise burst for "skin" contact
    const skLen=Math.floor(SR*0.004)|0;
    const skBuf=ctx.createBuffer(1,skLen,SR);
    const skD=skBuf.getChannelData(0);
    for(let i=0;i<skLen;i++) skD[i]=(Math.random()*2-1)*Math.pow(1-i/skLen,2);
    const sk=ctx.createBufferSource();sk.buffer=skBuf;
    const skhpf=ctx.createBiquadFilter();skhpf.type='highpass';skhpf.frequency.value=3000;
    const skg=ctx.createGain();skg.gain.value=vel*0.12;
    sk.connect(skhpf);skhpf.connect(skg);skg.connect(dest);
    sk.start(t);
    autoClean(sk,skhpf,skg);

  }else{
    // DEFAULT METALLIC: physical cymbal model (pop / fallback)
    _synthCymbalMetallic(ctx,t,type,s,warp,brightness,vel,dur,atk,SR,function(signal){
      signal.connect(dest);
    });
  }
}

// ── CORE METALLIC CYMBAL MODEL (used by metallic/tape/vinyl modes) ──────────
// Outputs to a callback so post-processing (saturation, filtering) can be applied
function _synthCymbalMetallic(ctx,t,type,s,warp,brightness,vel,dur,atk,SR,connectFn){
  // Metallic partials: inharmonic sine stack
  const baseHz = (360 + s.pitch*280 + brightness*180) * (type==='open'?0.92:type==='crash'?0.78:type==='ride'?1.05:1.0);
  const ratios = [1.0, 1.483, 1.932, 2.694, 3.175, 4.055, 4.799, 5.621];
  const pGains = [1.0,  0.72,  0.55,  0.38,  0.28,  0.18,  0.11,  0.07];
  const nPartials = type==='closed'?5 : type==='ride'?7 : 6;
  const metalVol = type==='closed'?0.08+vel*0.10 : type==='ride'?0.18+vel*0.10 : 0.12+vel*0.10;
  const metalMix = ctx.createGain(); metalMix.gain.value = metalVol;

  // Output node -- all sound goes here, then to connectFn
  const outMix = ctx.createGain(); outMix.gain.value=1;
  connectFn(outMix);
  metalMix.connect(outMix);

  for(let pi=0; pi<nPartials; pi++){
    const pHz = baseHz * ratios[pi] * (1 + (s.color-0.5)*0.04*(pi+1));
    if(pHz > SR*0.46) continue;
    const osc = ctx.createOscillator(); osc.type='sine'; osc.frequency.value=pHz;
    const pg = ctx.createGain();
    const pDecay = dur * (1.0 - pi*0.08) * (0.7 + s.decay*0.35);
    const pVol = pGains[pi] * (0.6 + brightness*0.4);
    pg.gain.setValueAtTime(0.0001, t);
    pg.gain.linearRampToValueAtTime(pVol, t + atk);
    pg.gain.exponentialRampToValueAtTime(0.0001, t + Math.max(0.004, pDecay));
    osc.connect(pg); pg.connect(metalMix);
    osc.start(t); osc.stop(t + pDecay + 0.02);
    autoClean(osc, pg);
  }
  autoClean(metalMix);

  // Noise body
  const noiseVol = type==='closed'?0.18+vel*0.14 : type==='crash'?0.20+vel*0.12 : type==='ride'?0.08+vel*0.06 : 0.14+vel*0.10;
  const noiseLPF = type==='closed'?7000+s.color*3000 : type==='crash'?4000+s.color*2000 : type==='ride'?6000+s.color*3000 : 5500+s.color*2500;
  const washDur = type==='closed'?0 : type==='crash'?0.30+s.decay*0.20 : type==='ride'?0.05+s.decay*0.04 : 0.08+s.decay*0.06;
  const nDur = dur + washDur;
  const nLen = Math.min(Math.ceil(SR*(nDur+0.05)), SR*1.4|0);
  const nBuf = ctx.createBuffer(1, nLen, SR);
  const nD = nBuf.getChannelData(0);
  let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0;
  for(let i=0;i<nLen;i++){
    const wh=Math.random()*2-1;
    b0=0.99886*b0+wh*0.0555179; b1=0.99332*b1+wh*0.0750759;
    b2=0.96900*b2+wh*0.1538520; b3=0.86650*b3+wh*0.3104856;
    b4=0.55000*b4+wh*0.5329522; b5=-0.7616*b5-wh*0.0168980;
    nD[i]=(b0+b1+b2+b3+b4+b5+wh*0.5362)*0.11;
  }
  const ns = ctx.createBufferSource(); ns.buffer=nBuf;
  const nhpf = ctx.createBiquadFilter(); nhpf.type='highpass';
  nhpf.frequency.value = type==='closed'?4800 : type==='ride'?3600 : type==='crash'?1800 : 3200;
  nhpf.Q.value=0.5;
  const nlpf = ctx.createBiquadFilter(); nlpf.type='lowpass';
  nlpf.frequency.value=Math.min(noiseLPF,SR*0.46); nlpf.Q.value=0.3+s.tone*0.4;
  const ng = ctx.createGain();
  ng.gain.setValueAtTime(0.0001,t);
  ng.gain.linearRampToValueAtTime(noiseVol*(0.5+brightness*0.5),t+atk*2);
  ng.gain.exponentialRampToValueAtTime(0.0001,t+dur*0.7);
  ns.connect(nhpf); nhpf.connect(nlpf); nlpf.connect(ng); ng.connect(outMix);
  ns.start(t); ns.stop(t+nDur+0.05);
  autoClean(ns,nhpf,nlpf,ng);

  // Wash tail
  if(washDur > 0.02){
    const wLen=Math.ceil(SR*washDur)|0;
    const wBuf=ctx.createBuffer(1,Math.max(1,wLen),SR);
    const wD=wBuf.getChannelData(0);
    for(let i=0;i<wLen;i++) wD[i]=(Math.random()*2-1)*(1-i/wLen);
    const ws=ctx.createBufferSource();ws.buffer=wBuf;
    const wlpf=ctx.createBiquadFilter();wlpf.type='lowpass';
    wlpf.frequency.value=(3000+s.color*2000)*warp; wlpf.Q.value=0.5;
    const wg=ctx.createGain();
    wg.gain.setValueAtTime(0.10+brightness*0.06,t+dur*0.6);
    wg.gain.exponentialRampToValueAtTime(0.0001,t+dur+washDur*0.9);
    ws.connect(wlpf);wlpf.connect(wg);wg.connect(outMix);
    ws.start(t+dur*0.5);ws.stop(t+dur+washDur+0.05);
    autoClean(ws,wlpf,wg);
  }
  autoClean(outMix);
}

// Crash cymbal helper -- distinct accent hit
function synthCrash(ctx,t,chaos,warp,dest,energy=0.6){
  const s=drumSeed();
  const hatMode = styleP().hatMode || 'metallic';
  synthCymbal(ctx,t,'crash',s,warp,dest,energy,0.9,hatMode);
}

// Ride cymbal helper  
function synthRide(ctx,t,chaos,warp,dest,energy=0.4){
  const s=drumSeed();
  const hatMode = styleP().hatMode || 'metallic';
  synthCymbal(ctx,t,'ride',s,warp,dest,energy,0.7,hatMode);
}


// -- SUB BASS: dedicated sub instrument, routes to subBus (below 120Hz) --------
// Sub bass holds a note for longer -- it's a sustained low-end foundation.
// Stage rule: when sub is playing, bass rests. They alternate, never stack.
// -- NEURAL SUB BASS ENGINE ---------------------------------------------------
// Deep learning-inspired: winding number history shapes every parameter.
// Each note is generated by a "neural" weight vector trained on recent play.
// Sub uses 5-layer harmonic stack + FM modulation + chaos-driven waveshaping.

// Mini neural layer: maps input vector to output weights via tanh activations
function neuralLayer(inputs, weights){
  // Single hidden-layer network: inputs -> tanh -> weighted sum -> sigmoid
  const hidden = weights.map(row => Math.tanh(row.reduce((s,w,wi)=>s+w*(inputs[wi]||0),0)));
  return hidden.reduce((s,h)=>s+h,0)/hidden.length;
}

// Bass "brain" -- evolves weights based on recent winding numbers and chaos
const bassBrain={
  weights: Array.from({length:8},()=>Array.from({length:6},()=>Math.random()*2-1)),
  history: [],
  update(winding, chaos, pcMod, beat){
    const inputs=[winding/10, chaos, pcMod, beat/16, Math.sin(winding), Math.cos(chaos*Math.PI)];
    this.history.push(inputs);
    if(this.history.length>32)this.history.shift();
    // Hebbian-style update: reinforce weights that correlate with recent patterns
    if(this.history.length>4){
      const prev=this.history[this.history.length-5];
      this.weights=this.weights.map(row=>row.map((w,i)=>
        Math.max(-2,Math.min(2, w + 0.012*(inputs[i]-prev[i])*Math.tanh(w)))
      ));
    }
    return inputs;
  },
  infer(inputs){
    return{
      harmonicMix:  (neuralLayer(inputs,this.weights.slice(0,2))+1)/2,  // 0-1
      attackTime:   Math.abs(neuralLayer(inputs,this.weights.slice(2,4)))*0.08,
      filterCutoff: (neuralLayer(inputs,this.weights.slice(4,6))+1)/2,
      satAmount:    Math.abs(neuralLayer(inputs,this.weights.slice(6,8)))*3+0.5,
      subFreqMod:   neuralLayer(inputs,this.weights)*0.03,  // micro-detune
    };
  }
};

function synthSubBass(ctx, t, note, chaos, warp, windBoost=0, beat=0){
  const dest=bus.getInput('sub'); if(!dest)return;
  // Clamp note to sub register raised one octave per user request: C1-C3
  // (24-48 MIDI). Old range was C0-C2 -- way too low.
  let subNote=note;
  while(subNote>48)subNote-=12;
  while(subNote<24)subNote+=12;
  const freq=440*Math.pow(2,(subNote-69)/12)*warp;
  const s=drumSeed();
  const pc=((subNote%12)+12)%12; const pcMod=pc/12;
  const subHz=freq*0.5;
  const weak=DeviceComp.score<0.45;

  const inputs=bassBrain.update(windBoost*10, chaos, pcMod, beat);
  const nn=bassBrain.infer(inputs);

  // LAYER 1: Primary sub -- EXACT frequency, no micro-detune on fundamental
  // Micro-detune on a low sine against bass = ~1Hz beating = audible artifact
  // Harmonics and FM voice can be detuned, but f1 must be clean
  const f1=subHz; // no subFreqMod here -- that goes on the FM layer only
  const osc1=ctx.createOscillator(); osc1.type='sine'; osc1.frequency.value=f1;
  const holdTime=(0.75+s.decay*0.5+windBoost*0.15)/warp;
  const attackT=Math.max(0.004,(nn.attackTime||0.01)*(1+chaos*0.5));
  const g1=ctx.createGain();
  g1.gain.setValueAtTime(0,t);
  g1.gain.linearRampToValueAtTime(0.80+windBoost*0.12, t+attackT);
  g1.gain.setValueAtTime(0.72+windBoost*0.10, t+holdTime*0.65);
  g1.gain.linearRampToValueAtTime(0.0001, t+holdTime);
  g1.gain.setValueAtTime(0, t+holdTime+0.003);

  // LAYER 2 harmonic removed -- user asked for all high end out of sub.
  const osc2=ctx.createOscillator(); osc2.type='sine'; osc2.frequency.value=f1*2;
  const g2=ctx.createGain();
  g2.gain.setValueAtTime(0, t);       // muted
  g2.gain.linearRampToValueAtTime(0, t+0.01);

  // Shaper + filters
  const satCurve=new Float32Array(512);
  const sat=(nn.satAmount||1)*(1+chaos*0.8+windBoost*0.4);
  const tanhSat=Math.tanh(sat)||1;
  for(let si=0;si<512;si++){const x=si*2/512-1; satCurve[si]=Math.tanh(x*sat)/tanhSat;}
  const shaper=ctx.createWaveShaper(); shaper.curve=satCurve;
  // LPF tightened to 90 Hz (was 110) so ANY harmonic content from the shaper
  // gets killed before it leaves the voice -- keeps sub a pure fundamental.
  const lpf1=ctx.createBiquadFilter(); lpf1.type='lowpass'; lpf1.frequency.value=90+windBoost*10; lpf1.Q.value=0.5;
  const lpf2=ctx.createBiquadFilter(); lpf2.type='lowpass'; lpf2.frequency.value=90+windBoost*10; lpf2.Q.value=0.5;

  // -- LFO 1: filter cutoff wobble -- slow, gives sub organic movement
  // Rate: 0.3-1.8Hz so it's felt as breath, not vibrato
  const lfo1=ctx.createOscillator(); lfo1.type='sine';
  lfo1.frequency.value=0.3+s.tone*1.5+chaos*0.8;
  const lfoGain1=ctx.createGain();
  lfoGain1.gain.value=(18+windBoost*12+chaos*20); // modulates lpf1 cutoff ±Hz
  lfo1.connect(lfoGain1); lfoGain1.connect(lpf1.frequency);
  lfo1.start(t); lfo1.stop(t+holdTime+0.1);
  autoClean(lfo1,lfoGain1);

  // -- LFO 2: amplitude tremolo -- very subtle, only on non-weak devices
  let lfo2=null,lfoGain2=null;
  if(!weak){
    lfo2=ctx.createOscillator(); lfo2.type='sine';
    // Slightly detuned from lfo1 so they don't phase-cancel
    lfo2.frequency.value=0.5+s.color*1.2+chaos*0.5;
    lfoGain2=ctx.createGain();
    lfoGain2.gain.value=0.06+chaos*0.05; // very subtle ±6% amplitude
    const lfoOffset=ctx.createGain(); lfoOffset.gain.value=1.0;
    lfo2.connect(lfoGain2); lfoGain2.connect(lfoOffset.gain);
    // Route through lfoOffset before mix so LFO modulates mix gain
    lfo2.start(t); lfo2.stop(t+holdTime+0.1);
    autoClean(lfo2,lfoGain2,lfoOffset);
  }

  const mix=ctx.createGain(); mix.gain.value=1.0;
  osc1.connect(g1); g1.connect(mix);
  osc2.connect(g2); g2.connect(mix);

  // LAYER 3+4: only on stronger devices
  let osc3=null,osc4=null,fmMod=null;
  if(!weak){
    osc3=ctx.createOscillator(); osc3.type='sine'; osc3.frequency.value=f1*3;
    const g3=ctx.createGain();
    g3.gain.setValueAtTime(chaos*0.15*(nn.harmonicMix||0.2)+windBoost*0.06,t+attackT);
    g3.gain.linearRampToValueAtTime(0.0001,t+holdTime*0.45);
    g3.gain.setValueAtTime(0,t+holdTime*0.47);
    osc3.connect(g3); g3.connect(mix);
    autoClean(osc3,g3);

    // FM voice: pitched up an octave so it doesn't fight the fundamental.
    // Previously osc4 ran at f1 which phase-cancelled against osc1 — that
    // was the "clashing / polarity" artifact.
    fmMod=ctx.createOscillator(); fmMod.type='sine';
    osc4=ctx.createOscillator(); osc4.type='sine'; osc4.frequency.value=f1*2;
    const fmRatio=1.0+pcMod*0.5+chaos*0.3+s.tone*0.2;
    fmMod.frequency.value=f1*2*fmRatio*(1+(nn.subFreqMod||0)*0.5);
    const fmDepth=ctx.createGain();
    fmDepth.gain.value=f1*(0.12+windBoost*0.18+chaos*0.22+s.sub*0.15);
    fmMod.connect(fmDepth); fmDepth.connect(osc4.frequency);
    const g4=ctx.createGain();
    // Lower level on FM layer (it was doubling the fundamental before)
    g4.gain.setValueAtTime((nn.filterCutoff||0.3)*0.22+chaos*0.06,t+attackT*0.3);
    g4.gain.linearRampToValueAtTime(0.0001,t+holdTime*0.55);
    g4.gain.setValueAtTime(0,t+holdTime*0.57);
    osc4.connect(g4); g4.connect(mix);
    autoClean(osc4,g4); autoClean(fmMod,fmDepth);
  }

  mix.connect(shaper); shaper.connect(lpf1); lpf1.connect(lpf2); lpf2.connect(dest);
  const stopT=t+holdTime+0.08;
  osc1.start(t); osc1.stop(stopT);
  osc2.start(t); osc2.stop(stopT);
  if(osc3){osc3.start(t);osc3.stop(stopT);}
  if(osc4){osc4.start(t);osc4.stop(stopT);}
  if(fmMod){fmMod.start(t);fmMod.stop(stopT);}
  autoClean(osc1,g1,mix,shaper,lpf1,lpf2);
  autoClean(osc2,g2);
}


// -- NEURAL BASS ENGINE --------------------------------------------------------
// Midrange bass (60-600Hz) with neural filter envelope shaping.
// Winding number history determines attack character, resonance, and envelope.
// 4 synthesis modes selected by neural inference: pluck, slap, sustain, growl.


// ── PER-GENRE BASS SYNTHS ─────────────────────────────────────────────────────

// 808 sub bomb: sine sweep with long tail + pitch envelope + noise transient
// ── 808 SYNTHESIS RECIPE (hiphop + edm) ──────────────────────────────────
// User's spec: saw + square + sine layered, dropped an octave, amp/distortion,
// envelope with a pitch-UP transient that then sustains via replaying a
// section of the pre-rendered waveform clipped to zero-crossings (no pops).
// Implementation:
//   1) Three primary oscillators (saw, square, sine) an octave below the
//      played note, mixed roughly 0.35/0.25/0.55.
//   2) Pitch envelope: +12 semitones for 18 ms at the attack, then glides to
//      the fundamental (this is the "transient pitch-up" they asked for).
//   3) Waveshaper distortion after the mix for amp grit.
//   4) Sustain loop: a short (~40 ms) pre-rendered chunk of the fundamental
//      sine, cropped at zero-crossings, looped through the decay so the
//      tail doesn't thin out and doesn't click on loop-back.
function synth808(ctx, t, note, chaos, warp, windBoost=0, destIn=null){
  const dest=destIn||bus.getInput('bass'); if(!dest)return;
  // Drop an octave per the user's spec -- 808s sit way down.
  const noteDown = note - 12;
  const baseFreq = 440*Math.pow(2,(noteDown-69)/12);
  const s=drumSeed();
  const lenRoll = Math.random();
  const lenClass = lenRoll < 0.25 ? 0.35 : lenRoll < 0.80 ? 0.70 : 1.10;
  const decay = (lenClass + s.decay*0.20 + windBoost*0.20)/warp;
  const punch = 0.88 + s.punch*0.15;

  // Shared pitch envelope constants -- applied to all three oscs.
  const blipEnd = t + 0.018;                   // 18 ms pitch-up window
  const pitchUpFactor = Math.pow(2, 12/12);    // +12 st = ×2

  const mkBody = (type, gainScale)=>{
    const osc = ctx.createOscillator(); osc.type = type;
    osc.frequency.setValueAtTime(baseFreq * pitchUpFactor, t);
    osc.frequency.exponentialRampToValueAtTime(baseFreq, blipEnd);
    osc.frequency.setTargetAtTime(baseFreq*0.992, blipEnd+0.08, 0.12);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(punch*gainScale, t+0.002);
    g.gain.setTargetAtTime(0.0001, t+0.10, decay*0.38);
    g.gain.setValueAtTime(0, t+decay+0.10);
    osc.connect(g);
    osc.start(t); osc.stop(t+decay+0.15);
    return {osc, g};
  };

  const sinOsc = mkBody('sine',     0.55);
  const sawOsc = mkBody('sawtooth', 0.35);
  const sqrOsc = mkBody('square',   0.25);

  // Mix bus for the three primary voices, then through the amp/distortion.
  const mix = ctx.createGain(); mix.gain.value = 1.0;
  sinOsc.g.connect(mix); sawOsc.g.connect(mix); sqrOsc.g.connect(mix);

  // Amp/distortion -- asymmetric tanh curve gives even harmonics for the
  // chest/amp feel the user described, not just buzzy clipping.
  const amp = ctx.createWaveShaper();
  const N = 1024, crv = new Float32Array(N);
  const drive = 1.8 + chaos*1.6 + windBoost*1.2 + s.punch*1.0;
  for(let i=0;i<N;i++){ const x=(i*2/N)-1; crv[i] = Math.tanh(x*drive + 0.15*x*x); }
  amp.curve = crv; amp.oversample = '4x';
  // Amp lowpass to roll off the distortion fizz -- keeps it warm, not crunchy.
  const ampLpf = ctx.createBiquadFilter(); ampLpf.type='lowpass';
  ampLpf.frequency.value = 420 + chaos*160; ampLpf.Q.value = 0.6;
  mix.connect(amp); amp.connect(ampLpf); ampLpf.connect(dest);

  // Sustain loop: pre-render ~3 cycles of a pure sine at baseFreq, crop to
  // an integer number of cycles (guarantees zero-crossing start+end so no
  // click on loop), then play looped through the decay at low gain. This
  // replaces the portion that would thin out as individual oscs fade and
  // gives the body the "replayed at 0dB points" continuity the user asked
  // for.
  const SR = ctx.sampleRate;
  const cycles = 4;
  const samplesPerCycle = Math.max(8, Math.round(SR / Math.max(1, baseFreq)));
  const loopLen = samplesPerCycle * cycles;
  const loopBuf = ctx.createBuffer(1, loopLen, SR);
  const ld = loopBuf.getChannelData(0);
  for(let i=0;i<loopLen;i++) ld[i] = Math.sin(2*Math.PI * baseFreq * (i/SR));
  const loopSrc = ctx.createBufferSource();
  loopSrc.buffer = loopBuf; loopSrc.loop = true;
  loopSrc.loopStart = 0;
  loopSrc.loopEnd = loopLen / SR;
  const loopG = ctx.createGain();
  loopG.gain.setValueAtTime(0, t);
  loopG.gain.linearRampToValueAtTime(punch*0.55+windBoost*0.10, t+0.012);
  loopG.gain.setTargetAtTime(0.0001, t+0.15, decay*0.50);
  loopG.gain.setValueAtTime(0, t+decay+0.15);
  loopSrc.connect(loopG); loopG.connect(dest);
  loopSrc.start(t); loopSrc.stop(t+decay+0.18);

  // Click transient: crisp snap at t=0, pitched independent of the body.
  const click=ctx.createOscillator(); click.type='square';
  click.frequency.setValueAtTime(baseFreq*6,t);
  click.frequency.exponentialRampToValueAtTime(baseFreq*1.8,t+0.015/warp);
  const cg=ctx.createGain();
  cg.gain.setValueAtTime(0.50+chaos*0.15,t);
  cg.gain.linearRampToValueAtTime(0.0001,t+0.022/warp);
  click.connect(cg); cg.connect(dest);
  click.start(t); click.stop(t+0.030/warp);

  autoClean(sinOsc.osc, sinOsc.g, sawOsc.osc, sawOsc.g, sqrOsc.osc, sqrOsc.g,
            mix, amp, ampLpf, loopSrc, loopG, click, cg);
}

// Upright/acoustic bass: Karplus-Strong inspired pluck with body resonance
function synthUprightBass(ctx, t, note, chaos, warp, windBoost=0, destIn=null){
  const dest=destIn||bus.getInput('bass'); if(!dest)return;
  const freq=440*Math.pow(2,(note-69)/12)*warp;
  const s=drumSeed();
  const decay=(0.35+s.decay*0.25+windBoost*0.12)/warp;

  // Noise burst → resonant comb = plucked string feel
  const bufLen=Math.floor(ctx.sampleRate/freq);
  const noiseLen=Math.floor(ctx.sampleRate*0.04);
  const noiseBuf=ctx.createBuffer(1,noiseLen,ctx.sampleRate);
  const nd=noiseBuf.getChannelData(0);
  for(let i=0;i<noiseLen;i++) nd[i]=Math.random()*2-1;
  const ns=ctx.createBufferSource(); ns.buffer=noiseBuf;

  // Body resonance: bandpass tuned to note + 2 harmonics
  const body=ctx.createBiquadFilter(); body.type='bandpass';
  body.frequency.value=freq; body.Q.value=18+windBoost*8;
  const harm=ctx.createBiquadFilter(); harm.type='bandpass';
  harm.frequency.value=freq*2.01; harm.Q.value=12;
  const harmG=ctx.createGain(); harmG.gain.value=0.25+s.color*0.12;

  // Warm LPF: wood body cuts highs
  const lpf=ctx.createBiquadFilter(); lpf.type='lowpass';
  lpf.frequency.value=(700+windBoost*300)*warp; lpf.Q.value=0.8;

  const g=ctx.createGain();
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(0.72+windBoost*0.1,t+0.012); // slow bow-like attack
  g.gain.linearRampToValueAtTime(0.0001,t+decay);
  g.gain.setValueAtTime(0,t+decay+0.01);

  ns.connect(body); body.connect(g);
  ns.connect(harm); harm.connect(harmG); harmG.connect(g);
  g.connect(lpf); lpf.connect(dest);
  ns.start(t); ns.stop(t+decay+0.02);
  autoClean(ns,body,harm,harmG,g,lpf);
}

// G-Funk synth bass: Moog-style portamento slide, wide filter sweep
function synthGFunkBass(ctx, t, note, chaos, warp, windBoost=0, prevNote=60, destIn=null){
  const dest=destIn||bus.getInput('bass'); if(!dest)return;
  const freq=440*Math.pow(2,(note-69)/12)*warp;
  const prevFreq=440*Math.pow(2,(prevNote-69)/12)*warp;
  const s=drumSeed();
  const decay=(0.55+s.decay*0.35)/warp;

  const osc=ctx.createOscillator(); osc.type='sawtooth';
  // Portamento from previous note -- the G-Funk slide
  osc.frequency.setValueAtTime(prevFreq,t);
  osc.frequency.setTargetAtTime(freq,t,0.04+chaos*0.03);  // slide time

  // Wide resonant filter sweep -- the Moog signature
  const flt=ctx.createBiquadFilter(); flt.type='lowpass';
  flt.Q.value=8+chaos*10+windBoost*6;
  flt.frequency.setValueAtTime(freq*12+windBoost*800,t);
  flt.frequency.setTargetAtTime(freq*1.5,t+0.06,0.12);

  // Detune second osc for thickness
  const osc2=ctx.createOscillator(); osc2.type='sawtooth';
  osc2.frequency.setValueAtTime(prevFreq*1.003,t);
  osc2.frequency.setTargetAtTime(freq*1.003,t,0.042);
  const osc2g=ctx.createGain(); osc2g.gain.value=0.4;

  const g=ctx.createGain();
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(0.75+windBoost*0.12,t+0.008);
  g.gain.linearRampToValueAtTime(0.0001,t+decay);
  g.gain.setValueAtTime(0,t+decay+0.01);

  osc.connect(flt); osc2.connect(osc2g); osc2g.connect(flt);
  flt.connect(g); g.connect(dest);
  osc.start(t); osc2.start(t);
  osc.stop(t+decay+0.02); osc2.stop(t+decay+0.02);
  autoClean(osc,osc2,osc2g,flt,g);
}

// Boom-bap staccato electric bass: gritty, short, percussive
function synthBoomBapBass(ctx, t, note, chaos, warp, windBoost=0, destIn=null){
  const dest=destIn||bus.getInput('bass'); if(!dest)return;
  const freq=440*Math.pow(2,(note-69)/12)*warp;
  const s=drumSeed();
  const decay=(0.12+s.decay*0.10)/warp;  // very short

  const osc=ctx.createOscillator(); osc.type='square';
  osc.frequency.value=freq;
  osc.detune.value=s.color*8-4;

  // Grit waveshaper
  const ws=ctx.createWaveShaper();
  const cv=new Float32Array(256);
  for(let i=0;i<256;i++){const x=i*2/256-1;cv[i]=Math.tanh(x*(2.5+windBoost*2));}
  ws.curve=cv;

  // Tight lowpass
  const lpf=ctx.createBiquadFilter(); lpf.type='lowpass';
  lpf.frequency.value=(300+chaos*400)*warp; lpf.Q.value=3;

  const g=ctx.createGain();
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(0.85,t+0.001);  // instant attack
  g.gain.linearRampToValueAtTime(0.0001,t+decay);
  g.gain.setValueAtTime(0,t+decay+0.01);

  osc.connect(ws); ws.connect(lpf); lpf.connect(g); g.connect(dest);
  osc.start(t); osc.stop(t+decay+0.02);
  autoClean(osc,ws,lpf,g);
}

// African clay/wood sub: resonant wood body, deep sub, very dynamic velocity
function synthAfroSub(ctx, t, note, chaos, warp, velocity=0.7, windBoost=0, destIn=null){
  const dest=destIn||bus.getInput('bass'); if(!dest)return;
  const freq=440*Math.pow(2,(note-69)/12)*warp;
  const s=drumSeed();
  const decay=(0.18+s.decay*0.14+windBoost*0.08)/warp;

  // Sub sine: clay resonator body
  const sub=ctx.createOscillator(); sub.type='sine';
  sub.frequency.setValueAtTime(freq*1.08,t);
  sub.frequency.setTargetAtTime(freq,t+0.01,0.025);

  // Overtone layer: wood body character
  const over=ctx.createOscillator(); over.type='triangle';
  over.frequency.value=freq*2.03;
  const og=ctx.createGain(); og.gain.value=velocity*0.22*s.color;

  // Wood thump: bandpass noise burst
  const nLen=Math.floor(ctx.sampleRate*0.06);
  const nBuf=ctx.createBuffer(1,nLen,ctx.sampleRate);
  const nd=nBuf.getChannelData(0);
  for(let i=0;i<nLen;i++) nd[i]=(Math.random()*2-1)*Math.exp(-i/nLen*8);
  const ns=ctx.createBufferSource(); ns.buffer=nBuf;
  const nbp=ctx.createBiquadFilter(); nbp.type='bandpass';
  nbp.frequency.value=freq*3+200; nbp.Q.value=4;
  const ng=ctx.createGain(); ng.gain.value=velocity*0.35;

  const g=ctx.createGain();
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(velocity*0.80,t+0.004);
  g.gain.linearRampToValueAtTime(0.0001,t+decay);
  g.gain.setValueAtTime(0,t+decay+0.01);

  sub.connect(g); over.connect(og); og.connect(g); g.connect(dest);
  ns.connect(nbp); nbp.connect(ng); ng.connect(dest);
  sub.start(t); sub.stop(t+decay+0.02);
  over.start(t); over.stop(t+decay+0.02);
  ns.start(t);
  autoClean(sub,over,og,g); autoClean(ns,nbp,ng);
}

// Tanpura/Indian drone sub: very long sustain, slight detuning for sitar-like shimmer
function synthTanpuraBass(ctx, t, note, chaos, warp, windBoost=0, destIn=null){
  const dest=destIn||bus.getInput('bass'); if(!dest)return;
  const freq=440*Math.pow(2,(note-69)/12)*warp;
  const s=drumSeed();
  const decay=(0.80+s.decay*0.6+windBoost*0.3)/warp;  // very long

  // 3 slightly detuned sines for tanpura shimmer
  const detunes=[0, 6, -4];
  for(const dt of detunes){
    const osc=ctx.createOscillator(); osc.type='sine';
    osc.frequency.value=freq*(1+dt*0.0001);
    // Slow modulation for beating
    const lfo=ctx.createOscillator(); lfo.type='sine';
    lfo.frequency.value=0.8+s.tone*0.6;
    const lfoG=ctx.createGain(); lfoG.gain.value=freq*0.003;
    lfo.connect(lfoG); lfoG.connect(osc.frequency);
    const g=ctx.createGain();
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.28,t+0.035);  // slow swell
    g.gain.linearRampToValueAtTime(0.0001,t+decay);
    g.gain.setValueAtTime(0,t+decay+0.01);
    osc.connect(g); g.connect(dest);
    osc.start(t); lfo.start(t); osc.stop(t+decay+0.02); lfo.stop(t+decay+0.02);
    autoClean(osc,lfo,lfoG,g);
  }
}

// Wood percussion: tabla/djembe-style short dynamic hits (African + Indian)
function synthWoodPerc(ctx, t, velocity=0.7, pitch=1.0, warp=1.0, dest){
  if(!dest)return;
  const s=drumSeed();
  const baseFreq=(180+s.pitch*140)*pitch*warp;
  const decay=(0.06+s.decay*0.07+velocity*0.04)/warp;

  // Body: membrane drum resonance
  const body=ctx.createOscillator(); body.type='sine';
  body.frequency.setValueAtTime(baseFreq*1.6,t);
  body.frequency.setTargetAtTime(baseFreq,t+0.003,0.018);

  // Skin snap: noise through tight bandpass
  const nLen=Math.floor(ctx.sampleRate*0.03);
  const nBuf=ctx.createBuffer(1,nLen,ctx.sampleRate);
  const nd=nBuf.getChannelData(0);
  for(let i=0;i<nLen;i++) nd[i]=(Math.random()*2-1)*Math.exp(-i/nLen*15);
  const ns=ctx.createBufferSource(); ns.buffer=nBuf;
  const nbp=ctx.createBiquadFilter(); nbp.type='bandpass';
  nbp.frequency.value=baseFreq*2.5; nbp.Q.value=6;
  const ng=ctx.createGain(); ng.gain.value=velocity*0.50;

  const g=ctx.createGain();
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(velocity*0.75,t+0.002);
  g.gain.linearRampToValueAtTime(0.0001,t+decay);
  g.gain.setValueAtTime(0,t+decay+0.005);

  body.connect(g); g.connect(dest);
  ns.connect(nbp); nbp.connect(ng); ng.connect(dest);
  body.start(t); body.stop(t+decay+0.01);
  ns.start(t);
  autoClean(body,g); autoClean(ns,nbp,ng);
}

// Funky Rhodes electric piano: DX7 E.PIANO 1 algorithm 5 — three carrier/mod
// pairs where one pair creates the bell tine via a 14:1 ratio, one pair does
// the bar/body at 1:1 with light modulation, and the third adds a 2:1
// detuned body layer. Classic 5-7 Hz tremolo + pickup EQ. Every note rolls
// fresh jitter so repeated pitches don't sound identical.
function synthRhodes(ctx, t, notes, chordType, chaos, warp, dest, windBoost=0, durScale=1.0){
  if(!dest)return;
  const s=drumSeed();
  const dark=bandTaste.darkness;
  const _ms=styleP();
  const _dscl=Math.max(0.25, Math.min(8.0, durScale||1.0));
  const sustain=(0.9+s.tone*0.5+windBoost*0.2)*_ms.noteLenMult*_dscl/warp;
  const atk=0.008*_ms.attackMult;

  // Per-note jitter seed so the same pitch sounds different every repeat
  const perNoteJitter = ()=>({
    tine: 13.5 + Math.random()*1.0,    // 13.5-14.5 (centered on DX7 14:1)
    bar:  1.98 + Math.random()*0.08,   // slight inharmonicity on bar layer
    body: 2.00 + (Math.random()-0.5)*0.02,
    modAtk: 0.35 + Math.random()*0.35, // tine brightness at attack
    modTail: 0.04 + Math.random()*0.05,
    hammerAmt: 0.30 + Math.random()*0.40,
    tremHz: 5.0 + Math.random()*1.6,   // 5-6.6 Hz Rhodes tremolo
    cutoff: 1400 + Math.random()*1800, // pickup bandpass center
  });

  // Shared tremolo LFO on the group gain (classic Rhodes stereo-ish swirl)
  const trem=ctx.createOscillator(); trem.type='sine';
  const groupJ = perNoteJitter();
  trem.frequency.value = groupJ.tremHz;
  const tremAmt=ctx.createGain(); tremAmt.gain.value = 0.08+chaos*0.06;
  const tremOut=ctx.createGain(); tremOut.gain.value = 1.0;
  trem.connect(tremAmt); tremAmt.connect(tremOut.gain);
  trem.start(t); trem.stop(t+sustain+0.1);

  // Pickup EQ: gentle bandpass that gives Rhodes its woody focus
  const pickup=ctx.createBiquadFilter(); pickup.type='bandpass';
  pickup.frequency.value = groupJ.cutoff;
  pickup.Q.value = 0.45 + chaos*0.2;
  // Funky-Rhodes wah envelope: pickup filter opens hard on attack and
  // slowly closes. This is the "bark" a Rhodes has in Stevie-Wonder funk.
  pickup.frequency.setValueAtTime(groupJ.cutoff*0.55, t);
  pickup.frequency.exponentialRampToValueAtTime(groupJ.cutoff*1.4, t+0.05);
  pickup.frequency.exponentialRampToValueAtTime(groupJ.cutoff, t+sustain*0.6);
  const pickupOut=ctx.createGain(); pickupOut.gain.value=1.0;

  // Chorus: slightly detuned, delayed copy so the Rhodes sits wide instead
  // of mono. 12-18 ms delay, gain 0.35, no feedback — the classic CE-1 feel.
  const chorus=ctx.createDelay(0.05);
  chorus.delayTime.value = 0.012 + Math.random()*0.006;
  const chorusLFO=ctx.createOscillator(); chorusLFO.type='sine';
  chorusLFO.frequency.value = 0.35 + Math.random()*0.45; // 0.35-0.8 Hz
  const chorusLFOAmt=ctx.createGain(); chorusLFOAmt.gain.value=0.0025;
  chorusLFO.connect(chorusLFOAmt); chorusLFOAmt.connect(chorus.delayTime);
  chorusLFO.start(t); chorusLFO.stop(t+sustain+0.1);
  const chorusMix=ctx.createGain(); chorusMix.gain.value=0.35;
  chorus.connect(chorusMix); chorusMix.connect(tremOut);

  pickup.connect(pickupOut); pickupOut.connect(tremOut); pickupOut.connect(chorus);
  tremOut.connect(dest);
  autoClean(trem,tremAmt,tremOut,pickup,pickupOut,chorus,chorusLFO,chorusLFOAmt,chorusMix);

  for(const semis of (notes||[0])){
    const freq=440*Math.pow(2,(semis-69)/12)*warp;
    if(freq<=0)continue;
    const J = perNoteJitter();

    // --- Pair 1: TINE (DX7 E.PIANO bell via 14:1 ratio) ---
    const carT=ctx.createOscillator(); carT.type='sine'; carT.frequency.value=freq;
    const modT=ctx.createOscillator(); modT.type='sine'; modT.frequency.value=freq*J.tine;
    const modTG=ctx.createGain();
    modTG.gain.setValueAtTime(freq*J.modAtk, t);
    modTG.gain.exponentialRampToValueAtTime(freq*0.002, t+0.10+J.modTail);
    const tineG=ctx.createGain();
    tineG.gain.setValueAtTime(0,t);
    tineG.gain.linearRampToValueAtTime(0.16+s.punch*0.06, t+atk);
    tineG.gain.exponentialRampToValueAtTime(0.0001, t+sustain);
    modT.connect(modTG); modTG.connect(carT.frequency);
    carT.connect(tineG); tineG.connect(pickup);
    carT.start(t); modT.start(t);
    carT.stop(t+sustain+0.02); modT.stop(t+sustain+0.02);
    autoClean(carT,modT,modTG,tineG);

    // --- Pair 2: BAR (warm body with slight inharmonic detune) ---
    const carB=ctx.createOscillator(); carB.type='sine'; carB.frequency.value=freq;
    const modB=ctx.createOscillator(); modB.type='sine'; modB.frequency.value=freq*J.bar;
    const modBG=ctx.createGain();
    modBG.gain.setValueAtTime(freq*(0.12+dark*0.10), t);
    modBG.gain.exponentialRampToValueAtTime(freq*0.015, t+sustain*0.7);
    const barG=ctx.createGain();
    barG.gain.setValueAtTime(0,t);
    barG.gain.linearRampToValueAtTime(0.22+s.tone*0.05, t+atk+0.004);
    barG.gain.exponentialRampToValueAtTime(0.0001, t+sustain+0.05);
    modB.connect(modBG); modBG.connect(carB.frequency);
    carB.connect(barG); barG.connect(pickup);
    carB.start(t); modB.start(t);
    carB.stop(t+sustain+0.04); modB.stop(t+sustain+0.04);
    autoClean(carB,modB,modBG,barG);

    // --- Pair 3: BODY (fifth partial — adds low fullness) ---
    const carH=ctx.createOscillator(); carH.type='sine'; carH.frequency.value=freq*0.5;
    const modH=ctx.createOscillator(); modH.type='sine'; modH.frequency.value=freq*J.body*0.5;
    const modHG=ctx.createGain();
    modHG.gain.setValueAtTime(freq*0.04, t);
    modHG.gain.exponentialRampToValueAtTime(freq*0.005, t+sustain*0.8);
    const bodyG=ctx.createGain();
    bodyG.gain.setValueAtTime(0,t);
    bodyG.gain.linearRampToValueAtTime(0.09, t+atk+0.008);
    bodyG.gain.exponentialRampToValueAtTime(0.0001, t+sustain+0.10);
    modH.connect(modHG); modHG.connect(carH.frequency);
    carH.connect(bodyG); bodyG.connect(pickup);
    carH.start(t); modH.start(t);
    carH.stop(t+sustain+0.08); modH.stop(t+sustain+0.08);
    autoClean(carH,modH,modHG,bodyG);

    // --- HAMMER THUD: real Rhodes hammer lands on a tonebar. Beefed up
    // for funk: sharper noise burst + a short square-wave "knock" at the
    // fundamental that gives the classic Stevie bark.
    const hLen=Math.floor(ctx.sampleRate*0.014);
    const hBuf=ctx.createBuffer(1,hLen,ctx.sampleRate);
    const hD=hBuf.getChannelData(0);
    for(let i=0;i<hLen;i++) hD[i]=(Math.random()*2-1)*Math.pow(1-i/hLen,0.6);
    const hNs=ctx.createBufferSource(); hNs.buffer=hBuf;
    const hHpf=ctx.createBiquadFilter(); hHpf.type='highpass'; hHpf.frequency.value=700;
    const hG=ctx.createGain();
    hG.gain.setValueAtTime(J.hammerAmt*0.42, t);
    hG.gain.exponentialRampToValueAtTime(0.0001, t+0.030);
    hNs.connect(hHpf); hHpf.connect(hG); hG.connect(pickup);
    hNs.start(t);
    autoClean(hNs,hHpf,hG);
    // Funky knock: quick square-wave pulse at the fundamental
    const knock=ctx.createOscillator(); knock.type='square';
    knock.frequency.setValueAtTime(freq*2, t);
    knock.frequency.exponentialRampToValueAtTime(freq*0.7, t+0.012);
    const knockG=ctx.createGain();
    knockG.gain.setValueAtTime(0.10+J.hammerAmt*0.05, t);
    knockG.gain.exponentialRampToValueAtTime(0.0001, t+0.020);
    knock.connect(knockG); knockG.connect(pickup);
    knock.start(t); knock.stop(t+0.025);
    autoClean(knock,knockG);
  }
}

// ═══════════════════════════════════════════════════════════════════════════════
// MID / LEAD SYNTH BANK
// Each synth has a distinct character so rotating between them over the course
// of a song keeps the chord + lead voice from going stale. All of them accept
// the same (ctx, t, notes, chordType, chaos, warp, dest, windBoost, durScale)
// shape for mid voices (lead variants take a single note instead of notes[]).
// Physical models are tuned from the DSP literature — not guessed ratios.
// ═══════════════════════════════════════════════════════════════════════════════

// Wurlitzer 200A: reed struck by hammer, slight asymmetric waveform with
// overdrive "growl" when played hard. Two operators (ratio ~2:1) plus a
// small square-wave 3rd harmonic for the reed buzz.
function synthWurli(ctx, t, notes, chordType, chaos, warp, dest, windBoost=0, durScale=1.0){
  if(!dest)return;
  const s=drumSeed();
  const _ms=styleP();
  const _dscl=Math.max(0.25, Math.min(8.0, durScale||1.0));
  const sustain=(0.75+s.tone*0.5+windBoost*0.25)*_ms.noteLenMult*_dscl/warp;
  const atk=0.006*_ms.attackMult;

  // Tremolo (Wurli has steeper amplitude tremolo than Rhodes)
  const trem=ctx.createOscillator(); trem.type='sine';
  trem.frequency.value = 5.2 + Math.random()*1.0;
  const tremAmt=ctx.createGain(); tremAmt.gain.value = 0.16 + chaos*0.08;
  const tremOut=ctx.createGain(); tremOut.gain.value = 1.0;
  trem.connect(tremAmt); tremAmt.connect(tremOut.gain);
  trem.start(t); trem.stop(t+sustain+0.1);
  // Subtle overdrive on sustain — the Wurli growl
  const od=ctx.createWaveShaper();
  const cv=new Float32Array(256); for(let i=0;i<256;i++){const x=i*2/256-1; cv[i]=Math.tanh(x*2.3);}
  od.curve=cv; od.oversample='2x';
  od.connect(tremOut); tremOut.connect(dest);
  autoClean(trem,tremAmt,tremOut,od);

  for(const semis of (notes||[0])){
    const freq=440*Math.pow(2,(semis-69)/12)*warp;
    if(freq<=0)continue;
    // Carrier + modulator at ~2:1 for reed body
    const car=ctx.createOscillator(); car.type='sine'; car.frequency.value=freq;
    const mod=ctx.createOscillator(); mod.type='sine';
    mod.frequency.value=freq*(2.00 + (Math.random()-0.5)*0.02);
    const modG=ctx.createGain();
    modG.gain.setValueAtTime(freq*(0.50+windBoost*0.2), t);
    modG.gain.exponentialRampToValueAtTime(freq*0.03, t+0.16);
    // Small 3rd-harmonic square bite for the reed buzz
    const buzz=ctx.createOscillator(); buzz.type='square'; buzz.frequency.value=freq*3;
    const buzzG=ctx.createGain();
    buzzG.gain.setValueAtTime(0.04+windBoost*0.03, t);
    buzzG.gain.exponentialRampToValueAtTime(0.002, t+0.12);
    const g=ctx.createGain();
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.24+s.punch*0.06, t+atk);
    g.gain.exponentialRampToValueAtTime(0.0001, t+sustain+0.05);
    mod.connect(modG); modG.connect(car.frequency);
    car.connect(g); buzz.connect(buzzG); buzzG.connect(g); g.connect(od);
    car.start(t); mod.start(t); buzz.start(t);
    car.stop(t+sustain+0.05); mod.stop(t+sustain+0.05); buzz.stop(t+sustain+0.05);
    autoClean(car,mod,modG,buzz,buzzG,g);
  }
}

// Clavinet D6: struck string with pickup EQ. Rapid attack, short decay,
// sharp bandpass around 1.5-2 kHz gives the classic Stevie "Superstition"
// bite. Every hit rolls a fresh pickup cutoff for tonal variety.
function synthClav(ctx, t, notes, chordType, chaos, warp, dest, windBoost=0, durScale=1.0){
  if(!dest)return;
  const s=drumSeed();
  const _dscl=Math.max(0.25, Math.min(8.0, durScale||1.0));
  const decay=(0.28+s.decay*0.22+windBoost*0.15)*_dscl/warp;

  // Pickup bandpass — randomized cutoff per voice for funky variety
  const pickup=ctx.createBiquadFilter(); pickup.type='bandpass';
  pickup.frequency.value = 1400 + Math.random()*1200;
  pickup.Q.value = Math.min(2.6, 1.4 + chaos*0.9);
  // Gentle wah envelope on the filter (makes it talk)
  pickup.frequency.setValueAtTime(pickup.frequency.value*0.6, t);
  pickup.frequency.exponentialRampToValueAtTime(pickup.frequency.value, t+0.05);
  pickup.connect(dest);
  autoClean(pickup);

  for(const semis of (notes||[0])){
    const freq=440*Math.pow(2,(semis-69)/12)*warp;
    if(freq<=0)continue;
    // Sawtooth "picked string" through the pickup
    const osc=ctx.createOscillator(); osc.type='sawtooth'; osc.frequency.value=freq;
    // Slight detune so chords shimmer
    osc.detune.value=(Math.random()-0.5)*8;
    const g=ctx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.16+s.punch*0.08, t+0.002);
    g.gain.exponentialRampToValueAtTime(0.0001, t+decay);
    osc.connect(g); g.connect(pickup);
    osc.start(t); osc.stop(t+decay+0.02);
    autoClean(osc,g);
    // Hammer snap: fast filtered noise burst
    const hLen=Math.floor(ctx.sampleRate*0.012);
    const hBuf=ctx.createBuffer(1,hLen,ctx.sampleRate);
    const hD=hBuf.getChannelData(0);
    for(let i=0;i<hLen;i++) hD[i]=(Math.random()*2-1)*Math.pow(1-i/hLen,1.2);
    const hNs=ctx.createBufferSource(); hNs.buffer=hBuf;
    const hHpf=ctx.createBiquadFilter(); hHpf.type='highpass'; hHpf.frequency.value=1200;
    const hG=ctx.createGain();
    hG.gain.setValueAtTime(0.18, t); hG.gain.exponentialRampToValueAtTime(0.0001, t+0.025);
    hNs.connect(hHpf); hHpf.connect(hG); hG.connect(pickup);
    hNs.start(t);
    autoClean(hNs,hHpf,hG);
  }
}

// Xylophone bar: fundamental + inharmonic partial at ~3.0x (traditional
// rosewood xylophone mode ratio) + ~6.0x second partial. Very short decay,
// bright mallet click at attack.
function synthXylo(ctx, t, notes, chordType, chaos, warp, dest, windBoost=0, durScale=1.0){
  if(!dest)return;
  const s=drumSeed();
  const _dscl=Math.max(0.25, Math.min(4.0, durScale||1.0));
  const decay=(0.12+s.decay*0.08)*_dscl/warp;

  for(const semis of (notes||[0])){
    const freq=440*Math.pow(2,(semis-69)/12)*warp;
    if(freq<=0)continue;

    // Fundamental
    const f0=ctx.createOscillator(); f0.type='sine'; f0.frequency.value=freq;
    const g0=ctx.createGain();
    g0.gain.setValueAtTime(0.28+s.punch*0.06, t);
    g0.gain.exponentialRampToValueAtTime(0.0001, t+decay);
    f0.connect(g0); g0.connect(dest);
    f0.start(t); f0.stop(t+decay+0.02);

    // 3x partial — characteristic xylophone "tink"
    const f1=ctx.createOscillator(); f1.type='sine';
    f1.frequency.value=freq*(3.00 + (Math.random()-0.5)*0.06);
    const g1=ctx.createGain();
    g1.gain.setValueAtTime(0.14, t);
    g1.gain.exponentialRampToValueAtTime(0.0001, t+decay*0.55);
    f1.connect(g1); g1.connect(dest);
    f1.start(t); f1.stop(t+decay*0.6);

    // 6x partial — upper brightness, decays fastest
    const f2=ctx.createOscillator(); f2.type='sine';
    f2.frequency.value=freq*6.0;
    const g2=ctx.createGain();
    g2.gain.setValueAtTime(0.05, t);
    g2.gain.exponentialRampToValueAtTime(0.0001, t+decay*0.25);
    f2.connect(g2); g2.connect(dest);
    f2.start(t); f2.stop(t+decay*0.3);

    // Mallet click
    const nLen=Math.floor(ctx.sampleRate*0.004);
    const nBuf=ctx.createBuffer(1,nLen,ctx.sampleRate);
    const nD=nBuf.getChannelData(0);
    for(let i=0;i<nLen;i++) nD[i]=(Math.random()*2-1)*Math.pow(1-i/nLen,0.3);
    const ns=ctx.createBufferSource(); ns.buffer=nBuf;
    const nHpf=ctx.createBiquadFilter(); nHpf.type='highpass'; nHpf.frequency.value=2500;
    const nG=ctx.createGain();
    nG.gain.setValueAtTime(0.10, t); nG.gain.exponentialRampToValueAtTime(0.0001, t+0.010);
    ns.connect(nHpf); nHpf.connect(nG); nG.connect(dest);
    ns.start(t);

    autoClean(f0,g0,f1,g1,f2,g2,ns,nHpf,nG);
  }
}

// Marimba bar: like xylo but tuned to 4:1 fundamental-to-first-partial
// (concert marimba standard from Yamaha bar tuning) with the 9.24x third
// partial. Softer mallet, slightly longer ring.
function synthMarimba(ctx, t, notes, chordType, chaos, warp, dest, windBoost=0, durScale=1.0){
  if(!dest)return;
  const s=drumSeed();
  const _dscl=Math.max(0.25, Math.min(6.0, durScale||1.0));
  const decay=(0.32+s.decay*0.20)*_dscl/warp;

  for(const semis of (notes||[0])){
    const freq=440*Math.pow(2,(semis-69)/12)*warp;
    if(freq<=0)continue;

    const f0=ctx.createOscillator(); f0.type='sine'; f0.frequency.value=freq;
    const g0=ctx.createGain();
    g0.gain.setValueAtTime(0.30+s.punch*0.05, t);
    g0.gain.exponentialRampToValueAtTime(0.0001, t+decay);
    f0.connect(g0); g0.connect(dest);
    f0.start(t); f0.stop(t+decay+0.02);

    // 4x partial (marimba's defining harmonic per bar-tuning research)
    const f1=ctx.createOscillator(); f1.type='sine';
    f1.frequency.value=freq*(4.00 + (Math.random()-0.5)*0.04);
    const g1=ctx.createGain();
    g1.gain.setValueAtTime(0.11, t);
    g1.gain.exponentialRampToValueAtTime(0.0001, t+decay*0.45);
    f1.connect(g1); g1.connect(dest);
    f1.start(t); f1.stop(t+decay*0.5);

    // 9.24x partial (measured third mode of a well-tuned marimba)
    const f2=ctx.createOscillator(); f2.type='sine';
    f2.frequency.value=freq*9.24;
    const g2=ctx.createGain();
    g2.gain.setValueAtTime(0.04, t);
    g2.gain.exponentialRampToValueAtTime(0.0001, t+decay*0.20);
    f2.connect(g2); g2.connect(dest);
    f2.start(t); f2.stop(t+decay*0.25);

    // Softer mallet — longer noise burst, lower highpass
    const nLen=Math.floor(ctx.sampleRate*0.008);
    const nBuf=ctx.createBuffer(1,nLen,ctx.sampleRate);
    const nD=nBuf.getChannelData(0);
    for(let i=0;i<nLen;i++) nD[i]=(Math.random()*2-1)*Math.pow(1-i/nLen,0.8);
    const ns=ctx.createBufferSource(); ns.buffer=nBuf;
    const nHpf=ctx.createBiquadFilter(); nHpf.type='highpass'; nHpf.frequency.value=1400;
    const nG=ctx.createGain();
    nG.gain.setValueAtTime(0.08, t); nG.gain.exponentialRampToValueAtTime(0.0001, t+0.018);
    ns.connect(nHpf); nHpf.connect(nG); nG.connect(dest);
    ns.start(t);

    autoClean(f0,g0,f1,g1,f2,g2,ns,nHpf,nG);
  }
}

// Nylon/steel-string guitar: Karplus-Strong plucked string model. A short
// noise burst (the pick) excites a delay line whose length equals the note
// period; a low-pass feedback filter damps the string so each successive
// reflection loses high frequencies. Body resonance is approximated with
// two resonant band-passes (~100 Hz air mode + ~200 Hz top-plate mode).
// Per-note pick position, brightness, and damping are randomized so
// repeated pitches sound like different strokes.
function synthGuitar(ctx, t, notes, chordType, chaos, warp, dest, windBoost=0, durScale=1.0){
  if(!dest)return;
  const _dscl=Math.max(0.25, Math.min(6.0, durScale||1.0));
  const SR=ctx.sampleRate;

  const body1=ctx.createBiquadFilter(); body1.type='bandpass';
  body1.frequency.value=100; body1.Q.value=8;
  const body2=ctx.createBiquadFilter(); body2.type='bandpass';
  body2.frequency.value=220; body2.Q.value=6;
  const bodyMix=ctx.createGain(); bodyMix.gain.value=0.35;
  const dry=ctx.createGain(); dry.gain.value=1.0;
  body1.connect(bodyMix); body2.connect(bodyMix);
  bodyMix.connect(dest); dry.connect(dest);
  autoClean(body1,body2,bodyMix,dry);

  (notes||[0]).forEach(function(semis, idx){
    const freq=440*Math.pow(2,(semis-69)/12)*warp;
    if(freq<=0||freq>2000) return;
    // Pluck position (0.05-0.35 of string) shapes initial brightness
    const pickPos = 0.08 + Math.random()*0.24;
    // Karplus-Strong via ScriptProcessor-style: use a very short buffer as
    // the initial excitation and feed it through a recursive delay + LP.
    const period = 1/freq;
    const dLine = ctx.createDelay(1);
    dLine.delayTime.value = period;
    const lp = ctx.createBiquadFilter(); lp.type='lowpass';
    lp.frequency.value = 2200 + Math.random()*2400 + windBoost*800;
    lp.Q.value = 0.4;
